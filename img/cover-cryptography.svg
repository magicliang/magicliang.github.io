<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Cryptography / Signature cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset=".5" stop-color="#1e1b4b"/><stop offset="1" stop-color="#0b1120"/></linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse"><path d="M80 0H0v80" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"/></pattern>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M0 740C200 660 380 780 620 700c200-66 340-200 520-160 140 31 260 100 460 50v310H0z" fill="#020617" opacity=".4"/>
  <!-- Hash chain visualization -->
  <g opacity=".12" fill="none" stroke="#a78bfa" stroke-width="2">
    <rect x="920" y="140" width="120" height="50" rx="8"/>
    <rect x="1080" y="140" width="120" height="50" rx="8"/>
    <rect x="1240" y="140" width="120" height="50" rx="8"/>
    <path d="M1040 165h40M1200 165h40" stroke-dasharray="6 4"/>
  </g>
  <!-- Key icon -->
  <g transform="translate(1050, 320)" fill="none" stroke="url(#keyGrad)" stroke-width="6" stroke-linecap="round">
    <circle cx="0" cy="0" r="35"/>
    <path d="M25 25L95 95M95 95l-25 0M95 95l0-25"/>
    <circle cx="0" cy="0" r="12" fill="#f59e0b" fill-opacity=".2"/>
  </g>
  <!-- Lock icon -->
  <g transform="translate(1320, 420)" fill="none" stroke="url(#lockGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-40" y="0" width="80" height="60" rx="8" fill="#4f46e5" fill-opacity=".15"/>
    <path d="M-20 0V-20a20 20 0 0 1 40 0V0"/>
    <circle cx="0" cy="28" r="6" fill="#a78bfa"/>
  </g>
  <!-- Signature wave -->
  <g opacity=".25" fill="none" stroke="#10b981" stroke-width="3">
    <path d="M930 540C960 510 990 570 1020 540s30-60 60-30 30 60 60 30 30-60 60-30 30 60 60 30 30-60 60-30 30 60 60 30"/>
  </g>
  <!-- Binary decorations -->
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#6366f1" opacity=".2">
    <text x="940" y="640">01001000 01001101 01000001 01000011</text>
    <text x="940" y="670">10110011 01010011 01001000 01000001</text>
  </g>
  <!-- Main text -->
  <text x="120" y="380" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="82" font-weight="760" letter-spacing="0" fill="#f8fafc">Cryptographic</text>
  <text x="120" y="470" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="82" font-weight="760" letter-spacing="0" fill="#f8fafc">Signatures</text>
  <text x="126" y="540" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0" fill="#c4b5fd">HMAC · RSA · ECDSA · EdDSA · JWT · X.509</text>
  <!-- Decorative lines -->
  <g opacity=".14" fill="none" stroke="#fff" stroke-width="2"><path d="M120 160h460M120 210h340M120 260h400M120 720h320"/></g>
  <text x="126" y="755" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="24" fill="#cbd5e1" opacity=".86">magicliang blog</text>
</svg>
