<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Self-improving agent shadow layer cover</title>
  <desc id="desc">A layered technical diagram showing static weights, context window, external memory, harness gates, and a shadow layer that changes agent behavior without changing model weights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.42" stop-color="#172033"/>
      <stop offset="1" stop-color="#26301f"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#a3e635" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e5e7eb; }
      .muted { fill: #a7b0be; }
      .small { font-size: 24px; }
      .mid { font-size: 34px; font-weight: 650; }
      .big { font-size: 72px; font-weight: 780; letter-spacing: 0; }
      .chip { fill: rgba(15, 23, 42, 0.74); stroke: rgba(226, 232, 240, 0.22); stroke-width: 2; }
      .node { fill: rgba(255,255,255,0.08); stroke: rgba(226,232,240,0.22); stroke-width: 2; }
      .line { stroke: rgba(226,232,240,0.48); stroke-width: 3; fill: none; }
      .dash { stroke-dasharray: 12 14; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 728 C245 662 363 760 567 704 C760 651 863 520 1076 567 C1260 607 1374 704 1600 642 L1600 900 L0 900 Z" fill="#0f172a" opacity="0.48"/>
  <path d="M0 762 C232 692 390 808 613 744 C838 679 952 604 1160 643 C1338 676 1449 746 1600 708" stroke="url(#shadow)" stroke-width="5" fill="none" opacity="0.75"/>

  <g transform="translate(94 74)">
    <text class="label big" x="0" y="0" dominant-baseline="hanging">Self-Improving Agent</text>
    <text class="label mid muted" x="4" y="92">外部记忆 shadow 权重，而不是改写权重</text>
  </g>

  <g filter="url(#soft)">
    <rect x="118" y="244" width="360" height="340" rx="18" class="node"/>
    <text class="label mid" x="156" y="300">L1 Static Weights</text>
    <text class="label small muted" x="156" y="344">语言能力 / 常识 / 泛化</text>
    <circle cx="298" cy="454" r="82" fill="#111827" stroke="#64748b" stroke-width="3"/>
    <path d="M244 454 C244 395 352 395 352 454 C352 513 244 513 244 454Z" fill="none" stroke="#94a3b8" stroke-width="4"/>
    <path d="M298 372 L298 536 M216 454 L380 454" stroke="#94a3b8" stroke-width="4" opacity="0.72"/>

    <rect x="620" y="214" width="360" height="400" rx="18" class="node"/>
    <text class="label mid" x="662" y="270">L2 Context</text>
    <text class="label small muted" x="662" y="314">当前工作集 / spec / tests</text>
    <rect x="668" y="374" width="264" height="42" rx="10" fill="#1f2937"/>
    <rect x="668" y="438" width="210" height="42" rx="10" fill="#164e63"/>
    <rect x="668" y="502" width="238" height="42" rx="10" fill="#3f3f46"/>

    <rect x="1122" y="244" width="360" height="340" rx="18" class="node"/>
    <text class="label mid" x="1162" y="300">L3 / L4 Store</text>
    <text class="label small muted" x="1162" y="344">memory / skill / world</text>
    <rect x="1170" y="394" width="120" height="126" rx="10" fill="#065f46"/>
    <rect x="1310" y="394" width="120" height="126" rx="10" fill="#854d0e"/>
    <text class="label small" x="1198" y="462">mem</text>
    <text class="label small" x="1340" y="462">skill</text>
  </g>

  <path class="line" d="M478 414 C540 414 562 414 620 414"/>
  <path class="line dash" d="M980 414 C1039 414 1062 414 1122 414"/>
  <path class="line" d="M1302 584 C1268 714 1012 762 802 700 C631 650 563 576 478 508"/>

  <g>
    <rect x="610" y="674" width="398" height="84" rx="18" fill="url(#shadow)" opacity="0.92"/>
    <text class="label mid" x="670" y="727" fill="#0f172a">Shadow Layer</text>
    <text class="label small" x="670" y="756" fill="#172033">检索 · 注入 · 验证 · 回滚</text>
  </g>

  <g transform="translate(110 776)">
    <rect width="256" height="48" rx="24" class="chip"/>
    <text class="label small muted" x="24" y="31">weights unchanged</text>
  </g>
  <g transform="translate(430 776)">
    <rect width="254" height="48" rx="24" class="chip"/>
    <text class="label small muted" x="24" y="31">behavior evolves</text>
  </g>
  <g transform="translate(748 776)">
    <rect width="288" height="48" rx="24" class="chip"/>
    <text class="label small muted" x="24" y="31">external state matters</text>
  </g>
</svg>
