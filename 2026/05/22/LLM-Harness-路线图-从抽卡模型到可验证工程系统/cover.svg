<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LLM Harness 路线图：从抽卡模型到可验证工程系统</title>
  <desc id="desc">从概率输出、上下文换入换出、环境可供性、Spec 边界、Agent Teams 到软件入口高阶化的路线图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.48" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#203a34"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 56px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 28px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#c7d2fe;letter-spacing:0}
      .node{fill:#0f172a;stroke:#7dd3fc;stroke-width:3;filter:url(#soft)}
      .hub{fill:#052e2b;stroke:#34d399;stroke-width:4;filter:url(#soft)}
      .label{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#ecfeff;letter-spacing:0}
      .small{font:500 19px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#cbd5e1;letter-spacing:0}
      .line{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .green{stroke:#34d399}
      .dot{fill:#38bdf8}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="132" class="title">LLM Harness 路线图</text>
  <text x="105" y="188" class="sub">从抽卡模型到可验证工程系统</text>

  <g transform="translate(140 286)">
    <path class="line" d="M120 115H350H580H810H1040H1270"/>
    <path class="line green" d="M695 115V315"/>
    <circle class="dot" cx="120" cy="115" r="9"/>
    <circle class="dot" cx="350" cy="115" r="9"/>
    <circle class="dot" cx="580" cy="115" r="9"/>
    <circle class="dot" cx="810" cy="115" r="9"/>
    <circle class="dot" cx="1040" cy="115" r="9"/>
    <circle class="dot" cx="1270" cy="115" r="9"/>

    <g transform="translate(0 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="54" y="52" class="label">概率分布</text>
      <text x="50" y="86" class="small">裸模型像抽卡</text>
    </g>
    <g transform="translate(230 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="42" y="52" class="label">工作集管理</text>
      <text x="54" y="86" class="small">context paging</text>
    </g>
    <g transform="translate(460 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="54" y="52" class="label">环境可供性</text>
      <text x="42" y="86" class="small">取到正确数据</text>
    </g>
    <g transform="translate(690 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="42" y="52" class="label">Spec / Tests</text>
      <text x="62" y="86" class="small">边界与验收</text>
    </g>
    <g transform="translate(920 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="52" y="52" class="label">Agent Teams</text>
      <text x="58" y="86" class="small">注意力降维</text>
    </g>
    <g transform="translate(1150 0)">
      <rect class="node" width="240" height="120" rx="18"/>
      <text x="54" y="52" class="label">软件入口</text>
      <text x="48" y="86" class="small">Agent 化入口层</text>
    </g>

    <g transform="translate(470 255)">
      <rect class="hub" width="450" height="120" rx="24"/>
      <text x="128" y="52" class="label">Harness</text>
      <text x="62" y="86" class="small">边界、供料、验证、循环组成控制系统</text>
    </g>
  </g>

  <text x="104" y="802" class="small">模型强弱只是底座；上下文、环境、Spec、工具和循环决定能力怎样进入工程世界。</text>
</svg>
