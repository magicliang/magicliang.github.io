<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent Teams 为什么有效</title>
  <desc id="desc">Orchestrator 把任务拆到多个独立上下文，再合并验证。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#2a3250"/>
      <stop offset="1" stop-color="#17382f"/>
    </linearGradient>
    <style>
      .title{font:700 68px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 30px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#c4b5fd}
      .label{font:700 25px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f5f3ff}
      .small{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#d8b4fe}
      .hub{fill:#1e1b4b;stroke:#a78bfa;stroke-width:3}
      .agent{fill:#0f172a;stroke:#5eead4;stroke-width:2}
      .line{stroke:#a78bfa;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="110" y="145" class="title">Agent Teams 为什么有效</text>
  <text x="116" y="202" class="sub">注意力隔离、模块降维、合并验证</text>
  <g transform="translate(620 310)">
    <rect class="hub" width="360" height="180" rx="24"/>
    <text x="70" y="76" class="label">Orchestrator</text>
    <text x="58" y="122" class="small">目标 / 分派 / 合并 / 验证</text>
  </g>
  <g transform="translate(160 300)">
    <rect class="agent" width="300" height="132" rx="18"/>
    <text x="44" y="56" class="label">Plan Agent</text>
    <text x="44" y="94" class="small">只做任务分解</text>
  </g>
  <g transform="translate(160 530)">
    <rect class="agent" width="300" height="132" rx="18"/>
    <text x="44" y="56" class="label">Build Agent</text>
    <text x="44" y="94" class="small">只改局部模块</text>
  </g>
  <g transform="translate(1140 300)">
    <rect class="agent" width="300" height="132" rx="18"/>
    <text x="44" y="56" class="label">Research Agent</text>
    <text x="44" y="94" class="small">只找证据</text>
  </g>
  <g transform="translate(1140 530)">
    <rect class="agent" width="300" height="132" rx="18"/>
    <text x="44" y="56" class="label">Verify Agent</text>
    <text x="44" y="94" class="small">只跑验证</text>
  </g>
  <path class="line" d="M460 366H620M460 596H620M980 366H1140M980 596H1140"/>
  <path class="line" d="M800 490V710"/>
  <g transform="translate(650 710)">
    <rect class="hub" width="300" height="78" rx="18"/>
    <text x="66" y="49" class="label">Merged Evidence</text>
  </g>
</svg>
