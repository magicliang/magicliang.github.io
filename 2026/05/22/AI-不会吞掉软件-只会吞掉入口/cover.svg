<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI 不会吞掉软件，只会吞掉入口</title>
  <desc id="desc">AI Agent 成为高阶入口，底层软件继续执行确定性任务。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#1d3557"/>
      <stop offset="1" stop-color="#28413c"/>
    </linearGradient>
    <style>
      .title{font:700 64px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 30px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#fde68a}
      .label{font:700 25px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#fff7ed}
      .small{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#e5e7eb}
      .entry{fill:#2f1f0f;stroke:#fbbf24;stroke-width:3}
      .sys{fill:#0f172a;stroke:#38bdf8;stroke-width:2}
      .line{stroke:#fbbf24;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="105" y="145" class="title">AI 不会吞掉软件</text>
  <text x="110" y="202" class="sub">它会吞掉入口，把软件变成可调用能力</text>
  <g transform="translate(560 250)">
    <rect class="entry" width="480" height="150" rx="24"/>
    <text x="92" y="64" class="label">Agent Entry Layer</text>
    <text x="78" y="108" class="small">意图理解 / 权限 / 工具选择 / 审计</text>
  </g>
  <g transform="translate(120 560)">
    <rect class="sys" width="210" height="90" rx="16"/>
    <text x="54" y="55" class="label">数据库</text>
  </g>
  <g transform="translate(390 560)">
    <rect class="sys" width="210" height="90" rx="16"/>
    <text x="58" y="55" class="label">浏览器</text>
  </g>
  <g transform="translate(660 560)">
    <rect class="sys" width="210" height="90" rx="16"/>
    <text x="54" y="55" class="label">PDF 库</text>
  </g>
  <g transform="translate(930 560)">
    <rect class="sys" width="210" height="90" rx="16"/>
    <text x="70" y="55" class="label">CI</text>
  </g>
  <g transform="translate(1200 560)">
    <rect class="sys" width="210" height="90" rx="16"/>
    <text x="48" y="55" class="label">SaaS API</text>
  </g>
  <path class="line" d="M800 400V490"/>
  <path class="line" d="M800 490H225V560M800 490H495V560M800 490H765V560M800 490H1035V560M800 490H1305V560"/>
  <g transform="translate(230 735)">
    <text class="small">确定性软件继续存在；变化发生在更高阶的操作入口。</text>
  </g>
</svg>
