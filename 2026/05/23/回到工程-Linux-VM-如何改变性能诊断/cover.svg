<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">回到工程：Linux VM 如何改变性能诊断</title>
  <desc id="desc">分层诊断方法论：从症状到层次到对象到状态转移到证据</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#101828"/>
      <stop offset="1" stop-color="#0F1E24"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.25" stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="0.75" stop-color="#34D399"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 100 H1480"/>
    <path d="M120 500 H1480"/>
  </g>

  <!-- Diagnostic methodology flow -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="90" fill="#CBD5E1" font-size="22" font-weight="700">Diagnostic Methodology</text>
  </g>

  <!-- Five-step flow -->
  <g filter="url(#softShadow)">
    <rect x="135" y="110" width="180" height="50" rx="8" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="345" y="110" width="180" height="50" rx="8" fill="#0B1A2A" stroke="#A78BFA" stroke-width="2"/>
    <rect x="555" y="110" width="180" height="50" rx="8" fill="#0B1A2A" stroke="#FBBF24" stroke-width="2"/>
    <rect x="765" y="110" width="200" height="50" rx="8" fill="#0B1A2A" stroke="#34D399" stroke-width="2"/>
    <rect x="995" y="110" width="180" height="50" rx="8" fill="#0B1A2A" stroke="#EF4444" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" font-size="14" font-weight="700">
    <text x="170" y="140" fill="#7DD3FC">Symptom</text>
    <text x="393" y="140" fill="#A78BFA">Layer</text>
    <text x="600" y="140" fill="#FBBF24">Object</text>
    <text x="800" y="140" fill="#34D399">Transition</text>
    <text x="1035" y="140" fill="#EF4444">Evidence</text>
  </g>
  <!-- Arrows -->
  <g font-family="Menlo, Consolas, monospace" fill="#64748B" font-size="18">
    <text x="320" y="140">→</text>
    <text x="530" y="140">→</text>
    <text x="740" y="140">→</text>
    <text x="970" y="140">→</text>
  </g>

  <!-- Layer stack (left side) -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="200" fill="#94A3B8" font-size="18" font-weight="700">VM Layer Stack</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="215" width="450" height="340" rx="12" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" font-size="13">
    <!-- Layers top to bottom -->
    <rect x="155" y="230" width="410" height="28" rx="5" fill="#7DD3FC" opacity="0.15"/>
    <text x="170" y="249" fill="#7DD3FC">VMA / address space</text>
    <text x="380" y="249" fill="#64748B">maps, smaps</text>

    <rect x="155" y="265" width="410" height="28" rx="5" fill="#7DD3FC" opacity="0.12"/>
    <text x="170" y="284" fill="#7DD3FC">page table / TLB</text>
    <text x="380" y="284" fill="#64748B">pagemap, perf</text>

    <rect x="155" y="300" width="410" height="28" rx="5" fill="#A78BFA" opacity="0.12"/>
    <text x="170" y="319" fill="#A78BFA">page fault / COW</text>
    <text x="380" y="319" fill="#64748B">pgfault, pgmajfault</text>

    <rect x="155" y="335" width="410" height="28" rx="5" fill="#A78BFA" opacity="0.12"/>
    <text x="170" y="354" fill="#A78BFA">page cache / folio</text>
    <text x="380" y="354" fill="#64748B">Cached, Buffers</text>

    <rect x="155" y="370" width="410" height="28" rx="5" fill="#FBBF24" opacity="0.12"/>
    <text x="170" y="389" fill="#FBBF24">LRU / reclaim / swap</text>
    <text x="380" y="389" fill="#64748B">vmstat, sar -B</text>

    <rect x="155" y="405" width="410" height="28" rx="5" fill="#FBBF24" opacity="0.12"/>
    <text x="170" y="424" fill="#FBBF24">NUMA / huge page</text>
    <text x="380" y="424" fill="#64748B">numastat, buddyinfo</text>

    <rect x="155" y="440" width="410" height="28" rx="5" fill="#34D399" opacity="0.12"/>
    <text x="170" y="459" fill="#34D399">buddy / SLUB</text>
    <text x="380" y="459" fill="#64748B">buddyinfo, slabinfo</text>

    <rect x="155" y="475" width="410" height="28" rx="5" fill="#34D399" opacity="0.12"/>
    <text x="170" y="494" fill="#34D399">memcg / OOM</text>
    <text x="380" y="494" fill="#64748B">memory.stat, dmesg</text>

    <rect x="155" y="510" width="410" height="28" rx="5" fill="#EF4444" opacity="0.12"/>
    <text x="170" y="529" fill="#EF4444">OOM killer</text>
    <text x="380" y="529" fill="#64748B">oom_score, events</text>
  </g>

  <!-- Right: Three case studies -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="650" y="200" fill="#94A3B8" font-size="18" font-weight="700">Case Studies</text>
  </g>

  <!-- Case 1 -->
  <g filter="url(#softShadow)">
    <rect x="650" y="215" width="790" height="90" rx="10" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="680" y="245" fill="#7DD3FC" font-size="14" font-weight="700">Case 1: RSS grows but no leak</text>
    <text x="680" y="270" fill="#94A3B8" font-size="12">Symptom: RSS 8GB, heap only 1GB</text>
    <text x="680" y="290" fill="#64748B" font-size="12">Root cause: file-backed mmap (JAR/SO) counted in RSS but reclaimable</text>
  </g>

  <!-- Case 2 -->
  <g filter="url(#softShadow)">
    <rect x="650" y="320" width="790" height="90" rx="10" fill="#1A1408" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="680" y="350" fill="#FBBF24" font-size="14" font-weight="700">Case 2: Latency spikes from direct reclaim</text>
    <text x="680" y="375" fill="#94A3B8" font-size="12">Symptom: P99 jumps 5ms → 50ms, no traffic change</text>
    <text x="680" y="395" fill="#64748B" font-size="12">Root cause: allocstall — kswapd too slow, request threads enter reclaim</text>
  </g>

  <!-- Case 3 -->
  <g filter="url(#softShadow)">
    <rect x="650" y="425" width="790" height="90" rx="10" fill="#1A0F2E" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="680" y="455" fill="#A78BFA" font-size="14" font-weight="700">Case 3: Container OOM, host has free memory</text>
    <text x="680" y="480" fill="#94A3B8" font-size="12">Symptom: Pod OOMKilled, node MemAvailable=32GB</text>
    <text x="680" y="500" fill="#64748B" font-size="12">Root cause: memcg limit (memory.max) hit, not global exhaustion</text>
  </g>

  <!-- Series stats -->
  <g filter="url(#softShadow)">
    <rect x="650" y="540" width="790" height="60" rx="10" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="680" y="570" fill="#CBD5E1" font-size="14">Series: 18 articles | 10 kernel subsystems | 3 diagnostic cases</text>
    <text x="680" y="590" fill="#64748B" font-size="12">From mm_struct to OOM kill — one coherent mental model</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="700" font-size="38" font-weight="700">回到工程：Linux VM 如何改变性能诊断</text>
    <text x="140" y="750" fill="#CBD5E1" font-size="21">symptom → layer → object → transition → evidence</text>
  </g>
</svg>
