<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">反向映射：从物理页找回虚拟地址</title>
  <desc id="desc">正向页表与反向映射的对称示意：forward lookup vs reverse maintenance</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#1A1F33"/>
      <stop offset="1" stop-color="#1F2A2A"/>
    </linearGradient>
    <linearGradient id="forwardColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="reverseColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="folioFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="vmaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C084FC"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 300 H1480"/>
    <path d="M120 460 H1480"/>
    <path d="M120 620 H1480"/>
    <path d="M300 100 V680"/>
    <path d="M560 100 V680"/>
    <path d="M820 100 V680"/>
    <path d="M1080 100 V680"/>
    <path d="M1340 100 V680"/>
  </g>

  <!-- Forward path label -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="135" fill="#5EEAD4" font-size="20" font-weight="700">FORWARD (page table): virtual addr -> PFN</text>
  </g>

  <!-- Forward path: VA -> PGD -> PTE -> PFN -->
  <g filter="url(#softShadow)">
    <rect x="135" y="160" width="180" height="80" rx="10" fill="#0F1A2A" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="370" y="160" width="140" height="80" rx="10" fill="#0F1A2A" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="565" y="160" width="140" height="80" rx="10" fill="#0F1A2A" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="760" y="160" width="160" height="80" rx="10" fill="#0F1A2A" stroke="#5EEAD4" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="225" y="205" fill="#5EEAD4" font-size="20" font-weight="700">virt addr</text>
    <text x="440" y="205" fill="#67E8F9" font-size="18" font-weight="700">PGD..PMD</text>
    <text x="635" y="205" fill="#67E8F9" font-size="18" font-weight="700">PTE</text>
    <text x="840" y="205" fill="#A3E635" font-size="20" font-weight="700">PFN</text>
  </g>

  <!-- Forward arrows -->
  <g stroke="url(#forwardColor)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M315 200 H370" marker-end="url(#arrowF)"/>
    <path d="M510 200 H565" marker-end="url(#arrowF)"/>
    <path d="M705 200 H760" marker-end="url(#arrowF)"/>
  </g>
  <defs>
    <marker id="arrowF" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#F472B6" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Reverse path label -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="320" fill="#F472B6" font-size="20" font-weight="700">REVERSE (rmap): folio -> VMAs -> PTEs</text>
  </g>

  <!-- Reverse path: Folio -> anon_vma/i_mmap -> VMA set -> PTE locations -->
  <g filter="url(#softShadow)">
    <rect x="135" y="350" width="200" height="100" rx="12" fill="url(#folioFill)"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="235" y="395" fill="#082F49" font-size="22" font-weight="700">folio</text>
    <text x="235" y="425" fill="#082F49" font-size="14">physical page(s)</text>
  </g>

  <!-- anon_vma / i_mmap -->
  <g filter="url(#softShadow)">
    <rect x="430" y="340" width="220" height="55" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="2"/>
    <rect x="430" y="405" width="220" height="55" rx="8" fill="#1E1B3A" stroke="#FBBF24" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="540" y="373" fill="#C084FC" font-size="16" font-weight="700">anon_vma rb_tree</text>
    <text x="540" y="438" fill="#FBBF24" font-size="16" font-weight="700">i_mmap interval tree</text>
  </g>

  <!-- VMA set -->
  <g filter="url(#softShadow)">
    <rect x="740" y="345" width="140" height="50" rx="8" fill="url(#vmaFill)"/>
    <rect x="740" y="405" width="140" height="50" rx="8" fill="url(#vmaFill)"/>
    <rect x="900" y="375" width="140" height="50" rx="8" fill="url(#vmaFill)"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="810" y="376" fill="#F8FAFC" font-size="15" font-weight="700">VMA (pid A)</text>
    <text x="810" y="436" fill="#F8FAFC" font-size="15" font-weight="700">VMA (pid B)</text>
    <text x="970" y="406" fill="#F8FAFC" font-size="15" font-weight="700">VMA (pid C)</text>
  </g>

  <!-- PTE targets -->
  <g filter="url(#softShadow)">
    <rect x="1130" y="345" width="120" height="45" rx="6" fill="#0F1A2A" stroke="#F472B6" stroke-width="1.5"/>
    <rect x="1130" y="400" width="120" height="45" rx="6" fill="#0F1A2A" stroke="#F472B6" stroke-width="1.5"/>
    <rect x="1270" y="372" width="120" height="45" rx="6" fill="#0F1A2A" stroke="#F472B6" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="1190" y="373" fill="#F472B6" font-size="14" font-weight="700">PTE (A)</text>
    <text x="1190" y="428" fill="#F472B6" font-size="14" font-weight="700">PTE (B)</text>
    <text x="1330" y="400" fill="#F472B6" font-size="14" font-weight="700">PTE (C)</text>
  </g>

  <!-- Reverse arrows -->
  <g stroke="url(#reverseColor)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M335 390 H430" marker-end="url(#arrowR)"/>
    <path d="M335 410 H430" marker-end="url(#arrowR)"/>
    <path d="M650 367 H740" marker-end="url(#arrowR)"/>
    <path d="M650 430 H740" marker-end="url(#arrowR)"/>
    <path d="M650 400 H680 Q700 400 710 395 L900 390" marker-end="url(#arrowR)"/>
    <path d="M880 370 H920 L1130 367" marker-end="url(#arrowR)"/>
    <path d="M880 430 H920 L1130 422" marker-end="url(#arrowR)"/>
    <path d="M1040 400 H1080 L1270 394" marker-end="url(#arrowR)"/>
  </g>

  <!-- Complexity note -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="530" fill="#94A3B8" font-size="18">forward: O(page table depth) per access — MMU hardware path</text>
    <text x="135" y="560" fill="#94A3B8" font-size="18">reverse: O(mapping count) per maintenance — kernel event-driven</text>
  </g>

  <!-- Use cases -->
  <g filter="url(#softShadow)">
    <rect x="135" y="590" width="1330" height="50" rx="8" fill="#0B1220" stroke="#64748B" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="621" fill="#FBBF24" font-size="16">rmap users:</text>
    <text x="330" y="621" fill="#CBD5E1" font-size="16">reclaim · migrate · COW check · KSM · THP split · NUMA balancing</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="730" font-size="46" font-weight="700">反向映射：从物理页找回虚拟地址</text>
    <text x="140" y="780" fill="#CBD5E1" font-size="24">forward index for lookup, reverse index for maintenance</text>
  </g>
</svg>
