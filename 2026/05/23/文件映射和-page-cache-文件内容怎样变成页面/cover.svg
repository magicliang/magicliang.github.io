<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">文件映射和 page cache</title>
  <desc id="desc">read 与 mmap 共享同一个 page cache 的示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#17243A"/>
      <stop offset="1" stop-color="#1F2E1F"/>
    </linearGradient>
    <linearGradient id="cacheFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="readArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="mmapArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 280 H1480"/>
    <path d="M120 420 H1480"/>
    <path d="M120 560 H1480"/>
    <path d="M260 100 V680"/>
    <path d="M520 100 V680"/>
    <path d="M780 100 V680"/>
    <path d="M1040 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="170" width="280" height="160" rx="14" fill="#0F1A2A" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="135" y="380" width="280" height="160" rx="14" fill="#0F1A2A" stroke="#FBBF24" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="275" y="218" fill="#5EEAD4" font-size="26" font-weight="700">read()</text>
    <text x="275" y="256" fill="#94A3B8" font-size="18">copy_to_user</text>
    <text x="275" y="295" fill="#94A3B8" font-size="18">user buffer</text>

    <text x="275" y="428" fill="#FBBF24" font-size="26" font-weight="700">mmap()</text>
    <text x="275" y="466" fill="#94A3B8" font-size="18">filemap_fault</text>
    <text x="275" y="505" fill="#94A3B8" font-size="18">install PTE</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="555" y="220" width="500" height="270" rx="14" fill="#101A2C" stroke="#94A3B8" stroke-width="1.5"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="585" y="262" fill="#CBD5E1" font-size="24" font-weight="700">page cache</text>
    <text x="585" y="288" fill="#94A3B8" font-size="16">address_space indexed by pgoff</text>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="585" y="310" width="140" height="80" rx="8" fill="url(#cacheFill)"/>
    <text x="655" y="350" fill="#082F49" font-size="20" font-weight="700">folio 0</text>
    <text x="655" y="372" fill="#082F49" font-size="14">cached</text>

    <rect x="740" y="310" width="140" height="80" rx="8" fill="url(#cacheFill)"/>
    <text x="810" y="350" fill="#082F49" font-size="20" font-weight="700">folio 1</text>
    <text x="810" y="372" fill="#082F49" font-size="14">cached</text>

    <rect x="895" y="310" width="140" height="80" rx="8" fill="#0B1220" stroke="#64748B" stroke-width="2"/>
    <text x="965" y="350" fill="#94A3B8" font-size="20" font-weight="700">folio 2</text>
    <text x="965" y="372" fill="#64748B" font-size="14">missing</text>

    <rect x="585" y="400" width="140" height="80" rx="8" fill="url(#cacheFill)"/>
    <text x="655" y="440" fill="#082F49" font-size="20" font-weight="700">folio 3</text>
    <text x="655" y="462" fill="#082F49" font-size="14">cached</text>

    <rect x="740" y="400" width="140" height="80" rx="8" fill="#0B1220" stroke="#64748B" stroke-width="2"/>
    <text x="810" y="440" fill="#94A3B8" font-size="20" font-weight="700">folio 4</text>
    <text x="810" y="462" fill="#64748B" font-size="14">missing</text>

    <rect x="895" y="400" width="140" height="80" rx="8" fill="url(#cacheFill)"/>
    <text x="965" y="440" fill="#082F49" font-size="20" font-weight="700">folio 5</text>
    <text x="965" y="462" fill="#082F49" font-size="14">cached</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1180" y="280" width="270" height="160" rx="14" fill="#0F1A2A" stroke="#A3E635" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="1315" y="328" fill="#A3E635" font-size="26" font-weight="700">filesystem</text>
    <text x="1315" y="366" fill="#94A3B8" font-size="18">read_folio</text>
    <text x="1315" y="405" fill="#94A3B8" font-size="18">writepages</text>
  </g>

  <g stroke="url(#readArrow)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M415 250 H555"/>
  </g>
  <g stroke="url(#mmapArrow)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M415 460 H555"/>
  </g>
  <g stroke="#A3E635" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.7">
    <path d="M1055 360 H1180"/>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="715" font-size="46" font-weight="700">文件映射和 page cache</text>
    <text x="140" y="765" fill="#CBD5E1" font-size="24">read and mmap consume the same folio pool</text>
  </g>
</svg>
