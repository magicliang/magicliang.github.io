<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">页表：CPU 能读懂的翻译结构</title>
  <desc id="desc">Linux 五级页表 walk 与 VMA 策略层的对比示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1626"/>
      <stop offset="0.55" stop-color="#142436"/>
      <stop offset="1" stop-color="#1B2E2A"/>
    </linearGradient>
    <linearGradient id="walk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="pteFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 260 H1480"/>
    <path d="M120 380 H1480"/>
    <path d="M120 500 H1480"/>
    <path d="M120 620 H1480"/>
    <path d="M260 100 V680"/>
    <path d="M500 100 V680"/>
    <path d="M740 100 V680"/>
    <path d="M980 100 V680"/>
    <path d="M1220 100 V680"/>
    <path d="M1460 100 V680"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="170" fill="#94A3B8" font-size="22">policy layer</text>
    <text x="135" y="490" fill="#94A3B8" font-size="22">translation layer</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="195" width="1320" height="120" rx="14" fill="#101A2C" stroke="#475569" stroke-width="1.5"/>
    <rect x="170" y="225" width="380" height="60" rx="9" fill="#0B1220" stroke="#94A3B8" stroke-width="1.5"/>
    <rect x="580" y="225" width="380" height="60" rx="9" fill="#0B1220" stroke="#94A3B8" stroke-width="1.5"/>
    <rect x="990" y="225" width="440" height="60" rx="9" fill="#0B1220" stroke="#94A3B8" stroke-width="1.5"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="195" y="263" fill="#E2E8F0" font-size="22">VMA: rw-p anonymous</text>
    <text x="605" y="263" fill="#E2E8F0" font-size="22">VMA: r-xp /usr/bin/cat</text>
    <text x="1015" y="263" fill="#E2E8F0" font-size="22">VMA: r--p file mapping</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="520" width="180" height="120" rx="14" fill="#0F1A2A" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="345" y="520" width="180" height="120" rx="14" fill="#0F1A2A" stroke="#67E8F9" stroke-width="2"/>
    <rect x="555" y="520" width="180" height="120" rx="14" fill="#0F1A2A" stroke="#34D399" stroke-width="2"/>
    <rect x="765" y="520" width="180" height="120" rx="14" fill="#0F1A2A" stroke="#84CC16" stroke-width="2"/>
    <rect x="975" y="520" width="220" height="120" rx="14" fill="url(#pteFill)" stroke="#0EA5E9" stroke-width="2"/>
    <rect x="1225" y="520" width="220" height="120" rx="14" fill="#0F1A2A" stroke="#FACC15" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="225" y="568" fill="#7DD3FC" font-size="32" font-weight="700">PGD</text>
    <text x="225" y="608" fill="#94A3B8" font-size="18">top</text>

    <text x="435" y="568" fill="#67E8F9" font-size="32" font-weight="700">P4D</text>
    <text x="435" y="608" fill="#94A3B8" font-size="18">foldable</text>

    <text x="645" y="568" fill="#34D399" font-size="32" font-weight="700">PUD</text>
    <text x="645" y="608" fill="#94A3B8" font-size="18">1G huge</text>

    <text x="855" y="568" fill="#A3E635" font-size="32" font-weight="700">PMD</text>
    <text x="855" y="608" fill="#94A3B8" font-size="18">2M huge</text>

    <text x="1085" y="568" fill="#082F49" font-size="32" font-weight="700">PTE</text>
    <text x="1085" y="608" fill="#0C4A6E" font-size="18">present + PFN + flags</text>

    <text x="1335" y="568" fill="#FDE68A" font-size="32" font-weight="700">PFN</text>
    <text x="1335" y="608" fill="#FACC15" font-size="18">physical page</text>
  </g>

  <g stroke="url(#walk)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M315 580 H345"/>
    <path d="M525 580 H555"/>
    <path d="M735 580 H765"/>
    <path d="M945 580 H975"/>
    <path d="M1195 580 H1225"/>
  </g>

  <g stroke="#94A3B8" stroke-width="2" fill="none" stroke-dasharray="8 6" opacity="0.55">
    <path d="M360 285 V520"/>
    <path d="M770 285 V520"/>
    <path d="M1210 285 V520"/>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="740" font-size="50" font-weight="700">页表：CPU 能读懂的翻译结构</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="26">vma decides allowance, page table decides translation</text>
  </g>
</svg>
