<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">环境可供性：智能的一半是取到正确数据</title>
  <desc id="desc">模型通过工具、日志、测试、搜索和 API 主动取数。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#243b53"/>
      <stop offset="1" stop-color="#12372a"/>
    </linearGradient>
    <style>
      .title{font:700 64px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 30px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#bbf7d0}
      .label{font:700 25px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#ecfeff}
      .small{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#d1d5db}
      .node{fill:#0f172a;stroke:#34d399;stroke-width:2}
      .tool{fill:#17324a;stroke:#7dd3fc;stroke-width:2}
      .line{stroke:#86efac;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M100 735H1500" stroke="#64748b" stroke-width="2" opacity=".45"/>
  <text x="105" y="146" class="title">环境可供性</text>
  <text x="110" y="203" class="sub">智能的一半，是取到正确数据</text>
  <g transform="translate(130 330)">
    <rect class="node" width="310" height="210" rx="20"/>
    <text x="42" y="65" class="label">模型</text>
    <text x="42" y="108" class="small">reason / choose / verify</text>
    <circle cx="232" cy="106" r="46" fill="#22c55e"/>
    <path d="M212 106h40M232 86v40" stroke="#052e16" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g transform="translate(605 250)">
    <rect class="tool" width="250" height="96" rx="16"/>
    <text x="36" y="58" class="label">文件与代码</text>
    <rect class="tool" y="130" width="250" height="96" rx="16"/>
    <text x="36" y="188" class="label">日志与错误</text>
    <rect class="tool" y="260" width="250" height="96" rx="16"/>
    <text x="36" y="318" class="label">测试与验证</text>
  </g>
  <g transform="translate(1010 250)">
    <rect class="tool" width="250" height="96" rx="16"/>
    <text x="36" y="58" class="label">API 与 MCP</text>
    <rect class="tool" y="130" width="250" height="96" rx="16"/>
    <text x="36" y="188" class="label">文档检索</text>
    <rect class="tool" y="260" width="250" height="96" rx="16"/>
    <text x="36" y="318" class="label">数据库查询</text>
  </g>
  <path class="line" d="M445 435H585"/>
  <path class="line" d="M855 300H990M855 430H990M855 560H990"/>
  <path class="line" d="M1265 430 C1390 430 1430 585 1335 660 C1190 775 735 755 455 515"/>
  <text x="478" y="405" class="small">主动取数</text>
  <text x="1128" y="724" class="small">观察结果回流到推理</text>
</svg>
