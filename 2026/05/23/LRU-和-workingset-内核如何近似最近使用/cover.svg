<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LRU 和 workingset：内核如何近似"最近使用"</title>
  <desc id="desc">active/inactive 分层与 refault 反馈示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#171D33"/>
      <stop offset="1" stop-color="#1A2A30"/>
    </linearGradient>
    <linearGradient id="activeColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="inactiveColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="refaultColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#A3E635" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 300 H1480"/>
    <path d="M120 460 H1480"/>
    <path d="M120 620 H1480"/>
    <path d="M400 100 V680"/>
    <path d="M700 100 V680"/>
    <path d="M1000 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <!-- Active list -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="135" fill="#F472B6" font-size="20" font-weight="700">ACTIVE (hot pages — protected)</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="135" y="155" width="900" height="90" rx="12" fill="url(#activeColor)" opacity="0.15"/>
    <rect x="135" y="155" width="900" height="90" rx="12" fill="none" stroke="#F472B6" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="160" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.7"/>
    <text x="210" y="205" fill="#0F172A" font-size="14" font-weight="700">hot page</text>
    <rect x="280" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.7"/>
    <text x="330" y="205" fill="#0F172A" font-size="14" font-weight="700">hot page</text>
    <rect x="400" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.7"/>
    <text x="450" y="205" fill="#0F172A" font-size="14" font-weight="700">hot page</text>
    <rect x="520" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.55"/>
    <text x="570" y="205" fill="#0F172A" font-size="14" font-weight="700">warm</text>
    <rect x="640" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.4"/>
    <text x="690" y="205" fill="#0F172A" font-size="14" font-weight="700">cooling</text>
    <rect x="760" y="175" width="100" height="50" rx="6" fill="#F472B6" opacity="0.25"/>
    <text x="810" y="205" fill="#0F172A" font-size="14" font-weight="700">cooling</text>
    <rect x="880" y="175" width="130" height="50" rx="6" fill="#64748B" opacity="0.4"/>
    <text x="945" y="205" fill="#CBD5E1" font-size="13">demote ↓</text>
  </g>

  <!-- Inactive list -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="310" fill="#7DD3FC" font-size="20" font-weight="700">INACTIVE (candidates for reclaim)</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="135" y="330" width="900" height="90" rx="12" fill="url(#inactiveColor)" opacity="0.12"/>
    <rect x="135" y="330" width="900" height="90" rx="12" fill="none" stroke="#7DD3FC" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="160" y="350" width="100" height="50" rx="6" fill="#7DD3FC" opacity="0.6"/>
    <text x="210" y="380" fill="#0F172A" font-size="13" font-weight="700">referenced</text>
    <rect x="280" y="350" width="100" height="50" rx="6" fill="#7DD3FC" opacity="0.5"/>
    <text x="330" y="380" fill="#0F172A" font-size="13" font-weight="700">new page</text>
    <rect x="400" y="350" width="100" height="50" rx="6" fill="#7DD3FC" opacity="0.4"/>
    <text x="450" y="380" fill="#0F172A" font-size="13" font-weight="700">cold</text>
    <rect x="520" y="350" width="100" height="50" rx="6" fill="#7DD3FC" opacity="0.3"/>
    <text x="570" y="380" fill="#0F172A" font-size="13" font-weight="700">cold</text>
    <rect x="640" y="350" width="100" height="50" rx="6" fill="#7DD3FC" opacity="0.2"/>
    <text x="690" y="380" fill="#0F172A" font-size="13" font-weight="700">cold</text>
    <rect x="760" y="350" width="100" height="50" rx="6" fill="#64748B" opacity="0.3"/>
    <text x="810" y="380" fill="#CBD5E1" font-size="13">cold</text>
    <rect x="880" y="350" width="130" height="50" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="2"/>
    <text x="945" y="380" fill="#EF4444" font-size="13" font-weight="700">RECLAIM</text>
  </g>

  <!-- Promote arrow -->
  <g stroke="#FBBF24" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6 4">
    <path d="M210 350 C210 310 210 280 210 245"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="220" y="300" fill="#FBBF24" font-size="13">promote ↑</text>
    <text x="220" y="316" fill="#FBBF24" font-size="12">(2nd access)</text>
  </g>

  <!-- Refault feedback loop -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="490" fill="#A3E635" font-size="20" font-weight="700">REFAULT FEEDBACK (workingset detection)</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="135" y="510" width="560" height="100" rx="12" fill="#0B1A10" stroke="#A3E635" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="545" fill="#A3E635" font-size="16">page evicted → shadow entry stored (eviction clock)</text>
    <text x="160" y="570" fill="#A3E635" font-size="16">page refaulted → compare distance vs active size</text>
    <text x="160" y="595" fill="#34D399" font-size="16">distance &lt; active → activate immediately (skip inactive)</text>
  </g>

  <!-- MGLRU generations -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="780" y="490" fill="#C084FC" font-size="18" font-weight="700">Multi-Gen LRU</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="780" y="510" width="90" height="100" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="1.5"/>
    <rect x="885" y="510" width="90" height="100" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="1.5" opacity="0.8"/>
    <rect x="990" y="510" width="90" height="100" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="1.5" opacity="0.6"/>
    <rect x="1095" y="510" width="90" height="100" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
    <rect x="1200" y="510" width="90" height="100" rx="8" fill="#1E1B3A" stroke="#C084FC" stroke-width="1.5" opacity="0.25"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="825" y="550" fill="#C084FC" font-size="14" font-weight="700">gen 5</text>
    <text x="825" y="575" fill="#94A3B8" font-size="12">youngest</text>
    <text x="930" y="550" fill="#C084FC" font-size="14">gen 4</text>
    <text x="1035" y="550" fill="#C084FC" font-size="14">gen 3</text>
    <text x="1140" y="550" fill="#C084FC" font-size="14">gen 2</text>
    <text x="1245" y="550" fill="#C084FC" font-size="14">gen 1</text>
    <text x="1245" y="575" fill="#94A3B8" font-size="12">oldest</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="720" font-size="46" font-weight="700">LRU 和 workingset</text>
    <text x="135" y="775" fill="#CBD5E1" font-size="24">unknown future -> observed recency -> approximate retention</text>
  </g>
</svg>
