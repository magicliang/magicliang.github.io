<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">裸模型为什么像抽卡</title>
  <desc id="desc">概率采样、变量奖励和工程流水线的对照封面图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="0.52" stop-color="#18344a"/>
      <stop offset="1" stop-color="#0f322e"/>
    </linearGradient>
    <style>
      .title{font:700 72px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 30px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#c7d2fe}
      .label{font:600 24px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#dbeafe}
      .small{font:500 20px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#b6c2d9}
      .card{fill:#111827;stroke:#38bdf8;stroke-width:2}
      .weak{fill:#182130;stroke:#475569;stroke-width:2}
      .accent{fill:#22c55e}
      .warn{fill:#f59e0b}
      .line{stroke:#7dd3fc;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 720 C260 650 390 790 630 720 C850 655 1020 560 1600 650 L1600 900 L0 900 Z" fill="#0b1220" opacity=".58"/>
  <g opacity=".16" stroke="#e0f2fe" stroke-width="1">
    <path d="M120 120H1480M120 220H1480M120 320H1480M120 420H1480M120 520H1480M120 620H1480M120 720H1480"/>
    <path d="M180 90V760M330 90V760M480 90V760M630 90V760M780 90V760M930 90V760M1080 90V760M1230 90V760M1380 90V760"/>
  </g>
  <text x="110" y="150" class="title">裸模型为什么像抽卡</text>
  <text x="116" y="206" class="sub">把随机高分样本，从奖励循环放回工程流水线</text>
  <g transform="translate(135 305)">
    <rect class="card" width="360" height="230" rx="18"/>
    <text x="36" y="56" class="label">概率池</text>
    <text x="36" y="94" class="small">同一任务，多次采样</text>
    <g transform="translate(42 122)">
      <rect x="0" y="0" width="54" height="54" rx="10" fill="#334155"/>
      <rect x="72" y="0" width="54" height="54" rx="10" fill="#334155"/>
      <rect x="144" y="0" width="54" height="54" rx="10" fill="#22c55e"/>
      <rect x="216" y="0" width="54" height="54" rx="10" fill="#334155"/>
      <text x="18" y="36" class="small">50</text>
      <text x="90" y="36" class="small">70</text>
      <text x="160" y="36" class="small" fill="#052e16">90</text>
      <text x="234" y="36" class="small">60</text>
    </g>
  </g>
  <path class="line" d="M520 420 C640 330 760 330 880 420"/>
  <path d="M875 393 L930 420 L875 447 Z" fill="#7dd3fc"/>
  <g transform="translate(935 305)">
    <rect class="card" width="520" height="230" rx="18"/>
    <text x="36" y="56" class="label">Harness 流水线</text>
    <text x="36" y="94" class="small">spec / test / tool / review / rollback</text>
    <g transform="translate(48 132)">
      <rect class="weak" x="0" y="0" width="88" height="56" rx="10"/>
      <rect class="weak" x="112" y="0" width="88" height="56" rx="10"/>
      <rect class="weak" x="224" y="0" width="88" height="56" rx="10"/>
      <rect class="weak" x="336" y="0" width="88" height="56" rx="10"/>
      <path d="M88 28H112M200 28H224M312 28H336" stroke="#94a3b8" stroke-width="4"/>
      <text x="24" y="36" class="small">边界</text>
      <text x="136" y="36" class="small">生成</text>
      <text x="248" y="36" class="small">验证</text>
      <text x="360" y="36" class="small">合入</text>
    </g>
  </g>
  <g transform="translate(210 640)">
    <circle cx="0" cy="0" r="14" class="warn"/>
    <text x="28" y="8" class="small">高分样本会强化重试冲动</text>
  </g>
  <g transform="translate(870 640)">
    <circle cx="0" cy="0" r="14" class="accent"/>
    <text x="28" y="8" class="small">停止规则把抽卡改成可验证迭代</text>
  </g>
</svg>
