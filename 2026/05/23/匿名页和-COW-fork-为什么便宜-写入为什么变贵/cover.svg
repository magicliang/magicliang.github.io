<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">匿名页和 COW</title>
  <desc id="desc">fork 后共享只读、写入触发 COW 复制的示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#172033"/>
      <stop offset="1" stop-color="#1F2E1F"/>
    </linearGradient>
    <linearGradient id="sharedFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="parentFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="childFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 280 H1480"/>
    <path d="M120 420 H1480"/>
    <path d="M120 560 H1480"/>
    <path d="M280 100 V680"/>
    <path d="M520 100 V680"/>
    <path d="M780 100 V680"/>
    <path d="M1040 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="155" width="640" height="220" rx="14" fill="#101A2C" stroke="#84CC16" stroke-width="2"/>
    <rect x="835" y="155" width="620" height="220" rx="14" fill="#101A2C" stroke="#F472B6" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="195" fill="#A3E635" font-size="26" font-weight="700">parent (pid=P)</text>
    <text x="870" y="195" fill="#F472B6" font-size="26" font-weight="700">child  (pid=C)</text>
    <text x="170" y="225" fill="#94A3B8" font-size="18">page table after fork</text>
    <text x="870" y="225" fill="#94A3B8" font-size="18">page table after fork</text>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="170" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="230" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="230" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="230" y="332" fill="#082F49" font-size="14">PFN A</text>

    <rect x="305" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="365" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="365" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="365" y="332" fill="#082F49" font-size="14">PFN B</text>

    <rect x="440" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="500" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="500" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="500" y="332" fill="#082F49" font-size="14">PFN C</text>

    <rect x="575" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="635" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="635" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="635" y="332" fill="#082F49" font-size="14">PFN D</text>

    <rect x="870" y="245" width="120" height="100" rx="8" fill="url(#childFill)"/>
    <text x="930" y="285" fill="#3B0764" font-size="18" font-weight="700">PTE</text>
    <text x="930" y="310" fill="#3B0764" font-size="14">rw-p</text>
    <text x="930" y="332" fill="#3B0764" font-size="14">PFN A'</text>

    <rect x="1005" y="245" width="120" height="100" rx="8" fill="url(#childFill)"/>
    <text x="1065" y="285" fill="#3B0764" font-size="18" font-weight="700">PTE</text>
    <text x="1065" y="310" fill="#3B0764" font-size="14">rw-p</text>
    <text x="1065" y="332" fill="#3B0764" font-size="14">PFN B'</text>

    <rect x="1140" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="1200" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="1200" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="1200" y="332" fill="#082F49" font-size="14">PFN C</text>

    <rect x="1275" y="245" width="120" height="100" rx="8" fill="url(#sharedFill)"/>
    <text x="1335" y="285" fill="#082F49" font-size="18" font-weight="700">PTE</text>
    <text x="1335" y="310" fill="#082F49" font-size="14">r--p</text>
    <text x="1335" y="332" fill="#082F49" font-size="14">PFN D</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="420" width="1320" height="180" rx="14" fill="#0F1626" stroke="#475569" stroke-width="1.5"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="460" fill="#94A3B8" font-size="22">physical pages</text>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="190" y="478" width="170" height="100" rx="8" fill="#142033" stroke="#5EEAD4" stroke-width="2"/>
    <text x="275" y="518" fill="#5EEAD4" font-size="20" font-weight="700">PFN A</text>
    <text x="275" y="548" fill="#94A3B8" font-size="14">shared</text>

    <rect x="385" y="478" width="170" height="100" rx="8" fill="#142033" stroke="#5EEAD4" stroke-width="2"/>
    <text x="470" y="518" fill="#5EEAD4" font-size="20" font-weight="700">PFN B</text>
    <text x="470" y="548" fill="#94A3B8" font-size="14">shared</text>

    <rect x="580" y="478" width="170" height="100" rx="8" fill="#142033" stroke="#5EEAD4" stroke-width="2"/>
    <text x="665" y="518" fill="#5EEAD4" font-size="20" font-weight="700">PFN C</text>
    <text x="665" y="548" fill="#94A3B8" font-size="14">shared</text>

    <rect x="775" y="478" width="170" height="100" rx="8" fill="#142033" stroke="#5EEAD4" stroke-width="2"/>
    <text x="860" y="518" fill="#5EEAD4" font-size="20" font-weight="700">PFN D</text>
    <text x="860" y="548" fill="#94A3B8" font-size="14">shared</text>

    <rect x="970" y="478" width="170" height="100" rx="8" fill="#1B1530" stroke="#F472B6" stroke-width="2"/>
    <text x="1055" y="518" fill="#F472B6" font-size="20" font-weight="700">PFN A'</text>
    <text x="1055" y="548" fill="#FB923C" font-size="14">child priv</text>

    <rect x="1165" y="478" width="170" height="100" rx="8" fill="#1B1530" stroke="#F472B6" stroke-width="2"/>
    <text x="1250" y="518" fill="#F472B6" font-size="20" font-weight="700">PFN B'</text>
    <text x="1250" y="548" fill="#FB923C" font-size="14">child priv</text>
  </g>

  <g stroke="#F472B6" stroke-width="2" fill="none" opacity="0.7" stroke-dasharray="6 5">
    <path d="M930 350 V478"/>
    <path d="M1065 350 V478"/>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="715" font-size="48" font-weight="700">匿名页和 COW</text>
    <text x="140" y="765" fill="#CBD5E1" font-size="24">fork shares read-only PTEs; first write copies the page</text>
  </g>
</svg>
