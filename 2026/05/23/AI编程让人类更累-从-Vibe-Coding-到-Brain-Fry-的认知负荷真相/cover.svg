<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="heatBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff9f1c"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>
  <pattern id="dots2" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots2)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#ff6b35" letter-spacing="3" font-weight="600" opacity="0.9">COGNITIVE LOAD</text>
  <line x1="60" y1="82" x2="260" y2="82" stroke="#ff6b35" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="148" font-size="52" font-weight="700" fill="white">AI 编程让人类更累</text>
  <!-- Subtitle -->
  <text x="60" y="200" font-size="24" fill="#a0a0c0">从 Vibe Coding 到 Brain Fry</text>

  <!-- Brain outline (circle with wavy lines) -->
  <g transform="translate(120, 270)">
    <circle cx="110" cy="100" r="95" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="110" cy="100" r="95" fill="#00d4ff" opacity="0.04"/>
    <!-- Wavy lines suggesting neural activity -->
    <path d="M30,80 Q50,60 70,80 Q90,100 110,80 Q130,60 150,80 Q170,100 190,80" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
    <path d="M25,105 Q50,85 75,105 Q100,125 125,105 Q150,85 175,105 Q185,115 195,105" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.6"/>
    <path d="M30,130 Q55,110 80,130 Q105,150 130,130 Q155,110 180,130" fill="none" stroke="#ff6b35" stroke-width="2.5" opacity="0.7"/>
    <!-- Central stress indicator -->
    <text x="110" y="108" font-size="36" text-anchor="middle" fill="#ff6b35" opacity="0.85">🔥</text>
    <text x="110" y="195" font-size="13" fill="#a0a0c0" text-anchor="middle">Brain Fry</text>
  </g>

  <!-- Arrow -->
  <line x1="350" y1="370" x2="440" y2="370" stroke="#a0a0c0" stroke-width="2" opacity="0.6"/>
  <polygon points="440,362 458,370 440,378" fill="#a0a0c0" opacity="0.6"/>

  <!-- Heat/Load bar chart -->
  <g transform="translate(470, 240)">
    <!-- Y axis -->
    <line x1="40" y1="0" x2="40" y2="220" stroke="#4a4a6a" stroke-width="1.5"/>
    <!-- X axis -->
    <line x1="40" y1="220" x2="340" y2="220" stroke="#4a4a6a" stroke-width="1.5"/>

    <!-- Bars: rising cognitive load -->
    <rect x="60"  y="190" width="36" height="30"  rx="3" fill="#00d4ff" opacity="0.7"/>
    <rect x="110" y="160" width="36" height="60"  rx="3" fill="#5bc8e8" opacity="0.7"/>
    <rect x="160" y="120" width="36" height="100" rx="3" fill="#f59e0b" opacity="0.8"/>
    <rect x="210" y="70"  width="36" height="150" rx="3" fill="#ef7c35" opacity="0.85"/>
    <rect x="260" y="20"  width="36" height="200" rx="3" fill="url(#bar1)" opacity="0.9"/>

    <!-- Bar labels -->
    <text x="78"  y="235" font-size="10" fill="#6060a0" text-anchor="middle">Solo</text>
    <text x="128" y="235" font-size="10" fill="#6060a0" text-anchor="middle">Tab</text>
    <text x="178" y="235" font-size="10" fill="#6060a0" text-anchor="middle">Vibe</text>
    <text x="228" y="235" font-size="10" fill="#6060a0" text-anchor="middle">Auto</text>
    <text x="278" y="235" font-size="10" fill="#ff6b35" text-anchor="middle" font-weight="600">Fry</text>

    <!-- Y label -->
    <text x="15" y="110" font-size="11" fill="#6060a0" transform="rotate(-90,15,110)">Cognitive Load</text>
  </g>

  <!-- Vibe Coding label -->
  <rect x="60" y="510" width="140" height="32" rx="6" fill="#2d1b4e" stroke="#00d4ff" stroke-width="1"/>
  <text x="130" y="531" font-size="13" fill="#00d4ff" text-anchor="middle">Vibe Coding</text>

  <!-- Arrow -->
  <line x1="202" y1="526" x2="260" y2="526" stroke="#a0a0c0" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="260,519 276,526 260,533" fill="#a0a0c0" opacity="0.6"/>

  <!-- Brain Fry label -->
  <rect x="278" y="510" width="140" height="32" rx="6" fill="#3d1515" stroke="#ff6b35" stroke-width="1"/>
  <text x="348" y="531" font-size="13" fill="#ff6b35" text-anchor="middle">Brain Fry</text>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#2d1b4e" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#4a4a7a">守株阁 · 开发者体验 · 认知科学</text>
</svg>
