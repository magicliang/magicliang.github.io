<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">重读 Linux VM</title>
  <desc id="desc">虚拟地址、VMA、页表和物理页之间的关系示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#142A2D"/>
      <stop offset="1" stop-color="#27381F"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 780 C240 700 360 850 590 770 C840 682 980 750 1200 675 C1390 610 1510 660 1600 620 L1600 900 L0 900 Z" fill="#0B1117" opacity="0.45"/>

  <g opacity="0.18" stroke="#E5E7EB" stroke-width="1">
    <path d="M180 130 H1420"/>
    <path d="M180 250 H1420"/>
    <path d="M180 370 H1420"/>
    <path d="M180 490 H1420"/>
    <path d="M180 610 H1420"/>
    <path d="M260 90 V690"/>
    <path d="M500 90 V690"/>
    <path d="M740 90 V690"/>
    <path d="M980 90 V690"/>
    <path d="M1220 90 V690"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="150" y="155" width="290" height="460" rx="18" fill="#111827" stroke="#2DD4BF" stroke-width="2"/>
    <rect x="480" y="155" width="290" height="460" rx="18" fill="#111827" stroke="#84CC16" stroke-width="2"/>
    <rect x="810" y="155" width="290" height="460" rx="18" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
    <rect x="1140" y="155" width="290" height="460" rx="18" fill="#111827" stroke="#FACC15" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="205" y="230" fill="#F8FAFC" font-size="42" font-weight="700">Virtual</text>
    <text x="205" y="280" fill="#CBD5E1" font-size="28">address</text>
    <text x="205" y="365" fill="#5EEAD4" font-size="26">0x7f..a000</text>
    <text x="205" y="410" fill="#5EEAD4" font-size="26">0x7f..b000</text>
    <text x="205" y="455" fill="#5EEAD4" font-size="26">0x7f..c000</text>

    <text x="555" y="230" fill="#F8FAFC" font-size="42" font-weight="700">VMA</text>
    <text x="535" y="280" fill="#CBD5E1" font-size="28">policy</text>
    <text x="535" y="365" fill="#BEF264" font-size="25">rw-p</text>
    <text x="535" y="410" fill="#BEF264" font-size="25">anon</text>
    <text x="535" y="455" fill="#BEF264" font-size="25">fault()</text>

    <text x="875" y="230" fill="#F8FAFC" font-size="42" font-weight="700">PTE</text>
    <text x="865" y="280" fill="#CBD5E1" font-size="28">mapping</text>
    <text x="865" y="365" fill="#7DD3FC" font-size="25">present</text>
    <text x="865" y="410" fill="#7DD3FC" font-size="25">dirty</text>
    <text x="865" y="455" fill="#7DD3FC" font-size="25">PFN</text>

    <text x="1205" y="230" fill="#F8FAFC" font-size="42" font-weight="700">Folio</text>
    <text x="1195" y="280" fill="#CBD5E1" font-size="28">physical</text>
    <text x="1195" y="365" fill="#FDE68A" font-size="25">LRU</text>
    <text x="1195" y="410" fill="#FDE68A" font-size="25">cache</text>
    <text x="1195" y="455" fill="#FDE68A" font-size="25">reclaim</text>
  </g>

  <g stroke="url(#line)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M440 385 C475 385 445 385 480 385"/>
    <path d="M770 385 C805 385 775 385 810 385"/>
    <path d="M1100 385 C1135 385 1105 385 1140 385"/>
    <path d="M430 468 C610 560 1010 560 1180 468" opacity="0.55"/>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="735" font-size="56" font-weight="700">重读 Linux VM</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="28">address space -> fault -> page table -> folio -> reclaim</text>
  </g>
</svg>
