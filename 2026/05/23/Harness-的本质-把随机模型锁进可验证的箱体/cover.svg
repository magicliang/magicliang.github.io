<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Harness 的本质：把随机模型锁进可验证的箱体</title>
  <desc id="desc">Spec、测试、工具和循环把概率模型约束在可验证箱体中。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.52" stop-color="#1f2a44"/>
      <stop offset="1" stop-color="#203735"/>
    </linearGradient>
    <style>
      .title{font:700 58px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 29px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#bfdbfe}
      .label{font:700 25px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#e0f2fe}
      .small{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#cbd5e1}
      .box{fill:#0b1220;stroke:#60a5fa;stroke-width:3}
      .wall{fill:#172554;stroke:#93c5fd;stroke-width:2}
      .ok{fill:#22c55e}
      .line{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="142" class="title">Harness 的本质</text>
  <text x="105" y="198" class="sub">把随机模型锁进可验证的箱体</text>
  <g transform="translate(275 275)">
    <rect class="box" width="1050" height="390" rx="26"/>
    <text x="426" y="68" class="label">可验证箱体</text>
    <g transform="translate(70 125)">
      <rect class="wall" width="185" height="88" rx="14"/>
      <text x="47" y="54" class="label">Spec</text>
      <rect class="wall" x="245" width="185" height="88" rx="14"/>
      <text x="291" y="54" class="label">Plan</text>
      <rect class="wall" x="490" width="185" height="88" rx="14"/>
      <text x="532" y="54" class="label">Tools</text>
      <rect class="wall" x="735" width="185" height="88" rx="14"/>
      <text x="774" y="54" class="label">Tests</text>
      <path class="line" d="M185 44H245M430 44H490M675 44H735"/>
    </g>
    <g transform="translate(218 270)">
      <path d="M0 0 C150 70 310 70 460 0 C580 -55 710 -55 830 0" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="13" class="ok"/>
      <circle cx="460" cy="0" r="13" class="ok"/>
      <circle cx="830" cy="0" r="13" class="ok"/>
      <text x="242" y="64" class="small">generate → validate → write back → loop</text>
    </g>
  </g>
  <g transform="translate(120 720)">
    <text class="small">目标边界、验证边界、权限边界、状态回灌，共同压低低分尾部。</text>
  </g>
</svg>
