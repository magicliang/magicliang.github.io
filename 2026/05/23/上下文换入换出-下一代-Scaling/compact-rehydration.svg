<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Compact 后上下文为什么降不下来</title>
  <desc id="desc">对比理想 compact 与回灌型 compact：压缩摘要由未完成任务决定，但 PreCompact、PostCompact、hot paths 和 skills 会把上下文重新撑大。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 58px; font-weight: 780; fill: #0F172A; letter-spacing: 0; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 26px; fill: #475569; }
      .h { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 34px; font-weight: 720; fill: #0F172A; letter-spacing: 0; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; fill: #0F172A; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; fill: #475569; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #64748B; }
      .card { fill: rgba(255,255,255,0.86); stroke: #CBD5E1; stroke-width: 2; }
      .slot { fill: #F1F5F9; stroke: #CBD5E1; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .mutedLine { stroke: #94A3B8; stroke-width: 3; fill: none; stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="78" class="title">Compact 后为什么还很满</text>
  <text x="84" y="124" class="subtitle">摘要由未完成工作集决定；百分比还会被不可压缩基线和回灌层抬高</text>

  <g filter="url(#cardShadow)">
    <rect x="78" y="176" width="676" height="620" rx="26" class="card"/>
    <rect x="846" y="176" width="676" height="620" rx="26" class="card"/>
  </g>

  <text x="126" y="236" class="h">理想 compact</text>
  <text x="894" y="236" class="h">75% 回灌型 compact</text>

  <text x="126" y="286" class="small">旧历史被压成摘要，窗口只留下继续任务所需状态</text>
  <text x="894" y="286" class="small">旧历史被压掉后，hooks 和恢复机制又把材料 page in</text>

  <g transform="translate(126 330)">
    <rect x="0" y="0" width="236" height="312" rx="16" class="slot"/>
    <text x="26" y="44" class="label">压缩前</text>
    <rect x="28" y="74" width="180" height="52" rx="10" fill="#FCA5A5"/>
    <text x="48" y="108" class="small">旧失败路径</text>
    <rect x="28" y="138" width="180" height="52" rx="10" fill="#FDE68A"/>
    <text x="48" y="172" class="small">长日志原文</text>
    <rect x="28" y="202" width="180" height="52" rx="10" fill="#BFDBFE"/>
    <text x="48" y="236" class="small">历史讨论</text>

    <path d="M262 156 C304 156 330 156 374 156" class="arrow"/>
    <text x="274" y="126" class="tiny">compact</text>

    <rect x="400" y="0" width="230" height="312" rx="16" class="slot"/>
    <text x="428" y="44" class="label">压缩后</text>
    <rect x="430" y="75" width="170" height="48" rx="10" fill="#93C5FD"/>
    <text x="452" y="106" class="small">固定基线</text>
    <rect x="430" y="139" width="170" height="48" rx="10" fill="#A7F3D0"/>
    <text x="452" y="170" class="small">任务摘要</text>
    <rect x="430" y="203" width="170" height="48" rx="10" fill="#C4B5FD"/>
    <text x="452" y="234" class="small">下一步动作</text>
    <text x="446" y="286" class="label">≈ 0% - 40%</text>
  </g>

  <g transform="translate(894 330)">
    <rect x="0" y="0" width="210" height="312" rx="16" class="slot"/>
    <text x="24" y="44" class="label">旧历史</text>
    <rect x="26" y="82" width="158" height="54" rx="10" fill="#FCA5A5"/>
    <text x="50" y="117" class="small">被压缩</text>
    <rect x="26" y="154" width="158" height="54" rx="10" fill="#FDE68A"/>
    <text x="50" y="189" class="small">被摘要</text>

    <path d="M232 156 C274 156 304 156 348 156" class="arrow"/>
    <text x="238" y="126" class="tiny">compact</text>

    <rect x="374" y="0" width="238" height="312" rx="16" class="slot"/>
    <text x="404" y="44" class="label">压缩后</text>
    <rect x="404" y="66" width="178" height="40" rx="9" fill="#93C5FD"/>
    <text x="424" y="93" class="tiny">固定基线</text>
    <rect x="404" y="116" width="178" height="40" rx="9" fill="#A7F3D0"/>
    <text x="424" y="143" class="tiny">任务摘要</text>
    <rect x="404" y="166" width="178" height="40" rx="9" fill="#FBBF24"/>
    <text x="424" y="193" class="tiny">PreCompact</text>
    <rect x="404" y="216" width="178" height="40" rx="9" fill="#FB7185"/>
    <text x="424" y="243" class="tiny">PostCompact</text>
    <rect x="404" y="266" width="178" height="40" rx="9" fill="#C4B5FD"/>
    <text x="424" y="293" class="tiny">hot paths / skills</text>
  </g>

  <g transform="translate(930 680)">
    <path d="M86 0 C86 60 210 60 210 0" class="mutedLine"/>
    <path d="M210 0 C210 -56 370 -56 370 0" class="mutedLine"/>
    <text x="0" y="66" class="label">恢复层每次重新 page in，反复 compact 也降不下来</text>
  </g>

  <g transform="translate(126 706)">
    <rect x="0" y="0" width="586" height="54" rx="18" fill="#0F172A"/>
    <text x="24" y="35" class="small" fill="#E2E8F0">结论：下方决定摘要下限；回灌层决定 compact 后百分比上限。</text>
  </g>
</svg>
