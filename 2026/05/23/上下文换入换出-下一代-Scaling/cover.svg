<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Context Paging：Compact、外部化、恢复与 Memory 生命周期</title>
  <desc id="desc">工作集、外部记忆、检索与压缩构成 context paging。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.48" stop-color="#15324a"/>
      <stop offset="1" stop-color="#1c2f2f"/>
    </linearGradient>
    <style>
      .title{font:700 68px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#f8fafc;letter-spacing:0}
      .sub{font:500 30px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#bae6fd}
      .label{font:700 26px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#e0f2fe}
      .small{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#cbd5e1}
      .box{fill:#0f172a;stroke:#22d3ee;stroke-width:2}
      .store{fill:#172554;stroke:#93c5fd;stroke-width:2}
      .line{stroke:#67e8f9;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity=".12" stroke="#f8fafc">
    <path d="M160 710H1440M160 610H1440M160 510H1440M160 410H1440M160 310H1440M160 210H1440"/>
    <path d="M220 180V740M380 180V740M540 180V740M700 180V740M860 180V740M1020 180V740M1180 180V740M1340 180V740"/>
  </g>
  <text x="110" y="145" class="title">Context Paging</text>
  <text x="116" y="202" class="sub">Compact、外部化、恢复与 Memory 生命周期</text>
  <g transform="translate(170 300)">
    <rect class="store" width="330" height="330" rx="18"/>
    <text x="44" y="62" class="label">外部记忆</text>
    <text x="44" y="105" class="small">spec / notes / tests</text>
    <rect x="48" y="145" width="232" height="34" rx="8" fill="#1e3a8a"/>
    <rect x="48" y="198" width="190" height="34" rx="8" fill="#1e40af"/>
    <rect x="48" y="251" width="252" height="34" rx="8" fill="#2563eb"/>
  </g>
  <g transform="translate(635 255)">
    <rect class="box" width="330" height="420" rx="22"/>
    <text x="54" y="72" class="label">工作集窗口</text>
    <text x="54" y="114" class="small">当前可用注意力预算</text>
    <g transform="translate(62 160)">
      <rect x="0" y="0" width="206" height="42" rx="9" fill="#0891b2"/>
      <rect x="0" y="68" width="154" height="42" rx="9" fill="#0e7490"/>
      <rect x="0" y="136" width="232" height="42" rx="9" fill="#155e75"/>
      <rect x="0" y="204" width="120" height="42" rx="9" fill="#164e63"/>
    </g>
  </g>
  <g transform="translate(1100 300)">
    <rect class="store" width="330" height="330" rx="18"/>
    <text x="44" y="62" class="label">压缩归档</text>
    <text x="44" y="105" class="small">summary / index / replay</text>
    <path d="M64 160H270M64 210H230M64 260H285" stroke="#bfdbfe" stroke-width="10" stroke-linecap="round"/>
  </g>
  <path class="line" d="M510 420H625"/>
  <path class="line" d="M965 420H1085"/>
  <path class="line" d="M1085 560 C905 745 690 745 505 560"/>
  <text x="532" y="392" class="small">page in</text>
  <text x="988" y="392" class="small">page out</text>
  <text x="690" y="760" class="small">select / write / compress / isolate</text>
</svg>
