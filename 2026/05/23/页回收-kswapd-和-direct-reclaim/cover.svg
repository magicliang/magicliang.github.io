<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">页回收：kswapd 和 direct reclaim</title>
  <desc id="desc">水位线模型与 kswapd/direct reclaim 分级响应示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#171D2E"/>
      <stop offset="1" stop-color="#1A2428"/>
    </linearGradient>
    <linearGradient id="highColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="lowColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="minColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="kswapdFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="directFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.1" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 300 H1480"/>
    <path d="M120 460 H1480"/>
    <path d="M120 620 H1480"/>
    <path d="M400 100 V680"/>
    <path d="M700 100 V680"/>
    <path d="M1000 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <!-- Watermark visualization (left side) -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="108" fill="#94A3B8" font-size="20" font-weight="700">zone free pages</text>
  </g>

  <!-- Vertical bar representing free memory -->
  <g filter="url(#softShadow)">
    <rect x="160" y="130" width="80" height="500" rx="6" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- High watermark -->
  <rect x="160" y="130" width="80" height="120" rx="6" fill="#A3E635" opacity="0.2"/>
  <line x1="140" y1="250" x2="260" y2="250" stroke="#A3E635" stroke-width="3"/>
  <g font-family="Menlo, Consolas, monospace">
    <text x="275" y="255" fill="#A3E635" font-size="18" font-weight="700">high</text>
    <text x="345" y="255" fill="#64748B" font-size="15">kswapd stops</text>
  </g>

  <!-- Low watermark -->
  <rect x="160" y="250" width="80" height="150" rx="0" fill="#FBBF24" opacity="0.12"/>
  <line x1="140" y1="400" x2="260" y2="400" stroke="#FBBF24" stroke-width="3"/>
  <g font-family="Menlo, Consolas, monospace">
    <text x="275" y="405" fill="#FBBF24" font-size="18" font-weight="700">low</text>
    <text x="330" y="405" fill="#64748B" font-size="15">kswapd wakes</text>
  </g>

  <!-- Min watermark -->
  <rect x="160" y="400" width="80" height="120" rx="0" fill="#EF4444" opacity="0.12"/>
  <line x1="140" y1="520" x2="260" y2="520" stroke="#EF4444" stroke-width="3"/>
  <g font-family="Menlo, Consolas, monospace">
    <text x="275" y="525" fill="#EF4444" font-size="18" font-weight="700">min</text>
    <text x="325" y="525" fill="#64748B" font-size="15">direct reclaim</text>
  </g>

  <!-- Below min: danger zone -->
  <rect x="160" y="520" width="80" height="110" rx="0" fill="#EF4444" opacity="0.08"/>
  <g font-family="Menlo, Consolas, monospace">
    <text x="275" y="585" fill="#64748B" font-size="14">OOM if reclaim fails</text>
  </g>

  <!-- kswapd box (right side, top) -->
  <g filter="url(#softShadow)">
    <rect x="600" y="130" width="450" height="180" rx="14" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="635" y="170" fill="#7DD3FC" font-size="22" font-weight="700">kswapd (background)</text>
    <text x="635" y="205" fill="#94A3B8" font-size="16">per-node kernel thread</text>
    <text x="635" y="235" fill="#94A3B8" font-size="16">balance_pgdat() → shrink_node()</text>
    <text x="635" y="265" fill="#94A3B8" font-size="16">→ shrink_lruvec() → free pages</text>
    <text x="635" y="295" fill="#5EEAD4" font-size="15">latency impact: NONE (transparent)</text>
  </g>

  <!-- direct reclaim box (right side, bottom) -->
  <g filter="url(#softShadow)">
    <rect x="600" y="340" width="450" height="180" rx="14" fill="#1A0B0B" stroke="#EF4444" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="635" y="380" fill="#EF4444" font-size="22" font-weight="700">direct reclaim (foreground)</text>
    <text x="635" y="415" fill="#94A3B8" font-size="16">runs in allocator's context</text>
    <text x="635" y="445" fill="#94A3B8" font-size="16">try_to_free_pages() → shrink_node()</text>
    <text x="635" y="475" fill="#94A3B8" font-size="16">→ may wait for I/O writeback</text>
    <text x="635" y="505" fill="#F472B6" font-size="15">latency impact: BLOCKS allocator</text>
  </g>

  <!-- Counters -->
  <g filter="url(#softShadow)">
    <rect x="600" y="550" width="450" height="90" rx="10" fill="#0B1220" stroke="#64748B" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="625" y="580" fill="#CBD5E1" font-size="16">/proc/vmstat counters:</text>
    <text x="625" y="605" fill="#7DD3FC" font-size="14">pgscan_kswapd  pgsteal_kswapd</text>
    <text x="625" y="625" fill="#EF4444" font-size="14">pgscan_direct  pgsteal_direct  allocstall</text>
  </g>

  <!-- Connecting arrows -->
  <g stroke="#FBBF24" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="8 5">
    <path d="M260 320 C400 320 450 220 600 220"/>
  </g>
  <g stroke="#EF4444" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="8 5">
    <path d="M260 470 C400 470 450 430 600 430"/>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="730" font-size="44" font-weight="700">页回收：kswapd 和 direct reclaim</text>
    <text x="140" y="780" fill="#CBD5E1" font-size="24">allocation pressure -> reclaim candidates -> free pages or escalate</text>
  </g>
</svg>
