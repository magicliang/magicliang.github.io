<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NUMA：内存为什么有远近</title>
  <desc id="desc">NUMA 双节点拓扑与本地/远程访问延迟对比示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#121A28"/>
      <stop offset="1" stop-color="#0F1E24"/>
    </linearGradient>
    <linearGradient id="node0Color" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="node1Color" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="localArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="remoteArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#E2E8F0" stroke-width="1">
    <path d="M800 80 V680"/>
    <path d="M120 250 H1480"/>
    <path d="M120 500 H1480"/>
  </g>

  <!-- Node 0 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="110" width="580" height="380" rx="18" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="2.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="140" y="155" fill="#7DD3FC" font-size="24" font-weight="700">Node 0</text>
    <text x="300" y="155" fill="#64748B" font-size="16">distance: 10 (local)</text>
  </g>
  <!-- CPUs in node 0 -->
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="140" y="180" width="90" height="55" rx="8" fill="#7DD3FC" opacity="0.7"/>
    <text x="185" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 0</text>
    <rect x="245" y="180" width="90" height="55" rx="8" fill="#7DD3FC" opacity="0.7"/>
    <text x="290" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 1</text>
    <rect x="350" y="180" width="90" height="55" rx="8" fill="#7DD3FC" opacity="0.7"/>
    <text x="395" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 2</text>
    <rect x="455" y="180" width="90" height="55" rx="8" fill="#7DD3FC" opacity="0.7"/>
    <text x="500" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 3</text>
  </g>
  <!-- DRAM in node 0 -->
  <g filter="url(#softShadow)">
    <rect x="140" y="270" width="510" height="90" rx="10" fill="#0B2030" stroke="#38BDF8" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="310" fill="#38BDF8" font-size="18" font-weight="700">Local DRAM 0</text>
    <text x="170" y="340" fill="#94A3B8" font-size="14">~80-100ns access latency</text>
    <text x="440" y="340" fill="#34D399" font-size="14" font-weight="700">FAST</text>
  </g>
  <!-- kswapd0 -->
  <g font-family="Menlo, Consolas, monospace">
    <rect x="140" y="390" width="200" height="40" rx="6" fill="#0B1220" stroke="#5EEAD4" stroke-width="1"/>
    <text x="160" y="416" fill="#5EEAD4" font-size="13">kswapd0 (per-node)</text>
    <rect x="360" y="390" width="200" height="40" rx="6" fill="#0B1220" stroke="#5EEAD4" stroke-width="1"/>
    <text x="380" y="416" fill="#5EEAD4" font-size="13">lruvec0 (per-node)</text>
  </g>

  <!-- Node 1 -->
  <g filter="url(#softShadow)">
    <rect x="920" y="110" width="580" height="380" rx="18" fill="#1A0F2E" stroke="#A78BFA" stroke-width="2.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="960" y="155" fill="#A78BFA" font-size="24" font-weight="700">Node 1</text>
    <text x="1120" y="155" fill="#64748B" font-size="16">distance: 21 (remote)</text>
  </g>
  <!-- CPUs in node 1 -->
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <rect x="960" y="180" width="90" height="55" rx="8" fill="#A78BFA" opacity="0.7"/>
    <text x="1005" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 4</text>
    <rect x="1065" y="180" width="90" height="55" rx="8" fill="#A78BFA" opacity="0.7"/>
    <text x="1110" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 5</text>
    <rect x="1170" y="180" width="90" height="55" rx="8" fill="#A78BFA" opacity="0.7"/>
    <text x="1215" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 6</text>
    <rect x="1275" y="180" width="90" height="55" rx="8" fill="#A78BFA" opacity="0.7"/>
    <text x="1320" y="213" fill="#0F172A" font-size="14" font-weight="700">CPU 7</text>
  </g>
  <!-- DRAM in node 1 -->
  <g filter="url(#softShadow)">
    <rect x="960" y="270" width="510" height="90" rx="10" fill="#1A0B2A" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="990" y="310" fill="#8B5CF6" font-size="18" font-weight="700">Local DRAM 1</text>
    <text x="990" y="340" fill="#94A3B8" font-size="14">~80-100ns access latency</text>
    <text x="1260" y="340" fill="#34D399" font-size="14" font-weight="700">FAST</text>
  </g>
  <!-- kswapd1 -->
  <g font-family="Menlo, Consolas, monospace">
    <rect x="960" y="390" width="200" height="40" rx="6" fill="#0B1220" stroke="#5EEAD4" stroke-width="1"/>
    <text x="980" y="416" fill="#5EEAD4" font-size="13">kswapd1 (per-node)</text>
    <rect x="1180" y="390" width="200" height="40" rx="6" fill="#0B1220" stroke="#5EEAD4" stroke-width="1"/>
    <text x="1200" y="416" fill="#5EEAD4" font-size="13">lruvec1 (per-node)</text>
  </g>

  <!-- Interconnect -->
  <g filter="url(#softShadow)">
    <rect x="700" y="250" width="200" height="60" rx="8" fill="#1A1408" stroke="#FBBF24" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="800" y="278" fill="#FBBF24" font-size="15" font-weight="700">Interconnect</text>
    <text x="800" y="298" fill="#F59E0B" font-size="12">UPI / QPI / IF</text>
  </g>
  <!-- Interconnect lines -->
  <line x1="680" y1="280" x2="700" y2="280" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="900" y1="280" x2="920" y2="280" stroke="#FBBF24" stroke-width="2.5"/>

  <!-- Remote access label -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="710" y="340" fill="#EF4444" font-size="14" font-weight="700">+40-80% latency</text>
    <text x="725" y="360" fill="#64748B" font-size="12">cross-node access</text>
  </g>

  <!-- Policy summary (bottom) -->
  <g filter="url(#softShadow)">
    <rect x="100" y="530" width="700" height="120" rx="12" fill="#0B1220" stroke="#64748B" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="130" y="565" fill="#CBD5E1" font-size="17" font-weight="700">Memory Policies</text>
    <text x="130" y="593" fill="#34D399" font-size="14">MPOL_DEFAULT  — local allocation (fast path)</text>
    <text x="130" y="615" fill="#7DD3FC" font-size="14">MPOL_BIND     — strict node set (hard constraint)</text>
    <text x="130" y="637" fill="#A78BFA" font-size="14">MPOL_INTERLEAVE — round-robin across nodes (bandwidth)</text>
  </g>

  <!-- NUMA balancing box -->
  <g filter="url(#softShadow)">
    <rect x="860" y="530" width="640" height="120" rx="12" fill="#0B1220" stroke="#FBBF24" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="890" y="565" fill="#FBBF24" font-size="17" font-weight="700">NUMA Balancing</text>
    <text x="890" y="593" fill="#94A3B8" font-size="14">PTE scan → hint fault → access tracking</text>
    <text x="890" y="615" fill="#94A3B8" font-size="14">→ migrate page to accessing node</text>
    <text x="890" y="637" fill="#64748B" font-size="13">numa_hint_faults / numa_pages_migrated</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="730" font-size="44" font-weight="700">NUMA：内存为什么有远近</text>
    <text x="140" y="780" fill="#CBD5E1" font-size="22">resource identity includes location — topology determines latency</text>
  </g>
</svg>
