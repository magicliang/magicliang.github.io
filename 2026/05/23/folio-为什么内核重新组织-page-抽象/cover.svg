<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Folio：管理单位的显式化</title>
  <desc id="desc">struct page 与 struct folio 的边界示意：head/tail 二义性被类型消除</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101424"/>
      <stop offset="0.55" stop-color="#171F33"/>
      <stop offset="1" stop-color="#1F2A35"/>
    </linearGradient>
    <linearGradient id="pageColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#94A3B8"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="folioColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="folioColor2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 280 H1480"/>
    <path d="M120 420 H1480"/>
    <path d="M120 560 H1480"/>
    <path d="M260 100 V680"/>
    <path d="M520 100 V680"/>
    <path d="M780 100 V680"/>
    <path d="M1040 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="180" fill="#94A3B8" font-size="22">physical pages (struct page)</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="270" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="405" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="540" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="675" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="810" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="945" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="1080" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
    <rect x="1215" y="200" width="120" height="100" rx="8" fill="url(#pageColor)"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="195" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="195" y="270" fill="#0F172A" font-size="14">PFN n</text>
    <text x="330" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="330" y="270" fill="#0F172A" font-size="14">PFN n+1</text>
    <text x="465" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="465" y="270" fill="#0F172A" font-size="14">PFN n+2</text>
    <text x="600" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="600" y="270" fill="#0F172A" font-size="14">PFN n+3</text>
    <text x="735" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="735" y="270" fill="#0F172A" font-size="14">PFN m</text>
    <text x="870" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="870" y="270" fill="#0F172A" font-size="14">PFN m+1</text>
    <text x="1005" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="1005" y="270" fill="#0F172A" font-size="14">PFN p</text>
    <text x="1140" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="1140" y="270" fill="#0F172A" font-size="14">PFN q</text>
    <text x="1275" y="240" fill="#0F172A" font-size="18" font-weight="700">page</text>
    <text x="1275" y="270" fill="#0F172A" font-size="14">PFN r</text>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="380" fill="#94A3B8" font-size="22">management units (struct folio)</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="400" width="525" height="120" rx="14" fill="url(#folioColor)"/>
    <rect x="675" y="400" width="255" height="120" rx="14" fill="url(#folioColor2)"/>
    <rect x="945" y="400" width="120" height="120" rx="14" fill="url(#folioColor)"/>
    <rect x="1080" y="400" width="120" height="120" rx="14" fill="url(#folioColor)"/>
    <rect x="1215" y="400" width="120" height="120" rx="14" fill="url(#folioColor)"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="397" y="450" fill="#082F49" font-size="24" font-weight="700">folio order 2</text>
    <text x="397" y="480" fill="#082F49" font-size="16">4 pages, one head</text>
    <text x="397" y="505" fill="#082F49" font-size="14">cache + reclaim unit</text>

    <text x="803" y="450" fill="#3B0764" font-size="22" font-weight="700">folio order 1</text>
    <text x="803" y="480" fill="#3B0764" font-size="16">2 pages</text>
    <text x="803" y="505" fill="#3B0764" font-size="14">large folio</text>

    <text x="1005" y="450" fill="#082F49" font-size="20" font-weight="700">folio 0</text>
    <text x="1005" y="495" fill="#082F49" font-size="14">single page</text>
    <text x="1140" y="450" fill="#082F49" font-size="20" font-weight="700">folio 0</text>
    <text x="1140" y="495" fill="#082F49" font-size="14">single page</text>
    <text x="1275" y="450" fill="#082F49" font-size="20" font-weight="700">folio 0</text>
    <text x="1275" y="495" fill="#082F49" font-size="14">single page</text>
  </g>

  <g stroke="#7DD3FC" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 5">
    <path d="M195 300 V400"/>
    <path d="M330 300 V400"/>
    <path d="M465 300 V400"/>
    <path d="M600 300 V400"/>
  </g>
  <g stroke="#F472B6" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 5">
    <path d="M735 300 V400"/>
    <path d="M870 300 V400"/>
  </g>
  <g stroke="#A3E635" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="6 5">
    <path d="M1005 300 V400"/>
    <path d="M1140 300 V400"/>
    <path d="M1275 300 V400"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="610" fill="#94A3B8" font-size="20">function signature contract</text>
    <text x="135" y="640" fill="#FBBF24" font-size="18">func(struct page *) — caller must normalize head/tail</text>
    <text x="135" y="664" fill="#5EEAD4" font-size="18">func(struct folio *) — type guarantees no tail page</text>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="730" font-size="48" font-weight="700">Folio：管理单位 vs 物理单位</text>
    <text x="140" y="780" fill="#CBD5E1" font-size="24">physical unit (page) != management unit (folio)</text>
  </g>
</svg>
