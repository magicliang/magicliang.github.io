<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OOM Killer：内核什么时候决定杀进程</title>
  <desc id="desc">OOM 触发前的逐步升级路径与 victim 选择机制</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#1A0F14"/>
      <stop offset="1" stop-color="#14100F"/>
    </linearGradient>
    <linearGradient id="escColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 100 H1480"/>
    <path d="M780 80 V750"/>
  </g>

  <!-- Left: Escalation path -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="95" fill="#CBD5E1" font-size="20" font-weight="700">Escalation Path (before OOM fires)</text>
  </g>

  <!-- Step 1: Normal alloc -->
  <g filter="url(#softShadow)">
    <rect x="135" y="115" width="580" height="45" rx="8" fill="#0B1A20" stroke="#34D399" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="143" fill="#34D399" font-size="14" font-weight="700">1. __alloc_pages()</text>
    <text x="400" y="143" fill="#64748B" font-size="13">check free_area → success?</text>
  </g>

  <!-- Step 2: kswapd -->
  <g filter="url(#softShadow)">
    <rect x="135" y="175" width="580" height="45" rx="8" fill="#0B1A20" stroke="#34D399" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="203" fill="#34D399" font-size="14">2. Wake kswapd</text>
    <text x="400" y="203" fill="#64748B" font-size="13">background reclaim</text>
  </g>

  <!-- Step 3: direct reclaim -->
  <g filter="url(#softShadow)">
    <rect x="135" y="235" width="580" height="45" rx="8" fill="#0B1A20" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="263" fill="#FBBF24" font-size="14">3. Direct reclaim</text>
    <text x="400" y="263" fill="#64748B" font-size="13">synchronous, in caller context</text>
  </g>

  <!-- Step 4: compaction -->
  <g filter="url(#softShadow)">
    <rect x="135" y="295" width="580" height="45" rx="8" fill="#0B1A20" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="323" fill="#FBBF24" font-size="14">4. Direct compaction</text>
    <text x="400" y="323" fill="#64748B" font-size="13">defragment, retry allocation</text>
  </g>

  <!-- Step 5: retry -->
  <g filter="url(#softShadow)">
    <rect x="135" y="355" width="580" height="45" rx="8" fill="#0B1A20" stroke="#F97316" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="383" fill="#F97316" font-size="14">5. Retry allocation</text>
    <text x="400" y="383" fill="#64748B" font-size="13">still fails?</text>
  </g>

  <!-- Step 6: OOM kill -->
  <g filter="url(#softShadow)">
    <rect x="135" y="415" width="580" height="55" rx="8" fill="#1A0B0B" stroke="#EF4444" stroke-width="2.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="443" fill="#EF4444" font-size="16" font-weight="700">6. OOM KILL</text>
    <text x="340" y="443" fill="#EF4444" font-size="14">select victim → SIGKILL → reap</text>
    <text x="160" y="462" fill="#64748B" font-size="12">last resort after all recovery attempts exhausted</text>
  </g>

  <!-- Arrows between steps -->
  <g font-family="Menlo, Consolas, monospace" fill="#475569" font-size="12">
    <text x="720" y="148" fill="#34D399">fail ↓</text>
    <text x="720" y="208" fill="#34D399">fail ↓</text>
    <text x="720" y="268" fill="#FBBF24">fail ↓</text>
    <text x="720" y="328" fill="#FBBF24">fail ↓</text>
    <text x="720" y="388" fill="#F97316">fail ↓</text>
  </g>

  <!-- Right: Victim selection -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="835" y="95" fill="#CBD5E1" font-size="20" font-weight="700">Victim Selection (oom_badness)</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="835" y="115" width="600" height="220" rx="12" fill="#0B1220" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="865" y="150" fill="#A78BFA" font-size="15" font-weight="700">oom_score = f(RSS, oom_score_adj)</text>
    <text x="865" y="180" fill="#94A3B8" font-size="13">Process A:  RSS=2.1GB  adj=0    score=680</text>
    <text x="865" y="205" fill="#EF4444" font-size="13" font-weight="700">Process B:  RSS=3.8GB  adj=0    score=950 ← VICTIM</text>
    <text x="865" y="230" fill="#94A3B8" font-size="13">Process C:  RSS=1.5GB  adj=-500 score=120</text>
    <text x="865" y="255" fill="#34D399" font-size="13">Process D:  RSS=0.8GB  adj=-1000 score=0 (immune)</text>
    <text x="865" y="290" fill="#64748B" font-size="12">Higher RSS → higher score → more likely to be killed</text>
    <text x="865" y="310" fill="#64748B" font-size="12">Goal: kill process that frees the most memory</text>
  </g>

  <!-- Global vs memcg OOM -->
  <g filter="url(#softShadow)">
    <rect x="835" y="360" width="600" height="115" rx="12" fill="#0B1220" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="865" y="395" fill="#FBBF24" font-size="16" font-weight="700">Two OOM Scopes</text>
    <text x="865" y="425" fill="#7DD3FC" font-size="14">Global OOM: system-wide, all processes at risk</text>
    <text x="865" y="450" fill="#A78BFA" font-size="14">Memcg OOM: container-scoped, only kills within cgroup</text>
    <text x="865" y="470" fill="#64748B" font-size="12">constraint=CONSTRAINT_MEMCG vs CONSTRAINT_NONE</text>
  </g>

  <!-- OOM log snippet -->
  <g filter="url(#softShadow)">
    <rect x="135" y="500" width="1300" height="140" rx="10" fill="#0B0B14" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="530" fill="#64748B" font-size="14" font-weight="700">dmesg OOM log (key fields):</text>
    <text x="160" y="558" fill="#94A3B8" font-size="12">invoked oom-killer: gfp_mask=0x100cca(GFP_HIGHUSER_MOVABLE), order=0</text>
    <text x="160" y="580" fill="#FBBF24" font-size="12">oom_kill_constraint=CONSTRAINT_MEMCG</text>
    <text x="160" y="602" fill="#EF4444" font-size="12">Killed process 12345 (my-app), anon-rss:512000kB, file-rss:24000kB</text>
    <text x="160" y="624" fill="#34D399" font-size="12">oom_reaper: reaped process 12345, now anon-rss:0kB</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="720" font-size="40" font-weight="700">OOM Killer：内核什么时候决定杀进程</text>
    <text x="140" y="770" fill="#CBD5E1" font-size="21">unrecoverable allocation failure → choose victim → free by termination</text>
  </g>
</svg>
