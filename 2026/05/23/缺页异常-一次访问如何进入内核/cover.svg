<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">缺页异常：一次访问如何进入内核</title>
  <desc id="desc">用户态 load/store 到 fault 分派的路径示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1320"/>
      <stop offset="0.55" stop-color="#161C2B"/>
      <stop offset="1" stop-color="#1F2A1F"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="cold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 140 H1480"/>
    <path d="M120 280 H1480"/>
    <path d="M120 420 H1480"/>
    <path d="M120 560 H1480"/>
    <path d="M260 100 V680"/>
    <path d="M520 100 V680"/>
    <path d="M780 100 V680"/>
    <path d="M1040 100 V680"/>
    <path d="M1300 100 V680"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="170" width="1320" height="140" rx="14" fill="#101728" stroke="#64748B" stroke-width="1.5"/>
    <rect x="170" y="200" width="280" height="80" rx="9" fill="#0B1220" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="470" y="200" width="200" height="80" rx="9" fill="#0B1220" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="690" y="200" width="240" height="80" rx="9" fill="#0B1220" stroke="#A3E635" stroke-width="2"/>
    <rect x="950" y="200" width="220" height="80" rx="9" fill="#0B1220" stroke="#FACC15" stroke-width="2"/>
    <rect x="1190" y="200" width="240" height="80" rx="9" fill="#0B1220" stroke="#F472B6" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="310" y="248" fill="#5EEAD4" font-size="22">load / store</text>
    <text x="570" y="248" fill="#7DD3FC" font-size="22">MMU / TLB</text>
    <text x="810" y="248" fill="#A3E635" font-size="22">page table walk</text>
    <text x="1060" y="248" fill="#FACC15" font-size="22">arch fault entry</text>
    <text x="1310" y="248" fill="#F472B6" font-size="22">handle_mm_fault</text>
  </g>

  <g stroke="url(#cold)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M450 240 H470"/>
    <path d="M670 240 H690"/>
  </g>

  <g stroke="url(#hot)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M930 240 H950"/>
    <path d="M1170 240 H1190"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="360" width="1320" height="280" rx="14" fill="#0F1626" stroke="#475569" stroke-width="1.5"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="400" fill="#94A3B8" font-size="22">fault path dispatch</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="170" y="420" width="245" height="90" rx="10" fill="#142033" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="430" y="420" width="245" height="90" rx="10" fill="#142033" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="690" y="420" width="245" height="90" rx="10" fill="#142033" stroke="#A3E635" stroke-width="2"/>
    <rect x="950" y="420" width="245" height="90" rx="10" fill="#142033" stroke="#FACC15" stroke-width="2"/>
    <rect x="1210" y="420" width="220" height="90" rx="10" fill="#142033" stroke="#F472B6" stroke-width="2"/>

    <rect x="170" y="530" width="500" height="90" rx="10" fill="#1B1530" stroke="#F87171" stroke-width="2"/>
    <rect x="690" y="530" width="500" height="90" rx="10" fill="#1B1530" stroke="#FB923C" stroke-width="2"/>
    <rect x="1210" y="530" width="220" height="90" rx="10" fill="#102018" stroke="#34D399" stroke-width="2"/>
  </g>

  <g font-family="Menlo, Consolas, monospace" text-anchor="middle">
    <text x="292" y="462" fill="#5EEAD4" font-size="22" font-weight="700">do_anonymous_page</text>
    <text x="292" y="490" fill="#94A3B8" font-size="17">minor fault</text>

    <text x="552" y="462" fill="#7DD3FC" font-size="22" font-weight="700">do_wp_page</text>
    <text x="552" y="490" fill="#94A3B8" font-size="17">COW</text>

    <text x="812" y="462" fill="#A3E635" font-size="22" font-weight="700">do_fault</text>
    <text x="812" y="490" fill="#94A3B8" font-size="17">file mapping</text>

    <text x="1072" y="462" fill="#FACC15" font-size="22" font-weight="700">do_swap_page</text>
    <text x="1072" y="490" fill="#94A3B8" font-size="17">swap in</text>

    <text x="1320" y="462" fill="#F472B6" font-size="22" font-weight="700">stack grow</text>
    <text x="1320" y="490" fill="#94A3B8" font-size="17">expand VMA</text>

    <text x="420" y="572" fill="#F87171" font-size="22" font-weight="700">SIGSEGV</text>
    <text x="420" y="600" fill="#94A3B8" font-size="17">invalid address or permission</text>

    <text x="940" y="572" fill="#FB923C" font-size="22" font-weight="700">SIGBUS</text>
    <text x="940" y="600" fill="#94A3B8" font-size="17">backing store error</text>

    <text x="1320" y="572" fill="#34D399" font-size="22" font-weight="700">retry</text>
    <text x="1320" y="600" fill="#94A3B8" font-size="17">user instruction</text>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="740" font-size="50" font-weight="700">缺页异常：一次访问如何进入内核</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="26">missing translation -> consult vma -> materialize or reject</text>
  </g>
</svg>
