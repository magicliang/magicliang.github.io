<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">地址空间不是数组</title>
  <desc id="desc">mm_struct 使用区间集合组织多个 VMA 的示意图</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.58" stop-color="#183142"/>
      <stop offset="1" stop-color="#1F3A2E"/>
    </linearGradient>
    <linearGradient id="rangeA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="rangeB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#BEF264"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="rangeC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 160 H1480"/>
    <path d="M120 280 H1480"/>
    <path d="M120 400 H1480"/>
    <path d="M120 520 H1480"/>
    <path d="M120 640 H1480"/>
    <path d="M220 110 V700"/>
    <path d="M420 110 V700"/>
    <path d="M620 110 V700"/>
    <path d="M820 110 V700"/>
    <path d="M1020 110 V700"/>
    <path d="M1220 110 V700"/>
    <path d="M1420 110 V700"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="160" width="1260" height="460" rx="20" fill="#101827" stroke="#334155" stroke-width="2"/>
    <rect x="245" y="260" width="1040" height="96" rx="12" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>
  </g>

  <g font-family="Menlo, Consolas, monospace">
    <text x="220" y="220" fill="#F8FAFC" font-size="34" font-weight="700">struct mm_struct</text>
    <text x="1040" y="220" fill="#CBD5E1" font-size="24">maple tree of VMAs</text>

    <rect x="300" y="274" width="245" height="68" rx="9" fill="url(#rangeA)"/>
    <rect x="555" y="274" width="130" height="68" rx="9" fill="#111827" stroke="#FDE68A" stroke-width="3"/>
    <rect x="695" y="274" width="360" height="68" rx="9" fill="url(#rangeB)"/>
    <rect x="1070" y="274" width="160" height="68" rx="9" fill="url(#rangeC)"/>

    <text x="325" y="316" fill="#082F49" font-size="23" font-weight="700">VMA: r-xp</text>
    <text x="575" y="316" fill="#FDE68A" font-size="23" font-weight="700">gap</text>
    <text x="725" y="316" fill="#1A2E05" font-size="23" font-weight="700">VMA: rw-p anonymous</text>
    <text x="1095" y="316" fill="#422006" font-size="23" font-weight="700">stack</text>

    <path d="M420 405 C420 370 420 358 420 344" stroke="#67E8F9" stroke-width="4" fill="none"/>
    <path d="M875 405 C875 370 875 358 875 344" stroke="#BEF264" stroke-width="4" fill="none"/>
    <path d="M1150 405 C1150 370 1150 358 1150 344" stroke="#FDE68A" stroke-width="4" fill="none"/>

    <rect x="320" y="420" width="205" height="80" rx="10" fill="#172033" stroke="#67E8F9" stroke-width="2"/>
    <rect x="750" y="420" width="250" height="80" rx="10" fill="#172033" stroke="#BEF264" stroke-width="2"/>
    <rect x="1050" y="420" width="205" height="80" rx="10" fill="#172033" stroke="#FDE68A" stroke-width="2"/>

    <text x="354" y="452" fill="#E0F2FE" font-size="22">vm_start</text>
    <text x="354" y="482" fill="#E0F2FE" font-size="22">vm_end</text>
    <text x="795" y="452" fill="#ECFCCB" font-size="22">vm_flags</text>
    <text x="795" y="482" fill="#ECFCCB" font-size="22">vm_ops</text>
    <text x="1087" y="452" fill="#FEF3C7" font-size="22">vm_file</text>
    <text x="1087" y="482" fill="#FEF3C7" font-size="22">vm_pgoff</text>
  </g>

  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="735" font-size="54" font-weight="700">地址空间不是数组</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="28">virtual address space = ordered ranges + policy</text>
  </g>
</svg>
