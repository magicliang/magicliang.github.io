<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Buddy system：物理页如何按阶分配</title>
  <desc id="desc">Buddy allocator 按阶拆分与合并的示意：order-3 拆分为 order-2 再拆分为 order-1</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#0F1A24"/>
      <stop offset="1" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="splitColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="freeColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="usedColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="mergeColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 160 H1480"/>
    <path d="M120 360 H1480"/>
    <path d="M120 540 H1480"/>
  </g>

  <!-- Section: Split on Allocation -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="120" fill="#FBBF24" font-size="22" font-weight="700">Split on Allocation (order-3 → order-1)</text>
  </g>

  <!-- Order-3 block (8 pages) -->
  <g filter="url(#softShadow)">
    <rect x="135" y="145" width="640" height="55" rx="8" fill="#34D399" opacity="0.25" stroke="#34D399" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="178" fill="#34D399" font-size="15" font-weight="700">order-3 (8 pages, 32KB)</text>
    <text x="580" y="178" fill="#64748B" font-size="13">free_area[3]</text>
  </g>

  <!-- Split arrow -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="222" fill="#FBBF24" font-size="14">▼ split</text>
  </g>

  <!-- Two order-2 blocks -->
  <g filter="url(#softShadow)">
    <rect x="135" y="235" width="310" height="50" rx="8" fill="#34D399" opacity="0.25" stroke="#34D399" stroke-width="1.5"/>
    <rect x="465" y="235" width="310" height="50" rx="8" fill="#34D399" opacity="0.15" stroke="#34D399" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="265" fill="#34D399" font-size="14">order-2 (4 pages)</text>
    <text x="485" y="265" fill="#64748B" font-size="14">order-2 → free_area[2]</text>
  </g>

  <!-- Split arrow 2 -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="308" fill="#FBBF24" font-size="14">▼ split</text>
  </g>

  <!-- Two order-1 blocks -->
  <g filter="url(#softShadow)">
    <rect x="135" y="320" width="148" height="45" rx="8" fill="#EF4444" opacity="0.3" stroke="#EF4444" stroke-width="2"/>
    <rect x="297" y="320" width="148" height="45" rx="8" fill="#34D399" opacity="0.15" stroke="#34D399" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="150" y="348" fill="#EF4444" font-size="13" font-weight="700">ALLOCATED</text>
    <text x="312" y="348" fill="#64748B" font-size="13">→ free_area[1]</text>
  </g>

  <!-- Right side: free_area array -->
  <g filter="url(#softShadow)">
    <rect x="860" y="130" width="600" height="250" rx="14" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="890" y="165" fill="#CBD5E1" font-size="18" font-weight="700">free_area[] per zone</text>
    <text x="890" y="200" fill="#94A3B8" font-size="14">[0] order-0:  4KB   ████████ (1247 blocks)</text>
    <text x="890" y="225" fill="#94A3B8" font-size="14">[1] order-1:  8KB   █████ (583 blocks)</text>
    <text x="890" y="250" fill="#94A3B8" font-size="14">[2] order-2: 16KB   ███ (201 blocks)</text>
    <text x="890" y="275" fill="#94A3B8" font-size="14">[3] order-3: 32KB   ██ (89 blocks)</text>
    <text x="890" y="300" fill="#64748B" font-size="14">...</text>
    <text x="890" y="325" fill="#94A3B8" font-size="14">[9] order-9:  2MB   █ (3 blocks)</text>
    <text x="890" y="350" fill="#94A3B8" font-size="14">[10] order-10: 4MB  (0 blocks)</text>
  </g>

  <!-- Section: Merge on Free -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="430" fill="#7DD3FC" font-size="22" font-weight="700">Merge on Free (buddy coalescing)</text>
  </g>

  <!-- Before merge: two order-1 buddies -->
  <g filter="url(#softShadow)">
    <rect x="135" y="450" width="148" height="45" rx="8" fill="#7DD3FC" opacity="0.25" stroke="#7DD3FC" stroke-width="1.5"/>
    <rect x="297" y="450" width="148" height="45" rx="8" fill="#7DD3FC" opacity="0.25" stroke="#7DD3FC" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="478" fill="#7DD3FC" font-size="13">PFN 0x1000</text>
    <text x="317" y="478" fill="#7DD3FC" font-size="13">PFN 0x1002</text>
    <text x="460" y="478" fill="#94A3B8" font-size="12">buddies (XOR check)</text>
  </g>

  <!-- Merge arrow -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="518" fill="#7DD3FC" font-size="14">▼ merge → order-2</text>
  </g>

  <!-- After merge: one order-2 -->
  <g filter="url(#softShadow)">
    <rect x="135" y="530" width="310" height="45" rx="8" fill="#34D399" opacity="0.25" stroke="#34D399" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="155" y="558" fill="#34D399" font-size="14" font-weight="700">order-2 block (4 pages)</text>
    <text x="410" y="558" fill="#64748B" font-size="12">continue checking order-2 buddy...</text>
  </g>

  <!-- Per-CPU pageset box -->
  <g filter="url(#softShadow)">
    <rect x="860" y="430" width="600" height="155" rx="14" fill="#1A1408" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="890" y="465" fill="#FBBF24" font-size="17" font-weight="700">Per-CPU Pagesets (PCP)</text>
    <text x="890" y="498" fill="#94A3B8" font-size="14">order-0 hot path: no zone->lock needed</text>
    <text x="890" y="523" fill="#94A3B8" font-size="14">alloc: PCP → [empty?] → batch refill from buddy</text>
    <text x="890" y="548" fill="#94A3B8" font-size="14">free:  PCP → [full?]  → batch drain to buddy</text>
    <text x="890" y="573" fill="#34D399" font-size="14" font-weight="700">Result: most order-0 ops are lock-free</text>
  </g>

  <!-- Formula -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="640" fill="#94A3B8" font-size="16">buddy_pfn = pfn ^ (1 &lt;&lt; order)</text>
    <text x="135" y="665" fill="#64748B" font-size="14">XOR guarantees O(1) buddy lookup, no search needed</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="740" font-size="42" font-weight="700">Buddy system：物理页如何按阶分配</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="22">power-of-two blocks → split on allocation → merge on free</text>
  </g>
</svg>
