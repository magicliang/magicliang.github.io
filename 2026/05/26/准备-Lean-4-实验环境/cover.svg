<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#120f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Series tag -->
  <text x="600" y="72" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="20" font-weight="700" letter-spacing="3">FORMAL METHODS / 08</text>
  <line x1="400" y1="90" x2="800" y2="90" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Terminal prompt box -->
  <rect x="310" y="200" width="580" height="100" rx="8" fill="rgba(0,0,0,0.4)" stroke="#a855f7" stroke-width="1" opacity="0.7"/>
  <circle cx="340" cy="225" r="6" fill="#ff5f57"/>
  <circle cx="362" cy="225" r="6" fill="#febc2e"/>
  <circle cx="384" cy="225" r="6" fill="#28c840"/>
  <!-- Symbol: monospace command -->
  <text x="600" y="272" text-anchor="middle" fill="#c084fc" font-family="'Courier New',monospace" font-size="36">$ lake build</text>
  <!-- Decorative underline -->
  <line x1="350" y1="315" x2="850" y2="315" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <!-- Chinese title -->
  <text x="600" y="375" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="34" font-weight="700">准备 Lean 4 实验环境</text>
  <!-- Subtitle -->
  <text x="600" y="418" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="17">工具链与项目搭建</text>
  <!-- Gold accent dots -->
  <circle cx="460" cy="375" r="3" fill="#f6d365" opacity="0.6"/>
  <circle cx="740" cy="375" r="3" fill="#f6d365" opacity="0.6"/>
  <!-- Bottom pill -->
  <rect x="400" y="570" width="400" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">形式化方法系列 · Formal Methods</text>
</svg>
