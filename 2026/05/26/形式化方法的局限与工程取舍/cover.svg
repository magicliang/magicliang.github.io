<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#120f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Series tag -->
  <text x="600" y="72" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="20" font-weight="700" letter-spacing="3">FORMAL METHODS / 11</text>
  <line x1="400" y1="90" x2="800" y2="90" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Balance scale drawn as SVG shapes -->
  <!-- Fulcrum vertical line -->
  <line x1="600" y1="180" x2="600" y2="310" stroke="#a855f7" stroke-width="2.5" opacity="0.8"/>
  <!-- Horizontal beam -->
  <line x1="400" y1="210" x2="800" y2="210" stroke="#c084fc" stroke-width="2.5"/>
  <!-- Left pan strings -->
  <line x1="440" y1="210" x2="420" y2="260" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
  <line x1="480" y1="210" x2="500" y2="260" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
  <!-- Right pan strings -->
  <line x1="720" y1="210" x2="700" y2="260" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
  <line x1="760" y1="210" x2="780" y2="260" stroke="#c084fc" stroke-width="1.5" opacity="0.7"/>
  <!-- Left pan -->
  <ellipse cx="460" cy="262" rx="50" ry="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <!-- Right pan (slightly lower to show imbalance) -->
  <ellipse cx="740" cy="272" rx="50" ry="8" fill="none" stroke="#c084fc" stroke-width="2"/>
  <!-- Balance scale symbol text as fallback center -->
  <text x="600" y="175" text-anchor="middle" fill="#f6d365" font-family="Georgia,serif" font-size="42">⚖</text>
  <!-- Decorative underline -->
  <line x1="350" y1="330" x2="850" y2="330" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <!-- Chinese title -->
  <text x="600" y="388" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="30" font-weight="700">形式化方法的局限与工程取舍</text>
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="17">理论与实践的边界</text>
  <!-- Bottom pill -->
  <rect x="400" y="570" width="400" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">形式化方法系列 · Formal Methods</text>
</svg>
