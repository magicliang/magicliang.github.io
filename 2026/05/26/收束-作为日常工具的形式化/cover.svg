<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#120f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c084fc"/>
    </marker>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Series tag -->
  <text x="600" y="72" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="20" font-weight="700" letter-spacing="3">FORMAL METHODS / 12</text>
  <line x1="400" y1="90" x2="800" y2="90" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Converging arrows from top-left, top-right, bottom toward center point -->
  <!-- Top-left arrow -->
  <line x1="390" y1="160" x2="572" y2="268" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.85"/>
  <!-- Top-right arrow -->
  <line x1="810" y1="160" x2="628" y2="268" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.85"/>
  <!-- Bottom arrow (from below) -->
  <line x1="600" y1="145" x2="600" y2="262" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.85"/>
  <!-- Center convergence point -->
  <circle cx="600" cy="278" r="12" fill="#f6d365" opacity="0.9"/>
  <circle cx="600" cy="278" r="6" fill="#7c3aed"/>
  <!-- Symbol text as a clean reference -->
  <text x="600" y="200" text-anchor="middle" fill="#c084fc" font-family="Georgia,serif" font-size="40" opacity="0.3">→•←</text>
  <!-- Decorative underline -->
  <line x1="350" y1="320" x2="850" y2="320" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <!-- Chinese title -->
  <text x="600" y="376" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="30" font-weight="700">收束：作为日常工具的形式化</text>
  <!-- Subtitle -->
  <text x="600" y="418" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="17">从理论回到工程</text>
  <!-- Bottom pill -->
  <rect x="400" y="570" width="400" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">形式化方法系列 · Formal Methods</text>
</svg>
