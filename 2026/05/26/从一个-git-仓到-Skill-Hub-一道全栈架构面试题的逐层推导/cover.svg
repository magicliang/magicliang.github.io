<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg5)"/>
  <pattern id="dots5" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots5)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#3fb950" letter-spacing="3" font-weight="600" opacity="0.9">ARCHITECTURE INTERVIEW</text>
  <line x1="60" y1="82" x2="315" y2="82" stroke="#3fb950" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="148" font-size="46" font-weight="700" fill="white">从一个 git 仓到 Skill Hub</text>
  <!-- Subtitle -->
  <text x="60" y="198" font-size="22" fill="#8090a0">全栈架构题的逐层推导</text>

  <!-- Layered architecture stack - centered vertically -->
  <g transform="translate(100, 245)">
    <!-- Layer 4: Skill Hub (top, widest) -->
    <rect x="0" y="0" width="520" height="56" rx="8" fill="#1a3040" stroke="#58a6ff" stroke-width="2"/>
    <rect x="0" y="0" width="520" height="56" rx="8" fill="#58a6ff" opacity="0.06"/>
    <text x="260" y="25" font-size="15" fill="#58a6ff" text-anchor="middle" font-weight="700">Skill Hub</text>
    <text x="260" y="44" font-size="11" fill="#6080a0" text-anchor="middle">API Gateway · Auth · Rate Limit · Search · Versioning</text>

    <!-- Arrow -->
    <text x="260" y="75" font-size="18" fill="#3fb950" text-anchor="middle" opacity="0.6">↑</text>

    <!-- Layer 3: CDN -->
    <rect x="30" y="84" width="460" height="52" rx="8" fill="#162810" stroke="#3fb950" stroke-width="1.5"/>
    <text x="260" y="107" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="600">CDN / Edge Cache</text>
    <text x="260" y="125" font-size="11" fill="#507040" text-anchor="middle">Global Distribution · Cache-Control · GZIP</text>

    <!-- Arrow -->
    <text x="260" y="153" font-size="18" fill="#3fb950" text-anchor="middle" opacity="0.6">↑</text>

    <!-- Layer 2: Registry -->
    <rect x="60" y="162" width="400" height="52" rx="8" fill="#1a2010" stroke="#3fb950" stroke-width="1.5" opacity="0.85"/>
    <text x="260" y="185" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="600" opacity="0.85">Package Registry</text>
    <text x="260" y="203" font-size="11" fill="#507040" text-anchor="middle" opacity="0.85">Metadata · Tarball Storage · Semver · Tags</text>

    <!-- Arrow -->
    <text x="260" y="231" font-size="18" fill="#3fb950" text-anchor="middle" opacity="0.6">↑</text>

    <!-- Layer 1: Git Repo (bottom, narrowest) -->
    <rect x="100" y="240" width="320" height="52" rx="8" fill="#0d1a08" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>
    <text x="260" y="263" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="600" opacity="0.7">Git Repository</text>
    <text x="260" y="281" font-size="11" fill="#507040" text-anchor="middle" opacity="0.7">Source · Hooks · CI/CD · Releases</text>
  </g>

  <!-- Right side: key technologies -->
  <g transform="translate(720, 245)">
    <text x="0" y="20" font-size="13" fill="#58a6ff" font-weight="600">技术栈</text>
    <line x1="0" y1="28" x2="180" y2="28" stroke="#30405a" stroke-width="1"/>

    <text x="0" y="52" font-size="12" fill="#6080a0">● Fastify / Express API</text>
    <text x="0" y="74" font-size="12" fill="#6080a0">● PostgreSQL + Redis</text>
    <text x="0" y="96" font-size="12" fill="#6080a0">● S3 / R2 artifact storage</text>
    <text x="0" y="118" font-size="12" fill="#6080a0">● Cloudflare Workers CDN</text>
    <text x="0" y="140" font-size="12" fill="#6080a0">● GitHub Actions CI</text>
    <text x="0" y="162" font-size="12" fill="#6080a0">● npm / pnpm protocol</text>

    <line x1="0" y1="178" x2="180" y2="178" stroke="#30405a" stroke-width="1"/>
    <text x="0" y="200" font-size="13" fill="#3fb950" font-weight="600">推导路径</text>
    <text x="0" y="222" font-size="11" fill="#507040">单仓 → 注册中心 → CDN</text>
    <text x="0" y="240" font-size="11" fill="#507040">→ 鉴权 → 版本管理</text>
    <text x="0" y="258" font-size="11" fill="#507040">→ 搜索 → Skill Hub</text>
  </g>

  <!-- Right side: complexity gauge -->
  <g transform="translate(960, 260)">
    <text x="90" y="0" font-size="12" fill="#8090a0" text-anchor="middle">Complexity</text>
    <rect x="70" y="10" width="40" height="200" rx="6" fill="#0d1117" stroke="#30405a" stroke-width="1"/>
    <!-- Fill gradient -->
    <rect x="71" y="11" width="38" height="198" rx="5" fill="#0d1117"/>
    <rect x="71" y="91" width="38" height="118" rx="5" fill="#3fb950" opacity="0.15"/>
    <rect x="71" y="51" width="38" height="158" rx="5" fill="#3fb950" opacity="0.2"/>
    <rect x="71" y="11" width="38" height="198" rx="5" fill="url(#stackGrad)" opacity="0.7"/>
    <defs>
      <linearGradient id="stackGrad" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#0d1117"/>
        <stop offset="60%" stop-color="#3fb950" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.5"/>
      </linearGradient>
    </defs>
    <text x="90" y="225" font-size="10" fill="#507040" text-anchor="middle">Low</text>
    <text x="90" y="20" font-size="10" fill="#58a6ff" text-anchor="middle">High</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#161b22" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#30405a">守株阁 · 架构设计 · 系统设计面试</text>
</svg>
