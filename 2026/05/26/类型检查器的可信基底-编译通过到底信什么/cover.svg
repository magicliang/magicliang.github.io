<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#120f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots overlay -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.06"/>

  <!-- Decorative top line -->
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Series tag -->
  <text x="600" y="115" text-anchor="middle" font-family="monospace" font-size="20" font-weight="700"
        letter-spacing="3" fill="#a855f7">FORMAL METHODS / 06</text>

  <!-- Decorative separator dots -->
  <circle cx="520" cy="145" r="2" fill="#7c3aed" opacity="0.6"/>
  <circle cx="600" cy="145" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="680" cy="145" r="2" fill="#7c3aed" opacity="0.6"/>

  <!-- TCB layered box stack: 3 boxes labeled Kernel, Checker, TCB -->
  <!-- Bottom box: Kernel -->
  <rect x="390" y="285" width="420" height="52" rx="4" fill="url(#boxGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="600" y="317" text-anchor="middle" font-family="monospace" font-size="18" fill="#a855f7" letter-spacing="2">Kernel</text>

  <!-- Middle box: Checker -->
  <rect x="420" y="233" width="360" height="52" rx="4" fill="url(#boxGrad)" stroke="#9333ea" stroke-width="1.5"/>
  <text x="600" y="265" text-anchor="middle" font-family="monospace" font-size="18" fill="#c084fc" letter-spacing="2">Checker</text>

  <!-- Top box: TCB -->
  <rect x="450" y="181" width="300" height="52" rx="4" fill="url(#boxGrad)" stroke="#a855f7" stroke-width="2"/>
  <text x="600" y="213" text-anchor="middle" font-family="monospace" font-size="24" font-weight="700" fill="white" letter-spacing="4">TCB</text>

  <!-- Thin horizontal rule -->
  <line x1="200" y1="365" x2="1000" y2="365" stroke="#a855f7" stroke-width="1" opacity="0.2"/>

  <!-- Main Chinese title -->
  <text x="600" y="415" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif"
        font-size="32" font-weight="700" fill="white">类型检查器的可信基底</text>

  <!-- Subtitle -->
  <text x="600" y="462" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif"
        font-size="17" fill="#a0a0c0">编译通过到底信什么</text>

  <!-- Bottom pill -->
  <rect x="375" y="530" width="450" height="40" rx="15" fill="none" stroke="#4a4a6a" stroke-width="1"/>
  <text x="600" y="556" text-anchor="middle" font-family="monospace" font-size="13"
        fill="#808090" letter-spacing="1">形式化方法系列 · Formal Methods</text>

  <!-- Decorative bottom line -->
  <line x1="100" y1="600" x2="1100" y2="600" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Gold accent dot -->
  <circle cx="600" cy="490" r="3" fill="#f6d365" opacity="0.7"/>
</svg>
