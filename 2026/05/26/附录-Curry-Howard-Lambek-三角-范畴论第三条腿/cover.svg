<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#120f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Series tag: APPENDIX -->
  <text x="600" y="72" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="20" font-weight="700" letter-spacing="3">FORMAL METHODS / APPENDIX</text>
  <line x1="340" y1="90" x2="860" y2="90" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Triangle vertices: C=top, H=bottom-left, L=bottom-right -->
  <!-- Triangle edges -->
  <line x1="600" y1="140" x2="440" y2="310" stroke="#c084fc" stroke-width="1.8" opacity="0.7"/>
  <line x1="600" y1="140" x2="760" y2="310" stroke="#c084fc" stroke-width="1.8" opacity="0.7"/>
  <line x1="440" y1="310" x2="760" y2="310" stroke="#c084fc" stroke-width="1.8" opacity="0.7"/>
  <!-- Vertex circles -->
  <circle cx="600" cy="140" r="22" fill="rgba(124,58,237,0.3)" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="440" cy="310" r="22" fill="rgba(124,58,237,0.3)" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="760" cy="310" r="22" fill="rgba(124,58,237,0.3)" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Vertex labels -->
  <text x="600" y="148" text-anchor="middle" dominant-baseline="middle" fill="#f6d365" font-family="Georgia,serif" font-size="26" font-weight="700">C</text>
  <text x="440" y="318" text-anchor="middle" dominant-baseline="middle" fill="#f6d365" font-family="Georgia,serif" font-size="26" font-weight="700">H</text>
  <text x="760" y="318" text-anchor="middle" dominant-baseline="middle" fill="#f6d365" font-family="Georgia,serif" font-size="26" font-weight="700">L</text>
  <!-- Edge labels -->
  <text x="502" y="220" text-anchor="middle" fill="#c084fc" font-family="Georgia,serif" font-size="14" opacity="0.8">Curry-Howard</text>
  <text x="698" y="220" text-anchor="middle" fill="#c084fc" font-family="Georgia,serif" font-size="14" opacity="0.8">Howard-Lambek</text>
  <text x="600" y="340" text-anchor="middle" fill="#c084fc" font-family="Georgia,serif" font-size="14" opacity="0.8">Curry-Lambek</text>
  <!-- Decorative underline -->
  <line x1="350" y1="365" x2="850" y2="365" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <!-- Chinese title -->
  <text x="600" y="415" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="28" font-weight="700">Curry-Howard-Lambek 三角</text>
  <!-- Subtitle -->
  <text x="600" y="455" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="17">范畴论第三条腿</text>
  <!-- Bottom pill -->
  <rect x="400" y="570" width="400" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">形式化方法系列 · Formal Methods</text>
</svg>
