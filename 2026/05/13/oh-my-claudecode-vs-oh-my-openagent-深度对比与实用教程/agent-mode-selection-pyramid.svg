<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Coding 工作模式选择金字塔</title>
  <desc id="desc">一张深色科技风金字塔图，从单 Agent 会话到原生并行、原生协作和插件编排层，帮助选择 OMC、OmO、Agent Teams 或 Subagents。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111e"/>
      <stop offset="50%" stop-color="#0b1626"/>
      <stop offset="100%" stop-color="#101421"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3346"/>
      <stop offset="100%" stop-color="#11345a"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#123b53"/>
      <stop offset="100%" stop-color="#174061"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#193157"/>
      <stop offset="100%" stop-color="#2c2c63"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29305d"/>
      <stop offset="100%" stop-color="#4a2a6d"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#7fefff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000814" flood-opacity=".48"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .h1 { font-size: 48px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .title { font-size: 28px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .body { font-size: 20px; fill: #bfd2df; letter-spacing: 0; }
      .small { font-size: 17px; fill: #9fb4c5; letter-spacing: 0; }
      .badge { font-size: 16px; font-weight: 800; fill: #07111d; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 17px; fill: #dff9ff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="800" cy="420" r="420" fill="#32e8ff" opacity=".08"/>
  <circle cx="1020" cy="360" r="330" fill="#b88cff" opacity=".10"/>

  <text x="800" y="86" text-anchor="middle" class="font h1">把任务放在合适的编排层</text>
  <text x="800" y="126" text-anchor="middle" class="font body">复杂度递增，能力递增；不是所有任务都值得上插件层</text>

  <g transform="translate(300 180)" filter="url(#shadow)">
    <path d="M500 0L690 128H310Z" fill="url(#layer4)" stroke="#c7a4ff" stroke-opacity=".62"/>
    <path d="M310 138H690L815 258H185Z" fill="url(#layer3)" stroke="#9ebfff" stroke-opacity=".5"/>
    <path d="M185 270H815L942 410H58Z" fill="url(#layer2)" stroke="#73e9ff" stroke-opacity=".46"/>
    <path d="M58 424H942L1000 570H0Z" fill="url(#layer1)" stroke="#4deaff" stroke-opacity=".5"/>

    <g class="font">
      <text x="500" y="72" text-anchor="middle" class="title">插件编排层</text>
      <text x="500" y="102" text-anchor="middle" class="small">OMC / OmO：流水线、跨模型、恢复机制</text>

      <text x="500" y="198" text-anchor="middle" class="title">原生协作层</text>
      <text x="500" y="230" text-anchor="middle" class="small">Agent Teams：同伴通信、共享任务、竞争假设</text>

      <text x="500" y="332" text-anchor="middle" class="title">原生并行层</text>
      <text x="500" y="366" text-anchor="middle" class="small">Subagents / Explore：独立搜索、审查、测试</text>

      <text x="500" y="490" text-anchor="middle" class="title">基础层</text>
      <text x="500" y="526" text-anchor="middle" class="small">单 Agent 会话：简单编辑、阅读、明确 bug</text>
    </g>
  </g>

  <g class="font">
    <g transform="translate(110 260)">
      <rect width="250" height="62" rx="18" fill="#061726" stroke="#4deaff" stroke-opacity=".36"/>
      <text x="28" y="28" class="small">优先考虑</text>
      <text x="28" y="50" class="mono">zero coordination</text>
    </g>
    <g transform="translate(1240 260)">
      <rect width="250" height="62" rx="18" fill="#11162b" stroke="#c7a4ff" stroke-opacity=".36"/>
      <text x="28" y="28" class="small">只在需要时升级</text>
      <text x="28" y="50" class="mono">workflow automation</text>
    </g>

    <path d="M360 360C250 412 230 510 312 604" fill="none" stroke="#4deaff" stroke-width="3" stroke-opacity=".6" stroke-linecap="round"/>
    <path d="M1240 360C1350 412 1370 510 1288 604" fill="none" stroke="#c7a4ff" stroke-width="3" stroke-opacity=".6" stroke-linecap="round"/>

    <g transform="translate(178 646)">
      <rect width="330" height="98" rx="20" fill="#07111d" fill-opacity=".86" stroke="#4deaff" stroke-opacity=".26"/>
      <rect x="24" y="22" width="86" height="28" rx="14" fill="#4deaff"/>
      <text x="67" y="42" text-anchor="middle" class="badge">Rule</text>
      <text x="130" y="42" class="body">能用原生就先用原生</text>
      <text x="24" y="76" class="small">减少 token、延迟和协调成本</text>
    </g>
    <g transform="translate(1092 646)">
      <rect width="330" height="98" rx="20" fill="#07111d" fill-opacity=".86" stroke="#c7a4ff" stroke-opacity=".28"/>
      <rect x="24" y="22" width="86" height="28" rx="14" fill="#c7a4ff"/>
      <text x="67" y="42" text-anchor="middle" class="badge">Rule</text>
      <text x="130" y="42" class="body">跨模型或长流程再上插件</text>
      <text x="24" y="76" class="small">让自动验证和状态恢复抵消复杂性</text>
    </g>
  </g>

  <g class="font" transform="translate(520 792)">
    <rect width="560" height="48" rx="24" fill="#07111d" fill-opacity=".86" stroke="#e7f6ff" stroke-opacity=".24"/>
    <text x="280" y="31" text-anchor="middle" class="small">选择题不是 OMC 或 OmO，而是任务应该停在哪一层</text>
  </g>
</svg>
