<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OMC 双表面架构与 OmO 三层架构对比</title>
  <desc id="desc">左侧展示 OMC 的 Claude Code Session 和 Terminal CLI 双运行表面；右侧展示 OmO 的规划、调度、执行三层结构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101b"/>
      <stop offset="55%" stop-color="#0b1523"/>
      <stop offset="100%" stop-color="#111423"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102f46"/>
      <stop offset="100%" stop-color="#071726"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b1a4b"/>
      <stop offset="100%" stop-color="#10182d"/>
    </linearGradient>
    <linearGradient id="hotline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42e8ff"/>
      <stop offset="50%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#b88cff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#89f3ff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .h1 { font-size: 46px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .h2 { font-size: 28px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .body { font-size: 20px; fill: #bfd2df; letter-spacing: 0; }
      .small { font-size: 17px; fill: #9fb4c5; letter-spacing: 0; }
      .tag { font-size: 16px; font-weight: 800; fill: #081421; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 17px; fill: #dff9ff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="226" cy="222" r="330" fill="#2fe9ff" opacity=".10"/>
  <circle cx="1316" cy="220" r="350" fill="#b98cff" opacity=".12"/>

  <text x="800" y="80" text-anchor="middle" class="font h1">运行表面 vs 角色层级</text>
  <text x="800" y="118" text-anchor="middle" class="font body">OMC 为独立 CLI 进程付出双表面复杂度；OmO 用 API 路由换取三层治理结构</text>

  <g transform="translate(78 170)" filter="url(#shadow)">
    <rect width="675" height="620" rx="24" fill="#07111d" fill-opacity=".88" stroke="#45eaff" stroke-opacity=".45"/>
    <text x="42" y="58" class="font h2">OMC：双运行表面</text>
    <text x="42" y="92" class="font body">Session 内编排 + Terminal 进程隔离</text>

    <g transform="translate(42 132)">
      <rect width="591" height="205" rx="18" fill="url(#cyan)" stroke="#49e6ff" stroke-opacity=".55"/>
      <rect x="28" y="26" width="146" height="32" rx="16" fill="#47e7ff"/>
      <text x="101" y="48" text-anchor="middle" class="font tag">Surface 01</text>
      <text x="28" y="92" class="font h2" font-size="24">Claude Code Session</text>
      <text x="28" y="126" class="font body">/team /ralph /ccg</text>
      <g transform="translate(28 150)">
        <rect width="112" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".4"/>
        <text x="56" y="23" text-anchor="middle" class="font small">architect</text>
        <rect x="128" width="112" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".4"/>
        <text x="184" y="23" text-anchor="middle" class="font small">executor</text>
        <rect x="256" width="112" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".4"/>
        <text x="312" y="23" text-anchor="middle" class="font small">verifier</text>
        <rect x="384" width="112" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".4"/>
        <text x="440" y="23" text-anchor="middle" class="font small">writer</text>
      </g>
    </g>

    <g transform="translate(42 374)">
      <rect width="591" height="205" rx="18" fill="#0b1523" stroke="#49e6ff" stroke-opacity=".35"/>
      <rect x="28" y="26" width="146" height="32" rx="16" fill="#94f3ff" fill-opacity=".9"/>
      <text x="101" y="48" text-anchor="middle" class="font tag">Surface 02</text>
      <text x="28" y="92" class="font h2" font-size="24">Terminal CLI / tmux Workers</text>
      <text x="28" y="126" class="font body">独立 agentic coding 进程，各自带工具链</text>
      <g transform="translate(28 150)">
        <rect width="132" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".42"/>
        <text x="66" y="23" text-anchor="middle" class="font small">Claude CLI</text>
        <rect x="150" width="132" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".42"/>
        <text x="216" y="23" text-anchor="middle" class="font small">Codex CLI</text>
        <rect x="300" width="132" height="34" rx="10" fill="#061726" stroke="#76efff" stroke-opacity=".42"/>
        <text x="366" y="23" text-anchor="middle" class="font small">Gemini CLI</text>
      </g>
    </g>
  </g>

  <g transform="translate(847 170)" filter="url(#shadow)">
    <rect width="675" height="620" rx="24" fill="#07111d" fill-opacity=".88" stroke="#bd96ff" stroke-opacity=".48"/>
    <text x="42" y="58" class="font h2">OmO：三层治理结构</text>
    <text x="42" y="92" class="font body">规划、调度、执行分离，避免自评闭环</text>

    <g transform="translate(42 132)">
      <rect width="591" height="128" rx="18" fill="url(#violet)" stroke="#c8a3ff" stroke-opacity=".55"/>
      <text x="30" y="48" class="font h2" font-size="24">Planning</text>
      <text x="30" y="82" class="font body">Prometheus → Metis → Momus</text>
      <text x="420" y="82" class="font mono">plan.md</text>
    </g>
    <g transform="translate(42 292)">
      <rect width="591" height="128" rx="18" fill="#151630" stroke="#c8a3ff" stroke-opacity=".42"/>
      <text x="30" y="48" class="font h2" font-size="24">Dispatch</text>
      <text x="30" y="82" class="font body">Atlas 读计划、分任务、验结果</text>
      <text x="422" y="82" class="font mono">boulder</text>
    </g>
    <g transform="translate(42 452)">
      <rect width="591" height="128" rx="18" fill="#10182d" stroke="#c8a3ff" stroke-opacity=".42"/>
      <text x="30" y="48" class="font h2" font-size="24">Workers</text>
      <text x="30" y="82" class="font body">Sisyphus-Jr / Oracle / visual-engineer</text>
      <text x="400" y="82" class="font mono">API route</text>
    </g>

    <path d="M337 260V292" stroke="#d4b8ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M337 420V452" stroke="#d4b8ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <g filter="url(#glow)">
    <path d="M760 480H840" stroke="url(#hotline)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="800" cy="480" r="12" fill="#f4fbff"/>
  </g>
  <g class="font">
    <rect x="618" y="810" width="364" height="48" rx="24" fill="#07111d" fill-opacity=".86" stroke="#e7f6ff" stroke-opacity=".24"/>
    <text x="800" y="841" text-anchor="middle" class="small">同样是 Hybrid，复杂度落点不同</text>
  </g>
</svg>
