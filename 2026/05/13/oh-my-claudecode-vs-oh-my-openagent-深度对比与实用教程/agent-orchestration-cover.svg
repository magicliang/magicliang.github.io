<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OMC 与 OmO 的 Agent 编排生态总览</title>
  <desc id="desc">一张深色科技风对比图，展示 OMC 的 Claude 深度增强路线与 OmO 的多模型原生编排路线。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="45%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#101626"/>
    </linearGradient>
    <radialGradient id="aura-cyan" cx="28%" cy="34%" r="44%">
      <stop offset="0%" stop-color="#36f2ff" stop-opacity=".34"/>
      <stop offset="48%" stop-color="#36f2ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#36f2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-violet" cx="73%" cy="36%" r="46%">
      <stop offset="0%" stop-color="#a875ff" stop-opacity=".32"/>
      <stop offset="52%" stop-color="#a875ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#a875ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel-left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2f44" stop-opacity=".86"/>
      <stop offset="100%" stop-color="#0d1a2e" stop-opacity=".92"/>
    </linearGradient>
    <linearGradient id="panel-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a4a" stop-opacity=".88"/>
      <stop offset="100%" stop-color="#101a31" stop-opacity=".93"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42e8ff"/>
      <stop offset="50%" stop-color="#e9f8ff"/>
      <stop offset="100%" stop-color="#b88cff"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#5fd7ff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".42"/>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 72px; font-weight: 800; fill: #f5fbff; letter-spacing: 0; }
      .subtitle { font-size: 28px; fill: #a9c4d8; letter-spacing: 0; }
      .label { font-size: 23px; font-weight: 700; fill: #eaf8ff; letter-spacing: 0; }
      .small { font-size: 18px; fill: #b8cad9; letter-spacing: 0; }
      .tiny { font-size: 15px; fill: #8ea4b8; letter-spacing: 0; }
      .chip { font-size: 17px; font-weight: 700; fill: #081421; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 18px; fill: #d9f7ff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#aura-cyan)"/>
  <rect width="1600" height="900" fill="url(#aura-violet)"/>

  <g opacity=".45">
    <path d="M72 728C238 620 318 655 455 548S673 298 803 423s218 146 358 40 218-84 363-8" fill="none" stroke="#4deaff" stroke-width="2"/>
    <path d="M82 769C262 661 345 705 489 603s236-262 363-123 231 165 379 51 214-95 302-55" fill="none" stroke="#b98cff" stroke-width="2"/>
  </g>

  <text x="800" y="124" text-anchor="middle" class="font title">OMC vs OmO</text>
  <text x="800" y="172" text-anchor="middle" class="font subtitle">Agentic Coding 编排层的两条路线</text>

  <g filter="url(#soft-shadow)">
    <rect x="110" y="250" width="565" height="430" rx="22" fill="url(#panel-left)" stroke="#49e6ff" stroke-opacity=".55"/>
    <rect x="925" y="250" width="565" height="430" rx="22" fill="url(#panel-right)" stroke="#b98cff" stroke-opacity=".58"/>
  </g>

  <g class="font">
    <text x="150" y="310" class="label">oh-my-claudecode</text>
    <text x="150" y="343" class="small">单模型深度增强：把 Claude Code 榨到更远</text>
    <rect x="150" y="382" width="168" height="38" rx="19" fill="#47e7ff"/>
    <text x="234" y="407" text-anchor="middle" class="chip">Claude-first</text>
    <rect x="338" y="382" width="146" height="38" rx="19" fill="#8ce7ff" fill-opacity=".18" stroke="#68edff" stroke-opacity=".5"/>
    <text x="411" y="407" text-anchor="middle" class="small" fill="#d8fbff">Team Pipeline</text>
    <rect x="503" y="382" width="118" height="38" rx="19" fill="#8ce7ff" fill-opacity=".18" stroke="#68edff" stroke-opacity=".5"/>
    <text x="562" y="407" text-anchor="middle" class="small" fill="#d8fbff">Ralph Loop</text>

    <g transform="translate(150 462)">
      <rect width="462" height="56" rx="10" fill="#061726" stroke="#55e9ff" stroke-opacity=".32"/>
      <text x="28" y="35" class="mono">plan → prd → exec → verify → fix</text>
      <circle cx="420" cy="28" r="9" fill="#47e7ff" filter="url(#glow)"/>
    </g>
    <g transform="translate(150 545)">
      <circle cx="22" cy="18" r="6" fill="#47e7ff"/>
      <text x="45" y="24" class="small">Session 内 19 个专业 Agent</text>
      <circle cx="22" cy="61" r="6" fill="#47e7ff"/>
      <text x="45" y="67" class="small">tmux 启动 Codex / Gemini CLI</text>
      <circle cx="22" cy="104" r="6" fill="#47e7ff"/>
      <text x="45" y="110" class="small">工作流自动化与验证循环优先</text>
    </g>
  </g>

  <g class="font">
    <text x="965" y="310" class="label">oh-my-openagent</text>
    <text x="965" y="343" class="small">多模型原生编排：按任务特征路由到最优模型</text>
    <rect x="965" y="382" width="154" height="38" rx="19" fill="#c5a0ff"/>
    <text x="1042" y="407" text-anchor="middle" class="chip">Multi-model</text>
    <rect x="1139" y="382" width="126" height="38" rx="19" fill="#c9a5ff" fill-opacity=".18" stroke="#d0a9ff" stroke-opacity=".5"/>
    <text x="1202" y="407" text-anchor="middle" class="small" fill="#f0e8ff">Atlas</text>
    <rect x="1285" y="382" width="158" height="38" rx="19" fill="#c9a5ff" fill-opacity=".18" stroke="#d0a9ff" stroke-opacity=".5"/>
    <text x="1364" y="407" text-anchor="middle" class="small" fill="#f0e8ff">boulder.json</text>

    <g transform="translate(965 462)">
      <rect width="462" height="56" rx="10" fill="#11162b" stroke="#c5a0ff" stroke-opacity=".34"/>
      <text x="28" y="35" class="mono">Prometheus → Atlas → Workers</text>
      <circle cx="420" cy="28" r="9" fill="#c5a0ff" filter="url(#glow)"/>
    </g>
    <g transform="translate(965 545)">
      <circle cx="22" cy="18" r="6" fill="#c5a0ff"/>
      <text x="45" y="24" class="small">visual / deep / quick 分类路由</text>
      <circle cx="22" cy="61" r="6" fill="#c5a0ff"/>
      <text x="45" y="67" class="small">计划、调度、执行三层硬隔离</text>
      <circle cx="22" cy="104" r="6" fill="#c5a0ff"/>
      <text x="45" y="110" class="small">跨任务经验沉淀与恢复</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <path d="M690 456H910" stroke="url(#bridge)" stroke-width="6" stroke-linecap="round"/>
    <path d="M884 430l35 29-35 29" fill="none" stroke="#d8f7ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M910 608H690" stroke="url(#bridge)" stroke-width="6" stroke-linecap="round"/>
    <path d="M716 582l-35 29 35 29" fill="none" stroke="#d8f7ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="font" transform="translate(705 330)">
    <rect width="190" height="196" rx="20" fill="#07111d" fill-opacity=".86" stroke="#eaf8ff" stroke-opacity=".28"/>
    <text x="95" y="54" text-anchor="middle" class="small">核心分歧</text>
    <line x1="38" y1="76" x2="152" y2="76" stroke="#eaf8ff" stroke-opacity=".24"/>
    <text x="95" y="112" text-anchor="middle" class="label">进程级</text>
    <text x="95" y="143" text-anchor="middle" class="tiny">vs</text>
    <text x="95" y="174" text-anchor="middle" class="label">API 级</text>
  </g>

  <g class="font">
    <rect x="330" y="742" width="940" height="72" rx="18" fill="#07111d" fill-opacity=".78" stroke="#85f4ff" stroke-opacity=".24"/>
    <text x="800" y="772" text-anchor="middle" class="small">插件层不是替代原生能力，而是在原生能力够不到的位置补上自动化、路由与恢复机制</text>
    <text x="800" y="802" text-anchor="middle" class="tiny">Base CLI → Native Agents → Agent Teams → Orchestration Plugins</text>
  </g>
</svg>
