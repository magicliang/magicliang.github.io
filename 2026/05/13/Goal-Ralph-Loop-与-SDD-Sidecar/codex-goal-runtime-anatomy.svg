<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Codex Goal Runtime Anatomy</title>
  <desc id="desc">A technical diagram showing Codex goal mode as persisted thread state, app-server control plane, core runtime continuation, narrow model tools, and user visible TUI controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="0.45" stop-color="#101827"/>
      <stop offset="1" stop-color="#141821"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12233b" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#121827" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#113245"/>
      <stop offset="0.55" stop-color="#182035"/>
      <stop offset="1" stop-color="#241a32"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173022"/>
      <stop offset="1" stop-color="#152438"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6aa5c8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58d7ff"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f7b955"/>
    </marker>
    <style>
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f5f8ff; letter-spacing: 0; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #a9b8cf; letter-spacing: 0; }
      .laneTitle { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f4f8ff; letter-spacing: 0; }
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #edf5ff; letter-spacing: 0; }
      .body { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b8c5d8; letter-spacing: 0; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #92a5bd; letter-spacing: 0; }
      .mono { font: 600 15px ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; fill: #dcf7ff; letter-spacing: 0; }
      .chip { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #08111e; letter-spacing: 0; }
      .box { fill: url(#panel); stroke: #5c7da8; stroke-opacity: 0.56; stroke-width: 1.4; rx: 18; filter: url(#softShadow); }
      .mini { fill: #0d1829; stroke: #4d719a; stroke-opacity: 0.75; stroke-width: 1.2; rx: 14; }
      .arrow { fill: none; stroke: #58d7ff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowCyan); }
      .arrow2 { fill: none; stroke: #f7b955; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowAmber); }
      .mutedLine { fill: none; stroke: #7c91aa; stroke-width: 1.5; stroke-dasharray: 7 9; stroke-opacity: 0.5; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <path d="M80 850 C320 760 470 930 720 835 C960 744 1120 860 1510 740" fill="none" stroke="#2de2a7" stroke-opacity="0.08" stroke-width="72"/>
  <path d="M100 150 C360 220 500 50 740 130 C1030 230 1170 80 1510 150" fill="none" stroke="#58d7ff" stroke-opacity="0.08" stroke-width="60"/>

  <text class="title" x="78" y="76">Codex `/goal`：把目标放进 runtime</text>
  <text class="subtitle" x="80" y="112">Goal 不是聊天上下文里的提醒，而是 thread-scoped 持久控制态：</text>
  <text class="subtitle" x="80" y="140">由客户端可见、runtime 调度、模型受限操作、预算可停。</text>

  <rect class="box" x="74" y="168" width="235" height="430"/>
  <text class="laneTitle" x="100" y="208">User / TUI</text>
  <rect class="mini" x="98" y="234" width="185" height="66"/>
  <text class="mono" x="116" y="262">/goal &lt;objective&gt;</text>
  <text class="tiny" x="116" y="286">set durable objective</text>
  <rect class="mini" x="98" y="322" width="185" height="94"/>
  <text class="mono" x="116" y="350">/goal pause</text>
  <text class="mono" x="116" y="374">/goal resume</text>
  <text class="mono" x="116" y="398">/goal clear</text>
  <rect class="mini" x="98" y="438" width="185" height="108"/>
  <text class="label" x="116" y="468">status footer</text>
  <text class="body" x="116" y="496">objective</text>
  <text class="body" x="116" y="520">elapsed / tokens</text>

  <rect class="box" x="360" y="168" width="260" height="430"/>
  <text class="laneTitle" x="390" y="208">App-server control plane</text>
  <rect class="mini" x="388" y="236" width="204" height="126"/>
  <text class="mono" x="410" y="266">thread/goal/get</text>
  <text class="mono" x="410" y="296">thread/goal/set</text>
  <text class="mono" x="410" y="326">thread/goal/clear</text>
  <rect class="mini" x="388" y="386" width="204" height="122"/>
  <text class="label" x="410" y="418">notifications</text>
  <text class="body" x="410" y="446">goal updated</text>
  <text class="body" x="410" y="470">goal cleared</text>
  <text class="body" x="410" y="494">resume snapshot</text>

  <rect class="box" x="672" y="168" width="276" height="430" fill="url(#store)"/>
  <text class="laneTitle" x="704" y="208">Thread store</text>
  <rect class="mini" x="700" y="236" width="220" height="292" fill="#10231d"/>
  <text class="mono" x="722" y="266">thread_goals</text>
  <line x1="722" y1="282" x2="898" y2="282" stroke="#62d99b" stroke-opacity="0.55"/>
  <text class="body" x="722" y="314">thread_id + goal_id</text>
  <text class="body" x="722" y="342">objective</text>
  <text class="body" x="722" y="370">status</text>
  <text class="body" x="722" y="398">token budget</text>
  <text class="body" x="722" y="426">wall-clock usage</text>
  <text class="body" x="722" y="454">continuation count</text>
  <text class="body" x="722" y="482">completion summary</text>
  <text class="tiny" x="722" y="514">stale updates ignored by active goal_id</text>

  <rect x="1004" y="168" width="312" height="430" rx="22" fill="url(#runtime)" stroke="#76e0ff" stroke-opacity="0.65" stroke-width="1.8" filter="url(#softShadow)"/>
  <text class="laneTitle" x="1038" y="208">Core runtime: GoalManager</text>
  <rect class="mini" x="1036" y="236" width="248" height="64"/>
  <text class="label" x="1058" y="264">idle continuation</text>
  <text class="tiny" x="1058" y="286">only after user input and mailbox clear</text>
  <rect class="mini" x="1036" y="318" width="248" height="64"/>
  <text class="label" x="1058" y="346">interrupt / resume</text>
  <text class="tiny" x="1058" y="368">pause on user control boundary</text>
  <rect class="mini" x="1036" y="400" width="248" height="64"/>
  <text class="label" x="1058" y="428">budget steering</text>
  <text class="tiny" x="1058" y="450">soft-stop before quota blow-up</text>
  <rect class="mini" x="1036" y="482" width="248" height="64"/>
  <text class="label" x="1058" y="510">event accounting</text>
  <text class="tiny" x="1058" y="532">turns, tools, mutations, tokens</text>

  <rect class="box" x="1370" y="168" width="160" height="430"/>
  <text class="laneTitle" x="1394" y="208">Model</text>
  <rect class="mini" x="1392" y="236" width="116" height="144"/>
  <text class="mono" x="1408" y="266">get_goal</text>
  <text class="mono" x="1408" y="296">create_goal</text>
  <text class="mono" x="1408" y="326">update_goal</text>
  <text class="tiny" x="1408" y="354">complete only</text>
  <rect class="mini" x="1392" y="410" width="116" height="104"/>
  <text class="label" x="1408" y="440">tools</text>
  <text class="body" x="1408" y="466">edit</text>
  <text class="body" x="1408" y="490">test</text>

  <path class="arrow" d="M309 278 H360"/>
  <path class="arrow" d="M620 300 H672"/>
  <path class="arrow" d="M948 330 C986 330 978 300 1004 300"/>
  <path class="arrow" d="M1316 332 H1370"/>
  <path class="arrow2" d="M1370 480 C1328 540 1280 552 1235 548"/>
  <path class="arrow2" d="M1004 510 C954 558 850 574 790 528"/>
  <path class="arrow" d="M1036 255 C870 96 550 112 496 236"/>
  <path class="mutedLine" d="M1392 364 C1270 650 970 690 810 528"/>
  <text class="tiny" x="1112" y="648" fill="#f7c779">model can request completion, runtime owns continuation</text>

  <rect x="78" y="650" width="1452" height="116" rx="20" fill="#0d1727" stroke="#3f5879" stroke-opacity="0.82"/>
  <text class="laneTitle" x="108" y="690">Status state machine</text>
  <rect x="108" y="714" width="130" height="34" rx="17" fill="#58d7ff"/>
  <text class="chip" x="151" y="737">active</text>
  <rect x="286" y="714" width="130" height="34" rx="17" fill="#f7b955"/>
  <text class="chip" x="326" y="737">paused</text>
  <rect x="464" y="714" width="178" height="34" rx="17" fill="#ff6d8c"/>
  <text class="chip" x="496" y="737">budget_limited</text>
  <rect x="690" y="714" width="140" height="34" rx="17" fill="#6ee7a8"/>
  <text class="chip" x="736" y="737">complete</text>
  <path d="M244 731 H276" stroke="#9fb3cc" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M422 731 H454" stroke="#9fb3cc" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M648 731 H680" stroke="#9fb3cc" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text class="body" x="880" y="720">危险操作、用户确认、预算耗尽都必须变成显式状态，</text>
  <text class="body" x="880" y="746">不能被下一轮 continuation 当成普通失败重试。</text>
  <text class="tiny" x="880" y="766">The hard part is not the loop. The hard part is the control boundary.</text>

  <rect x="78" y="818" width="1452" height="104" rx="20" fill="#f6f8fb" fill-opacity="0.06" stroke="#d6e2f0" stroke-opacity="0.18"/>
  <text class="laneTitle" x="108" y="858">Design invariant</text>
  <text class="body" x="108" y="892">Goal 是持久控制态，不是“多写一句系统提示”。用户掌握 pause / resume / clear，runtime 掌握调度与预算。</text>
  <text class="body" x="108" y="918">模型只在窄工具边界内读目标、创建目标、声明完成。</text>
</svg>
