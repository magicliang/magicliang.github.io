<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Goal Mode Control Protocol</title>
  <desc id="desc">A technical visual map showing goal mode as five contracts: objective, continuation, completion oracle, evidence and recovery state, and human budget control. It maps Codex, Claude Code, Hermes, Ralph Loop, and SDD sidecar onto those contracts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#171923"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b5f84"/>
      <stop offset="0.5" stop-color="#1d384e"/>
      <stop offset="1" stop-color="#271b3f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12243b" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#101827" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#82b8d8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6fe4ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f6c35f"/>
    </marker>
    <style>
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f6f8ff; letter-spacing: 0; }
      .subtitle { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #aebbd0; letter-spacing: 0; }
      .section { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f6f8ff; letter-spacing: 0; }
      .label { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f1f7ff; letter-spacing: 0; }
      .body { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b9c6d8; letter-spacing: 0; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8fa4bd; letter-spacing: 0; }
      .mono { font: 650 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #dcf9ff; letter-spacing: 0; }
      .card { fill: url(#card); stroke: #557399; stroke-opacity: 0.72; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .mini { fill: #0d1828; stroke: #4c7196; stroke-opacity: 0.72; stroke-width: 1.1; rx: 14; }
      .link { fill: none; stroke: #6fe4ff; stroke-opacity: 0.74; stroke-width: 2.4; marker-end: url(#arrow); }
      .link2 { fill: none; stroke: #f6c35f; stroke-opacity: 0.72; stroke-width: 2.4; marker-end: url(#arrowGold); }
      .dash { fill: none; stroke: #8da1bb; stroke-opacity: 0.45; stroke-width: 1.6; stroke-dasharray: 8 10; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect width="1600" height="980" fill="url(#grid)"/>
  <path d="M88 830 C330 735 475 890 705 810 C960 720 1110 855 1500 720" fill="none" stroke="#2fe0b3" stroke-opacity="0.08" stroke-width="68"/>
  <path d="M100 150 C360 230 510 65 785 145 C1040 220 1170 92 1490 155" fill="none" stroke="#6fe4ff" stroke-opacity="0.08" stroke-width="66"/>

  <text class="title" x="78" y="74">Goal Mode 不是一个命令，而是一组控制协议</text>
  <text class="subtitle" x="80" y="112">36氪给出生态信号：闭环交付成为入口。</text>
  <text class="subtitle" x="80" y="140">gist 给出实现剖面：目标、状态、预算、恢复进入 runtime / control plane。</text>

  <rect x="510" y="210" width="580" height="300" rx="32" fill="url(#core)" stroke="#8ceaff" stroke-opacity="0.68" stroke-width="2" filter="url(#shadow)"/>
  <text class="section" x="565" y="258">Five Contracts</text>
  <text class="body" x="565" y="292">一个真正可用的 `/goal`，至少要回答五个工程问题。</text>

  <rect class="mini" x="552" y="322" width="230" height="64"/>
  <text class="label" x="574" y="350">Objective Contract</text>
  <text class="tiny" x="574" y="372">目标和边界是什么</text>
  <rect class="mini" x="818" y="322" width="230" height="64"/>
  <text class="label" x="840" y="350">Continuation</text>
  <text class="tiny" x="840" y="372">什么时候继续下一轮</text>
  <rect class="mini" x="552" y="408" width="230" height="64"/>
  <text class="label" x="574" y="436">Completion Oracle</text>
  <text class="tiny" x="574" y="458">谁有权判定完成</text>
  <rect class="mini" x="818" y="408" width="230" height="64"/>
  <text class="label" x="840" y="436">Evidence Store</text>
  <text class="tiny" x="840" y="458">凭什么恢复和验收</text>
  <rect x="658" y="492" width="284" height="50" rx="15" fill="#f6c35f" fill-opacity="0.95"/>
  <text class="label" x="692" y="524" fill="#101522">Human / Budget Control</text>

  <rect class="card" x="78" y="180" width="340" height="190"/>
  <text class="section" x="110" y="222">Ralph Loop</text>
  <text class="body" x="110" y="256">最小原型：外部 loop 重喂 prompt。</text>
  <text class="mono" x="110" y="292">while :; do ... done</text>
  <text class="body" x="110" y="326">完成判定通常是 promise 字符串，</text>
  <text class="body" x="110" y="350">轻量，但最容易自我误报。</text>

  <rect class="card" x="78" y="520" width="340" height="214"/>
  <text class="section" x="110" y="562">Claude Code</text>
  <text class="body" x="110" y="596">session-scoped Stop hook。</text>
  <text class="body" x="110" y="624">小模型看 transcript 做 yes/no。</text>
  <text class="body" x="110" y="652">强项：执行者和验收者分离。</text>
  <text class="body" x="110" y="680">弱点：裁判不能读文件或跑命令。</text>

  <rect class="card" x="1182" y="180" width="340" height="214"/>
  <text class="section" x="1214" y="222">Codex</text>
  <text class="body" x="1214" y="256">把 goal 做成 thread runtime state。</text>
  <text class="mono" x="1214" y="292">thread_goals + GoalManager</text>
  <text class="body" x="1214" y="326">runtime 负责 idle continuation、</text>
  <text class="body" x="1214" y="350">interrupt、resume、budget soft stop。</text>

  <rect class="card" x="1182" y="520" width="340" height="214"/>
  <text class="section" x="1214" y="562">Hermes</text>
  <text class="body" x="1214" y="596">常驻 Agent 的 session control plane。</text>
  <text class="body" x="1214" y="624">goal + gateway + worker + Kanban。</text>
  <text class="body" x="1214" y="652">强项：多入口、多 worker、重试预算。</text>
  <text class="body" x="1214" y="680">目标锁定纵向深入，看板横向铺开。</text>

  <rect class="card" x="508" y="650" width="584" height="166"/>
  <text class="section" x="540" y="692">SDD Sidecar</text>
  <text class="body" x="540" y="726">不直接负责循环，而是把完成判定证据化。</text>
  <text class="body" x="540" y="754">正式语义在 proposal / spec / design / tasks；</text>
  <text class="body" x="540" y="782">sidecar 只放 loop、test-spec、evidence、ledger。</text>
  <text class="body" x="540" y="810">它是 verification memory，不是第二套需求文档。</text>

  <path class="link" d="M418 274 C470 286 482 330 552 350"/>
  <path class="link" d="M418 620 C485 590 522 470 552 440"/>
  <path class="link" d="M1182 288 C1115 292 1090 330 1048 350"/>
  <path class="link" d="M1182 620 C1108 595 1088 470 1048 440"/>
  <path class="link2" d="M800 650 V542"/>
  <path class="dash" d="M248 370 C350 478 430 620 540 690"/>
  <path class="dash" d="M1352 394 C1275 515 1198 636 1092 710"/>

  <rect x="80" y="858" width="1440" height="72" rx="18" fill="#f8fafc" fill-opacity="0.06" stroke="#d9e6f3" stroke-opacity="0.18"/>
  <text class="label" x="112" y="900">核心判断</text>
  <text class="body" x="245" y="890">竞争点不再是“让 Agent 多跑几轮”，</text>
  <text class="body" x="245" y="914">而是哪个系统能把完成信号、证据、预算和人工控制做成可靠边界。</text>
</svg>
