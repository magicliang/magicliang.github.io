<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07121f"/>
      <stop offset="1" stop-color="#0d1d1b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58d7ff"/>
      <stop offset="1" stop-color="#41efb7"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1600" height="960" fill="url(#bg)"/>
  <rect width="1600" height="960" fill="url(#grid)"/>
  <text x="90" y="88" fill="#f4fbff" font-size="46" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Goal / Ralph 模式的三层结构</text>
  <text x="90" y="132" fill="#9fb8c8" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">Loop 只是入口，完成判定与证据层决定它能不能进入真实工程。</text>

  <g transform="translate(120 210)">
    <rect x="0" y="0" width="1360" height="190" rx="24" fill="#0d2234" stroke="#5fdcff" stroke-opacity="0.35"/>
    <circle cx="94" cy="95" r="54" fill="none" stroke="url(#blue)" stroke-width="8"/>
    <path d="M94 50 A45 45 0 1 1 66 130" fill="none" stroke="#ffdd8a" stroke-width="7" stroke-linecap="round"/>
    <path d="M55 129 L70 132 L64 116" fill="none" stroke="#ffdd8a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="75" fill="#f4fbff" font-size="32" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">1. Loop Trigger</text>
    <text x="180" y="120" fill="#cfe4ef" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">Stop hook、idle continuation、runtime continuation、gateway queue</text>
    <text x="1045" y="78" fill="#79e9ff" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">问题：何时再跑一轮？</text>
    <text x="1045" y="120" fill="#a9c3d6" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">不要每个 turn 后自然停下</text>
  </g>

  <g transform="translate(120 440)">
    <rect x="0" y="0" width="1360" height="190" rx="24" fill="#111f2d" stroke="#f8d47a" stroke-opacity="0.42"/>
    <rect x="44" y="42" width="104" height="104" rx="18" fill="#1b3146" stroke="#f8d47a" stroke-width="4"/>
    <path d="M68 98 L91 121 L126 71" fill="none" stroke="#45f2b9" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="75" fill="#f4fbff" font-size="32" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">2. Completion Oracle</text>
    <text x="180" y="120" fill="#cfe4ef" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">DONE promise、judge model、model tool、reviewer、gate script</text>
    <text x="1045" y="78" fill="#ffe39b" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">问题：凭什么停？</text>
    <text x="1045" y="120" fill="#a9c3d6" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">避免 premature completion</text>
  </g>

  <g transform="translate(120 670)">
    <rect x="0" y="0" width="1360" height="190" rx="24" fill="#102824" stroke="#49efbb" stroke-opacity="0.38"/>
    <rect x="42" y="35" width="112" height="32" rx="10" fill="#18334a" stroke="#58d7ff" stroke-opacity="0.6"/>
    <rect x="42" y="80" width="112" height="32" rx="10" fill="#18334a" stroke="#58d7ff" stroke-opacity="0.6"/>
    <rect x="42" y="125" width="112" height="32" rx="10" fill="#18334a" stroke="#58d7ff" stroke-opacity="0.6"/>
    <circle cx="62" cy="51" r="5" fill="#41efb7"/>
    <circle cx="62" cy="96" r="5" fill="#ffdd8a"/>
    <circle cx="62" cy="141" r="5" fill="#58d7ff"/>
    <text x="180" y="75" fill="#f4fbff" font-size="32" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">3. State and Evidence Ledger</text>
    <text x="180" y="120" fill="#cfe4ef" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">thread state、SessionDB、transcript、sidecar evidence、task ledger</text>
    <text x="1045" y="78" fill="#6df0c0" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">问题：下一轮记得什么？</text>
    <text x="1045" y="120" fill="#a9c3d6" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">支持恢复、审计和脚本校验</text>
  </g>
</svg>
