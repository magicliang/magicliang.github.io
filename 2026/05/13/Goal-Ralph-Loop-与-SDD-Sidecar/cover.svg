<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#102236"/>
      <stop offset="1" stop-color="#0b1714"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#66e3ff"/>
      <stop offset="1" stop-color="#3df5b6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ff8f6b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#7cc7ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.22">
    <path d="M0 720 C260 620 370 760 620 650 C900 525 1100 590 1600 420" fill="none" stroke="#66e3ff" stroke-width="2"/>
    <path d="M0 785 C320 660 460 800 720 700 C980 600 1180 660 1600 510" fill="none" stroke="#3df5b6" stroke-width="2"/>
  </g>

  <g transform="translate(120 120)">
    <text x="0" y="0" fill="#9ee8ff" font-size="24" font-family="Arial, 'PingFang SC', sans-serif" letter-spacing="3">AI AGENT CONTROL PROTOCOL</text>
    <text x="0" y="92" fill="#f7fbff" font-size="78" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Goal 模式深度解析</text>
    <text x="0" y="150" fill="#c7d7e8" font-size="34" font-family="Arial, 'PingFang SC', sans-serif">Ralph Loop、Claude Code、Hermes 与 SDD Sidecar</text>
  </g>

  <g transform="translate(145 345)">
    <rect x="0" y="0" width="1320" height="350" rx="28" fill="#091827" fill-opacity="0.72" stroke="#6ee7ff" stroke-opacity="0.24"/>
    <g transform="translate(70 70)">
      <circle cx="92" cy="92" r="70" fill="none" stroke="url(#cyan)" stroke-width="8" filter="url(#glow)"/>
      <path d="M92 35 A57 57 0 1 1 56 136" fill="none" stroke="#f8e28b" stroke-width="8" stroke-linecap="round"/>
      <path d="M43 132 L60 136 L55 118" fill="none" stroke="#f8e28b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="102" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">LOOP</text>
      <text x="0" y="210" fill="#a9c3d6" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">继续执行</text>
    </g>

    <g transform="translate(360 70)">
      <rect x="20" y="20" width="150" height="130" rx="20" fill="#142c40" stroke="#66e3ff" stroke-width="3"/>
      <path d="M55 88 L82 115 L138 58" fill="none" stroke="#3df5b6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="95" y="210" text-anchor="middle" fill="#a9c3d6" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">完成判定</text>
    </g>

    <g transform="translate(625 70)">
      <rect x="0" y="14" width="190" height="48" rx="12" fill="#10243a" stroke="#6ee7ff" stroke-opacity="0.45"/>
      <rect x="0" y="78" width="190" height="48" rx="12" fill="#10243a" stroke="#6ee7ff" stroke-opacity="0.45"/>
      <rect x="0" y="142" width="190" height="48" rx="12" fill="#10243a" stroke="#6ee7ff" stroke-opacity="0.45"/>
      <circle cx="28" cy="38" r="8" fill="#3df5b6"/>
      <circle cx="28" cy="102" r="8" fill="#ffe08a"/>
      <circle cx="28" cy="166" r="8" fill="#66e3ff"/>
      <text x="52" y="46" fill="#dff8ff" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">thread goal</text>
      <text x="52" y="110" fill="#dff8ff" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">judge result</text>
      <text x="52" y="174" fill="#dff8ff" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">evidence</text>
      <text x="0" y="230" fill="#a9c3d6" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">状态与证据</text>
    </g>

    <g transform="translate(945 58)">
      <rect x="0" y="0" width="250" height="210" rx="26" fill="#1e2535" stroke="url(#amber)" stroke-width="3"/>
      <text x="125" y="55" text-anchor="middle" fill="#ffe9a8" font-size="28" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">SDD Sidecar</text>
      <text x="125" y="102" text-anchor="middle" fill="#f5f9ff" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">gate scripts</text>
      <text x="125" y="136" text-anchor="middle" fill="#f5f9ff" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">test evidence</text>
      <text x="125" y="170" text-anchor="middle" fill="#f5f9ff" font-size="21" font-family="Arial, 'PingFang SC', sans-serif">user ledgers</text>
    </g>
  </g>

  <g transform="translate(126 772)">
    <rect x="0" y="0" width="1348" height="1" fill="#87dfff" opacity="0.28"/>
    <text x="0" y="54" fill="#9fb7c8" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">The hard part is not keeping the agent running. It is knowing when the evidence is enough to stop.</text>
  </g>
</svg>
