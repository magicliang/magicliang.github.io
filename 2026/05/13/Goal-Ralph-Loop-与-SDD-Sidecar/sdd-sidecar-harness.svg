<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58d7ff"/>
      <stop offset="1" stop-color="#41efb7"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.07"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#67e7ff"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <text x="90" y="84" fill="#f4fbff" font-size="44" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">SDD Sidecar 是 Goal 循环的 evidence harness</text>
  <text x="90" y="126" fill="#9fb8c8" font-size="23" font-family="Arial, 'PingFang SC', sans-serif">正式语义留在 native SDD 工件，sidecar 只承载执行记录、证据和签字。</text>

  <g transform="translate(110 210)">
    <rect x="0" y="0" width="420" height="590" rx="28" fill="#0e2133" stroke="#58d7ff" stroke-opacity="0.4"/>
    <text x="40" y="62" fill="#7be6ff" font-size="30" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Native SDD Artifacts</text>
    <text x="40" y="108" fill="#cfe4ef" font-size="23" font-family="Arial, 'PingFang SC', sans-serif">唯一正式语义源</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="23" fill="#f7fbff">
      <rect x="40" y="165" width="340" height="58" rx="14" fill="#132d44" stroke="#58d7ff" stroke-opacity="0.35"/>
      <text x="68" y="202">proposal.md</text>
      <rect x="40" y="245" width="340" height="58" rx="14" fill="#132d44" stroke="#58d7ff" stroke-opacity="0.35"/>
      <text x="68" y="282">specs/**/spec.md</text>
      <rect x="40" y="325" width="340" height="58" rx="14" fill="#132d44" stroke="#58d7ff" stroke-opacity="0.35"/>
      <text x="68" y="362">design.md</text>
      <rect x="40" y="405" width="340" height="58" rx="14" fill="#132d44" stroke="#58d7ff" stroke-opacity="0.35"/>
      <text x="68" y="442">tasks.md</text>
    </g>
    <text x="40" y="522" fill="#9fb8c8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">回答：要做什么、为什么、边界在哪里。</text>
  </g>

  <g transform="translate(610 210)">
    <rect x="0" y="0" width="420" height="590" rx="28" fill="#10251f" stroke="#41efb7" stroke-opacity="0.4"/>
    <text x="40" y="62" fill="#72f0c3" font-size="30" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Sidecar Ledger</text>
    <text x="40" y="108" fill="#cfe4ef" font-size="23" font-family="Arial, 'PingFang SC', sans-serif">循环与证据层</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="23" fill="#f7fbff">
      <rect x="40" y="165" width="340" height="58" rx="14" fill="#17342c" stroke="#41efb7" stroke-opacity="0.35"/>
      <text x="68" y="202">_sdd/loop.md</text>
      <rect x="40" y="245" width="340" height="58" rx="14" fill="#17342c" stroke="#41efb7" stroke-opacity="0.35"/>
      <text x="68" y="282">_sdd/test-spec.md</text>
      <rect x="40" y="325" width="340" height="58" rx="14" fill="#17342c" stroke="#41efb7" stroke-opacity="0.35"/>
      <text x="68" y="362">_sdd/_evidence/*.json</text>
      <rect x="40" y="405" width="340" height="58" rx="14" fill="#17342c" stroke="#41efb7" stroke-opacity="0.35"/>
      <text x="68" y="442">ledgers / sign-off</text>
    </g>
    <text x="40" y="522" fill="#9fb8c8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">回答：做到哪里、证据是什么、谁放行。</text>
  </g>

  <g transform="translate(1110 210)">
    <rect x="0" y="0" width="380" height="590" rx="28" fill="#241f19" stroke="#ffbd7a" stroke-opacity="0.45"/>
    <text x="40" y="62" fill="#ffd596" font-size="30" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Completion Oracle</text>
    <text x="40" y="108" fill="#cfe4ef" font-size="23" font-family="Arial, 'PingFang SC', sans-serif">检查脚本裁决</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="23" fill="#f7fbff">
      <rect x="40" y="170" width="300" height="64" rx="16" fill="#34291e" stroke="#ffbd7a" stroke-opacity="0.35"/>
      <text x="64" y="210">spec-ready?</text>
      <rect x="40" y="265" width="300" height="64" rx="16" fill="#34291e" stroke="#ffbd7a" stroke-opacity="0.35"/>
      <text x="64" y="305">apply-ready?</text>
      <rect x="40" y="360" width="300" height="64" rx="16" fill="#34291e" stroke="#ffbd7a" stroke-opacity="0.35"/>
      <text x="64" y="400">pipeline-pass?</text>
    </g>
    <text x="40" y="522" fill="#9fb8c8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">返回 pass / fail / blocker。</text>
  </g>

  <path d="M535 505H600" stroke="#67e7ff" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M1035 505H1100" stroke="#67e7ff" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <path d="M1300 805 C1240 905 720 905 670 805" stroke="#67e7ff" stroke-opacity="0.65" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
  <text x="735" y="888" fill="#9fb8c8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">fail 返回 apply / clarify，pass 进入 archive</text>
</svg>
