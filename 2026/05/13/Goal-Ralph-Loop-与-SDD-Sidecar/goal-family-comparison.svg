<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111e"/>
      <stop offset="1" stop-color="#101c24"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#88d9ff" stroke-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1600" height="1040" fill="url(#bg)"/>
  <rect width="1600" height="1040" fill="url(#grid)"/>
  <text x="90" y="86" fill="#f4fbff" font-size="44" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Goal / Ralph 家族对照</text>
  <text x="90" y="128" fill="#9fb8c8" font-size="23" font-family="Arial, 'PingFang SC', sans-serif">差别不在是否循环，而在完成判定器和状态边界。</text>

  <g transform="translate(90 190)">
    <rect x="0" y="0" width="1420" height="88" rx="18" fill="#112337" stroke="#5fdcff" stroke-opacity="0.35"/>
    <text x="28" y="55" fill="#7be6ff" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">System</text>
    <text x="290" y="55" fill="#7be6ff" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Continuation</text>
    <text x="625" y="55" fill="#7be6ff" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Completion Oracle</text>
    <text x="1030" y="55" fill="#7be6ff" font-size="24" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">State Boundary</text>

    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="22">
      <g transform="translate(0 112)">
        <rect width="1420" height="92" rx="18" fill="#0c1d2c" stroke="#27445b"/>
        <circle cx="32" cy="46" r="10" fill="#ffdd8a"/>
        <text x="60" y="54" fill="#f7fbff" font-weight="700">Ralph Loop</text>
        <text x="290" y="54" fill="#cfe4ef">Stop hook replay</text>
        <text x="625" y="54" fill="#cfe4ef">DONE / promise</text>
        <text x="1030" y="54" fill="#cfe4ef">session + filesystem</text>
      </g>
      <g transform="translate(0 220)">
        <rect width="1420" height="92" rx="18" fill="#0d2234" stroke="#274b64"/>
        <circle cx="32" cy="46" r="10" fill="#58d7ff"/>
        <text x="60" y="54" fill="#f7fbff" font-weight="700">Claude Code /goal</text>
        <text x="290" y="54" fill="#cfe4ef">session Stop hook</text>
        <text x="625" y="54" fill="#cfe4ef">small judge yes/no</text>
        <text x="1030" y="54" fill="#cfe4ef">transcript scoped</text>
      </g>
      <g transform="translate(0 328)">
        <rect width="1420" height="92" rx="18" fill="#0e2530" stroke="#2c5863"/>
        <circle cx="32" cy="46" r="10" fill="#41efb7"/>
        <text x="60" y="54" fill="#f7fbff" font-weight="700">Hermes /goal</text>
        <text x="290" y="54" fill="#cfe4ef">gateway continuation</text>
        <text x="625" y="54" fill="#cfe4ef">aux judge JSON</text>
        <text x="1030" y="54" fill="#cfe4ef">SessionDB state</text>
      </g>
      <g transform="translate(0 436)">
        <rect width="1420" height="92" rx="18" fill="#111f2f" stroke="#344b66"/>
        <circle cx="32" cy="46" r="10" fill="#bca7ff"/>
        <text x="60" y="54" fill="#f7fbff" font-weight="700">Codex /goal</text>
        <text x="290" y="54" fill="#cfe4ef">core runtime</text>
        <text x="625" y="54" fill="#cfe4ef">goal tool + control state</text>
        <text x="1030" y="54" fill="#cfe4ef">thread goal + API</text>
      </g>
      <g transform="translate(0 544)">
        <rect width="1420" height="92" rx="18" fill="#18242b" stroke="#61543a"/>
        <circle cx="32" cy="46" r="10" fill="#ff9f76"/>
        <text x="60" y="54" fill="#f7fbff" font-weight="700">SDD sidecar</text>
        <text x="290" y="54" fill="#cfe4ef">provided to loop</text>
        <text x="625" y="54" fill="#cfe4ef">gate script + evidence</text>
        <text x="1030" y="54" fill="#cfe4ef">change-scoped ledger</text>
      </g>
    </g>
  </g>

  <g transform="translate(120 900)">
    <rect x="0" y="0" width="1360" height="72" rx="18" fill="#081926" stroke="#5fdcff" stroke-opacity="0.25"/>
    <text x="34" y="46" fill="#cfe4ef" font-size="24" font-family="Arial, 'PingFang SC', sans-serif">从左到右，完成信号越来越工程化：promise → judge → runtime state → evidence gates。</text>
  </g>
</svg>
