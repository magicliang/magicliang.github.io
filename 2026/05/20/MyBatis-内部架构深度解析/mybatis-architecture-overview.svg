<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MyBatis 构建期与执行期总览</title>
  <desc id="desc">展示 MyBatis 如何在构建期把配置编译成 Configuration 元数据对象图，并在执行期把 Mapper 方法调用委托到 Executor、StatementHandler 和 JDBC。</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#2f5f73"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f6f8fb; }
      .panel { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1.2; filter: url(#soft-shadow); }
      .build { fill: #eef7ff; stroke: #8bc5e8; }
      .runtime { fill: #f1fbf5; stroke: #8bd6ad; }
      .hub { fill: #fff7ed; stroke: #f2a65a; stroke-width: 2; }
      .meta { fill: #ffffff; stroke: #ccd7e2; }
      .jdbc { fill: #fff1f2; stroke: #f3a0a9; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14313d; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #173647; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #657987; }
      .arrow { stroke: #2f5f73; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7a8e9a; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .chipText { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344f5d; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="60" y="64">MyBatis 内部架构：构建期对象图 + 执行期流水线</text>
  <text class="subtitle" x="60" y="92">核心线索：外部配置先编译成 Configuration，再由 Mapper 调用驱动 Executor 到 JDBC。</text>

  <rect class="panel" x="50" y="125" width="500" height="535" rx="8"/>
  <rect class="panel" x="650" y="125" width="500" height="535" rx="8"/>
  <text class="label" x="82" y="165">构建期：配置编译</text>
  <text class="small" x="82" y="190">XML、注解和扩展注册表被编译为元数据对象图</text>
  <text class="label" x="682" y="165">执行期：方法调用</text>
  <text class="small" x="682" y="190">Mapper 方法被翻译为一次 SQL 执行链</text>

  <rect class="build" x="90" y="225" width="170" height="76" rx="8"/>
  <text class="label" x="116" y="258">配置输入</text>
  <text class="small" x="116" y="282">mybatis-config.xml</text>
  <text class="tiny" x="116" y="300">Mapper XML / 注解</text>

  <rect class="build" x="330" y="225" width="170" height="76" rx="8"/>
  <text class="label" x="357" y="258">Builder</text>
  <text class="small" x="357" y="282">XMLConfigBuilder</text>
  <text class="tiny" x="357" y="300">XMLMapperBuilder</text>

  <rect class="hub" x="230" y="365" width="220" height="98" rx="8"/>
  <text class="label" x="276" y="399">Configuration</text>
  <text class="small" x="265" y="424">运行时元数据仓库</text>
  <text class="tiny" x="266" y="444">组件统一创建点</text>

  <rect class="meta" x="90" y="530" width="170" height="70" rx="8"/>
  <text class="chipText" x="120" y="559">MappedStatement</text>
  <text class="tiny" x="120" y="581">一条 SQL 的执行描述</text>

  <rect class="meta" x="310" y="530" width="170" height="70" rx="8"/>
  <text class="chipText" x="352" y="559">ResultMap</text>
  <text class="tiny" x="348" y="581">结果对象映射规则</text>

  <rect class="meta" x="90" y="620" width="170" height="32" rx="8"/>
  <text class="chipText" x="124" y="641">TypeHandlerRegistry</text>
  <rect class="meta" x="310" y="620" width="170" height="32" rx="8"/>
  <text class="chipText" x="351" y="641">InterceptorChain</text>

  <path class="arrow" d="M260 263 H330"/>
  <path class="arrow" d="M415 301 C415 335 395 346 365 365"/>
  <path class="arrow" d="M300 463 C245 492 205 505 175 530"/>
  <path class="arrow" d="M382 463 C395 492 395 508 395 530"/>
  <path class="arrow" d="M285 463 C210 510 175 575 175 620"/>
  <path class="arrow" d="M402 463 C430 508 432 575 395 620"/>

  <rect class="runtime" x="690" y="225" width="170" height="70" rx="8"/>
  <text class="label" x="726" y="255">Mapper 接口</text>
  <text class="small" x="719" y="278">业务方法调用</text>

  <rect class="runtime" x="925" y="225" width="170" height="70" rx="8"/>
  <text class="label" x="956" y="255">MapperProxy</text>
  <text class="small" x="956" y="278">MapperMethod</text>

  <rect class="runtime" x="690" y="355" width="170" height="70" rx="8"/>
  <text class="label" x="733" y="385">SqlSession</text>
  <text class="small" x="724" y="408">会话与事务边界</text>

  <rect class="runtime" x="925" y="355" width="170" height="70" rx="8"/>
  <text class="label" x="966" y="385">Executor</text>
  <text class="small" x="957" y="408">缓存与执行策略</text>

  <rect class="runtime" x="690" y="500" width="170" height="70" rx="8"/>
  <text class="label" x="716" y="530">StatementHandler</text>
  <text class="small" x="728" y="553">JDBC 语句边界</text>

  <rect class="jdbc" x="925" y="500" width="170" height="70" rx="8"/>
  <text class="label" x="977" y="530">JDBC</text>
  <text class="small" x="948" y="553">PreparedStatement</text>

  <path class="arrow" d="M860 260 H925"/>
  <path class="arrow" d="M1010 295 C1010 330 955 335 860 370"/>
  <path class="arrow" d="M860 390 H925"/>
  <path class="arrow" d="M1010 425 C1010 470 950 480 860 518"/>
  <path class="arrow" d="M860 535 H925"/>

  <path class="dash" d="M450 405 C555 405 570 260 690 260"/>
  <path class="dash" d="M450 425 C575 425 585 390 690 390"/>
  <path class="dash" d="M450 445 C560 492 590 535 690 535"/>
  <text class="tiny" x="520" y="385">创建 / 持有 / 查找</text>

  <rect x="60" y="690" width="1080" height="42" rx="8" fill="#ffffff" stroke="#d8e1ea"/>
  <text class="small" x="84" y="716">阅读锚点：Configuration 解释组件从哪里来，MappedStatement 解释 SQL 是什么，Executor 解释 SQL 如何执行。</text>
</svg>
