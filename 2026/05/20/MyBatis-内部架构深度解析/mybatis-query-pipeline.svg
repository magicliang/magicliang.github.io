<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">MyBatis 一次查询执行链</title>
  <desc id="desc">展示从 Mapper 方法调用到 JDBC PreparedStatement，再到 ResultSetHandler 返回对象的完整执行流水线。</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#31596a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7fafc; }
      .lane { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1.2; filter: url(#shadow); }
      .api { fill: #edf6ff; stroke: #83bde3; }
      .core { fill: #f1fbf5; stroke: #86cfaa; }
      .cache { fill: #fff8e7; stroke: #eeb65d; }
      .jdbc { fill: #fff1f2; stroke: #ee9ca8; }
      .result { fill: #f4f0ff; stroke: #b6a6ea; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14313d; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .laneTitle { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #496171; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #183847; }
      .small { font: 500 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .tiny { font: 500 11.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667b88; }
      .arrow { stroke: #31596a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #78909c; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="680"/>
  <text class="title" x="60" y="60">一次 Mapper 查询如何穿过 MyBatis</text>
  <text class="subtitle" x="60" y="88">Mapper 代理只负责入口翻译；真正的执行、缓存、参数绑定和结果映射分布在后续流水线中。</text>

  <rect class="lane" x="50" y="125" width="1100" height="118" rx="8"/>
  <text class="laneTitle" x="72" y="153">Java API 层</text>
  <rect class="api" x="95" y="174" width="150" height="46" rx="8"/>
  <text class="label" x="120" y="202">Mapper 方法</text>
  <rect class="api" x="315" y="174" width="170" height="46" rx="8"/>
  <text class="label" x="346" y="202">MapperProxy</text>
  <rect class="api" x="555" y="174" width="170" height="46" rx="8"/>
  <text class="label" x="586" y="202">MapperMethod</text>
  <rect class="api" x="795" y="174" width="175" height="46" rx="8"/>
  <text class="label" x="828" y="202">DefaultSqlSession</text>

  <rect class="lane" x="50" y="285" width="1100" height="165" rx="8"/>
  <text class="laneTitle" x="72" y="313">MyBatis 核心执行层</text>
  <rect class="cache" x="95" y="340" width="170" height="58" rx="8"/>
  <text class="label" x="126" y="365">CachingExecutor</text>
  <text class="small" x="125" y="385">二级缓存装饰器</text>
  <rect class="core" x="330" y="340" width="170" height="58" rx="8"/>
  <text class="label" x="376" y="365">BaseExecutor</text>
  <text class="small" x="372" y="385">一级缓存 / CacheKey</text>
  <rect class="core" x="565" y="340" width="185" height="58" rx="8"/>
  <text class="label" x="602" y="365">StatementHandler</text>
  <text class="small" x="606" y="385">prepare / query</text>
  <rect class="core" x="815" y="317" width="170" height="48" rx="8"/>
  <text class="label" x="851" y="346">ParameterHandler</text>
  <rect class="core" x="815" y="389" width="170" height="48" rx="8"/>
  <text class="label" x="849" y="418">ResultSetHandler</text>

  <rect class="lane" x="50" y="495" width="1100" height="110" rx="8"/>
  <text class="laneTitle" x="72" y="523">JDBC 与数据库边界</text>
  <rect class="jdbc" x="175" y="545" width="210" height="42" rx="8"/>
  <text class="label" x="218" y="572">PreparedStatement</text>
  <rect class="jdbc" x="500" y="545" width="160" height="42" rx="8"/>
  <text class="label" x="552" y="572">ResultSet</text>
  <rect class="result" x="790" y="545" width="190" height="42" rx="8"/>
  <text class="label" x="830" y="572">Java 对象 / 集合</text>

  <path class="arrow" d="M245 197 H315"/>
  <path class="arrow" d="M485 197 H555"/>
  <path class="arrow" d="M725 197 H795"/>
  <path class="arrow" d="M882 220 C882 260 205 292 180 340"/>
  <path class="arrow" d="M265 369 H330"/>
  <path class="arrow" d="M500 369 H565"/>
  <path class="thin" d="M750 355 C780 345 790 342 815 341"/>
  <path class="thin" d="M900 365 C870 385 835 392 750 385"/>
  <path class="arrow" d="M660 398 C620 470 410 495 310 545"/>
  <path class="arrow" d="M385 566 H500"/>
  <path class="arrow" d="M660 566 H790"/>
  <path class="arrow" d="M900 545 C925 506 952 472 930 437"/>

  <text class="tiny" x="112" y="420">命中二级缓存时直接返回</text>
  <text class="tiny" x="346" y="420">未命中时进入 JDBC</text>
  <text class="tiny" x="828" y="302">TypeHandler 绑定参数</text>
  <text class="tiny" x="830" y="462">ResultMap 组装对象</text>

  <rect x="70" y="630" width="1060" height="34" rx="8" fill="#ffffff" stroke="#d8e1ea"/>
  <text class="small" x="94" y="652">可插拔点集中在 Executor、StatementHandler、ParameterHandler、ResultSetHandler；字段转换优先放到 TypeHandler。</text>
</svg>
