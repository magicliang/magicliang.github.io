<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">MyBatis 一级缓存与二级缓存边界</title>
  <desc id="desc">展示一级缓存位于 SqlSession 内的 BaseExecutor.localCache，二级缓存位于 namespace Cache，由 CachingExecutor 与 TransactionalCacheManager 管理。</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#31596a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1.2; filter: url(#shadow); }
      .l1 { fill: #eefbf3; stroke: #7ccf9b; stroke-width: 1.5; }
      .l2 { fill: #fff7e8; stroke: #eba94c; stroke-width: 1.5; }
      .db { fill: #fff1f2; stroke: #ee9ca8; stroke-width: 1.5; }
      .switch { fill: #edf6ff; stroke: #85bfe2; stroke-width: 1.5; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14313d; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .panelTitle { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #183847; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #183847; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526a78; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667b88; }
      .arrow { stroke: #31596a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7c8d98; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="700"/>
  <text class="title" x="60" y="60">MyBatis 缓存边界：一级缓存不是二级缓存的开关结果</text>
  <text class="subtitle" x="60" y="88">一级缓存跟随 SqlSession；二级缓存跟随 namespace，并通过事务性缓存管理器延迟提交。</text>

  <rect class="panel" x="55" y="125" width="510" height="460" rx="8"/>
  <rect class="panel" x="635" y="125" width="510" height="460" rx="8"/>
  <text class="panelTitle" x="90" y="165">一级缓存：SqlSession 内部</text>
  <text class="small" x="90" y="190">由 BaseExecutor.localCache 持有，不依赖 CachingExecutor。</text>
  <text class="panelTitle" x="670" y="165">二级缓存：namespace 级别</text>
  <text class="small" x="670" y="190">由 CachingExecutor 和 TransactionalCacheManager 管理。</text>

  <rect class="switch" x="105" y="235" width="180" height="58" rx="8"/>
  <text class="label" x="143" y="261">Executor.query</text>
  <text class="tiny" x="136" y="281">创建 CacheKey</text>

  <rect class="l1" x="335" y="225" width="185" height="78" rx="8"/>
  <text class="label" x="374" y="255">localCache</text>
  <text class="small" x="367" y="278">同一个 SqlSession</text>
  <text class="tiny" x="365" y="296">SESSION / STATEMENT</text>

  <rect class="l1" x="140" y="370" width="335" height="78" rx="8"/>
  <text class="label" x="194" y="402">缓存未命中：委托数据库查询</text>
  <text class="small" x="198" y="426">查询结果先写回 BaseExecutor.localCache</text>

  <path class="arrow" d="M285 264 H335"/>
  <path class="arrow" d="M428 303 C428 345 395 355 345 370"/>
  <path class="arrow" d="M335 264 C290 310 245 340 220 370"/>
  <text class="tiny" x="360" y="330">命中直接返回</text>

  <rect class="switch" x="675" y="225" width="185" height="64" rx="8"/>
  <text class="label" x="707" y="253">cacheEnabled</text>
  <text class="tiny" x="704" y="274">控制是否包装 CachingExecutor</text>

  <rect class="l2" x="925" y="225" width="175" height="64" rx="8"/>
  <text class="label" x="958" y="253">CachingExecutor</text>
  <text class="tiny" x="965" y="274">二级缓存入口</text>

  <rect class="l2" x="675" y="355" width="210" height="72" rx="8"/>
  <text class="label" x="709" y="384">TransactionalCacheManager</text>
  <text class="tiny" x="716" y="405">暂存写入，等待事务边界</text>

  <rect class="l2" x="945" y="355" width="165" height="72" rx="8"/>
  <text class="label" x="985" y="384">Namespace Cache</text>
  <text class="tiny" x="972" y="405">按 mapper namespace 隔离</text>

  <rect class="db" x="765" y="500" width="205" height="58" rx="8"/>
  <text class="label" x="825" y="527">Database</text>
  <text class="tiny" x="804" y="548">二级未命中后查库</text>

  <path class="arrow" d="M860 257 H925"/>
  <path class="arrow" d="M1012 289 C1012 322 960 340 885 372"/>
  <path class="arrow" d="M885 391 H945"/>
  <path class="arrow" d="M1026 427 C1000 470 960 485 915 500"/>
  <path class="dash" d="M780 427 C790 470 815 485 842 500"/>
  <path class="dash" d="M860 500 C800 470 780 455 780 427"/>

  <text class="tiny" x="905" y="318">useCache=true 且有 &lt;cache/&gt;</text>
  <text class="tiny" x="685" y="463">commit 后写入可见</text>
  <text class="tiny" x="685" y="482">rollback 后丢弃暂存</text>

  <rect x="70" y="620" width="1060" height="42" rx="8" fill="#ffffff" stroke="#d8e1ea"/>
  <text class="small" x="94" y="646">实践判断：关闭 cacheEnabled 不会关闭一级缓存；要收紧同会话缓存行为，应关注 localCacheScope 和语句 flush cache。</text>
</svg>
