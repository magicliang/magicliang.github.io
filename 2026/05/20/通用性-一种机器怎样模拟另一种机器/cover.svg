<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">通用性：一种机器怎样模拟另一种机器</title>
  <desc id="desc">当程序变成数据，解释器就能模拟另一台机器</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0d9488"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0d9488" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#dc2626" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0d9488" font-weight="800">COMPUTATION REREAD / 15</text>
  <rect x="104" y="164" width="286" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0d9488" stroke-width="2"/>
  <text x="247" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">Universal Machine</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">通用性：一种机器怎样模拟另一</tspan><tspan x="104" dy="64">种机器</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">当程序变成数据，解释器就能模拟另一台机</tspan><tspan x="108" dy="42">器</tspan></text>
