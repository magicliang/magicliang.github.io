<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">用 Python 写一台图灵机</title>
  <desc id="desc">用规则表驱动纸带 trace，看见机器怎样一步步运行</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0891b2"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0891b2" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#f59e0b" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#7c3aed" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0891b2" font-weight="800">COMPUTATION REREAD / 11</text>
  <rect x="104" y="164" width="286" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0891b2" stroke-width="2"/>
  <text x="247" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">Python DTM</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">用 Python 写一台图灵机</tspan></text>
  <text x="108" y="394" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">用规则表驱动纸带 trace，看见机器怎样</tspan><tspan x="108" dy="42">一步步运行</tspan></text>
  <g opacity="0.96"><rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><g><text x="900" y="310" font-size="22" fill="#475569" font-weight="700" text-anchor="start" class="mono">(scan, 1) -&gt; R</text><text x="900" y="350" font-size="22" fill="#475569" font-weight="700" text-anchor="start" class="mono">(carry, 0) -&gt; 1</text><text x="900" y="390" font-size="22" fill="#475569" font-weight="700" text-anchor="start" class="mono">(carry, 1) -&gt; 0</text><rect x="875" y="245" width="245" height="260" rx="16" fill="#f8fafc" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/><text x="997.5" y="384" font-size="28" fill="#111827" font-weight="700" text-anchor="middle" class="">规则表</text></g><path d="M 1138 376 L 1230 376" fill="none" stroke="#0891b2" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><g><rect x="1250" y="250" width="210" height="90" rx="16" fill="#ecfeff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><text x="1355" y="304" font-size="28" fill="#111827" font-weight="700" text-anchor="middle" class="">step()</text></g><g><rect x="1250" y="410" width="210" height="90" rx="16" fill="#fffbeb" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/><text x="1355" y="464" font-size="28" fill="#111827" font-weight="700" text-anchor="middle" class="">trace</text></g><path d="M 1355 348 L 1355 405" fill="none" stroke="#0891b2" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><text x="920" y="620" font-size="34" fill="#334155" font-weight="700" text-anchor="start" class="mono">1011 -&gt; 1100</text></g>
  <g><circle cx="104" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="132" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="160" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="188" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="216" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="244" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="272" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="300" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="328" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="356" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="384" cy="812" r="4" fill="#0891b2" opacity="0.75"/><circle cx="412" cy="812" r="7" fill="#0891b2" opacity="1"/><circle cx="440" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="468" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="496" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="524" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="552" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="580" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><circle cx="608" cy="812" r="4" fill="#cbd5e1" opacity="0.75"/><rect x="104" y="834" width="532" height="6" rx="3" fill="#e5e7eb"/><rect x="104" y="834" width="336.0" height="6" rx="3" fill="#7c3aed"/></g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start" class="">Tom Stuart / Understanding Computation</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end" class="">finite rules, visible states</text>
</svg>
