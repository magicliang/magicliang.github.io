<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">cgroup memory：内存从全局资源变成局部预算</title>
  <desc id="desc">cgroup v2 内存控制器的层级预算模型：memory.min/low/high/max 构成四层边界</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#121428"/>
      <stop offset="1" stop-color="#0F1E1E"/>
    </linearGradient>
    <linearGradient id="cgColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="protectColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dangerColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 120 H1480"/>
    <path d="M800 80 V750"/>
  </g>

  <!-- Left: Memory boundary model (vertical bar) -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="100" fill="#A78BFA" font-size="22" font-weight="700">Memory Boundary Model</text>
  </g>

  <!-- Vertical bar representing memory usage range -->
  <g filter="url(#softShadow)">
    <rect x="200" y="130" width="80" height="520" rx="8" fill="#0B1220" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- memory.min zone (bottom, green) -->
  <rect x="204" y="570" width="72" height="76" rx="4" fill="#34D399" opacity="0.3"/>
  <!-- memory.low zone -->
  <rect x="204" y="470" width="72" height="100" rx="4" fill="#34D399" opacity="0.15"/>
  <!-- normal zone -->
  <rect x="204" y="300" width="72" height="170" rx="4" fill="#7DD3FC" opacity="0.1"/>
  <!-- memory.high zone -->
  <rect x="204" y="220" width="72" height="80" rx="4" fill="#FBBF24" opacity="0.2"/>
  <!-- memory.max zone (top, red) -->
  <rect x="204" y="134" width="72" height="86" rx="4" fill="#EF4444" opacity="0.2"/>

  <!-- Labels -->
  <g font-family="Menlo, Consolas, monospace">
    <!-- memory.max line -->
    <line x1="195" y1="220" x2="290" y2="220" stroke="#EF4444" stroke-width="2.5"/>
    <text x="300" y="215" fill="#EF4444" font-size="15" font-weight="700">memory.max</text>
    <text x="300" y="235" fill="#EF4444" font-size="12">OOM kill (hard ceiling)</text>

    <!-- memory.high line -->
    <line x1="195" y1="300" x2="290" y2="300" stroke="#FBBF24" stroke-width="2.5"/>
    <text x="300" y="295" fill="#FBBF24" font-size="15" font-weight="700">memory.high</text>
    <text x="300" y="315" fill="#FBBF24" font-size="12">throttle + reclaim (soft ceiling)</text>

    <!-- memory.low line -->
    <line x1="195" y1="470" x2="290" y2="470" stroke="#34D399" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="300" y="465" fill="#34D399" font-size="15" font-weight="700">memory.low</text>
    <text x="300" y="485" fill="#34D399" font-size="12">best-effort protection</text>

    <!-- memory.min line -->
    <line x1="195" y1="570" x2="290" y2="570" stroke="#059669" stroke-width="2.5"/>
    <text x="300" y="565" fill="#059669" font-size="15" font-weight="700">memory.min</text>
    <text x="300" y="585" fill="#059669" font-size="12">hard protection (never reclaim)</text>

    <!-- Current usage indicator -->
    <rect x="215" y="365" width="50" height="6" rx="3" fill="#7DD3FC"/>
    <text x="300" y="372" fill="#7DD3FC" font-size="13">← memory.current</text>
  </g>

  <!-- Right: cgroup hierarchy and isolation -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="620" y="100" fill="#CBD5E1" font-size="22" font-weight="700">Hierarchical Isolation</text>
  </g>

  <!-- Root cgroup -->
  <g filter="url(#softShadow)">
    <rect x="750" y="120" width="320" height="50" rx="10" fill="#0B1220" stroke="#64748B" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="775" y="150" fill="#94A3B8" font-size="15">/ (root) — total physical memory</text>
  </g>

  <!-- Lines to children -->
  <line x1="850" y1="170" x2="720" y2="210" stroke="#64748B" stroke-width="1.5"/>
  <line x1="950" y1="170" x2="1100" y2="210" stroke="#64748B" stroke-width="1.5"/>

  <!-- cgroup A (container) -->
  <g filter="url(#softShadow)">
    <rect x="590" y="210" width="280" height="130" rx="10" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="615" y="240" fill="#7DD3FC" font-size="15" font-weight="700">container-A</text>
    <text x="615" y="265" fill="#94A3B8" font-size="12">memory.max = 512M</text>
    <text x="615" y="285" fill="#94A3B8" font-size="12">memory.current = 380M</text>
    <text x="615" y="305" fill="#34D399" font-size="12">memory.events.oom = 0</text>
    <text x="615" y="325" fill="#64748B" font-size="11">own lruvec, own reclaim boundary</text>
  </g>

  <!-- cgroup B (container) -->
  <g filter="url(#softShadow)">
    <rect x="950" y="210" width="280" height="130" rx="10" fill="#1A0F2E" stroke="#A78BFA" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="975" y="240" fill="#A78BFA" font-size="15" font-weight="700">container-B</text>
    <text x="975" y="265" fill="#94A3B8" font-size="12">memory.max = 256M</text>
    <text x="975" y="285" fill="#EF4444" font-size="12" font-weight="700">memory.current = 256M ← OOM!</text>
    <text x="975" y="305" fill="#EF4444" font-size="12">memory.events.oom_kill = 3</text>
    <text x="975" y="325" fill="#64748B" font-size="11">OOM only kills within B</text>
  </g>

  <!-- Key insight box -->
  <g filter="url(#softShadow)">
    <rect x="590" y="380" width="640" height="100" rx="12" fill="#1A1408" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="620" y="415" fill="#FBBF24" font-size="16" font-weight="700">Key Insight</text>
    <text x="620" y="445" fill="#94A3B8" font-size="14">Container-B OOM ≠ host out of memory</text>
    <text x="620" y="468" fill="#94A3B8" font-size="14">Host MemAvailable may still be 32GB while B is being killed</text>
  </g>

  <!-- Memory accounting breakdown -->
  <g filter="url(#softShadow)">
    <rect x="590" y="510" width="640" height="130" rx="12" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="620" y="542" fill="#CBD5E1" font-size="15" font-weight="700">memory.stat (what gets charged)</text>
    <text x="620" y="570" fill="#7DD3FC" font-size="13">anon: 180M    ← anonymous pages (heap, stack, mmap)</text>
    <text x="620" y="592" fill="#A78BFA" font-size="13">file: 140M    ← page cache (read/write file data)</text>
    <text x="620" y="614" fill="#34D399" font-size="13">slab:  48M    ← kernel objects (dentry, inode)</text>
    <text x="620" y="636" fill="#FBBF24" font-size="13">sock:  12M    ← TCP/UDP buffers</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="740" font-size="38" font-weight="700">cgroup memory：内存从全局资源变成局部预算</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="21">global resource → hierarchical budget → local reclaim / local OOM</text>
  </g>
</svg>
