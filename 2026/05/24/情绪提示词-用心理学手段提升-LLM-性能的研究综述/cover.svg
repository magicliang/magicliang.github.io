<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg4)"/>
  <pattern id="dots4" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots4)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#f472b6" letter-spacing="3" font-weight="600" opacity="0.9">PROMPT ENGINEERING</text>
  <line x1="60" y1="82" x2="295" y2="82" stroke="#f472b6" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="148" font-size="58" font-weight="700" fill="white">情绪提示词</text>
  <!-- Subtitle -->
  <text x="60" y="198" font-size="22" fill="#9090c0">用心理学手段提升 LLM 性能</text>

  <!-- Head/brain outline with sentiment -->
  <g transform="translate(60, 240)">
    <!-- Head silhouette -->
    <ellipse cx="120" cy="90" rx="90" ry="100" fill="none" stroke="#f472b6" stroke-width="2" opacity="0.5"/>
    <ellipse cx="120" cy="90" rx="90" ry="100" fill="#f472b6" opacity="0.04"/>
    <!-- Neck -->
    <rect x="98" y="180" width="44" height="30" rx="4" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.3"/>
    <!-- Eyes -->
    <circle cx="90" cy="70" r="6" fill="#fbbf24" opacity="0.8"/>
    <circle cx="150" cy="70" r="6" fill="#fbbf24" opacity="0.8"/>
    <!-- Smile -->
    <path d="M 85,115 Q 120,140 155,115" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
    <!-- Sentiment sparks -->
    <text x="30" y="40" font-size="22" opacity="0.8">✨</text>
    <text x="180" y="35" font-size="22" opacity="0.8">💡</text>
    <text x="10" y="130" font-size="18" opacity="0.7">😊</text>

    <text x="120" y="230" font-size="13" fill="#9090c0" text-anchor="middle">Emotional Input</text>
  </g>

  <!-- Arrow with label -->
  <g transform="translate(310, 350)">
    <line x1="0" y1="30" x2="100" y2="30" stroke="#f472b6" stroke-width="2.5"/>
    <polygon points="100,22 118,30 100,38" fill="#f472b6"/>
    <text x="50" y="18" font-size="11" fill="#f472b6" text-anchor="middle" opacity="0.8">Emotion Prompt</text>
    <text x="50" y="50" font-size="10" fill="#9090c0" text-anchor="middle">"This is very important..."</text>
  </g>

  <!-- LLM box -->
  <g transform="translate(440, 290)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="#1a1840" stroke="#f472b6" stroke-width="1.5"/>
    <text x="100" y="45" font-size="20" fill="white" text-anchor="middle" font-weight="700">LLM</text>
    <text x="100" y="72" font-size="12" fill="#9090c0" text-anchor="middle">language model</text>
    <!-- Activation bars inside -->
    <rect x="20"  y="85" width="16" height="20" rx="2" fill="#f472b6" opacity="0.4"/>
    <rect x="44"  y="75" width="16" height="30" rx="2" fill="#f472b6" opacity="0.55"/>
    <rect x="68"  y="65" width="16" height="40" rx="2" fill="#f472b6" opacity="0.7"/>
    <rect x="92"  y="55" width="16" height="50" rx="2" fill="#fbbf24" opacity="0.75"/>
    <rect x="116" y="70" width="16" height="35" rx="2" fill="#f472b6" opacity="0.6"/>
    <rect x="140" y="80" width="16" height="25" rx="2" fill="#f472b6" opacity="0.45"/>
    <rect x="164" y="88" width="16" height="17" rx="2" fill="#f472b6" opacity="0.35"/>
  </g>

  <!-- Arrow out -->
  <g transform="translate(642, 350)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#fbbf24" stroke-width="2.5"/>
    <polygon points="80,-8 98,0 80,8" fill="#fbbf24"/>
    <text x="40" y="-12" font-size="11" fill="#fbbf24" text-anchor="middle">Improved Output</text>
  </g>

  <!-- Output box -->
  <g transform="translate(745, 300)">
    <rect x="0" y="0" width="220" height="100" rx="8" fill="#1a2a1a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="110" y="28" font-size="13" fill="#fbbf24" text-anchor="middle" font-weight="600">Performance +</text>
    <text x="110" y="50" font-size="12" fill="#9090c0" text-anchor="middle">Accuracy ↑</text>
    <text x="110" y="68" font-size="12" fill="#9090c0" text-anchor="middle">Reasoning ↑</text>
    <text x="110" y="86" font-size="12" fill="#9090c0" text-anchor="middle">Task Completion ↑</text>
  </g>

  <!-- Psychology tags on right -->
  <g transform="translate(970, 260)">
    <rect x="0" y="0"   width="180" height="34" rx="6" fill="#2a1840" stroke="#f472b6" stroke-width="1"/>
    <text x="90" y="22" font-size="12" fill="#f472b6" text-anchor="middle">自我肯定 Self-Affirmation</text>
    <rect x="0" y="48"  width="180" height="34" rx="6" fill="#2a1840" stroke="#f472b6" stroke-width="1" opacity="0.8"/>
    <text x="90" y="70" font-size="12" fill="#f472b6" text-anchor="middle" opacity="0.8">紧迫感 Urgency</text>
    <rect x="0" y="96"  width="180" height="34" rx="6" fill="#2a1840" stroke="#f472b6" stroke-width="1" opacity="0.7"/>
    <text x="90" y="118" font-size="12" fill="#f472b6" text-anchor="middle" opacity="0.7">社会压力 Social Cue</text>
    <rect x="0" y="144" width="180" height="34" rx="6" fill="#2a1840" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
    <text x="90" y="166" font-size="12" fill="#fbbf24" text-anchor="middle">奖励期待 Reward</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#302b63" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#4a4070">守株阁 · 提示工程 · 心理学 · LLM</text>
</svg>
