<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="uCurve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#f6d365"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>
  <pattern id="dots3" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots3)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#f6d365" letter-spacing="3" font-weight="600" opacity="0.9">THINKING MODEL</text>
  <line x1="60" y1="82" x2="255" y2="82" stroke="#f6d365" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="148" font-size="60" font-weight="700" fill="white">U 型思考法</text>
  <!-- Subtitle -->
  <text x="60" y="200" font-size="24" fill="#9090b0">从表象到本质的深度思维模型</text>

  <!-- U-shaped curve - large central visual -->
  <!-- The U curve using a cubic bezier path -->
  <path d="M 200,260 C 200,520 560,520 560,260" fill="none" stroke="url(#uCurve)" stroke-width="6" stroke-linecap="round"/>

  <!-- Glow effect on curve -->
  <path d="M 200,260 C 200,520 560,520 560,260" fill="none" stroke="#f6d365" stroke-width="12" opacity="0.12" stroke-linecap="round"/>

  <!-- Left side: 表象/Surface label -->
  <circle cx="200" cy="258" r="10" fill="#f6d365" opacity="0.9"/>
  <line x1="210" y1="258" x2="310" y2="220" stroke="#f6d365" stroke-width="1.5" opacity="0.6"/>
  <rect x="315" y="200" width="160" height="38" rx="6" fill="#2a1f3d" stroke="#f6d365" stroke-width="1"/>
  <text x="395" y="218" font-size="11" fill="#f6d365" text-anchor="middle" opacity="0.7">表象 / Surface</text>
  <text x="395" y="233" font-size="11" fill="#f6d365" text-anchor="middle">现象观察 · 问题描述</text>

  <!-- Bottom: 本质/Essence label -->
  <circle cx="380" cy="508" r="10" fill="#2dd4bf" opacity="0.9"/>
  <line x1="390" y1="508" x2="500" y2="520" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
  <rect x="505" y="506" width="160" height="38" rx="6" fill="#1a2e2d" stroke="#2dd4bf" stroke-width="1"/>
  <text x="585" y="524" font-size="11" fill="#2dd4bf" text-anchor="middle" opacity="0.7">本质 / Essence</text>
  <text x="585" y="539" font-size="11" fill="#2dd4bf" text-anchor="middle">根因探索 · 深层结构</text>

  <!-- Right side: 方案/Solution label -->
  <circle cx="560" cy="258" r="10" fill="#f6d365" opacity="0.9"/>
  <line x1="570" y1="258" x2="640" y2="220" stroke="#f6d365" stroke-width="1.5" opacity="0.6"/>
  <rect x="645" y="200" width="160" height="38" rx="6" fill="#2a1f3d" stroke="#f6d365" stroke-width="1"/>
  <text x="725" y="218" font-size="11" fill="#f6d365" text-anchor="middle" opacity="0.7">方案 / Solution</text>
  <text x="725" y="233" font-size="11" fill="#f6d365" text-anchor="middle">创新路径 · 系统设计</text>

  <!-- Down arrow on left side of U -->
  <text x="155" y="400" font-size="20" fill="#2dd4bf" opacity="0.7">↓</text>
  <text x="128" y="365" font-size="11" fill="#9090b0">下沉</text>
  <!-- Up arrow on right side of U -->
  <text x="582" y="380" font-size="20" fill="#f6d365" opacity="0.7">↑</text>
  <text x="582" y="415" font-size="11" fill="#9090b0">升维</text>

  <!-- Right side: three-step description -->
  <g transform="translate(840, 240)">
    <rect x="0" y="0" width="300" height="260" rx="10" fill="#1e1a30" stroke="#3d3560" stroke-width="1"/>

    <!-- Step 1 -->
    <rect x="16" y="20" width="268" height="60" rx="6" fill="#2a2040"/>
    <circle cx="36" cy="50" r="14" fill="#f6d365" opacity="0.2"/>
    <text x="36" y="55" font-size="14" fill="#f6d365" text-anchor="middle" font-weight="700">1</text>
    <text x="60" y="44" font-size="13" fill="white" font-weight="600">观察表象</text>
    <text x="60" y="62" font-size="11" fill="#8080a0">描述你看到的现象和问题</text>

    <!-- Step 2 -->
    <rect x="16" y="96" width="268" height="60" rx="6" fill="#1a2e2d"/>
    <circle cx="36" cy="126" r="14" fill="#2dd4bf" opacity="0.2"/>
    <text x="36" y="131" font-size="14" fill="#2dd4bf" text-anchor="middle" font-weight="700">2</text>
    <text x="60" y="120" font-size="13" fill="white" font-weight="600">挖掘本质</text>
    <text x="60" y="138" font-size="11" fill="#8080a0">持续追问「为什么」到根因</text>

    <!-- Step 3 -->
    <rect x="16" y="172" width="268" height="60" rx="6" fill="#2a2040"/>
    <circle cx="36" cy="202" r="14" fill="#f6d365" opacity="0.2"/>
    <text x="36" y="207" font-size="14" fill="#f6d365" text-anchor="middle" font-weight="700">3</text>
    <text x="60" y="196" font-size="13" fill="white" font-weight="600">构建方案</text>
    <text x="60" y="214" font-size="11" fill="#8080a0">从本质出发重构解决路径</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#2a1f3d" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#4a4060">守株阁 · 思维模型 · 深度研究</text>
</svg>
