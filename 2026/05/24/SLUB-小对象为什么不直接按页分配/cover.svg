<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SLUB：小对象为什么不直接按页分配</title>
  <desc id="desc">SLUB 分配器将物理页切分为固定大小对象槽位，per-cpu freelist 实现无锁快路径</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#14192B"/>
      <stop offset="1" stop-color="#0F1E24"/>
    </linearGradient>
    <linearGradient id="slabColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="objFree" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="objUsed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F87171"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 160 H1480"/>
    <path d="M120 420 H1480"/>
  </g>

  <!-- Left: A page wasted by buddy for small object -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="120" fill="#EF4444" font-size="20" font-weight="700">Without SLUB: 1 page per object</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="135" y="140" width="280" height="220" rx="10" fill="#0B1220" stroke="#EF4444" stroke-width="1.5"/>
  </g>
  <rect x="155" y="160" width="60" height="30" rx="4" fill="#EF4444" opacity="0.6"/>
  <g font-family="Menlo, Consolas, monospace">
    <text x="225" y="180" fill="#EF4444" font-size="13">192B dentry</text>
    <text x="155" y="220" fill="#64748B" font-size="12">wasted: 3904 bytes</text>
    <text x="155" y="240" fill="#64748B" font-size="12">utilization: 4.7%</text>
    <text x="155" y="280" fill="#475569" font-size="11">4096 bytes allocated</text>
    <text x="155" y="300" fill="#475569" font-size="11">192 bytes used</text>
    <text x="155" y="340" fill="#EF4444" font-size="14" font-weight="700">95% internal waste</text>
  </g>

  <!-- Right: SLUB slab with many objects -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="500" y="120" fill="#34D399" font-size="20" font-weight="700">With SLUB: 21 objects per page</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="500" y="140" width="650" height="220" rx="10" fill="#0B1220" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <!-- Object slots grid -->
  <g>
    <!-- Row 1: mixed used/free -->
    <rect x="520" y="160" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="580" y="160" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="640" y="160" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="700" y="160" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="760" y="160" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="820" y="160" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="880" y="160" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <!-- Row 2 -->
    <rect x="520" y="195" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="580" y="195" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="640" y="195" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="700" y="195" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="760" y="195" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="820" y="195" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="880" y="195" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <!-- Row 3 -->
    <rect x="520" y="230" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="580" y="230" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="640" y="230" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="700" y="230" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="760" y="230" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
    <rect x="820" y="230" width="55" height="28" rx="4" fill="#EF4444" opacity="0.5"/>
    <rect x="880" y="230" width="55" height="28" rx="4" fill="#34D399" opacity="0.4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="960" y="178" fill="#EF4444" font-size="12">■ in-use (14)</text>
    <text x="960" y="198" fill="#34D399" font-size="12">■ free (7)</text>
    <text x="520" y="290" fill="#A78BFA" font-size="14">slab: 1 page (4096B) = 21 × 192B slots</text>
    <text x="520" y="315" fill="#64748B" font-size="13">internal waste per slot: 0B (exact fit)</text>
    <text x="520" y="340" fill="#34D399" font-size="14" font-weight="700">utilization: 98.4%</text>
  </g>

  <!-- Bottom: Per-CPU fast path -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="430" fill="#FBBF24" font-size="20" font-weight="700">Allocation Fast Path (lock-free)</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="135" y="450" width="1320" height="130" rx="12" fill="#0B1220" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <!-- CPU 0 -->
    <rect x="170" y="475" width="120" height="35" rx="6" fill="#7DD3FC" opacity="0.3" stroke="#7DD3FC" stroke-width="1"/>
    <text x="190" y="498" fill="#7DD3FC" font-size="13" font-weight="700">CPU 0</text>
    <!-- Arrow -->
    <text x="300" y="498" fill="#94A3B8" font-size="14">→</text>
    <!-- freelist -->
    <rect x="320" y="475" width="180" height="35" rx="6" fill="#34D399" opacity="0.2" stroke="#34D399" stroke-width="1"/>
    <text x="340" y="498" fill="#34D399" font-size="12">freelist: obj→obj→obj</text>
    <!-- Arrow -->
    <text x="510" y="498" fill="#94A3B8" font-size="14">→</text>
    <!-- Return -->
    <rect x="530" y="475" width="140" height="35" rx="6" fill="#A3E635" opacity="0.2" stroke="#A3E635" stroke-width="1"/>
    <text x="545" y="498" fill="#A3E635" font-size="12" font-weight="700">return object</text>

    <!-- CPU 1 -->
    <rect x="170" y="525" width="120" height="35" rx="6" fill="#A78BFA" opacity="0.3" stroke="#A78BFA" stroke-width="1"/>
    <text x="190" y="548" fill="#A78BFA" font-size="13" font-weight="700">CPU 1</text>
    <text x="300" y="548" fill="#94A3B8" font-size="14">→</text>
    <rect x="320" y="525" width="180" height="35" rx="6" fill="#34D399" opacity="0.2" stroke="#34D399" stroke-width="1"/>
    <text x="340" y="548" fill="#34D399" font-size="12">freelist: obj→obj→obj</text>
    <text x="510" y="548" fill="#94A3B8" font-size="14">→</text>
    <rect x="530" y="525" width="140" height="35" rx="6" fill="#A3E635" opacity="0.2" stroke="#A3E635" stroke-width="1"/>
    <text x="545" y="548" fill="#A3E635" font-size="12" font-weight="700">return object</text>

    <!-- Annotation -->
    <text x="730" y="498" fill="#FBBF24" font-size="14" font-weight="700">No lock!</text>
    <text x="730" y="520" fill="#94A3B8" font-size="12">Each CPU has its own active slab</text>
    <text x="730" y="542" fill="#94A3B8" font-size="12">Fast path: pointer swap only (~ns)</text>
    <text x="730" y="564" fill="#64748B" font-size="12">Slow path: refill from partial list or buddy</text>
  </g>

  <!-- kmalloc size classes -->
  <g filter="url(#softShadow)">
    <rect x="135" y="610" width="600" height="100" rx="10" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="640" fill="#CBD5E1" font-size="15" font-weight="700">kmalloc size classes</text>
    <text x="160" y="665" fill="#94A3B8" font-size="13">8  16  32  64  96  128  192  256  512  1k  2k  4k  8k</text>
    <text x="160" y="692" fill="#64748B" font-size="12">kmalloc(150) → kmalloc-192 cache → 22% internal frag (vs 96% with buddy)</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="775" font-size="40" font-weight="700">SLUB：小对象为什么不直接按页分配</text>
    <text x="140" y="820" fill="#CBD5E1" font-size="21">page allocator for bulk, object allocator for shape</text>
  </g>
</svg>
