<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Swap：换出去的页怎样回来</title>
  <desc id="desc">匿名页在内存与 swap 设备之间流转的生命周期示意</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.55" stop-color="#141E2B"/>
      <stop offset="1" stop-color="#1A2030"/>
    </linearGradient>
    <linearGradient id="memColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="swapColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="zswapColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M1,0 L5,9 L9,0" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="1" orient="auto">
      <path d="M1,9 L5,0 L9,9" fill="none" stroke="#34D399" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#E2E8F0" stroke-width="1">
    <path d="M120 150 H1480"/>
    <path d="M120 330 H1480"/>
    <path d="M120 510 H1480"/>
    <path d="M120 690 H1480"/>
    <path d="M400 100 V700"/>
    <path d="M800 100 V700"/>
    <path d="M1200 100 V700"/>
  </g>

  <!-- Physical Memory box -->
  <g filter="url(#softShadow)">
    <rect x="135" y="120" width="500" height="170" rx="14" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="160" fill="#7DD3FC" font-size="22" font-weight="700">Physical Memory (RAM)</text>
    <text x="170" y="195" fill="#94A3B8" font-size="15">anon pages live here during normal access</text>
    <rect x="170" y="215" width="80" height="50" rx="6" fill="#7DD3FC" opacity="0.6"/>
    <text x="210" y="245" fill="#0F172A" font-size="12" font-weight="700" text-anchor="middle">hot</text>
    <rect x="265" y="215" width="80" height="50" rx="6" fill="#7DD3FC" opacity="0.45"/>
    <text x="305" y="245" fill="#0F172A" font-size="12" font-weight="700" text-anchor="middle">warm</text>
    <rect x="360" y="215" width="80" height="50" rx="6" fill="#7DD3FC" opacity="0.3"/>
    <text x="400" y="245" fill="#0F172A" font-size="12" font-weight="700" text-anchor="middle">cold</text>
    <rect x="455" y="215" width="80" height="50" rx="6" fill="#7DD3FC" opacity="0.15"/>
    <text x="495" y="245" fill="#CBD5E1" font-size="12" font-weight="700" text-anchor="middle">cold</text>
    <rect x="550" y="215" width="60" height="50" rx="6" fill="#0F172A" stroke="#EF4444" stroke-width="1.5"/>
    <text x="580" y="245" fill="#EF4444" font-size="11" font-weight="700" text-anchor="middle">evict</text>
  </g>

  <!-- zswap box (middle layer) -->
  <g filter="url(#softShadow)">
    <rect x="135" y="350" width="500" height="130" rx="14" fill="#1A0F2E" stroke="#A78BFA" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="390" fill="#A78BFA" font-size="20" font-weight="700">zswap (compressed RAM cache)</text>
    <text x="170" y="420" fill="#94A3B8" font-size="15">CPU compress/decompress, no disk I/O</text>
    <text x="170" y="450" fill="#94A3B8" font-size="15">pool_percent, accept_threshold, LRU eviction</text>
    <text x="170" y="465" fill="#8B5CF6" font-size="13">trades CPU cycles for reduced I/O</text>
  </g>

  <!-- Swap device box (bottom layer) -->
  <g filter="url(#softShadow)">
    <rect x="135" y="540" width="500" height="130" rx="14" fill="#1A1408" stroke="#FBBF24" stroke-width="2"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="170" y="580" fill="#FBBF24" font-size="20" font-weight="700">Swap Device (disk/SSD)</text>
    <text x="170" y="610" fill="#94A3B8" font-size="15">swap partition or swap file</text>
    <text x="170" y="640" fill="#94A3B8" font-size="15">slot bitmap, priority-based selection</text>
    <text x="170" y="655" fill="#F59E0B" font-size="13">ms-level latency per page</text>
  </g>

  <!-- Arrows: swap out (down) -->
  <g stroke="#FBBF24" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M580 290 L580 350" stroke-dasharray="6 4"/>
    <path d="M580 480 L580 540" stroke-dasharray="6 4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="592" y="325" fill="#FBBF24" font-size="13">swap out</text>
    <text x="592" y="515" fill="#FBBF24" font-size="13">writeback</text>
  </g>

  <!-- Arrows: swap in (up) -->
  <g stroke="#34D399" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M200 350 L200 290" stroke-dasharray="6 4"/>
    <path d="M200 540 L200 480" stroke-dasharray="6 4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="140" y="325" fill="#34D399" font-size="13">swap in</text>
    <text x="140" y="515" fill="#34D399" font-size="13">read back</text>
  </g>

  <!-- Right side: PTE encoding -->
  <g filter="url(#softShadow)">
    <rect x="750" y="120" width="420" height="150" rx="12" fill="#0B1220" stroke="#64748B" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="785" y="158" fill="#CBD5E1" font-size="18" font-weight="700">PTE State Transition</text>
    <text x="785" y="190" fill="#7DD3FC" font-size="14">present=1: PFN + flags (normal page)</text>
    <text x="785" y="218" fill="#FBBF24" font-size="14">present=0: swap_type | swap_offset</text>
    <text x="785" y="246" fill="#64748B" font-size="14">access triggers page fault → swap in</text>
  </g>

  <!-- Right side: swap cache -->
  <g filter="url(#softShadow)">
    <rect x="750" y="310" width="420" height="130" rx="12" fill="#0B1220" stroke="#5EEAD4" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="785" y="348" fill="#5EEAD4" font-size="18" font-weight="700">Swap Cache</text>
    <text x="785" y="378" fill="#94A3B8" font-size="14">page exists in both RAM and swap</text>
    <text x="785" y="403" fill="#94A3B8" font-size="14">dedup concurrent faults on same entry</text>
    <text x="785" y="428" fill="#94A3B8" font-size="14">skip re-write if page unmodified</text>
  </g>

  <!-- Right side: counters -->
  <g filter="url(#softShadow)">
    <rect x="750" y="480" width="420" height="100" rx="12" fill="#0B1220" stroke="#64748B" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="785" y="515" fill="#CBD5E1" font-size="16">/proc/vmstat:</text>
    <text x="785" y="540" fill="#FBBF24" font-size="14">pswpout (pages written to swap)</text>
    <text x="785" y="560" fill="#34D399" font-size="14">pswpin  (pages read from swap)</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="740" font-size="44" font-weight="700">Swap：换出去的页怎样回来</text>
    <text x="140" y="790" fill="#CBD5E1" font-size="22">anonymous state -> compressed cache -> external backing -> fault-driven restore</text>
  </g>
</svg>
