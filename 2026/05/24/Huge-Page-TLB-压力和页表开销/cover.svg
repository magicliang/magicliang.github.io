<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Huge Page：TLB 压力和页表开销</title>
  <desc id="desc">4KB vs 2MB 页面粒度的 TLB 覆盖率与页表层级对比</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1419"/>
      <stop offset="0.5" stop-color="#14192B"/>
      <stop offset="1" stop-color="#1A1A28"/>
    </linearGradient>
    <linearGradient id="smallColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="hugeColor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#E2E8F0" stroke-width="1">
    <path d="M800 80 V700"/>
    <path d="M120 200 H1480"/>
    <path d="M120 420 H1480"/>
  </g>

  <!-- Left: 4KB pages -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="135" y="130" fill="#7DD3FC" font-size="24" font-weight="700">4KB Pages (standard)</text>
  </g>

  <!-- TLB representation for 4KB -->
  <g filter="url(#softShadow)">
    <rect x="135" y="155" width="600" height="100" rx="12" fill="#0B1A2A" stroke="#7DD3FC" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="185" fill="#94A3B8" font-size="15">TLB: 2048 entries × 4KB = 8MB coverage</text>
    <text x="160" y="210" fill="#EF4444" font-size="15" font-weight="700">8GB workset → 0.1% TLB hit rate</text>
    <text x="160" y="235" fill="#64748B" font-size="14">→ constant page table walks (4-5 mem accesses each)</text>
  </g>

  <!-- Page table for 4KB -->
  <g filter="url(#softShadow)">
    <rect x="135" y="280" width="600" height="120" rx="12" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="310" fill="#CBD5E1" font-size="16" font-weight="700">Page Table (5 levels)</text>
    <text x="160" y="338" fill="#94A3B8" font-size="14">PGD → P4D → PUD → PMD → PTE → page</text>
    <text x="160" y="362" fill="#94A3B8" font-size="14">8GB mapping: ~2M PTEs = ~16MB page table memory</text>
    <text x="160" y="386" fill="#94A3B8" font-size="14">65,536 page faults per 256MB first-touch</text>
  </g>

  <!-- Small page grid visualization -->
  <g opacity="0.6">
    <rect x="160" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="175" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="190" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="205" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="220" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="235" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="250" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="265" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="280" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="295" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="310" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="325" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="340" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="355" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="370" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="385" y="415" width="12" height="12" fill="#7DD3FC" opacity="0.5"/>
    <rect x="160" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="175" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="190" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="205" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="220" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="235" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="250" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="265" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="280" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="295" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="310" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="325" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="340" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="355" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="370" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
    <rect x="385" y="430" width="12" height="12" fill="#7DD3FC" opacity="0.4"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="410" y="427" fill="#7DD3FC" font-size="13">512 × 4KB pages</text>
    <text x="410" y="445" fill="#64748B" font-size="12">= 512 PTEs, 512 TLB entries</text>
  </g>

  <!-- Right: 2MB huge pages -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="835" y="130" fill="#A3E635" font-size="24" font-weight="700">2MB Huge Pages (THP)</text>
  </g>

  <!-- TLB representation for 2MB -->
  <g filter="url(#softShadow)">
    <rect x="835" y="155" width="600" height="100" rx="12" fill="#0B1A20" stroke="#A3E635" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="860" y="185" fill="#94A3B8" font-size="15">TLB: 2048 entries × 2MB = 4GB coverage</text>
    <text x="860" y="210" fill="#34D399" font-size="15" font-weight="700">8GB workset → 50% TLB hit rate</text>
    <text x="860" y="235" fill="#64748B" font-size="14">→ 512× fewer TLB misses</text>
  </g>

  <!-- Page table for 2MB -->
  <g filter="url(#softShadow)">
    <rect x="835" y="280" width="600" height="120" rx="12" fill="#0B1220" stroke="#475569" stroke-width="1"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="860" y="310" fill="#CBD5E1" font-size="16" font-weight="700">Page Table (4 levels, skip PTE)</text>
    <text x="860" y="338" fill="#94A3B8" font-size="14">PGD → P4D → PUD → PMD → huge page</text>
    <text x="860" y="362" fill="#34D399" font-size="14">8GB mapping: ~4K PMD entries = ~32KB table memory</text>
    <text x="860" y="386" fill="#34D399" font-size="14">128 page faults per 256MB first-touch</text>
  </g>

  <!-- Huge page block visualization -->
  <g filter="url(#softShadow)">
    <rect x="860" y="410" width="240" height="45" rx="8" fill="#A3E635" opacity="0.3" stroke="#A3E635" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="880" y="438" fill="#A3E635" font-size="14" font-weight="700">1 × 2MB huge page</text>
    <text x="1120" y="438" fill="#64748B" font-size="12">= 1 PMD entry, 1 TLB entry</text>
  </g>

  <!-- Trade-offs box -->
  <g filter="url(#softShadow)">
    <rect x="835" y="490" width="600" height="120" rx="12" fill="#1A1408" stroke="#FBBF24" stroke-width="1.5"/>
  </g>
  <g font-family="Menlo, Consolas, monospace">
    <text x="860" y="525" fill="#FBBF24" font-size="16" font-weight="700">Trade-offs</text>
    <text x="860" y="553" fill="#94A3B8" font-size="14">+ TLB coverage ×512, page faults ÷512</text>
    <text x="860" y="575" fill="#EF4444" font-size="14">- allocation latency spike (compaction)</text>
    <text x="860" y="597" fill="#EF4444" font-size="14">- memory waste (up to 2MB-1 per mapping)</text>
  </g>

  <!-- Comparison arrow -->
  <g font-family="Menlo, Consolas, monospace">
    <text x="160" y="500" fill="#64748B" font-size="14">fragmented, many PTEs</text>
    <text x="160" y="520" fill="#64748B" font-size="14">high TLB pressure</text>
  </g>

  <!-- Title -->
  <g fill="#F8FAFC" font-family="Menlo, Consolas, monospace">
    <text x="135" y="710" font-size="42" font-weight="700">Huge Page：TLB 压力和页表开销</text>
    <text x="140" y="760" fill="#CBD5E1" font-size="22">larger granularity -> lower metadata cost + higher allocation risk</text>
  </g>
</svg>
