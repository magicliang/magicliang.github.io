  <text x="247" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">Church Encoding</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">不用数字也能计算：Church 编</tspan><tspan x="104" dy="64">码</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">数据可以表现为行为，数字也可以只是函数</tspan><tspan x="108" dy="42">组合</tspan></text>
