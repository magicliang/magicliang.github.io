<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="50%" stop-color="#112240"/>
      <stop offset="100%" stop-color="#0a192f"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#071525"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- Grid dots -->
  <pattern id="dots1" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots1)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#64ffda" letter-spacing="3" font-weight="600" opacity="0.9">DEBUGGING METHODOLOGY</text>
  <line x1="60" y1="82" x2="340" y2="82" stroke="#64ffda" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="150" font-size="52" font-weight="700" fill="white">进程启动期的静默故障</text>
  <!-- Subtitle -->
  <text x="60" y="205" font-size="24" fill="#8892b0">JVM 与 Node.js 的调试方法论</text>

  <!-- Terminal box -->
  <rect x="60" y="255" width="560" height="290" rx="8" fill="url(#termGrad)" stroke="#233554" stroke-width="1.5"/>
  <!-- Terminal title bar -->
  <rect x="60" y="255" width="560" height="36" rx="8" fill="#1d3557"/>
  <rect x="60" y="277" width="560" height="14" fill="#1d3557"/>
  <circle cx="88" cy="273" r="7" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="112" cy="273" r="7" fill="#ffd93d" opacity="0.9"/>
  <circle cx="136" cy="273" r="7" fill="#6bcb77" opacity="0.9"/>
  <text x="200" y="277" font-size="12" fill="#8892b0" text-anchor="middle">terminal — debug session</text>

  <!-- Terminal content -->
  <text x="82" y="320" font-size="13" fill="#64ffda" font-family="monospace">$ java -jar service.jar --env prod</text>
  <text x="82" y="344" font-size="13" fill="#8892b0" font-family="monospace">Starting application context...</text>
  <text x="82" y="368" font-size="13" fill="#8892b0" font-family="monospace">Initializing bean: DataSourceConfig</text>
  <text x="82" y="392" font-size="13" fill="#ff6b6b" font-family="monospace">Exception in thread "main"</text>
  <text x="82" y="416" font-size="13" fill="#ff6b6b" font-family="monospace">  at Process.start() [SILENT FAIL]</text>
  <text x="82" y="440" font-size="13" fill="#ff6b6b" font-family="monospace">  at JvmBootstrap.init(line:247)</text>
  <text x="82" y="464" font-size="13" fill="#8892b0" font-family="monospace" opacity="0.6">  at sun.reflect.NativeMethodAccessorImpl</text>
  <text x="82" y="488" font-size="13" fill="#64ffda" font-family="monospace">_</text>

  <!-- Warning triangle -->
  <g transform="translate(700, 260)">
    <polygon points="220,20 380,290 60,290" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.9"/>
    <polygon points="220,20 380,290 60,290" fill="#ff6b6b" opacity="0.08"/>
    <text x="220" y="200" font-size="80" text-anchor="middle" fill="#ff6b6b" opacity="0.9">!</text>
    <text x="220" y="270" font-size="14" text-anchor="middle" fill="#ff6b6b" opacity="0.7">SILENT FAILURE</text>
  </g>

  <!-- Right side labels -->
  <text x="780" y="395" font-size="14" fill="#64ffda" text-anchor="middle" opacity="0.8">No stack trace</text>
  <text x="780" y="418" font-size="14" fill="#64ffda" text-anchor="middle" opacity="0.8">No exit code</text>
  <text x="780" y="441" font-size="14" fill="#64ffda" text-anchor="middle" opacity="0.8">No log output</text>

  <!-- JVM / Node badges -->
  <rect x="900" y="260" width="110" height="36" rx="6" fill="#1d3557" stroke="#64ffda" stroke-width="1"/>
  <text x="955" y="283" font-size="14" fill="#64ffda" text-anchor="middle" font-weight="600">JVM</text>
  <rect x="1030" y="260" width="130" height="36" rx="6" fill="#1d3557" stroke="#64ffda" stroke-width="1"/>
  <text x="1095" y="283" font-size="14" fill="#64ffda" text-anchor="middle" font-weight="600">Node.js</text>

  <!-- Connector lines -->
  <line x1="955" y1="296" x2="780" y2="380" stroke="#64ffda" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="1095" y1="296" x2="780" y2="380" stroke="#64ffda" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#233554" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#495670">守株阁 · 可观察性 · 系统编程</text>
</svg>
