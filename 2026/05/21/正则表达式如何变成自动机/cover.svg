  <text x="247" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">Regex -&gt; NFA</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">正则表达式如何变成自动机</tspan></text>
