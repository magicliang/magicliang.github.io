  <g opacity="0.96"><rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/><text x="885" y="285" font-size="34" fill="#be123c" font-weight="700" text-anchor="start" class="mono">(a|b)*abb</text><path d="M 1045 275 L 1150 275" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><g><rect x="1170" y="230" width="170" height="90" rx="16" fill="#fff7ed" stroke="#facc15" stroke-width="2" filter="url(#shadow)"/><text x="1255" y="284" font-size="25" fill="#111827" font-weight="700" text-anchor="middle" class="">Regex AST</text></g><path d="M 1255 325 L 1255 405" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><g><circle cx="1065" cy="500" r="35" fill="#ecfeff" stroke="#be123c" stroke-width="4" filter="url(#shadow)"/><text x="1065" y="508" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">S</text></g><path d="M 1100 500 L 1195 500" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><g><circle cx="1230" cy="500" r="35" fill="#fff" stroke="#0891b2" stroke-width="4" filter="url(#shadow)"/><text x="1230" y="508" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">A</text></g><path d="M 1265 500 L 1360 500" fill="none" stroke="#be123c" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><g><circle cx="1395" cy="500" r="35" fill="#dcfce7" stroke="#facc15" stroke-width="4" filter="url(#shadow)"/><text x="1395" y="508" font-size="25" fill="#111827" font-weight="800" text-anchor="middle" class="">✓</text></g><text x="1235" y="620" font-size="29" fill="#334155" font-weight="700" text-anchor="middle" class="">编译后再匹配</text></g>
