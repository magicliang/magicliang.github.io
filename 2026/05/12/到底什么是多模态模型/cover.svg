<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">到底什么是多模态模型</title>
  <desc id="desc">文本、图像、音频、视频通过编码器与投影层落到同一语义空间</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="52%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#141827"/>
    </linearGradient>
    <radialGradient id="auraA" cx="18%" cy="24%" r="48%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraB" cx="82%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity=".20"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#9befff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .kicker { font-size: 22px; font-weight: 800; fill: #5eead4; letter-spacing: 2px; }
      .h1 { font-size: 58px; font-weight: 850; fill: #f4fbff; }
      .sub { font-size: 25px; fill: #bdd0df; }
      .body { fill: #d7e6f0; font-weight: 650; }
      .chip { font-size: 17px; font-weight: 850; fill: #06111f; }
      .foot { font-size: 24px; fill: #b7cad8; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#auraA)"/>
  <rect width="1600" height="900" fill="url(#auraB)"/>
  <path d="M80 744 C330 648 456 772 707 666 C960 560 1146 630 1520 468" fill="none" stroke="#5eead4" stroke-width="2" opacity=".22"/>
  <path d="M82 792 C342 704 520 812 748 718 C1010 612 1214 700 1518 558" fill="none" stroke="#93c5fd" stroke-width="2" opacity=".20"/>
  <g class="font">
    <text x="118" y="88" class="kicker">MULTIMODAL ALIGNMENT / SHARED SEMANTICS</text>
    <text x="118" y="156" class="font h1">到底什么是多模态模型</text>
    <text x="118" y="168" class="sub">文本、图像、音频、视频通过编码器与投影层落到同一语义空间</text>
  </g>
  <path d="M520 450H1080" stroke="#f0abfc" stroke-width="7" stroke-linecap="round" opacity=".72" filter="url(#glow)"/>
  <circle cx="520" cy="450" r="11" fill="#5eead4" filter="url(#glow)"/>
  <circle cx="955" cy="450" r="11" fill="#93c5fd" filter="url(#glow)"/>
  <circle cx="1080" cy="450" r="11" fill="#f0abfc" filter="url(#glow)"/>
  <g transform="translate(150 305)">
      <rect x="0" y="0" width="370" height="285" rx="24" fill="#091827" fill-opacity=".86" stroke="#5eead4" stroke-opacity=".55" filter="url(#shadow)"/>
      <rect x="26" y="30" width="96" height="34" rx="17" fill="#5eead4"/>
      <text x="74" y="53" text-anchor="middle" class="font chip">感知模态</text>
      <circle cx="315" cy="50" r="22" fill="none" stroke="#5eead4" stroke-width="4" opacity=".75"/>
      <path d="M304 50h22M315 39v22" stroke="#5eead4" stroke-width="4" stroke-linecap="round" opacity=".9"/>
      <text x="32" y="114" class="font body" font-size="29">图像 / 音频 / 视频</text>
<text x="32" y="162" class="font body" font-size="29">像素、波形、帧序列</text>
<text x="32" y="210" class="font body" font-size="29">低层信号</text>
    </g>
<g transform="translate(585 305)">
      <rect x="0" y="0" width="370" height="285" rx="24" fill="#091827" fill-opacity=".86" stroke="#93c5fd" stroke-opacity=".55" filter="url(#shadow)"/>
      <rect x="26" y="30" width="96" height="34" rx="17" fill="#93c5fd"/>
      <text x="74" y="53" text-anchor="middle" class="font chip">对齐层</text>
      <circle cx="315" cy="50" r="22" fill="none" stroke="#93c5fd" stroke-width="4" opacity=".75"/>
      <path d="M304 50h22M315 39v22" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity=".9"/>
      <text x="32" y="114" class="font body" font-size="29">encoder</text>
<text x="32" y="162" class="font body" font-size="29">projection</text>
<text x="32" y="210" class="font body" font-size="29">shared embedding space</text>
    </g>
<g transform="translate(1020 305)">
      <rect x="0" y="0" width="370" height="285" rx="24" fill="#091827" fill-opacity=".86" stroke="#f0abfc" stroke-opacity=".55" filter="url(#shadow)"/>
      <rect x="26" y="30" width="96" height="34" rx="17" fill="#f0abfc"/>
      <text x="74" y="53" text-anchor="middle" class="font chip">语言推理</text>
      <circle cx="315" cy="50" r="22" fill="none" stroke="#f0abfc" stroke-width="4" opacity=".75"/>
      <path d="M304 50h22M315 39v22" stroke="#f0abfc" stroke-width="4" stroke-linecap="round" opacity=".9"/>
      <text x="32" y="114" class="font body" font-size="29">LLM</text>
<text x="32" y="162" class="font body" font-size="29">跨模态理解</text>
<text x="32" y="210" class="font body" font-size="29">生成与转换</text>
    </g>
  <g class="font">
    <rect x="154" y="755" width="1292" height="78" rx="22" fill="#07111d" fill-opacity=".78" stroke="#d7f7ff" stroke-opacity=".24"/>
    <text x="800" y="805" text-anchor="middle" class="foot">难点不在“输入很多格式”，而在不同模态之间的语义对齐。</text>
  </g>
</svg>
