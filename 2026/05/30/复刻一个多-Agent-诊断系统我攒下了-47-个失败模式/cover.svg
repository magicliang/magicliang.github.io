  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#2d1a1a" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#503030">守株阁 · AI Agent · 工程纪律 · 失败复盘</text>
</svg>
