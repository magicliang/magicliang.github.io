    <rect x="230" y="54" width="120" height="22" rx="3" fill="#ef4444" opacity="0.15"/>
    <text x="290" y="69" font-size="11" fill="#ef4444" text-anchor="middle" opacity="0.8">18 cases</text>

    <rect x="16" y="96" width="348" height="36" rx="5" fill="#2d1212"/>
