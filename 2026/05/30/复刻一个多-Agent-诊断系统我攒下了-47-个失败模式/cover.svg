    <circle cx="30"  cy="260" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="70"  cy="260" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="110" cy="260" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="150" cy="260" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="190" cy="260" r="9" fill="#ef4444" opacity="0.85"/>
