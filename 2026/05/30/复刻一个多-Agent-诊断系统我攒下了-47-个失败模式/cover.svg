    <rect x="230" y="102" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="290" y="117" font-size="11" fill="#f59e0b" text-anchor="middle" opacity="0.8">12 cases</text>

    <rect x="16" y="144" width="348" height="36" rx="5" fill="#2d1212"/>
    <text x="36" y="167" font-size="12" fill="#ef4444">循环死锁</text>
    <rect x="230" y="150" width="120" height="22" rx="3" fill="#ef4444" opacity="0.15"/>
    <text x="290" y="165" font-size="11" fill="#ef4444" text-anchor="middle" opacity="0.8">9 cases</text>

    <rect x="16" y="192" width="348" height="36" rx="5" fill="#2d1212"/>
    <text x="36" y="215" font-size="12" fill="#f59e0b">协调协议缺失</text>
    <rect x="230" y="198" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.15"/>
    <text x="290" y="213" font-size="11" fill="#f59e0b" text-anchor="middle" opacity="0.8">8 cases</text>

    <rect x="16" y="240" width="348" height="36" rx="5" fill="#2d1212"/>
    <text x="36" y="263" font-size="12" fill="#ef4444">其他边界失效</text>
    <rect x="230" y="246" width="120" height="22" rx="3" fill="#ef4444" opacity="0.15"/>
    <text x="290" y="261" font-size="11" fill="#ef4444" text-anchor="middle" opacity="0.8">↑ 47 total</text>
