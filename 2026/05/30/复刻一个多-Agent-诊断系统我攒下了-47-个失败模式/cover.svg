    <circle cx="190" cy="20" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="230" cy="20" r="9" fill="#f59e0b" opacity="0.8"/>
    <circle cx="270" cy="20" r="9" fill="#ef4444" opacity="0.85"/>
    <!-- Row 2 -->
    <circle cx="30"  cy="60" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="70"  cy="60" r="9" fill="#f59e0b" opacity="0.8"/>
    <circle cx="110" cy="60" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="150" cy="60" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="190" cy="60" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="230" cy="60" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="270" cy="60" r="9" fill="#f59e0b" opacity="0.8"/>
    <!-- Row 3 -->
    <circle cx="30"  cy="100" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="70"  cy="100" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="110" cy="100" r="9" fill="#f59e0b" opacity="0.8"/>
    <circle cx="150" cy="100" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="190" cy="100" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="230" cy="100" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="270" cy="100" r="9" fill="#ef4444" opacity="0.85"/>
