  <text x="60" y="148" font-size="46" font-weight="700" fill="white">复刻多 Agent 诊断系统</text>
  <!-- Subtitle -->
  <text x="60" y="198" font-size="22" fill="#907070">47 个失败模式复盘</text>

  <!-- Large "47" -->
