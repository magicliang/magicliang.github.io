    <circle cx="110" cy="180" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="150" cy="180" r="9" fill="#f59e0b" opacity="0.8"/>
    <circle cx="190" cy="180" r="9" fill="#ef4444" opacity="0.85"/>
    <circle cx="230" cy="180" r="9" fill="#ef4444" opacity="0.85"/>
