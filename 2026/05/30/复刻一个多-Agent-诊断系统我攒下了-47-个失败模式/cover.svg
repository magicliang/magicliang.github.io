<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#2d1a1a"/>
      <stop offset="100%" stop-color="#1a0f0f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg6)"/>
  <pattern id="dots6" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots6)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#ef4444" letter-spacing="3" font-weight="600" opacity="0.9">MULTI-AGENT POSTMORTEM</text>
  <line x1="60" y1="82" x2="330" y2="82" stroke="#ef4444" stroke-width="1" opacity="0.4"/>

