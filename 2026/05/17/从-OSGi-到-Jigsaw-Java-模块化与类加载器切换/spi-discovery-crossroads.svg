<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SPI、模块化与 ClassLoader 的交汇点</title>
  <desc id="desc">展示 ServiceLoader、DriverManager、JPMS uses/provides 与 OSGi Service Registry 的服务发现差异。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="100%" stop-color="#111323"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4deaff"/>
      <stop offset="50%" stop-color="#f4fbff"/>
      <stop offset="100%" stop-color="#c391ff"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#80eaff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000814" flood-opacity=".44"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .h1 { font-size: 50px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .sub { font-size: 22px; fill: #bdd0df; letter-spacing: 0; }
      .title { font-size: 25px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .body { font-size: 18px; fill: #c3d3df; letter-spacing: 0; }
      .small { font-size: 16px; fill: #91a8ba; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 16px; fill: #dff9ff; }
      .chip { font-size: 15px; font-weight: 800; fill: #07111d; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="780" cy="420" r="370" fill="#4deaff" opacity=".07"/>
  <circle cx="980" cy="390" r="350" fill="#c391ff" opacity=".09"/>

  <text x="800" y="88" text-anchor="middle" class="font h1">SPI 是模块化与 CL 切换的交汇点</text>
  <text x="800" y="126" text-anchor="middle" class="font sub">发现策略可控性 × 实现引用可释放性，决定 reload 是否稳定</text>

  <g class="font" filter="url(#shadow)">
    <rect x="610" y="214" width="380" height="150" rx="24" fill="#071522" fill-opacity=".92" stroke="#f4fbff" stroke-opacity=".32"/>
    <text x="800" y="270" text-anchor="middle" class="title">Service Interface</text>
    <text x="800" y="306" text-anchor="middle" class="mono">com.example.spi.Plugin</text>
    <text x="800" y="334" text-anchor="middle" class="small">接口越过边界，实现必须被发现</text>
  </g>

  <g class="font" filter="url(#shadow)">
    <rect x="102" y="466" width="320" height="238" rx="22" fill="#071522" fill-opacity=".9" stroke="#4deaff" stroke-opacity=".42"/>
    <rect x="458" y="466" width="320" height="238" rx="22" fill="#0c1728" fill-opacity=".9" stroke="#85d7ff" stroke-opacity=".38"/>
    <rect x="822" y="466" width="320" height="238" rx="22" fill="#12172f" fill-opacity=".9" stroke="#aab8ff" stroke-opacity=".4"/>
    <rect x="1178" y="466" width="320" height="238" rx="22" fill="#1b1536" fill-opacity=".9" stroke="#c391ff" stroke-opacity=".46"/>
  </g>

  <g stroke="url(#flow)" stroke-width="4" stroke-linecap="round" filter="url(#glow)" fill="none">
    <path d="M710 365C590 420 460 428 300 466"/>
    <path d="M760 365C700 420 650 428 618 466"/>
    <path d="M840 365C900 420 944 428 982 466"/>
    <path d="M900 365C1030 420 1160 428 1338 466"/>
  </g>

  <g class="font">
    <g transform="translate(134 504)">
      <rect width="128" height="30" rx="15" fill="#4deaff"/>
      <text x="64" y="21" text-anchor="middle" class="chip">Classpath</text>
      <text x="0" y="72" class="title">ServiceLoader</text>
      <text x="0" y="106" class="body">默认读取 TCCL</text>
      <text x="0" y="136" class="body">META-INF/services</text>
      <text x="0" y="166" class="body">无版本、弱生命周期</text>
    </g>
    <g transform="translate(490 504)">
      <rect width="128" height="30" rx="15" fill="#85d7ff"/>
      <text x="64" y="21" text-anchor="middle" class="chip">Legacy</text>
      <text x="0" y="72" class="title">DriverManager</text>
      <text x="0" y="106" class="body">静态注册表持有 Driver</text>
      <text x="0" y="136" class="body">system CL 下的全局钉子</text>
      <text x="0" y="166" class="body">必须显式 deregister</text>
    </g>
    <g transform="translate(854 504)">
      <rect width="128" height="30" rx="15" fill="#aab8ff"/>
      <text x="64" y="21" text-anchor="middle" class="chip">JPMS</text>
      <text x="0" y="72" class="title">uses / provides</text>
      <text x="0" y="106" class="body">服务关系进入 module-info</text>
      <text x="0" y="136" class="body">按 ModuleLayer 查找</text>
      <text x="0" y="166" class="body">发现更稳，引用仍要释放</text>
    </g>
    <g transform="translate(1210 504)">
      <rect width="128" height="30" rx="15" fill="#c391ff"/>
      <text x="64" y="21" text-anchor="middle" class="chip">OSGi</text>
      <text x="0" y="72" class="title">Service Registry</text>
      <text x="0" y="106" class="body">主动注册 + 事件订阅</text>
      <text x="0" y="136" class="body">REGISTERED / UNREGISTERING</text>
      <text x="0" y="166" class="body">ServiceTracker 主动放手</text>
    </g>
  </g>

  <g class="font">
    <rect x="332" y="760" width="936" height="60" rx="20" fill="#07111d" fill-opacity=".84" stroke="#d7f7ff" stroke-opacity=".24"/>
    <text x="800" y="797" text-anchor="middle" class="body">SPI 不是语法糖，而是决定实现从哪个 loader / layer / registry 进入系统的协议</text>
  </g>
</svg>
