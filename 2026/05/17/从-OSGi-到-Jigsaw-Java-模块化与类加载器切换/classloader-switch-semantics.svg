<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ClassLoader 切换的三种语义</title>
  <desc id="desc">展示切换 TCCL、用新 ClassLoader 加载新类、卸载整个 ClassLoader 三种不同语义。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="100%" stop-color="#101425"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#80eaff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="17" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .h1 { font-size: 50px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .sub { font-size: 22px; fill: #bdd0df; letter-spacing: 0; }
      .title { font-size: 26px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .body { font-size: 19px; fill: #c3d3df; letter-spacing: 0; }
      .small { font-size: 16px; fill: #91a8ba; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 16px; fill: #dff9ff; }
      .chip { font-size: 15px; font-weight: 800; fill: #07111d; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="285" cy="332" r="310" fill="#3feaff" opacity=".10"/>
  <circle cx="1260" cy="360" r="340" fill="#bf8cff" opacity=".10"/>

  <text x="800" y="88" text-anchor="middle" class="font h1">“切换 ClassLoader”不是同一件事</text>
  <text x="800" y="126" text-anchor="middle" class="font sub">TCCL 只改未来查找；新 CL 产生新世界；卸载要求旧世界完全不可达</text>

  <g filter="url(#shadow)" class="font">
    <rect x="86" y="204" width="430" height="492" rx="24" fill="#071522" fill-opacity=".9" stroke="#4deaff" stroke-opacity=".45"/>
    <rect x="586" y="204" width="430" height="492" rx="24" fill="#0c1728" fill-opacity=".9" stroke="#87cfff" stroke-opacity=".42"/>
    <rect x="1084" y="204" width="430" height="492" rx="24" fill="#171631" fill-opacity=".9" stroke="#c391ff" stroke-opacity=".48"/>
  </g>

  <g class="font">
    <g transform="translate(126 246)">
      <rect width="94" height="30" rx="15" fill="#4deaff"/>
      <text x="47" y="21" text-anchor="middle" class="chip">语义一</text>
      <text x="0" y="78" class="title">切 TCCL</text>
      <text x="0" y="116" class="body">改变框架未来去哪里找 provider</text>
      <text x="0" y="149" class="body">不改变已加载类与已存在对象</text>
      <rect x="0" y="196" width="350" height="78" rx="14" fill="#06111d" stroke="#4deaff" stroke-opacity=".28"/>
      <text x="24" y="226" class="mono">setContextClassLoader(pluginCl)</text>
      <text x="24" y="252" class="mono">ServiceLoader.load(...)</text>
      <path d="M68 350H284" stroke="#4deaff" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
      <path d="M258 326l32 26-32 26" fill="none" stroke="#dff9ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="430" class="small">安全性：try/finally 恢复即可</text>
    </g>

    <g transform="translate(626 246)">
      <rect width="94" height="30" rx="15" fill="#87cfff"/>
      <text x="47" y="21" text-anchor="middle" class="chip">语义二</text>
      <text x="0" y="78" class="title">新 CL 加载新版本</text>
      <text x="0" y="116" class="body">同名类变成两个 Class 身份</text>
      <text x="0" y="149" class="body">老对象仍活在旧 loader 的世界里</text>
      <g transform="translate(0 196)">
        <rect width="150" height="72" rx="14" fill="#06111d" stroke="#87cfff" stroke-opacity=".32"/>
        <text x="75" y="30" text-anchor="middle" class="mono">Plugin @CL1</text>
        <text x="75" y="55" text-anchor="middle" class="small">old object</text>
        <rect x="200" width="150" height="72" rx="14" fill="#06111d" stroke="#87cfff" stroke-opacity=".32"/>
        <text x="275" y="30" text-anchor="middle" class="mono">Plugin @CL2</text>
        <text x="275" y="55" text-anchor="middle" class="small">new object</text>
        <path d="M158 36H192" stroke="#ff6b83" stroke-width="4" stroke-linecap="round"/>
        <path d="M192 20L158 54" stroke="#ff6b83" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text x="0" y="430" class="small">跨边界：父 CL 接口、反射、序列化或抛弃</text>
    </g>

    <g transform="translate(1124 246)">
      <rect width="94" height="30" rx="15" fill="#c391ff"/>
      <text x="47" y="21" text-anchor="middle" class="chip">语义三</text>
      <text x="0" y="78" class="title">卸载整个 CL</text>
      <text x="0" y="116" class="body">不是调用一个 API，而是等待 GC</text>
      <text x="0" y="149" class="body">任何一根强引用都会钉住全世界</text>
      <g transform="translate(0 190)">
        <rect width="350" height="182" rx="16" fill="#06111d" stroke="#c391ff" stroke-opacity=".32"/>
        <text x="24" y="38" class="mono">GC Root</text>
        <path d="M108 34H260" stroke="#c391ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
        <text x="24" y="78" class="mono">instance → Class</text>
        <path d="M166 74H260" stroke="#c391ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
        <text x="24" y="118" class="mono">Class → defining loader</text>
        <path d="M238 114H300" stroke="#c391ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
        <text x="24" y="158" class="mono">loader → all classes pinned</text>
      </g>
      <text x="0" y="430" class="small">典型钉子：ThreadLocal、DriverManager、static cache</text>
    </g>
  </g>

  <g class="font">
    <rect x="432" y="760" width="736" height="58" rx="18" fill="#07111d" fill-opacity=".82" stroke="#d7f7ff" stroke-opacity=".24"/>
    <text x="800" y="796" text-anchor="middle" class="body">类身份 = binary name + defining loader；同名不等于同类</text>
  </g>
</svg>
