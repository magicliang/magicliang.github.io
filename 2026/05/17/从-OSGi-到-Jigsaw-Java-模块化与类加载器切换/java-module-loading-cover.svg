<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">从 OSGi 到 Jigsaw 的 Java 模块化路线图</title>
  <desc id="desc">一张深色科技风路线图，展示 classpath 之上的 OSGi、JBoss Modules 与 JPMS 三条模块化路线。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="55%" stop-color="#0b1728"/>
      <stop offset="100%" stop-color="#121323"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44eaff"/>
      <stop offset="50%" stop-color="#f3fbff"/>
      <stop offset="100%" stop-color="#bf8cff"/>
    </linearGradient>
    <radialGradient id="aura1" cx="22%" cy="34%" r="48%">
      <stop offset="0%" stop-color="#3feaff" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#3feaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura2" cx="78%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#c18cff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#c18cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#83efff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".44"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .h1 { font-size: 58px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .sub { font-size: 23px; fill: #bdd0df; letter-spacing: 0; }
      .title { font-size: 27px; font-weight: 800; fill: #f4fbff; letter-spacing: 0; }
      .body { font-size: 19px; fill: #c3d3df; letter-spacing: 0; }
      .small { font-size: 16px; fill: #91a8ba; letter-spacing: 0; }
      .chip { font-size: 15px; font-weight: 800; fill: #07111d; letter-spacing: 0; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 17px; fill: #dff9ff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#aura1)"/>
  <rect width="1600" height="900" fill="url(#aura2)"/>

  <text x="800" y="96" text-anchor="middle" class="font h1">Java 模块化的三条路线</text>
  <text x="800" y="136" text-anchor="middle" class="font sub">classpath 把打包、可见性、加载和服务发现混成一锅；模块系统把它们拆开</text>

  <g filter="url(#shadow)">
    <rect x="96" y="226" width="312" height="370" rx="22" fill="#071522" fill-opacity=".88" stroke="#4deaff" stroke-opacity=".45"/>
    <rect x="464" y="226" width="312" height="370" rx="22" fill="#0a1725" fill-opacity=".9" stroke="#79dbff" stroke-opacity=".42"/>
    <rect x="824" y="226" width="312" height="370" rx="22" fill="#111631" fill-opacity=".9" stroke="#aab8ff" stroke-opacity=".42"/>
    <rect x="1192" y="226" width="312" height="370" rx="22" fill="#1b1536" fill-opacity=".9" stroke="#c391ff" stroke-opacity=".48"/>
  </g>

  <path d="M252 640H1348" stroke="url(#rail)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <g fill="#f4fbff" filter="url(#glow)">
    <circle cx="252" cy="640" r="11"/>
    <circle cx="620" cy="640" r="11"/>
    <circle cx="980" cy="640" r="11"/>
    <circle cx="1348" cy="640" r="11"/>
  </g>

  <g class="font">
    <g transform="translate(128 266)">
      <rect width="118" height="30" rx="15" fill="#4deaff"/>
      <text x="59" y="21" text-anchor="middle" class="chip">1995</text>
      <text x="0" y="72" class="title">Classpath</text>
      <text x="0" y="110" class="body">扁平命名空间</text>
      <text x="0" y="143" class="body">缺少依赖图与版本语义</text>
      <text x="0" y="176" class="body">SPI 依赖隐式 TCCL</text>
      <rect x="0" y="232" width="248" height="54" rx="12" fill="#06111d" stroke="#4deaff" stroke-opacity=".28"/>
      <text x="24" y="266" class="mono">JAR Hell</text>
    </g>

    <g transform="translate(496 266)">
      <rect width="118" height="30" rx="15" fill="#75e6ff"/>
      <text x="59" y="21" text-anchor="middle" class="chip">1999+</text>
      <text x="0" y="72" class="title">OSGi</text>
      <text x="0" y="110" class="body">动态 install / update / refresh</text>
      <text x="0" y="143" class="body">每 bundle 独立 ClassLoader</text>
      <text x="0" y="176" class="body">Service Registry 管生命周期</text>
      <rect x="0" y="232" width="248" height="54" rx="12" fill="#06111d" stroke="#75e6ff" stroke-opacity=".28"/>
      <text x="24" y="266" class="mono">runtime evolution</text>
    </g>

    <g transform="translate(856 266)">
      <rect width="118" height="30" rx="15" fill="#aab8ff"/>
      <text x="59" y="21" text-anchor="middle" class="chip">2010s</text>
      <text x="0" y="72" class="title">JBoss Modules</text>
      <text x="0" y="110" class="body">静态拓扑与快速启动</text>
      <text x="0" y="143" class="body">module.xml + slot</text>
      <text x="0" y="176" class="body">应用服务器内部隔离</text>
      <rect x="0" y="232" width="248" height="54" rx="12" fill="#06111d" stroke="#aab8ff" stroke-opacity=".28"/>
      <text x="24" y="266" class="mono">server isolation</text>
    </g>

    <g transform="translate(1224 266)">
      <rect width="118" height="30" rx="15" fill="#c391ff"/>
      <text x="59" y="21" text-anchor="middle" class="chip">Java 9</text>
      <text x="0" y="72" class="title">Jigsaw / JPMS</text>
      <text x="0" y="110" class="body">可靠配置 + 强封装</text>
      <text x="0" y="143" class="body">module-info 进入 javac / JVM</text>
      <text x="0" y="176" class="body">不解决版本与热替换</text>
      <rect x="0" y="232" width="248" height="54" rx="12" fill="#06111d" stroke="#c391ff" stroke-opacity=".28"/>
      <text x="24" y="266" class="mono">strong encapsulation</text>
    </g>
  </g>

  <g class="font">
    <rect x="420" y="720" width="760" height="74" rx="20" fill="#07111d" fill-opacity=".82" stroke="#d7f7ff" stroke-opacity=".24"/>
    <text x="800" y="752" text-anchor="middle" class="body">真正的问题不是“哪个更先进”，而是部署形态需要哪一种约束</text>
    <text x="800" y="780" text-anchor="middle" class="small">动态生命周期 / 静态隔离 / 强封装与可靠配置，是三套不同的优先级</text>
  </g>
</svg>
