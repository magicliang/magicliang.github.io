<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg9)"/>
  <pattern id="dots9" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots9)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#06b6d4" letter-spacing="3" font-weight="600" opacity="0.9">AGENT RUNTIME ANATOMY</text>
  <line x1="60" y1="82" x2="315" y2="82" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="140" font-size="40" font-weight="700" fill="white">AI Coding Agent 的 Hook 与 Loop</text>
  <!-- Subtitle -->
  <text x="60" y="186" font-size="20" fill="#7080a0">Codex · Claude Code · OpenCode · OMC</text>

  <!-- Circular loop diagram - centered -->
  <g transform="translate(380, 210)">
    <!-- Outer ring -->
    <circle cx="200" cy="185" r="155" fill="none" stroke="#1a1a4e" stroke-width="20"/>

    <!-- Top semicircle: Loop -->
    <path d="M 45,185 A 155,155 0 0,1 355,185" fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round"/>
    <text x="200" y="60" font-size="20" fill="#06b6d4" text-anchor="middle" font-weight="700">LOOP</text>
    <text x="200" y="82" font-size="11" fill="#5070a0" text-anchor="middle">turn iteration · context window · sampling</text>

    <!-- Bottom semicircle: Hook -->
    <path d="M 355,185 A 155,155 0 0,1 45,185" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
    <text x="200" y="325" font-size="20" fill="#8b5cf6" text-anchor="middle" font-weight="700">HOOK</text>
    <text x="200" y="346" font-size="11" fill="#5070a0" text-anchor="middle">PreToolUse · PostToolUse · Stop · Notification</text>

    <!-- Connection point markers -->
    <circle cx="45"  cy="185" r="10" fill="#06b6d4"/>
    <circle cx="355" cy="185" r="10" fill="#8b5cf6"/>

    <!-- Left Plugin box (at left connection) -->
    <rect x="-150" y="155" width="130" height="58" rx="8" fill="#1a1a3e" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="-85" y="180" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="600">Plugin</text>
    <text x="-85" y="198" font-size="10" fill="#5070a0" text-anchor="middle">pre-hook / inject</text>
    <line x1="-20" y1="184" x2="35" y2="184" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

    <!-- Right Plugin box (at right connection) -->
    <rect x="420" y="155" width="130" height="58" rx="8" fill="#1a1a3e" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="485" y="180" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="600">Plugin</text>
    <text x="485" y="198" font-size="10" fill="#5070a0" text-anchor="middle">post-hook / emit</text>
    <line x1="365" y1="184" x2="420" y2="184" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

    <!-- Center circle -->
    <circle cx="200" cy="185" r="42" fill="#12122e" stroke="#1a1a4e" stroke-width="2"/>
    <text x="200" y="181" font-size="12" fill="#a0a0c0" text-anchor="middle">Agent</text>
    <text x="200" y="197" font-size="12" fill="#a0a0c0" text-anchor="middle">Core</text>

    <!-- Four labels around -->
    <text x="200" y="20" font-size="11" fill="#06b6d4" text-anchor="middle" opacity="0.7">Codex</text>
    <text x="390" y="105" font-size="11" fill="#06b6d4" text-anchor="middle" opacity="0.7">Claude Code</text>
    <text x="200" y="390" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.7">OMC</text>
    <text x="10" y="105" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.7">OpenCode</text>
  </g>

  <!-- Right side legend -->
  <g transform="translate(960, 220)">
    <text x="0" y="0" font-size="13" fill="#06b6d4" font-weight="600">Hook 类型</text>
    <line x1="0" y1="10" x2="180" y2="10" stroke="#1a1a4e" stroke-width="1"/>
    <rect x="0" y="22" width="180" height="28" rx="5" fill="#0a0a2e" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
    <text x="90" y="41" font-size="11" fill="#06b6d4" text-anchor="middle">PreToolUse</text>
    <rect x="0" y="58" width="180" height="28" rx="5" fill="#0a0a2e" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <text x="90" y="77" font-size="11" fill="#06b6d4" text-anchor="middle">PostToolUse</text>
    <rect x="0" y="94" width="180" height="28" rx="5" fill="#0a0a2e" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
    <text x="90" y="113" font-size="11" fill="#8b5cf6" text-anchor="middle">Stop / Notification</text>
    <rect x="0" y="130" width="180" height="28" rx="5" fill="#0a0a2e" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
    <text x="90" y="149" font-size="11" fill="#8b5cf6" text-anchor="middle">PreCompact</text>

    <text x="0" y="186" font-size="13" fill="#8b5cf6" font-weight="600">Plugin 能力</text>
    <line x1="0" y1="196" x2="180" y2="196" stroke="#1a1a4e" stroke-width="1"/>
    <text x="0" y="218" font-size="11" fill="#7070a0">● 注入系统提示词</text>
    <text x="0" y="240" font-size="11" fill="#7070a0">● 拦截工具调用</text>
    <text x="0" y="262" font-size="11" fill="#7070a0">● 修改响应内容</text>
    <text x="0" y="284" font-size="11" fill="#7070a0">● 触发外部工作流</text>
    <text x="0" y="306" font-size="11" fill="#7070a0">● 跨 agent 协作</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#1a1a3e" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#30305a">守株阁 · AI Agent · 插件体系 · 运行时</text>
</svg>
