<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg10)"/>
  <pattern id="dots10" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots10)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#3b82f6" letter-spacing="3" font-weight="600" opacity="0.9">AGENT INTEROP PROTOCOLS</text>
  <line x1="60" y1="82" x2="325" y2="82" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="140" font-size="46" font-weight="700" fill="white">Agent 互操作协议全景</text>
  <!-- Subtitle -->
  <text x="60" y="188" font-size="20" fill="#7080a0">MCP · A2A · AG-UI · Agent Runtime</text>

  <!-- Protocol stack: 4 horizontal bands -->
  <!-- Band 1: AG-UI (top, UI layer) -->
  <rect x="80" y="230" width="720" height="76" rx="10" fill="#1a2a3e" stroke="#3b82f6" stroke-width="2"/>
  <rect x="80" y="230" width="720" height="76" rx="10" fill="#3b82f6" opacity="0.06"/>
  <text x="200" y="264" font-size="16" fill="#3b82f6" font-weight="700">AG-UI</text>
  <text x="200" y="288" font-size="12" fill="#5070a0">Agent-to-User Interface · 流式 UI 事件 · Human-in-the-Loop</text>
  <rect x="640" y="248" width="140" height="40" rx="6" fill="#3b82f6" opacity="0.12"/>
  <text x="710" y="273" font-size="12" fill="#3b82f6" text-anchor="middle">UI Layer</text>

  <!-- Connector arrow -->
  <line x1="440" y1="306" x2="440" y2="318" stroke="#5060a0" stroke-width="1.5" opacity="0.5"/>

  <!-- Band 2: A2A (agent-to-agent) -->
  <rect x="80" y="318" width="720" height="76" rx="10" fill="#1a2e2a" stroke="#22c55e" stroke-width="2"/>
  <rect x="80" y="318" width="720" height="76" rx="10" fill="#22c55e" opacity="0.05"/>
  <text x="200" y="352" font-size="16" fill="#22c55e" font-weight="700">A2A</text>
  <text x="200" y="376" font-size="12" fill="#407060">Agent-to-Agent · Task delegation · Peer discovery · Auth</text>
  <rect x="640" y="336" width="140" height="40" rx="6" fill="#22c55e" opacity="0.10"/>
  <text x="710" y="361" font-size="12" fill="#22c55e" text-anchor="middle">Agent Layer</text>

  <!-- Connector arrow -->
  <line x1="440" y1="394" x2="440" y2="406" stroke="#5060a0" stroke-width="1.5" opacity="0.5"/>

  <!-- Band 3: MCP (tool layer) -->
  <rect x="80" y="406" width="720" height="76" rx="10" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="80" y="406" width="720" height="76" rx="10" fill="#8b5cf6" opacity="0.05"/>
  <text x="200" y="440" font-size="16" fill="#8b5cf6" font-weight="700">MCP</text>
  <text x="200" y="464" font-size="12" fill="#605080">Model Context Protocol · Tool call · Resource · Prompts</text>
  <rect x="640" y="424" width="140" height="40" rx="6" fill="#8b5cf6" opacity="0.10"/>
  <text x="710" y="449" font-size="12" fill="#8b5cf6" text-anchor="middle">Tool Layer</text>

  <!-- Connector arrow -->
  <line x1="440" y1="482" x2="440" y2="494" stroke="#5060a0" stroke-width="1.5" opacity="0.5"/>

  <!-- Band 4: Runtime (foundation) -->
  <rect x="80" y="494" width="720" height="66" rx="10" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="200" y="525" font-size="16" fill="#58a6ff" font-weight="700">Agent Runtime</text>
  <text x="200" y="546" font-size="12" fill="#305070">Loop · Hook · Memory · Sampling · Tool dispatch</text>
  <rect x="640" y="508" width="140" height="36" rx="6" fill="#58a6ff" opacity="0.08"/>
  <text x="710" y="531" font-size="12" fill="#58a6ff" text-anchor="middle">Foundation</text>

  <!-- Right panel: layered map legend -->
  <g transform="translate(856, 230)">
    <rect x="0" y="0" width="284" height="330" rx="10" fill="#0d0d1e" stroke="#1a1a4e" stroke-width="1"/>
    <text x="142" y="28" font-size="13" fill="#a0a0c0" text-anchor="middle" font-weight="600">分层地图</text>
    <line x1="20" y1="40" x2="264" y2="40" stroke="#1a1a4e" stroke-width="1"/>

    <!-- Mini stack replica -->
    <rect x="20" y="54" width="244" height="36" rx="6" fill="#1a2a3e" stroke="#3b82f6" stroke-width="1"/>
    <text x="142" y="77" font-size="12" fill="#3b82f6" text-anchor="middle">AG-UI  ← 用户界面协议</text>

    <rect x="20" y="100" width="244" height="36" rx="6" fill="#1a2e2a" stroke="#22c55e" stroke-width="1"/>
    <text x="142" y="123" font-size="12" fill="#22c55e" text-anchor="middle">A2A  ← Agent 协作协议</text>

    <rect x="20" y="146" width="244" height="36" rx="6" fill="#1e1a2e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="142" y="169" font-size="12" fill="#8b5cf6" text-anchor="middle">MCP  ← 工具调用协议</text>

    <rect x="20" y="192" width="244" height="36" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
    <text x="142" y="215" font-size="12" fill="#58a6ff" text-anchor="middle">Runtime  ← 运行时基础</text>

    <line x1="20" y1="242" x2="264" y2="242" stroke="#1a1a4e" stroke-width="1"/>
    <text x="20" y="264" font-size="11" fill="#5060a0">各层独立演化，互补而非竞争</text>
    <text x="20" y="283" font-size="11" fill="#5060a0">共同构成 Agent 互操作能力</text>
    <text x="20" y="303" font-size="11" fill="#22c55e" opacity="0.8">标准仍在快速演进中 (2025)</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#1a1a3e" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#30305a">守株阁 · Agent 协议 · MCP · A2A · AG-UI</text>
</svg>
