<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Layer 1: 裸 OFFSET -->
  <g transform="translate(0, 10)">
    <rect x="10" y="5" width="900" height="110" rx="6" fill="#fff3f3" stroke="#e06060" stroke-width="1.5"/>
    <text x="25" y="25" font-size="14" font-weight="bold" fill="#c03030">① 裸 OFFSET · 扫宽行 + 数前缀</text>
    <rect x="40" y="40" width="320" height="60" rx="5" fill="#fff" stroke="#d08080"/>
    <text x="200" y="62" text-anchor="middle" font-size="12">沿索引扫 99 万个位置</text>
    <text x="200" y="80" text-anchor="middle" font-size="11" fill="#666">多数还要回表读整行(含 4KB 大字段)</text>
    <line x1="360" y1="70" x2="420" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="420" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#d08080"/>
    <text x="520" y="75" text-anchor="middle" font-size="12">丢弃前 99 万行</text>
    <line x1="620" y1="70" x2="680" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="680" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#d08080"/>
    <text x="780" y="75" text-anchor="middle" font-size="12">返回 1000 整行</text>
  </g>

  <!-- Layer 2: 覆盖索引 -->
  <g transform="translate(0, 135)">
    <rect x="10" y="5" width="900" height="110" rx="6" fill="#f3f8ff" stroke="#5080c0" stroke-width="1.5"/>
    <text x="25" y="25" font-size="14" font-weight="bold" fill="#305090">② 覆盖索引 · 扫窄项 + 数前缀</text>
    <rect x="40" y="40" width="320" height="60" rx="5" fill="#fff" stroke="#80a0d0"/>
    <text x="200" y="62" text-anchor="middle" font-size="12">只扫窄索引项 (status,paid_at,id)</text>
    <text x="200" y="80" text-anchor="middle" font-size="11" fill="#666">不读大字段、不回表</text>
    <line x1="360" y1="70" x2="420" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="420" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#80a0d0"/>
    <text x="520" y="75" text-anchor="middle" font-size="12">丢弃前 99 万项</text>
    <line x1="620" y1="70" x2="680" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="680" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#80a0d0"/>
    <text x="780" y="75" text-anchor="middle" font-size="12">返回 1000 个 id</text>
  </g>

  <!-- Layer 3: 延迟关联 -->
  <g transform="translate(0, 260)">
    <rect x="10" y="5" width="900" height="110" rx="6" fill="#f3fff5" stroke="#409060" stroke-width="1.5"/>
    <text x="25" y="25" font-size="14" font-weight="bold" fill="#207040">③ 延迟关联 · 窄项定位 + 只回表窗口</text>
    <rect x="40" y="40" width="280" height="60" rx="5" fill="#fff" stroke="#70b080"/>
    <text x="180" y="75" text-anchor="middle" font-size="12">覆盖索引上数过 99 万窄项</text>
    <line x1="320" y1="70" x2="380" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="380" y="40" width="250" height="60" rx="5" fill="#fff" stroke="#70b080"/>
    <text x="505" y="75" text-anchor="middle" font-size="12">定位目标窗口 1000 个 id</text>
    <line x1="630" y1="70" x2="690" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="690" y="40" width="200" height="60" rx="5" fill="#fff" stroke="#70b080"/>
    <text x="790" y="65" text-anchor="middle" font-size="12">外层按 id 回表</text>
    <text x="790" y="83" text-anchor="middle" font-size="12">1000 整行</text>
  </g>

  <!-- Layer 4: 游标分页 -->
  <g transform="translate(0, 385)">
    <rect x="10" y="5" width="900" height="110" rx="6" fill="#fffdf3" stroke="#b09030" stroke-width="1.5"/>
    <text x="25" y="25" font-size="14" font-weight="bold" fill="#806010">④ 游标分页 · 不数前缀</text>
    <rect x="40" y="40" width="280" height="60" rx="5" fill="#fff" stroke="#c0a050"/>
    <text x="180" y="75" text-anchor="middle" font-size="12">用上一页锚点直接定位</text>
    <line x1="320" y1="70" x2="380" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="380" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#c0a050"/>
    <text x="480" y="75" text-anchor="middle" font-size="12">向后扫 1000 项</text>
    <line x1="580" y1="70" x2="640" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="640" y="45" width="200" height="50" rx="5" fill="#fff" stroke="#c0a050"/>
    <text x="740" y="75" text-anchor="middle" font-size="12">返回 1000 整行</text>
  </g>
</svg>
