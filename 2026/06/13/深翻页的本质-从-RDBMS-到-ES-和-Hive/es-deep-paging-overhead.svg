<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- 协调节点 (顶部) -->
  <rect x="170" y="15" width="360" height="70" rx="6" fill="#fff3e0" stroke="#d08020" stroke-width="2"/>
  <text x="350" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#905010">协调节点</text>
  <text x="350" y="58" text-anchor="middle" font-size="12">全局归并所有分片候选</text>
  <text x="350" y="74" text-anchor="middle" font-size="11" fill="#666">只取最终第 990001–991000 的 1000 条</text>

  <!-- 5 个 shard -->
  <g>
    <!-- shard 1 -->
    <rect x="20" y="240" width="120" height="70" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
    <text x="80" y="262" text-anchor="middle" font-size="12" font-weight="bold">shard 1</text>
    <text x="80" y="278" text-anchor="middle" font-size="10" fill="#555">本地跳过长前缀</text>
    <text x="80" y="293" text-anchor="middle" font-size="10" fill="#555">返回 ~from+size 候选</text>
    <line x1="80" y1="240" x2="300" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arw)"/>

    <!-- shard 2 -->
    <rect x="155" y="240" width="120" height="70" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
    <text x="215" y="262" text-anchor="middle" font-size="12" font-weight="bold">shard 2</text>
    <text x="215" y="278" text-anchor="middle" font-size="10" fill="#555">同样的前缀开销</text>
    <line x1="215" y1="240" x2="320" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arw)"/>

    <!-- shard 3 -->
    <rect x="290" y="240" width="120" height="70" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
    <text x="350" y="262" text-anchor="middle" font-size="12" font-weight="bold">shard 3</text>
    <text x="350" y="278" text-anchor="middle" font-size="10" fill="#555">同样的前缀开销</text>
    <line x1="350" y1="240" x2="350" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arw)"/>

    <!-- shard 4 -->
    <rect x="425" y="240" width="120" height="70" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
    <text x="485" y="262" text-anchor="middle" font-size="12" font-weight="bold">shard 4</text>
    <text x="485" y="278" text-anchor="middle" font-size="10" fill="#555">同样的前缀开销</text>
    <line x1="485" y1="240" x2="380" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arw)"/>

    <!-- shard 5 -->
    <rect x="560" y="240" width="120" height="70" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
    <text x="620" y="262" text-anchor="middle" font-size="12" font-weight="bold">shard 5</text>
    <text x="620" y="278" text-anchor="middle" font-size="10" fill="#555">同样的前缀开销</text>
    <line x1="620" y1="240" x2="400" y2="85" stroke="#555" stroke-width="1.2" marker-end="url(#arw)"/>
  </g>
</svg>
