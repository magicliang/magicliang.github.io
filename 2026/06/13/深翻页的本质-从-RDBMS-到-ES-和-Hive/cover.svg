<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Deep pagination cover</title>
  <desc id="desc">A technical cover showing offset scanning, anchor seeking, and distributed merge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#18332f"/>
      <stop offset="1" stop-color="#2b253b"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>

  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Deep Pagination</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">offset scan · anchor seek · materialized directory</text>
  </g>

  <g transform="translate(130 265)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">OFFSET</text>
    <g opacity="0.42">
      <rect x="0" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="52" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="104" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="156" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="208" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="260" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="312" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
      <rect x="364" y="0" width="42" height="56" rx="8" fill="#94a3b8"/>
    </g>
    <rect x="420" y="0" width="84" height="56" rx="10" fill="url(#hot)"/>
    <path d="M0 82 H504" stroke="#f97316" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 16"/>
    <text x="0" y="122" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">compute prefix, then discard</text>
  </g>

  <g transform="translate(130 455)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">SEEK</text>
    <circle cx="22" cy="26" r="18" fill="#2dd4bf"/>
    <path d="M52 26 H470" stroke="url(#cool)" stroke-width="9" stroke-linecap="round"/>
    <path d="M438 1 L480 26 L438 51" fill="none" stroke="#38bdf8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="508" y="-2" width="108" height="56" rx="10" fill="#ecfeff"/>
    <text x="536" y="34" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="700">page</text>
    <text x="0" y="92" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">continue from a stable sort anchor</text>
  </g>

  <g transform="translate(760 245)" filter="url(#shadow)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">SHARDS</text>
    <rect x="0" y="0" width="105" height="62" rx="14" fill="#dbeafe" opacity="0.94"/>
    <rect x="0" y="90" width="105" height="62" rx="14" fill="#ccfbf1" opacity="0.94"/>
    <rect x="0" y="180" width="105" height="62" rx="14" fill="#fef3c7" opacity="0.94"/>
    <text x="35" y="39" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="700">S1</text>
    <text x="35" y="129" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="700">S2</text>
    <text x="35" y="219" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="700">S3</text>
    <path d="M128 31 C185 31 192 121 250 121" fill="none" stroke="#dbeafe" stroke-width="5" stroke-linecap="round"/>
    <path d="M128 121 H250" fill="none" stroke="#ccfbf1" stroke-width="5" stroke-linecap="round"/>
    <path d="M128 211 C185 211 192 121 250 121" fill="none" stroke="#fef3c7" stroke-width="5" stroke-linecap="round"/>
    <rect x="252" y="82" width="145" height="78" rx="18" fill="#f8fafc"/>
    <text x="286" y="129" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="700">merge</text>
    <path d="M414 121 H510" stroke="url(#hot)" stroke-width="8" stroke-linecap="round"/>
    <path d="M482 96 L520 121 L482 146" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
