<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 160" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- 用户节点 -->
  <rect x="10" y="50" width="150" height="50" rx="5" fill="#eef6ff" stroke="#4080c0" stroke-width="1.5"/>
  <text x="85" y="80" text-anchor="middle" font-size="13">用户：跳到第 23 页</text>

  <!-- 箭头 -->
  <line x1="160" y1="75" x2="210" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 锚点目录 (菱形用 polygon) -->
  <polygon points="320,30 430,75 320,120 210,75" fill="#fff8e8" stroke="#c09030" stroke-width="1.5"/>
  <text x="320" y="70" text-anchor="middle" font-size="12">锚点目录</text>
  <text x="320" y="86" text-anchor="middle" font-size="11" fill="#666">每 10 页存一个锚点</text>

  <!-- 从菱形到锚点 -->
  <line x1="430" y1="75" x2="480" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="65" text-anchor="middle" font-size="10" fill="#666">找到 ≤23 的最近锚点</text>

  <!-- 第20页锚点 -->
  <rect x="480" y="45" width="150" height="60" rx="5" fill="#f0fff0" stroke="#509050" stroke-width="1.5"/>
  <text x="555" y="70" text-anchor="middle" font-size="12">第 20 页锚点</text>
  <text x="555" y="88" text-anchor="middle" font-size="10" fill="#666">(anchor_paid_at, anchor_id)</text>

  <!-- seek 链 -->
  <line x1="630" y1="75" x2="665" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="648" y="65" font-size="10" fill="#888">seek</text>

  <rect x="665" y="55" width="55" height="40" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="693" y="80" text-anchor="middle" font-size="11">第21页</text>

  <line x1="720" y1="75" x2="740" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="65" font-size="10" fill="#888">seek</text>

  <rect x="740" y="55" width="55" height="40" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="768" y="80" text-anchor="middle" font-size="11">第22页</text>

  <line x1="795" y1="75" x2="815" y2="75" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="805" y="65" font-size="10" fill="#888">seek</text>

  <rect x="815" y="50" width="60" height="50" rx="4" fill="#e8ffe8" stroke="#309030" stroke-width="1.5"/>
  <text x="845" y="73" text-anchor="middle" font-size="11" font-weight="bold">第23页</text>
  <text x="845" y="89" text-anchor="middle" font-size="10" fill="#309030">返回</text>
</svg>
