<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg7)"/>
  <pattern id="dots7" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots7)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#d97706" letter-spacing="3" font-weight="600" opacity="0.9">SOURCE CODE ANALYSIS</text>
  <line x1="60" y1="82" x2="295" y2="82" stroke="#d97706" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="140" font-size="38" font-weight="700" fill="white">Anthropic autonomous-coding</text>
  <!-- Subtitle -->
  <text x="60" y="188" font-size="20" fill="#a09070">500 行 Python 里的 Harness 工程学</text>

  <!-- Code structure diagram: tree layout -->
  <!-- main.py root node -->
  <rect x="80" y="240" width="160" height="50" rx="8" fill="#1a1520" stroke="#d97706" stroke-width="2"/>
  <text x="160" y="261" font-size="13" fill="#fef3c7" text-anchor="middle" font-family="monospace" font-weight="600">main.py</text>
  <text x="160" y="279" font-size="10" fill="#a09070" text-anchor="middle" font-family="monospace">entry point</text>

  <!-- Connector lines from main.py -->
  <line x1="240" y1="265" x2="340" y2="220" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="265" x2="340" y2="310" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="265" x2="340" y2="400" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>

  <!-- Agent Loop node -->
  <rect x="340" y="193" width="175" height="54" rx="8" fill="#1a1520" stroke="#fef3c7" stroke-width="1.5"/>
  <text x="428" y="215" font-size="13" fill="#fef3c7" text-anchor="middle" font-weight="600">Agent Loop</text>
  <text x="428" y="234" font-size="10" fill="#a09070" text-anchor="middle">turn iteration · context mgmt</text>

  <!-- Tool Router node -->
  <rect x="340" y="284" width="175" height="54" rx="8" fill="#1a1520" stroke="#d97706" stroke-width="1.5"/>
  <text x="428" y="306" font-size="13" fill="#fef3c7" text-anchor="middle" font-weight="600">Tool Router</text>
  <text x="428" y="325" font-size="10" fill="#a09070" text-anchor="middle">dispatch · validation · timeout</text>

  <!-- Harness node -->
  <rect x="340" y="374" width="175" height="54" rx="8" fill="#2a1a00" stroke="#d97706" stroke-width="2"/>
  <text x="428" y="396" font-size="13" fill="#fef3c7" text-anchor="middle" font-weight="700">Harness</text>
  <text x="428" y="415" font-size="10" fill="#d97706" text-anchor="middle">eval scaffold · scoring</text>

  <!-- Second level connectors -->
  <line x1="515" y1="220" x2="600" y2="200" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="515" y1="311" x2="600" y2="290" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="515" y1="311" x2="600" y2="340" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="515" y1="401" x2="600" y2="380" stroke="#d97706" stroke-width="1" opacity="0.4"/>
  <line x1="515" y1="401" x2="600" y2="430" stroke="#d97706" stroke-width="1" opacity="0.4"/>

  <!-- Leaf nodes -->
  <rect x="600" y="182" width="150" height="38" rx="6" fill="#100e18" stroke="#60507a" stroke-width="1"/>
  <text x="675" y="205" font-size="11" fill="#a090c0" text-anchor="middle" font-family="monospace">sampling.py</text>

  <rect x="600" y="273" width="150" height="38" rx="6" fill="#100e18" stroke="#60507a" stroke-width="1"/>
  <text x="675" y="296" font-size="11" fill="#a090c0" text-anchor="middle" font-family="monospace">tools/bash.py</text>

  <rect x="600" y="323" width="150" height="38" rx="6" fill="#100e18" stroke="#60507a" stroke-width="1"/>
  <text x="675" y="346" font-size="11" fill="#a090c0" text-anchor="middle" font-family="monospace">tools/editor.py</text>

  <rect x="600" y="363" width="150" height="38" rx="6" fill="#100e18" stroke="#60507a" stroke-width="1"/>
  <text x="675" y="386" font-size="11" fill="#a090c0" text-anchor="middle" font-family="monospace">eval/runner.py</text>

  <rect x="600" y="413" width="150" height="38" rx="6" fill="#100e18" stroke="#60507a" stroke-width="1"/>
  <text x="675" y="436" font-size="11" fill="#a090c0" text-anchor="middle" font-family="monospace">eval/scorer.py</text>

  <!-- Right: Stats panel -->
  <g transform="translate(820, 220)">
    <rect x="0" y="0" width="320" height="300" rx="10" fill="#12100e" stroke="#2a2018" stroke-width="1"/>
    <text x="160" y="30" font-size="14" fill="#d97706" text-anchor="middle" font-weight="600">代码解剖</text>

    <line x1="20" y1="42" x2="300" y2="42" stroke="#2a2018" stroke-width="1"/>

    <text x="20" y="68" font-size="12" fill="#a09070">● 总行数</text>
    <text x="300" y="68" font-size="12" fill="#fef3c7" text-anchor="end" font-weight="600">~500 lines</text>

    <text x="20" y="96" font-size="12" fill="#a09070">● 核心 Agent Loop</text>
    <text x="300" y="96" font-size="12" fill="#fef3c7" text-anchor="end">~120 lines</text>

    <text x="20" y="124" font-size="12" fill="#a09070">● Harness scaffold</text>
    <text x="300" y="124" font-size="12" fill="#d97706" text-anchor="end" font-weight="600">~80 lines</text>

    <text x="20" y="152" font-size="12" fill="#a09070">● Tool definitions</text>
    <text x="300" y="152" font-size="12" fill="#fef3c7" text-anchor="end">~150 lines</text>

    <text x="20" y="180" font-size="12" fill="#a09070">● Eval + scoring</text>
    <text x="300" y="180" font-size="12" fill="#fef3c7" text-anchor="end">~150 lines</text>

    <line x1="20" y1="196" x2="300" y2="196" stroke="#2a2018" stroke-width="1"/>

    <text x="20" y="220" font-size="12" fill="#a09070">模型</text>
    <text x="300" y="220" font-size="12" fill="#fef3c7" text-anchor="end">claude-3-5-sonnet</text>

    <text x="20" y="248" font-size="12" fill="#a09070">协议</text>
    <text x="300" y="248" font-size="12" fill="#fef3c7" text-anchor="end">Anthropic Python SDK</text>

    <text x="20" y="276" font-size="12" fill="#a09070">关键设计</text>
    <text x="300" y="276" font-size="12" fill="#d97706" text-anchor="end" font-weight="600">Harness 模式</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#1a1a3e" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#40405a">守株阁 · Claude Agent SDK · 源码分析</text>
</svg>
