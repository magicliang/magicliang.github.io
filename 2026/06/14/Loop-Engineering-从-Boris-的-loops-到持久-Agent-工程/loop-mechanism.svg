<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 310" width="700" height="310" role="img" aria-labelledby="mech-title">
  <title id="mech-title">/loop 触发时序与 Token 消耗模式</title>
  <defs>
    <linearGradient id="bg-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arr-mr" viewBox="0 0 12 12" refX="11" refY="6"
      markerWidth="7" markerHeight="7" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="700" height="310" fill="url(#bg-m)" rx="12"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" fill="#1e293b"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="13" font-weight="700">/loop 触发时序与 Token 消耗模式</text>

  <!-- ── Time axis ── -->
  <line x1="110" y1="275" x2="685" y2="275"
    stroke="#475569" stroke-width="1.5" marker-end="url(#arr-mr)"/>
  <!-- Time labels (approximate scale: 110=0min, 685=12min) -->
  <text x="110" y="291" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">0</text>
  <text x="349" y="291" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">5 min</text>
  <text x="588" y="291" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">10 min</text>
  <text x="685" y="291" text-anchor="middle" fill="#475569"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">时间</text>

  <!-- 5-min boundary vertical lines -->
  <line x1="349" y1="40" x2="349" y2="275"
    stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="588" y1="40" x2="588" y2="275"
    stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── 300s cache TTL boundary ── -->
  <!-- 300s from each CronCreate fire: at 110+239=349 (first), 349+239=588 (second) -->
  <!-- Cache TTL line at exactly 300s = at 349px and 588px (same as 5-min marks, which is the point) -->
  <!-- Show the cache miss zone (300s+ from last fire) -->
  <!-- Since /loop 5m fires exactly at 300s, it JUST hits the boundary every time -->
  <text x="349" y="52" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="600">⚠ cache TTL 到期</text>
  <text x="588" y="52" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="600">⚠ cache TTL 到期</text>
  <line x1="349" y1="56" x2="349" y2="275"
    stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="588" y1="56" x2="588" y2="275"
    stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- ── Track 1: CronCreate /loop 5m ── -->
  <!-- Label -->
  <text x="15" y="105" fill="#1e293b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">/loop 5m</text>
  <text x="15" y="120" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10">CronCreate</text>

  <!-- Sleep bars (gray) -->
  <!-- t=0→5min is one cycle; run bar from 110→170, sleep 170→349 -->
  <rect x="170" y="75" width="179" height="40" rx="4" fill="#e2e8f0"/>
  <text x="259" y="100" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">休眠（zero token）</text>
  <!-- t=5min cycle: run 349→430, sleep 430→588 -->
  <rect x="430" y="75" width="158" height="40" rx="4" fill="#e2e8f0"/>
  <text x="509" y="100" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">休眠</text>
  <!-- t=10min: run starts at 588 -->
  <rect x="648" y="75" width="30" height="40" rx="4" fill="#e2e8f0"/>

  <!-- Active bars (green = token consumed) -->
  <rect x="110" y="75" width="60" height="40" rx="4" fill="#059669"/>
  <text x="140" y="97" text-anchor="middle" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="700">运行</text>
  <rect x="349" y="75" width="81" height="40" rx="4" fill="#059669"/>
  <text x="389" y="97" text-anchor="middle" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="700">运行</text>
  <rect x="588" y="75" width="60" height="40" rx="4" fill="#059669"/>
  <text x="618" y="97" text-anchor="middle" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="700">运行</text>

  <!-- CronCreate fire indicators -->
  <circle cx="110" cy="75" r="5" fill="#dc2626"/>
  <circle cx="349" cy="75" r="5" fill="#dc2626"/>
  <circle cx="588" cy="75" r="5" fill="#dc2626"/>
  <text x="110" y="68" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="9">↓fire</text>
  <text x="349" y="68" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="9">↓fire</text>
  <text x="588" y="68" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="9">↓fire</text>

  <!-- ── Track 2: ScheduleWakeup /loop (dynamic) ── -->
  <text x="15" y="185" fill="#1e293b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">/loop</text>
  <text x="15" y="200" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10">ScheduleWakeup</text>

  <!-- Dynamic: run 110→155, sleep 155→408 (≈270s, stays in cache), run 408→460, sleep 460→680, run 680 -->
  <!-- sleep bar 1: 155 → 408 = 253px ≈ 270s (within cache) -->
  <rect x="155" y="160" width="253" height="40" rx="4" fill="#dbeafe"/>
  <text x="281" y="184" text-anchor="middle" fill="#3b82f6"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">休眠 ≈270s（cache 热态）</text>

  <!-- sleep bar 2: 460 → 660 = 200px ≈ 360s (cache miss, longer sleep) -->
  <rect x="460" y="160" width="208" height="40" rx="4" fill="#f1f5f9"/>
  <text x="564" y="184" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">休眠 ≈360s（cache miss）</text>

  <!-- Active bars -->
  <rect x="110" y="160" width="45" height="40" rx="4" fill="#059669"/>
  <text x="132" y="183" text-anchor="middle" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="700">运行</text>

  <rect x="408" y="160" width="52" height="40" rx="4" fill="#059669"/>
  <text x="434" y="183" text-anchor="middle" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10" font-weight="700">运行</text>

  <!-- ScheduleWakeup fire indicators -->
  <circle cx="110" cy="160" r="5" fill="#7c3aed"/>
  <circle cx="408" cy="160" r="5" fill="#7c3aed"/>
  <text x="110" y="153" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="9">↓wake</text>
  <text x="408" y="153" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="9">↓wake</text>

  <!-- ── Legend ── -->
  <rect x="110" y="232" width="18" height="12" rx="2" fill="#059669"/>
  <text x="133" y="243" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">Claude 运行（token 消耗）</text>

  <rect x="290" y="232" width="18" height="12" rx="2" fill="#e2e8f0"/>
  <text x="313" y="243" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">休眠（零 token）</text>

  <rect x="450" y="232" width="18" height="12" rx="2" fill="#dbeafe"/>
  <text x="473" y="243" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">cache 热态休眠</text>

  <!-- Bottom note -->
  <text x="350" y="298" text-anchor="middle" fill="#dc2626"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">⚠ /loop 5m 恰好落在 300s cache TTL 边界——cache miss 却不换来更长休眠，是最差选点</text>
</svg>
