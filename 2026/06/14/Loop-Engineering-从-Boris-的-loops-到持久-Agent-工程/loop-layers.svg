<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" width="700" height="440" role="img" aria-labelledby="layers-title">
  <title id="layers-title">四层循环的嵌套关系</title>
  <defs>
    <linearGradient id="bg-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="700" height="440" fill="url(#bg-l)" rx="12"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="13" font-weight="700">四层循环的嵌套关系：外层的一轮 = 内层的很多轮</text>

  <!-- ── Fleet loop (outermost) ── -->
  <rect x="24" y="44" width="652" height="322" rx="10" fill="#fef2f2" stroke="#991b1b" stroke-width="2"/>
  <text x="40" y="68" fill="#991b1b"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="14" font-weight="800">Fleet loop</text>
  <text x="126" y="68" fill="#7f1d1d"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">多 session、多 agent 并行工作</text>
  <text x="660" y="68" text-anchor="end" fill="#b91c1c"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">周期：夜间 / 每日 / 每周</text>

  <!-- ── Session loop ── -->
  <rect x="64" y="86" width="572" height="240" rx="10" fill="#fffbeb" stroke="#92400e" stroke-width="2"/>
  <text x="80" y="110" fill="#92400e"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="14" font-weight="800">Session loop</text>
  <text x="184" y="110" fill="#78350f"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">一个 session 承接一组相关任务</text>
  <text x="620" y="110" text-anchor="end" fill="#b45309"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">周期：小时到天</text>

  <!-- ── Task loop ── -->
  <rect x="104" y="128" width="492" height="158" rx="10" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="120" y="152" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="14" font-weight="800">Task loop</text>
  <text x="206" y="152" fill="#4c1d95"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">一个任务反复尝试、修复、验证</text>
  <text x="580" y="152" text-anchor="end" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">周期：分钟到小时</text>

  <!-- ── Model loop (innermost) ── -->
  <rect x="144" y="170" width="412" height="96" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160" y="194" fill="#1d4ed8"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="14" font-weight="800">Model loop</text>
  <text x="540" y="194" text-anchor="end" fill="#2563eb"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">周期：秒到分钟</text>
  <text x="350" y="226" text-anchor="middle" fill="#1e3a8a"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="12">调用模型 → 执行工具 → 读结果 → 再调用 ↺</text>
  <text x="350" y="248" text-anchor="middle" fill="#3b82f6"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">ReAct 式 thought-action-observation 内环</text>

  <!-- Nesting captions inside each ring's bottom band -->
  <text x="350" y="308" text-anchor="middle" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">一个 Task 里，Model loop 转很多圈</text>
  <text x="350" y="348" text-anchor="middle" fill="#92400e"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">一个 Session 里，Task loop 跑多个任务；Fleet 的一轮调度，启动若干 Session</text>

  <!-- Bottom notes -->
  <text x="350" y="396" text-anchor="middle" fill="#475569"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="700">嵌套轴：按时间尺度分层，回答「这个循环嵌在哪一层」</text>
  <text x="350" y="418" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">正交轴：触发形态（Turn / Goal / Time / Proactive）与层无关，任何一层都可以由任意一种方式触发</text>
</svg>
