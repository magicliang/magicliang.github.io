<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" role="img" aria-labelledby="shift-title">
  <title id="shift-title">主界面的迁移：从单次 prompt 到循环编排</title>
  <defs>
    <linearGradient id="bg-s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arr-old" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-new" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d28d9"/>
    </marker>
  </defs>

  <rect width="760" height="400" fill="url(#bg-s)" rx="12"/>

  <text x="380" y="30" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="14" font-weight="700">主界面的迁移：工程量从「写好一条 prompt」移到「设计一组循环」</text>

  <!-- ══ OLD pipeline ══ -->
  <text x="40" y="70" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="700">过去：交互式终端工具</text>
  <text x="720" y="70" text-anchor="end" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">人全程在场，一次一问一答</text>

  <!-- old nodes: 5 boxes -->
  <g font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11.5" text-anchor="middle">
    <rect x="40" y="84" width="110" height="42" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="95" y="109" fill="#475569">human</text>

    <rect x="188" y="84" width="110" height="42" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="243" y="109" fill="#475569">prompt</text>

    <rect x="336" y="84" width="110" height="42" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="391" y="109" fill="#475569">agent</text>

    <rect x="484" y="84" width="110" height="42" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="539" y="109" fill="#475569">diff</text>

    <rect x="632" y="84" width="88" height="42" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="676" y="105" fill="#475569">human</text>
    <text x="676" y="119" fill="#475569">review</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arr-old)">
    <line x1="150" y1="105" x2="186" y2="105"/>
    <line x1="298" y1="105" x2="334" y2="105"/>
    <line x1="446" y1="105" x2="482" y2="105"/>
    <line x1="594" y1="105" x2="630" y2="105"/>
  </g>

  <!-- divider -->
  <line x1="40" y1="168" x2="720" y2="168" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ══ NEW pipeline ══ -->
  <text x="40" y="200" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="700">Boris 展示：持久自动化系统</text>
  <text x="720" y="200" text-anchor="end" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">人只在两端出现：定义循环、审阅产出</text>

  <!-- new nodes: 5 boxes, first & last highlighted as human touchpoints -->
  <g font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" text-anchor="middle">
    <rect x="40" y="216" width="120" height="52" rx="8" fill="#faf5ff" stroke="#6d28d9" stroke-width="2.5"/>
    <text x="100" y="238" fill="#5b21b6" font-weight="700">human</text>
    <text x="100" y="254" fill="#7c3aed">定义循环</text>

    <rect x="196" y="216" width="120" height="52" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="256" y="238" fill="#4c1d95">recurring</text>
    <text x="256" y="254" fill="#4c1d95">loop specs</text>

    <rect x="352" y="216" width="120" height="52" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="412" y="238" fill="#4c1d95">session</text>
    <text x="412" y="254" fill="#4c1d95">fleet</text>

    <rect x="508" y="216" width="120" height="52" rx="8" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="568" y="238" fill="#4c1d95">overnight</text>
    <text x="568" y="254" fill="#4c1d95">work</text>

    <rect x="640" y="216" width="80" height="52" rx="8" fill="#faf5ff" stroke="#6d28d9" stroke-width="2.5"/>
    <text x="680" y="238" fill="#5b21b6" font-weight="700">review</text>
    <text x="680" y="254" fill="#7c3aed">queue</text>
  </g>
  <g stroke="#6d28d9" stroke-width="1.6" marker-end="url(#arr-new)">
    <line x1="160" y1="242" x2="194" y2="242"/>
    <line x1="316" y1="242" x2="350" y2="242"/>
    <line x1="472" y1="242" x2="506" y2="242"/>
    <line x1="628" y1="242" x2="638" y2="242"/>
  </g>

  <!-- annotations under new pipeline -->
  <text x="256" y="290" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">写一次，反复触发</text>
  <text x="412" y="290" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">多 session 并行</text>
  <text x="568" y="290" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">无人在场时推进</text>

  <!-- bottom takeaways -->
  <rect x="40" y="316" width="680" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="340" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11.5" font-weight="700">变了什么</text>
  <text x="56" y="360" fill="#475569"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">人从「每一步都在链条里」退到「只在两端」：中间的执行由 fleet 自己跑，人的工作从写 prompt 变成写循环规格 + 消化审阅队列。</text>
</svg>
