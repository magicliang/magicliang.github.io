<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 550" width="740" height="550" role="img" aria-labelledby="quad-title">
  <title id="quad-title">四种 Loop 形态：触发方 × 完成判定</title>
  <defs>
    <linearGradient id="bg-q" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arr-qr" viewBox="0 0 12 12" refX="11" refY="6"
      markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-qu" viewBox="0 0 12 12" refX="6" refY="1"
      markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 11 L6 1 L10 11 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-green-u" viewBox="0 0 12 12" refX="6" refY="1"
      markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 11 L6 1 L10 11 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-orange-r" viewBox="0 0 12 12" refX="11" refY="6"
      markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#d97706"/>
    </marker>
    <marker id="arr-indigo-u" viewBox="0 0 12 12" refX="6" refY="1"
      markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 11 L6 1 L10 11 Z" fill="#4f46e5"/>
    </marker>
  </defs>

  <rect width="740" height="550" fill="url(#bg-q)" rx="12"/>

  <!-- Title -->
  <text x="370" y="26" text-anchor="middle" fill="#1e293b"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="14" font-weight="700">四种 Loop 形态：触发方 × 完成判定</text>

  <!-- ── Axes ── -->
  <!-- X axis -->
  <line x1="100" y1="475" x2="710" y2="475"
    stroke="#475569" stroke-width="2" marker-end="url(#arr-qr)"/>
  <!-- Y axis -->
  <line x1="100" y1="475" x2="100" y2="50"
    stroke="#475569" stroke-width="2" marker-end="url(#arr-qu)"/>

  <!-- Center dashed lines -->
  <line x1="100" y1="262" x2="710" y2="262"
    stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="405" y1="50" x2="405" y2="475"
    stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- X axis labels -->
  <text x="200" y="500" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12">人工实时 prompt</text>
  <text x="580" y="500" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12">外部自动（时间 / 事件）</text>
  <text x="405" y="525" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="13" font-weight="700">触发方</text>

  <!-- Y axis labels (rotated) -->
  <text transform="translate(62,390) rotate(-90)" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12">模型直觉</text>
  <text transform="translate(62,140) rotate(-90)" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12">显式外部条件</text>
  <text transform="translate(30,262) rotate(-90)" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="13" font-weight="700">完成判定</text>

  <!-- ── Quadrant fills ── -->
  <rect x="102" y="264" width="301" height="209" rx="6" fill="#f1f5f9" opacity="0.7"/>
  <rect x="102" y="52"  width="301" height="209" rx="6" fill="#f0fdf4" opacity="0.7"/>
  <rect x="407" y="52"  width="301" height="209" rx="6" fill="#fff7ed" opacity="0.7"/>
  <rect x="407" y="264" width="301" height="209" rx="6" fill="#f0f9ff" opacity="0.7"/>

  <!-- ── LOOP BOXES ── -->

  <!-- Turn-based: bottom-left, center ≈ (207, 390) -->
  <rect x="122" y="348" width="170" height="85" rx="10"
    fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="207" y="374" text-anchor="middle" fill="#f8fafc"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="14" font-weight="700">Turn-based</text>
  <text x="207" y="391" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">回合循环</text>
  <text x="207" y="423" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">人工触发 · 模型自判完成</text>

  <!-- Goal-based: top-left, center ≈ (207, 145) -->
  <rect x="118" y="95" width="178" height="95" rx="10"
    fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="207" y="122" text-anchor="middle" fill="#dcfce7"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="14" font-weight="700">Goal-based</text>
  <text x="207" y="139" text-anchor="middle" fill="#86efac"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">目标循环</text>
  <text x="207" y="163" text-anchor="middle" fill="#4ade80"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">人工触发 · 显式谓词</text>
  <text x="207" y="179" text-anchor="middle" fill="#4ade80"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">满足前持续尝试</text>

  <!-- Time-based: right, slightly below center, center ≈ (558, 330) -->
  <rect x="468" y="285" width="180" height="90" rx="10"
    fill="#7c2d12" stroke="#ea580c" stroke-width="2"/>
  <text x="558" y="312" text-anchor="middle" fill="#ffedd5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="14" font-weight="700">Time-based</text>
  <text x="558" y="329" text-anchor="middle" fill="#fdba74"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">定时循环</text>
  <text x="558" y="357" text-anchor="middle" fill="#fb923c"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">时钟触发 · 当次任务完成信号</text>

  <!-- Proactive: top-right, center ≈ (558, 145) -->
  <rect x="468" y="95" width="180" height="95" rx="10"
    fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="558" y="122" text-anchor="middle" fill="#e0e7ff"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="14" font-weight="700">Proactive</text>
  <text x="558" y="139" text-anchor="middle" fill="#a5b4fc"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">主动循环</text>
  <text x="558" y="163" text-anchor="middle" fill="#818cf8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">事件触发 · 例程定义结束</text>
  <text x="558" y="179" text-anchor="middle" fill="#818cf8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">人工可完全不在场</text>

  <!-- ── DIFFERENCE ANNOTATIONS ── -->

  <!-- Arrow: Turn-based → Goal-based (vertical, left side) -->
  <line x1="207" y1="346" x2="207" y2="193"
    stroke="#16a34a" stroke-width="2" stroke-dasharray="7,4"
    marker-end="url(#arr-green-u)"/>
  <!-- Label on arrow -->
  <rect x="114" y="252" width="130" height="26" rx="5"
    fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="179" y="269" text-anchor="middle" fill="#15803d"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11" font-weight="600">加显式完成谓词</text>

  <!-- Arrow: Goal-based → Proactive (horizontal, top area) -->
  <line x1="298" y1="145" x2="465" y2="145"
    stroke="#d97706" stroke-width="2" stroke-dasharray="7,4"
    marker-end="url(#arr-orange-r)"/>
  <!-- Label on arrow -->
  <rect x="303" y="118" width="158" height="22" rx="4"
    fill="#fef9c3" stroke="#d97706" stroke-width="1.2"/>
  <text x="382" y="133" text-anchor="middle" fill="#92400e"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="600">触发源 → 外部事件（无需人工）</text>

  <!-- Arrow: Time-based → Proactive (vertical, right side) -->
  <line x1="558" y1="283" x2="558" y2="193"
    stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,4"
    marker-end="url(#arr-indigo-u)"/>
  <!-- Label -->
  <rect x="568" y="224" width="120" height="24" rx="4"
    fill="#e0e7ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="628" y="240" text-anchor="middle" fill="#3730a3"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="10" font-weight="600">时钟 ⊂ 外部事件</text>

  <!-- Footnote -->
  <text x="370" y="542" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">是否使用 subagent 是独立决策，与选哪种 loop 形态无关</text>
</svg>
