<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 492" width="760" height="492" role="img" aria-labelledby="six-title">
  <title id="six-title">Osmani 的六个组件与七要素的对应</title>
  <defs>
    <linearGradient id="bg-six" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="760" height="492" fill="url(#bg-six)" rx="12"/>

  <text x="380" y="28" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="14" font-weight="700">Osmani 把工程化循环拆成六个可组装的零件</text>
  <text x="380" y="48" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">「≈」标出每个零件对应本文七要素里的哪一项</text>

  <!-- ============ Row 1 ============ -->
  <!-- Card 1 Automation (blue) -->
  <rect x="20" y="66" width="220" height="152" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="34" y="92" fill="#1d4ed8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">Automation 触发器</text>
  <text x="34" y="116" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">定时或事件驱动，让循环</text>
  <text x="34" y="134" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">自己发现要处理的任务</text>
  <line x1="34" y1="150" x2="226" y2="150" stroke="#bfdbfe" stroke-width="1"/>
  <text x="34" y="172" fill="#1d4ed8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">≈ 七要素 · Trigger</text>
  <text x="34" y="196" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">整个循环的心跳</text>

  <!-- Card 2 Worktree (teal) -->
  <rect x="270" y="66" width="220" height="152" rx="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.5"/>
  <text x="284" y="92" fill="#0e7490" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">Worktree 工作树隔离</text>
  <text x="284" y="116" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">每个并发 agent 一个</text>
  <text x="284" y="134" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">独立 git 工作树，防冲突</text>
  <line x1="284" y1="150" x2="476" y2="150" stroke="#a5f3fc" stroke-width="1"/>
  <text x="284" y="172" fill="#0e7490" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">并行 fleet 的前提</text>
  <text x="284" y="196" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">最易被忽视，缺了就是合并灾难</text>

  <!-- Card 3 Skills (purple) -->
  <rect x="520" y="66" width="220" height="152" rx="10" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <text x="534" y="92" fill="#6d28d9" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">Skills 技能文件</text>
  <text x="534" y="116" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">构建步骤、规范、教训</text>
  <text x="534" y="134" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">写进 SKILL.md，不从零猜</text>
  <line x1="534" y1="150" x2="726" y2="150" stroke="#ddd6fe" stroke-width="1"/>
  <text x="534" y="172" fill="#6d28d9" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">≈ 七要素 · Task spec</text>
  <text x="534" y="196" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">可被每轮重复消费的知识</text>

  <!-- ============ Row 2 ============ -->
  <!-- Card 4 Connectors (green) -->
  <rect x="20" y="238" width="220" height="152" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="34" y="264" fill="#047857" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">Connectors 连接器</text>
  <text x="34" y="288" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">MCP 接 Issue、数据库、</text>
  <text x="34" y="306" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">Slack，打通「说」到「做」</text>
  <line x1="34" y1="322" x2="226" y2="322" stroke="#a7f3d0" stroke-width="1"/>
  <text x="34" y="344" fill="#047857" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">≈ 观察面 + 行动半径</text>
  <text x="34" y="368" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">既扩信号，也扩能触达的系统</text>

  <!-- Card 5 Sub-agents (amber) -->
  <rect x="270" y="238" width="220" height="152" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="284" y="264" fill="#92400e" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">Sub-agents 子 agent</text>
  <text x="284" y="288" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">写码的不给自己打分，</text>
  <text x="284" y="306" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">独立 agent、甚至换模型来验</text>
  <line x1="284" y1="322" x2="476" y2="322" stroke="#fde68a" stroke-width="1"/>
  <text x="284" y="344" fill="#92400e" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">≈ 七要素 · Evidence gate</text>
  <text x="284" y="368" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">把「产出」和「验收」分开</text>

  <!-- Card 6 State/Memory (rose) -->
  <rect x="520" y="238" width="220" height="152" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="534" y="264" fill="#9f1239" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="13" font-weight="800">State/Memory 状态记忆</text>
  <text x="534" y="288" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">Markdown / board 记着</text>
  <text x="534" y="306" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">做了什么、验了什么</text>
  <line x1="534" y1="322" x2="726" y2="322" stroke="#fecaca" stroke-width="1"/>
  <text x="534" y="344" fill="#9f1239" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">≈ 七要素 · Durable state</text>
  <text x="534" y="368" fill="#94a3b8" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">进程外的进度，任务才不随会话死</text>

  <!-- ============ Missing-piece callout ============ -->
  <rect x="20" y="410" width="720" height="66" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="34" y="434" fill="#334155" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11.5" font-weight="700">六个零件里没有单独的第七件：升级路径（Escalation）</text>
  <text x="34" y="456" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">什么时候把控制权交还给人，是 Osmani 六组件和 Boris 示例都略过的一环。</text>
  <text x="34" y="472" fill="#475569" font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5">本文七要素把它单列，补的正是这个缺口。</text>
</svg>
