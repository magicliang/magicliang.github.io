<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420" role="img" aria-labelledby="prim-title">
  <title id="prim-title">Agent 构件的五层抽象</title>
  <defs>
    <linearGradient id="bg-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arr-up-p" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 10 L5 0 L10 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-dn-p" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L5 10 L10 0 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="700" height="420" fill="url(#bg-p)" rx="12"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="13" font-weight="700">Agent 构件的五层抽象（从下到上：执行 → 调度）</text>

  <!-- ── Layer 1: Tool (bottom) y=350 ── -->
  <rect x="20" y="348" width="660" height="58" rx="8" fill="#0f766e"/>
  <!-- left tag -->
  <rect x="20" y="348" width="130" height="58" rx="8" fill="#115e59"/>
  <text x="85" y="373" text-anchor="middle" fill="#ccfbf1"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="15" font-weight="800">Tool</text>
  <text x="85" y="393" text-anchor="middle" fill="#99f6e4"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">执行层</text>
  <!-- description -->
  <text x="166" y="374" fill="#ecfdf5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="12">Claude 的单次原子能力</text>
  <!-- examples -->
  <text x="166" y="394" fill="#6ee7b7"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="11">read_file · bash · web_search · mcp_tool</text>

  <!-- ── Layer 2: Rule + Hook y=281 ── -->
  <rect x="20" y="281" width="660" height="58" rx="8" fill="#1d4ed8"/>
  <rect x="20" y="281" width="130" height="58" rx="8" fill="#1e3a8a"/>
  <text x="85" y="306" text-anchor="middle" fill="#bfdbfe"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="14" font-weight="800">Rule+Hook</text>
  <text x="85" y="326" text-anchor="middle" fill="#93c5fd"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">治理层</text>
  <text x="166" y="307" fill="#eff6ff"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="12">行为约束（Rule）+ 生命周期确定性拦截点（Hook）</text>
  <text x="166" y="327" fill="#93c5fd"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="11">CLAUDE.md · PreToolUse hook · PostToolUse hook</text>

  <!-- ── Layer 3: Skill + Plugin y=214 ── -->
  <rect x="20" y="214" width="660" height="58" rx="8" fill="#6d28d9"/>
  <rect x="20" y="214" width="130" height="58" rx="8" fill="#4c1d95"/>
  <text x="85" y="238" text-anchor="middle" fill="#ede9fe"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="13" font-weight="800">Skill+Plugin</text>
  <text x="85" y="259" text-anchor="middle" fill="#c4b5fd"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">能力包层</text>
  <text x="166" y="240" fill="#f5f3ff"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="12">可复用行为配方（Skill）+ 外部系统接入通道（Plugin / MCP）</text>
  <text x="166" y="260" fill="#c4b5fd"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="11">blog-editor · anti-ai-tone · MCP server</text>

  <!-- ── Layer 4: Subagent y=147 ── -->
  <rect x="20" y="147" width="660" height="58" rx="8" fill="#92400e"/>
  <rect x="20" y="147" width="130" height="58" rx="8" fill="#78350f"/>
  <text x="85" y="171" text-anchor="middle" fill="#fef3c7"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="15" font-weight="800">Subagent</text>
  <text x="85" y="192" text-anchor="middle" fill="#fde68a"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">并发层</text>
  <text x="166" y="172" fill="#fffbeb"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="12">独立 Claude 进程，有自己的上下文，可并行运行</text>
  <text x="166" y="192" fill="#fde68a"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="11">Agent tool → executor / explorer / analyst agent</text>

  <!-- ── Layer 5: Loop (top) y=80 ── -->
  <rect x="20" y="80" width="660" height="58" rx="8" fill="#991b1b"/>
  <rect x="20" y="80" width="130" height="58" rx="8" fill="#7f1d1d"/>
  <text x="85" y="105" text-anchor="middle" fill="#fee2e2"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="15" font-weight="800">Loop</text>
  <text x="85" y="126" text-anchor="middle" fill="#fca5a5"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">调度层</text>
  <text x="166" y="106" fill="#fff1f2"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="12">在时间维度上持续触发和编排下方所有构件的机制</text>
  <text x="166" y="126" fill="#fca5a5"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif"
    font-size="11">/loop · /goal · /schedule · Routines</text>

  <!-- Vertical double-arrow on left -->
  <line x1="8" y1="90" x2="8" y2="396"
    stroke="#94a3b8" stroke-width="1.5"
    marker-start="url(#arr-up-p)" marker-end="url(#arr-dn-p)"/>

  <!-- Bottom note -->
  <text x="350" y="414" text-anchor="middle" fill="#94a3b8"
    font-family="Inter,ui-sans-serif,Arial,sans-serif"
    font-size="11">七个构件各自是所在层的基础构件（primitive），不在同一平面上互换等价</text>
</svg>
