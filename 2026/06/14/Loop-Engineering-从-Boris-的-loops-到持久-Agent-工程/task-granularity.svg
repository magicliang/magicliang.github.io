<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520" role="img" aria-labelledby="task-title">
  <title id="task-title">为什么 model 和 session 之间还有一层 task</title>
  <defs>
    <linearGradient id="bg-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="720" height="520" fill="url(#bg-t)" rx="12"/>

  <text x="360" y="30" text-anchor="middle" fill="#334155"
    font-family="Inter,ui-sans-serif,system-ui,Arial,sans-serif"
    font-size="14" font-weight="700">三层各按不同标准划分：task 的边界是「完成谓词」，不是对话边界</text>

  <!-- Column headers -->
  <text x="196" y="62" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700">划分依据</text>
  <text x="392" y="62" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700">「一圈」是什么</text>
  <text x="600" y="62" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700">什么时候停</text>

  <!-- ── Model row ── -->
  <rect x="20" y="72" width="680" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="20" y="72" width="6" height="72" rx="3" fill="#1d4ed8"/>
  <text x="44" y="104" fill="#1d4ed8"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif" font-size="14" font-weight="800">Model</text>
  <text x="44" y="124" fill="#3b82f6"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">秒到分钟</text>
  <text x="196" y="102" text-anchor="middle" fill="#1e3a8a"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">一次模型 API 调用</text>
  <text x="196" y="120" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">调用的边界</text>
  <text x="392" y="102" text-anchor="middle" fill="#1e3a8a"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">模型说完这一轮</text>
  <text x="392" y="120" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">产出一条 assistant 消息</text>
  <text x="600" y="102" text-anchor="middle" fill="#1e3a8a"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">模型自宣完成</text>
  <text x="600" y="120" text-anchor="middle" fill="#64748b"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">这轮不再要工具</text>

  <!-- ── Task row (highlighted) ── -->
  <rect x="20" y="152" width="680" height="80" rx="10" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2.5"/>
  <rect x="20" y="152" width="6" height="80" rx="3" fill="#6d28d9"/>
  <text x="44" y="186" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif" font-size="14" font-weight="800">Task</text>
  <text x="44" y="206" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">分钟到小时</text>
  <text x="196" y="184" text-anchor="middle" fill="#4c1d95"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700">完成谓词</text>
  <text x="196" y="202" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">一个可验证的目标</text>
  <text x="392" y="184" text-anchor="middle" fill="#4c1d95"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">一次「试 → 改 → 验」</text>
  <text x="392" y="202" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">内含很多圈 model loop</text>
  <text x="600" y="184" text-anchor="middle" fill="#4c1d95"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11" font-weight="700">证据满足</text>
  <text x="600" y="202" text-anchor="middle" fill="#7c3aed"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">测试过 / 构建成 / diff 符合</text>
  <text x="360" y="222" text-anchor="middle" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10.5" font-weight="700">不认模型的自宣，只认证据</text>

  <!-- ── Session row ── -->
  <rect x="20" y="240" width="680" height="72" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="20" y="240" width="6" height="72" rx="3" fill="#92400e"/>
  <text x="44" y="272" fill="#92400e"
    font-family="Inter,ui-sans-serif,monospace,Arial,sans-serif" font-size="14" font-weight="800">Session</text>
  <text x="44" y="292" fill="#b45309"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">小时到天</text>
  <text x="196" y="270" text-anchor="middle" fill="#78350f"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">对话 / 进程边界</text>
  <text x="196" y="288" text-anchor="middle" fill="#a16207"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">一个窗口、一段进程</text>
  <text x="392" y="270" text-anchor="middle" fill="#78350f"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">一次会话</text>
  <text x="392" y="288" text-anchor="middle" fill="#a16207"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">可顺次装多个 task</text>
  <text x="600" y="270" text-anchor="middle" fill="#78350f"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">对话结束 / 进程退出</text>
  <text x="600" y="288" text-anchor="middle" fill="#a16207"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="10">与任务是否完成无关</text>

  <!-- ── Why invisible block ── -->
  <rect x="20" y="332" width="680" height="72" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="40" y="358" fill="#334155"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="700">日常聊天里 task 为什么看不见</text>
  <text x="40" y="380" fill="#475569"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">一个 session 通常只干一件事，session ≈ task；「试 → 改 → 验」由人一回合一回合手动驱动，</text>
  <text x="40" y="396" fill="#475569"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">task 的完成谓词就藏在你每次的追问里，于是只剩下 model（一次回复）和 session（一次对话）两个可感知的颗粒度。</text>

  <!-- ── When task shows up block ── -->
  <rect x="20" y="416" width="680" height="86" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="40" y="442" fill="#6d28d9"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="12" font-weight="700">task 显形于两种情况</text>
  <text x="40" y="464" fill="#5b21b6"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">① 自动化接管试-改-验循环：你不再手动点「继续」，而是给一个完成谓词让它自己转到验收通过为止。</text>
  <text x="40" y="484" fill="#5b21b6"
    font-family="Inter,ui-sans-serif,Arial,sans-serif" font-size="11">② task 与 session 脱钩：一个 session 装多个 task，或一个大 task（token 见顶后）跨多个 session 接力。</text>
</svg>
