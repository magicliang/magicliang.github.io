<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101424"/>
      <stop offset="55%" stop-color="#17243A"/>
      <stop offset="100%" stop-color="#1F2E1F"/>
    </linearGradient>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5EEAD4"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FBBF24"/>
    </marker>
    <marker id="arrow-lime" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A3E635"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1e2d45" stroke-width="1" opacity="0.35">
    <line x1="0" y1="180" x2="1600" y2="180"/>
    <line x1="0" y1="360" x2="1600" y2="360"/>
    <line x1="0" y1="540" x2="1600" y2="540"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>

  <!-- API Server box (client) -->
  <rect x="40" y="60" width="220" height="70" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="150" y="90" font-family="Menlo, Consolas, monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">kube-apiserver</text>
  <text x="150" y="115" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">write path</text>

  <!-- Arrow to etcd leader -->
  <line x1="260" y1="95" x2="360" y2="200" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="290" y="140" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">txn put</text>

  <!-- etcd leader -->
  <rect x="360" y="140" width="240" height="130" rx="8" fill="#0a1628" stroke="#FBBF24" stroke-width="2.5"/>
  <text x="480" y="175" font-family="Menlo, Consolas, monospace" font-size="20" fill="#FBBF24" text-anchor="middle">etcd leader</text>
  <text x="480" y="200" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8" text-anchor="middle">term=7  index=5001</text>
  <text x="480" y="222" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">AppendEntries →</text>
  <text x="480" y="242" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">wait quorum ACK</text>
  <text x="480" y="260" font-family="Menlo, Consolas, monospace" font-size="13" fill="#A3E635" text-anchor="middle">commit → revision++</text>

  <!-- Raft replication arrows -->
  <line x1="600" y1="185" x2="740" y2="185" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <line x1="600" y1="225" x2="740" y2="310" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="660" y="172" font-family="Menlo, Consolas, monospace" font-size="13" fill="#FBBF24">AppendEntries</text>

  <!-- etcd follower 1 -->
  <rect x="740" y="140" width="200" height="100" rx="6" fill="#0a1628" stroke="#64748B" stroke-width="1.5"/>
  <text x="840" y="173" font-family="Menlo, Consolas, monospace" font-size="17" fill="#94A3B8" text-anchor="middle">etcd-2</text>
  <text x="840" y="198" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">follower</text>
  <text x="840" y="220" font-family="Menlo, Consolas, monospace" font-size="13" fill="#A3E635" text-anchor="middle">ACK</text>
  <text x="840" y="236" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">BoltDB write</text>

  <!-- etcd follower 2 -->
  <rect x="740" y="280" width="200" height="100" rx="6" fill="#0a1628" stroke="#64748B" stroke-width="1.5"/>
  <text x="840" y="313" font-family="Menlo, Consolas, monospace" font-size="17" fill="#94A3B8" text-anchor="middle">etcd-3</text>
  <text x="840" y="338" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">follower</text>
  <text x="840" y="360" font-family="Menlo, Consolas, monospace" font-size="13" fill="#A3E635" text-anchor="middle">ACK</text>
  <text x="840" y="376" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">BoltDB write</text>

  <!-- quorum label -->
  <text x="840" y="430" font-family="Menlo, Consolas, monospace" font-size="14" fill="#FBBF24" text-anchor="middle">quorum = 2/3 ACK</text>
  <text x="840" y="452" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">→ leader commits</text>

  <!-- MVCC section -->
  <rect x="1020" y="60" width="540" height="340" rx="8" fill="#0a1628" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1290" y="95" font-family="Menlo, Consolas, monospace" font-size="20" fill="#5EEAD4" text-anchor="middle">MVCC Storage</text>

  <!-- MVCC rows -->
  <rect x="1040" y="115" width="500" height="36" rx="4" fill="#0f1e35" stroke="#5EEAD4" stroke-width="1"/>
  <text x="1060" y="139" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5EEAD4">revision=1  /foo = "v1"  create_rev=1  mod_rev=1</text>

  <rect x="1040" y="158" width="500" height="36" rx="4" fill="#0f1e35" stroke="#64748B" stroke-width="1"/>
  <text x="1060" y="182" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">revision=2  /bar = "v2"  create_rev=2  mod_rev=2</text>

  <rect x="1040" y="201" width="500" height="36" rx="4" fill="#0f1e35" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1060" y="225" font-family="Menlo, Consolas, monospace" font-size="14" fill="#A3E635">revision=3  /foo = "v3"  create_rev=1  mod_rev=3</text>
  <text x="1490" y="225" font-family="Menlo, Consolas, monospace" font-size="12" fill="#A3E635">← latest</text>

  <rect x="1040" y="244" width="500" height="36" rx="4" fill="#0f1e35" stroke="#64748B" stroke-width="1" opacity="0.5"/>
  <text x="1060" y="268" font-family="Menlo, Consolas, monospace" font-size="14" fill="#64748B">revision=1  /foo = "v1"  (old, pre-compact)</text>

  <text x="1290" y="310" font-family="Menlo, Consolas, monospace" font-size="14" fill="#FBBF24" text-anchor="middle">GET /foo at revision=1  →  "v1"  (time travel)</text>
  <text x="1290" y="335" font-family="Menlo, Consolas, monospace" font-size="14" fill="#A3E635" text-anchor="middle">GET /foo at revision=3  →  "v3"  (current)</text>
  <text x="1290" y="358" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">resourceVersion = mod_revision (opaque to client)</text>
  <text x="1290" y="380" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">compact(rev=2) → removes revision=1 history</text>

  <!-- Watch section -->
  <rect x="1020" y="430" width="540" height="230" rx="8" fill="#0a1628" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1290" y="465" font-family="Menlo, Consolas, monospace" font-size="20" fill="#A3E635" text-anchor="middle">Watch Stream</text>
  <text x="1040" y="498" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">Watch /registry/pods/ --prefix, startRevision=5000</text>
  <text x="1040" y="524" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5EEAD4">  PUT /registry/pods/default/nginx  (rev=5001)</text>
  <text x="1040" y="548" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5EEAD4">  DELETE /registry/pods/default/old (rev=5002)</text>
  <text x="1040" y="572" font-family="Menlo, Consolas, monospace" font-size="14" fill="#64748B">  PUT /registry/svc/default/...     (rev=5003) → skip</text>
  <text x="1040" y="600" font-family="Menlo, Consolas, monospace" font-size="13" fill="#FBBF24">ErrCompacted → relist from revision=0 → new snapshot</text>
  <text x="1040" y="624" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">Lease TTL: kubelet heartbeat every 10s, NodeNotReady @40s</text>
  <text x="1040" y="646" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">auto-compact: --auto-compaction-retention=1h</text>

  <!-- Key format box -->
  <rect x="40" y="310" width="960" height="120" rx="6" fill="#0a1628" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="520" y="342" font-family="Menlo, Consolas, monospace" font-size="17" fill="#FBBF24" text-anchor="middle">etcd Key Layout in Kubernetes</text>
  <text x="60" y="372" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">/registry/{resource-group}/{resource-type}/{namespace}/{name}</text>
  <text x="60" y="396" font-family="Menlo, Consolas, monospace" font-size="13" fill="#5EEAD4">/registry/pods/default/nginx-xxx-yyy</text>
  <text x="400" y="396" font-family="Menlo, Consolas, monospace" font-size="13" fill="#5EEAD4">/registry/deployments/apps/prod/api</text>
  <text x="60" y="418" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">/registry/leases/kube-node-lease/node-1</text>
  <text x="420" y="418" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">/registry/clusterroles//cluster-admin</text>

  <!-- Title -->
  <text x="60" y="858" font-family="Menlo, Consolas, monospace" font-size="46" fill="#F8FAFC" font-weight="bold">etcd 与持久化</text>
  <text x="60" y="888" font-family="Menlo, Consolas, monospace" font-size="24" fill="#CBD5E1">Raft Consensus · MVCC Revision · Watch Stream · Lease</text>
</svg>
