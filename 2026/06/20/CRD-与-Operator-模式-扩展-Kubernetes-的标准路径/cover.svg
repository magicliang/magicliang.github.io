<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- User -->
  <rect x="80" y="100" width="240" height="55" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="200" y="133" font-family="Menlo,Consolas,monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">kubectl apply -f myapp.yaml</text>

  <line x1="200" y1="155" x2="200" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- API Server -->
  <rect x="55" y="210" width="290" height="110" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="200" y="238" font-family="Menlo,Consolas,monospace" font-size="17" fill="#FBBF24" text-anchor="middle">API Server</text>
  <text x="200" y="262" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">OpenAPI v3 schema validate</text>
  <text x="200" y="282" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">admission webhook (optional)</text>
  <text x="200" y="302" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">write to etcd</text>

  <line x1="200" y1="320" x2="200" y2="375" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- etcd -->
  <rect x="100" y="375" width="200" height="55" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="200" y="408" font-family="Menlo,Consolas,monospace" font-size="17" fill="#A3E635" text-anchor="middle">etcd</text>

  <line x1="200" y1="430" x2="200" y2="485" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Operator -->
  <rect x="40" y="485" width="320" height="175" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="200" y="513" font-family="Menlo,Consolas,monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">MyApp Controller (Operator)</text>
  <text x="200" y="537" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Informer watches ADD/UPDATE/DELETE</text>
  <text x="200" y="558" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">WorkQueue (dedup + rate-limit)</text>
  <text x="200" y="579" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Reconcile(ns/name)</text>
  <text x="200" y="600" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">get spec → diff → createOrUpdate</text>
  <text x="200" y="621" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">Status().Update(conditions)</text>
  <text x="200" y="642" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">leader election via Manager</text>

  <!-- CRD box -->
  <rect x="430" y="100" width="360" height="220" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="610" y="130" font-family="Menlo,Consolas,monospace" font-size="18" fill="#FBBF24" text-anchor="middle">CustomResourceDefinition</text>
  <text x="610" y="158" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Group / Version / Kind</text>
  <text x="610" y="180" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">mygroup.io / v1 / MyApp</text>
  <text x="610" y="204" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">openAPIV3Schema validation</text>
  <text x="610" y="226" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">subresources: /status  /scale</text>
  <text x="610" y="248" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">conversion webhook (v1alpha1→v1)</text>
  <text x="610" y="295" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">dynamic REST endpoint (no restart)</text>

  <!-- controller-runtime box -->
  <rect x="430" y="355" width="360" height="185" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="610" y="385" font-family="Menlo,Consolas,monospace" font-size="18" fill="#A3E635" text-anchor="middle">controller-runtime</text>
  <text x="610" y="412" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Manager  →  leader election + cache</text>
  <text x="610" y="436" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Reconciler  →  Reconcile(ctx, req)</text>
  <text x="610" y="460" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Scheme  →  GVK ↔ Go struct</text>
  <text x="610" y="484" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">spec (user) vs status (operator)</text>
  <text x="610" y="508" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Finalizer → safe cascade delete</text>

  <!-- Ecosystem box -->
  <rect x="430" y="570" width="360" height="155" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="610" y="600" font-family="Menlo,Consolas,monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">生态 Operators</text>
  <text x="610" y="626" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Prometheus Operator → ServiceMonitor</text>
  <text x="610" y="648" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">cert-manager → Certificate + Issuer</text>
  <text x="610" y="670" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Argo CD → Application</text>
  <text x="610" y="692" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Strimzi → KafkaTopic</text>
  <text x="610" y="714" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Kubeflow → TFJob / PyTorchJob</text>

  <!-- Reconcile loop -->
  <rect x="870" y="100" width="330" height="350" rx="8" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="1035" y="130" font-family="Menlo,Consolas,monospace" font-size="16" fill="#94A3B8" text-anchor="middle">Reconcile Loop</text>
  <text x="1035" y="160" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Get MyApp from cache</text>
  <text x="1035" y="182" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">↓  (not found → ignore)</text>
  <text x="1035" y="208" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">DeletionTimestamp set?</text>
  <text x="1035" y="230" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">↓  yes → handleDeletion + remove Finalizer</text>
  <text x="1035" y="256" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">desiredDeployment(spec)</text>
  <text x="1035" y="278" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">↓</text>
  <text x="1035" y="302" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">createOrUpdate(dep)  [idempotent]</text>
  <text x="1035" y="324" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">↓</text>
  <text x="1035" y="348" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Status().Update(conditions)</text>
  <text x="1035" y="372" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">↓</text>
  <text x="1035" y="396" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">Result{} → converged</text>
  <text x="1035" y="418" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">error → requeue + backoff</text>

  <!-- Title -->
  <text x="80" y="832" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">CRD 与 Operator 模式</text>
  <text x="80" y="874" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">Extending Kubernetes with Custom Resources and Controllers</text>
</svg>
