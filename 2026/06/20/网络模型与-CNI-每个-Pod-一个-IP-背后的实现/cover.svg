<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Node 1 box -->
  <rect x="80" y="120" width="620" height="560" rx="12" fill="none" stroke="#5EEAD4" stroke-width="2" opacity="0.7"/>
  <text x="110" y="155" font-family="Menlo, monospace" font-size="20" fill="#5EEAD4">Node 1 (10.244.1.0/24)</text>

  <!-- Pod A -->
  <rect x="120" y="175" width="240" height="100" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="145" y="215" font-family="Menlo, monospace" font-size="16" fill="#FBBF24">Pod A</text>
  <text x="145" y="240" font-family="Menlo, monospace" font-size="14" fill="#94A3B8">10.244.1.2</text>
  <text x="145" y="262" font-family="Menlo, monospace" font-size="13" fill="#64748B">eth0</text>

  <!-- Pod C -->
  <rect x="400" y="175" width="240" height="100" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="425" y="215" font-family="Menlo, monospace" font-size="16" fill="#FBBF24">Pod C</text>
  <text x="425" y="240" font-family="Menlo, monospace" font-size="14" fill="#94A3B8">10.244.1.3</text>
  <text x="425" y="262" font-family="Menlo, monospace" font-size="13" fill="#64748B">eth0</text>

  <!-- veth arrows node1 -->
  <line x1="240" y1="275" x2="240" y2="340" stroke="#A3E635" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="520" y1="275" x2="520" y2="340" stroke="#A3E635" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="255" y="315" font-family="Menlo, monospace" font-size="12" fill="#A3E635">veth pair</text>
  <text x="535" y="315" font-family="Menlo, monospace" font-size="12" fill="#A3E635">veth pair</text>

  <!-- bridge node1 -->
  <rect x="120" y="340" width="520" height="60" rx="6" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="2"/>
  <text x="290" y="376" font-family="Menlo, monospace" font-size="17" fill="#5EEAD4">cni0 (Linux bridge)</text>

  <!-- flannel.1 node1 -->
  <rect x="200" y="460" width="260" height="60" rx="6" fill="#0f2a1f" stroke="#A3E635" stroke-width="2"/>
  <text x="230" y="496" font-family="Menlo, monospace" font-size="16" fill="#A3E635">flannel.1 (VTEP)</text>
  <line x1="380" y1="400" x2="330" y2="460" stroke="#5EEAD4" stroke-width="2"/>

  <!-- physical nic node1 -->
  <rect x="200" y="570" width="260" height="55" rx="6" fill="#1a1a2e" stroke="#64748B" stroke-width="1.5"/>
  <text x="235" y="602" font-family="Menlo, monospace" font-size="15" fill="#94A3B8">eth0 (物理网卡)</text>
  <line x1="330" y1="520" x2="330" y2="570" stroke="#A3E635" stroke-width="2"/>

  <!-- Node 2 box -->
  <rect x="900" y="120" width="620" height="560" rx="12" fill="none" stroke="#5EEAD4" stroke-width="2" opacity="0.7"/>
  <text x="930" y="155" font-family="Menlo, monospace" font-size="20" fill="#5EEAD4">Node 2 (10.244.2.0/24)</text>

  <!-- Pod B -->
  <rect x="940" y="175" width="240" height="100" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="965" y="215" font-family="Menlo, monospace" font-size="16" fill="#FBBF24">Pod B</text>
  <text x="965" y="240" font-family="Menlo, monospace" font-size="14" fill="#94A3B8">10.244.2.3</text>
  <text x="965" y="262" font-family="Menlo, monospace" font-size="13" fill="#64748B">eth0</text>

  <!-- Pod D -->
  <rect x="1220" y="175" width="240" height="100" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="1245" y="215" font-family="Menlo, monospace" font-size="16" fill="#FBBF24">Pod D</text>
  <text x="1245" y="240" font-family="Menlo, monospace" font-size="14" fill="#94A3B8">10.244.2.4</text>
  <text x="1245" y="262" font-family="Menlo, monospace" font-size="13" fill="#64748B">eth0</text>

  <!-- veth arrows node2 -->
  <line x1="1060" y1="275" x2="1060" y2="340" stroke="#A3E635" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="1340" y1="275" x2="1340" y2="340" stroke="#A3E635" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="1075" y="315" font-family="Menlo, monospace" font-size="12" fill="#A3E635">veth pair</text>
  <text x="1355" y="315" font-family="Menlo, monospace" font-size="12" fill="#A3E635">veth pair</text>

  <!-- bridge node2 -->
  <rect x="940" y="340" width="520" height="60" rx="6" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="2"/>
  <text x="1105" y="376" font-family="Menlo, monospace" font-size="17" fill="#5EEAD4">cni0 (Linux bridge)</text>

  <!-- flannel.1 node2 -->
  <rect x="1020" y="460" width="260" height="60" rx="6" fill="#0f2a1f" stroke="#A3E635" stroke-width="2"/>
  <text x="1050" y="496" font-family="Menlo, monospace" font-size="16" fill="#A3E635">flannel.1 (VTEP)</text>
  <line x1="1200" y1="400" x2="1150" y2="460" stroke="#5EEAD4" stroke-width="2"/>

  <!-- physical nic node2 -->
  <rect x="1020" y="570" width="260" height="55" rx="6" fill="#1a1a2e" stroke="#64748B" stroke-width="1.5"/>
  <text x="1055" y="602" font-family="Menlo, monospace" font-size="15" fill="#94A3B8">eth0 (物理网卡)</text>
  <line x1="1150" y1="520" x2="1150" y2="570" stroke="#A3E635" stroke-width="2"/>

  <!-- VXLAN tunnel between nodes -->
  <line x1="460" y1="490" x2="1020" y2="490" stroke="#FBBF24" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="640" y="480" font-family="Menlo, monospace" font-size="15" fill="#FBBF24">VXLAN / UDP 封装</text>
  <polygon points="1015,483 1025,490 1015,497" fill="#FBBF24"/>

  <!-- Physical network bar -->
  <rect x="80" y="690" width="1440" height="50" rx="6" fill="#0a0a18" stroke="#475569" stroke-width="1.5"/>
  <text x="690" y="722" font-family="Menlo, monospace" font-size="16" fill="#64748B">物理网络 (Underlay)</text>
  <line x1="330" y1="625" x2="330" y2="690" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1150" y1="625" x2="1150" y2="690" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="60" y="830" font-family="Menlo, monospace" font-size="46" fill="#F8FAFC">网络模型与 CNI</text>
  <text x="60" y="878" font-family="Menlo, monospace" font-size="24" fill="#CBD5E1">Every Pod Gets Its Own IP — How CNI Makes It Real</text>
</svg>
