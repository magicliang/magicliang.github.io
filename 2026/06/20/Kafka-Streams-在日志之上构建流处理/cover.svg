<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kafka Streams：在日志之上构建流处理</title>
  <desc id="desc">KStream/KTable 对偶、拓扑、状态存储与窗口</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 11</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="220" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="214" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Kafka Streams</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="800"><tspan x="104" dy="0">Kafka Streams</tspan><tspan x="104" dy="64">在日志之上构建流处理</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">KStream/KTable 对偶、拓扑结构</tspan><tspan x="108" dy="42">状态存储与窗口计算</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Topology: Source → Process → Sink -->
    <!-- Source Processor -->
    <rect x="890" y="200" width="160" height="56" rx="10" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="970" y="234" font-size="18" fill="#1e40af" font-weight="700" text-anchor="middle" class="mono">Source Topic</text>
    <!-- Arrow down -->
    <line x1="970" y1="256" x2="970" y2="296" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <polygon points="964,290 976,290 970,302" fill="#94a3b8"/>
    <!-- KStream -->
    <rect x="890" y="304" width="160" height="56" rx="10" fill="#fef3c7" stroke="#f97316" stroke-width="2"/>
    <text x="970" y="338" font-size="18" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">KStream</text>
    <!-- Arrow right to KTable -->
    <line x1="1050" y1="332" x2="1110" y2="332" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="1104,326 1104,338 1116,332" fill="#94a3b8"/>
    <!-- KTable -->
    <rect x="1118" y="304" width="160" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1198" y="338" font-size="18" fill="#166534" font-weight="700" text-anchor="middle" class="mono">KTable</text>
    <!-- Duality label -->
    <text x="1088" y="296" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle">duality</text>
    <!-- Arrow down from KStream -->
    <polygon points="964,366 976,366 970,378" fill="#94a3b8"/>
    <!-- GroupBy + Aggregate -->
    <rect x="890" y="384" width="160" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="970" y="412" font-size="16" fill="#5b21b6" font-weight="700" text-anchor="middle" class="mono">groupByKey()</text>
    <text x="970" y="432" font-size="14" fill="#7c3aed" font-weight="600" text-anchor="middle" class="mono">.count()</text>
    <!-- Arrow down -->
    <polygon points="964,446 976,446 970,458" fill="#94a3b8"/>
    <!-- State Store -->
    <rect x="890" y="464" width="160" height="56" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="970" y="498" font-size="16" fill="#9f1239" font-weight="700" text-anchor="middle" class="mono">State Store</text>
    <!-- RocksDB label -->
    <text x="1068" y="498" font-size="13" fill="#64748b" font-weight="600">(RocksDB)</text>
    <!-- Changelog arrow from state store -->
    <line x1="1050" y1="492" x2="1110" y2="492" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="1104,486 1104,498 1116,492" fill="#94a3b8"/>
    <!-- Changelog topic -->
    <rect x="1118" y="464" width="160" height="56" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1198" y="492" font-size="14" fill="#0369a1" font-weight="700" text-anchor="middle" class="mono">Changelog</text>
    <text x="1198" y="510" font-size="14" fill="#0369a1" font-weight="600" text-anchor="middle" class="mono">Topic</text>
    <!-- Arrow down from state store -->
    <polygon points="964,526 976,526 970,538" fill="#94a3b8"/>
    <!-- Sink topic -->
    <rect x="890" y="544" width="160" height="56" rx="10" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="970" y="578" font-size="18" fill="#1e40af" font-weight="700" text-anchor="middle" class="mono">Sink Topic</text>
    <!-- Window label -->
    <rect x="1118" y="384" width="160" height="56" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="1198" y="412" font-size="16" fill="#854d0e" font-weight="700" text-anchor="middle" class="mono">Windowing</text>
    <text x="1198" y="432" font-size="13" fill="#a16207" font-weight="600" text-anchor="middle">tumble / hop / session</text>
    <!-- Topology label -->
    <text x="1160" y="640" font-size="20" fill="#0ea5e9" font-weight="800" text-anchor="middle">Stream Topology</text>
    <text x="1160" y="665" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">library, not a cluster</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="336" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
