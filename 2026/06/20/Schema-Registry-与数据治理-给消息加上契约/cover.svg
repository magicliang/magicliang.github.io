<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Schema Registry 与数据治理：给消息加上契约</title>
  <desc id="desc">Schema 注册、兼容性检查、Avro 序列化与 Schema 演进</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 13</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="230" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="219" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Schema Registry</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="800"><tspan x="104" dy="0">Schema Registry</tspan><tspan x="104" dy="64">给消息加上契约</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">Schema 注册与版本管理</tspan><tspan x="108" dy="42">兼容性检查与 Avro 序列化</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Producer -->
    <rect x="870" y="220" width="140" height="50" rx="10" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="940" y="251" font-size="17" fill="#1e40af" font-weight="700" text-anchor="middle" class="mono">Producer</text>
    <!-- Arrow down to serializer -->
    <polygon points="934,276 946,276 940,288" fill="#94a3b8"/>
    <!-- Serializer -->
    <rect x="870" y="294" width="140" height="50" rx="10" fill="#fef3c7" stroke="#f97316" stroke-width="2"/>
    <text x="940" y="318" font-size="14" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">Avro</text>
    <text x="940" y="336" font-size="14" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">Serializer</text>
    <!-- Arrow right to Schema Registry -->
    <line x1="1010" y1="319" x2="1080" y2="319" stroke="#0ea5e9" stroke-width="2"/>
    <polygon points="1074,313 1074,325 1086,319" fill="#0ea5e9"/>
    <!-- Schema Registry -->
    <rect x="1088" y="210" width="180" height="230" rx="14" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2.5"/>
    <text x="1178" y="244" font-size="16" fill="#0369a1" font-weight="800" text-anchor="middle" class="mono">Schema Registry</text>
    <!-- Schema versions inside -->
    <rect x="1108" y="260" width="140" height="34" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="1178" y="283" font-size="13" fill="#0c4a6e" font-weight="600" text-anchor="middle" class="mono">v1: {name}</text>
    <rect x="1108" y="300" width="140" height="34" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="1178" y="323" font-size="13" fill="#0c4a6e" font-weight="600" text-anchor="middle" class="mono">v2: {name, age?}</text>
    <rect x="1108" y="340" width="140" height="34" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
    <text x="1178" y="363" font-size="13" fill="#0c4a6e" font-weight="600" text-anchor="middle" class="mono">v3: {name, age?, email?}</text>
    <!-- Compatibility badge -->
    <rect x="1118" y="388" width="120" height="30" rx="15" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="1178" y="408" font-size="13" fill="#166534" font-weight="700" text-anchor="middle">BACKWARD</text>
    <!-- Message format -->
    <rect x="870" y="470" width="400" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="880" y="498" font-size="14" fill="#5b21b6" font-weight="700" class="mono">0x00</text>
    <rect x="936" y="480" width="80" height="30" rx="4" fill="#c4b5fd"/>
    <text x="976" y="500" font-size="13" fill="#4c1d95" font-weight="700" text-anchor="middle" class="mono">Schema ID</text>
    <rect x="1024" y="480" width="220" height="30" rx="4" fill="#ddd6fe"/>
    <text x="1134" y="500" font-size="13" fill="#5b21b6" font-weight="700" text-anchor="middle" class="mono">Avro-serialized payload</text>
    <text x="1070" y="462" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle">Wire Format</text>
    <!-- Consumer -->
    <rect x="870" y="560" width="140" height="50" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="940" y="591" font-size="17" fill="#166534" font-weight="700" text-anchor="middle" class="mono">Consumer</text>
    <!-- Arrow up from consumer to deserializer -->
    <polygon points="934,554 946,554 940,542" fill="#94a3b8"/>
    <!-- Arrow from registry to consumer side -->
    <line x1="1178" y1="440" x2="1178" y2="560" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="1200" y="510" font-size="12" fill="#0ea5e9" font-weight="600" transform="rotate(90, 1200, 510)">fetch schema</text>
    <!-- Bottom label -->
    <text x="1160" y="650" font-size="20" fill="#0ea5e9" font-weight="800" text-anchor="middle">Contract-First Messaging</text>
    <text x="1160" y="675" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">schema evolution with compatibility</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="468" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="392" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
