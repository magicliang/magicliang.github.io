<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">安全体系：认证、授权与加密</title>
  <desc id="desc">SASL、ACL、TLS——Kafka 生产环境的三层安全防线</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 15</text>
  <rect x="104" y="164" width="180" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="194" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Security</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="900"><tspan x="104" dy="0">安全体系</tspan><tspan x="104" dy="64">认证、授权与加密</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">SASL、ACL、TLS</tspan><tspan x="108" dy="42">Kafka 生产环境的三层安全防线</tspan></text>
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Three security layers -->
    <text x="1160" y="200" font-size="20" fill="#111827" font-weight="800" text-anchor="middle">Security Layers</text>
    <!-- Layer 1: Authentication -->
    <rect x="890" y="230" width="540" height="120" rx="16" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="2"/>
    <text x="910" y="260" font-size="18" fill="#0ea5e9" font-weight="800">Authentication</text>
    <text x="910" y="285" font-size="14" fill="#64748b" font-weight="600" class="mono">SASL/PLAIN</text>
    <text x="1040" y="285" font-size="14" fill="#64748b" font-weight="600" class="mono">SASL/SCRAM</text>
    <text x="1190" y="285" font-size="14" fill="#64748b" font-weight="600" class="mono">SASL/GSSAPI</text>
    <text x="1340" y="285" font-size="14" fill="#64748b" font-weight="600" class="mono">mTLS</text>
    <text x="910" y="335" font-size="15" fill="#475569" font-weight="600">Who are you?</text>
    <!-- Layer 2: Authorization -->
    <rect x="890" y="370" width="540" height="120" rx="16" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="2"/>
    <text x="910" y="400" font-size="18" fill="#f97316" font-weight="800">Authorization</text>
    <text x="910" y="425" font-size="14" fill="#64748b" font-weight="600" class="mono">ACL: User + Operation + Resource</text>
    <text x="910" y="450" font-size="14" fill="#64748b" font-weight="600" class="mono">AclAuthorizer → ALLOW / DENY</text>
    <text x="910" y="475" font-size="15" fill="#475569" font-weight="600">What can you do?</text>
    <!-- Layer 3: Encryption -->
    <rect x="890" y="510" width="540" height="120" rx="16" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
    <text x="910" y="540" font-size="18" fill="#16a34a" font-weight="800">Encryption</text>
    <text x="910" y="565" font-size="14" fill="#64748b" font-weight="600" class="mono">TLS 1.2+ (client ↔ broker, broker ↔ broker)</text>
    <text x="910" y="590" font-size="14" fill="#64748b" font-weight="600" class="mono">ssl.keystore / ssl.truststore</text>
    <text x="910" y="615" font-size="15" fill="#475569" font-weight="600">Is the channel safe?</text>
    <!-- Arrows between layers -->
    <line x1="1160" y1="350" x2="1160" y2="370" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
    <line x1="1160" y1="490" x2="1160" y2="510" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>
  </g>
  <!-- Progress dots (18) -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="524" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="448" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
