<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Consumer Group 协议：分配、重平衡与静态成员</title>
  <desc id="desc">一组 consumer 怎么瓜分一个 topic 的所有 partition</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 05</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="280" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="244" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Consumer Protocol</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">Consumer Group 协议</tspan><tspan x="104" dy="64">分配、重平衡与静态成员</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">一组 consumer 怎么瓜分</tspan><tspan x="108" dy="42">一个 topic 的所有 partition</tspan></text>
  <!-- 右侧主图区：830,155 ~ 1490,715（660x560）-->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Group Coordinator 框 -->
    <rect x="980" y="185" width="360" height="50" rx="12" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1160" y="218" font-size="22" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Group Coordinator</text>
    <!-- Partitions 列 -->
    <rect x="870" y="280" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="306" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-0</text>
    <rect x="870" y="335" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="361" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-1</text>
    <rect x="870" y="390" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="416" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-2</text>
    <rect x="870" y="445" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="471" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-3</text>
    <rect x="870" y="500" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="526" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-4</text>
    <rect x="870" y="555" width="120" height="40" rx="8" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="1.5"/>
    <text x="930" y="581" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">P-5</text>
    <!-- Consumers 列 -->
    <rect x="1190" y="295" width="140" height="44" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1260" y="323" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Consumer-0</text>
    <rect x="1190" y="395" width="140" height="44" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1260" y="423" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Consumer-1</text>
    <rect x="1190" y="495" width="140" height="44" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1260" y="523" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Consumer-2</text>
    <!-- 分配箭头 -->
    <line x1="990" y1="300" x2="1190" y2="317" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <line x1="990" y1="355" x2="1190" y2="317" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <line x1="990" y1="410" x2="1190" y2="417" stroke="#f97316" stroke-width="2" opacity="0.6"/>
    <line x1="990" y1="465" x2="1190" y2="417" stroke="#f97316" stroke-width="2" opacity="0.6"/>
    <line x1="990" y1="520" x2="1190" y2="517" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
    <line x1="990" y1="575" x2="1190" y2="517" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
    <!-- 标签 -->
    <text x="930" y="640" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">Partitions</text>
    <text x="1260" y="640" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">Consumer Group</text>
    <!-- JoinGroup / SyncGroup 标注 -->
    <text x="1100" y="670" font-size="14" fill="#94a3b8" font-weight="600" text-anchor="middle" class="mono">JoinGroup → SyncGroup</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="168" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
