<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101424"/>
      <stop offset="55%" stop-color="#17243A"/>
      <stop offset="100%" stop-color="#1F2E1F"/>
    </linearGradient>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5EEAD4"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FBBF24"/>
    </marker>
    <marker id="arrow-lime" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A3E635"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1e2d45" stroke-width="1" opacity="0.35">
    <line x1="0" y1="180" x2="1600" y2="180"/>
    <line x1="0" y1="360" x2="1600" y2="360"/>
    <line x1="0" y1="540" x2="1600" y2="540"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- API Server (source) -->
  <rect x="40" y="60" width="210" height="70" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="145" y="91" font-family="Menlo, Consolas, monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">kube-apiserver</text>
  <text x="145" y="115" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">Watch stream</text>

  <!-- Arrow API Server -> ListWatcher -->
  <line x1="250" y1="95" x2="330" y2="95" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="288" y="87" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">HTTP/2</text>

  <!-- Informer outer box -->
  <rect x="330" y="40" width="860" height="340" rx="10" fill="none" stroke="#5EEAD4" stroke-width="1.5" opacity="0.5"/>
  <text x="760" y="68" font-family="Menlo, Consolas, monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">Informer (client-go)</text>

  <!-- ListWatcher -->
  <rect x="350" y="80" width="180" height="90" rx="6" fill="#0a1628" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="440" y="110" font-family="Menlo, Consolas, monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">ListWatcher</text>
  <text x="440" y="132" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">List (snapshot)</text>
  <text x="440" y="152" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Watch (stream)</text>

  <!-- Arrow ListWatcher -> Reflector -->
  <line x1="530" y1="125" x2="590" y2="125" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Reflector -->
  <rect x="590" y="80" width="180" height="90" rx="6" fill="#0a1628" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="680" y="110" font-family="Menlo, Consolas, monospace" font-size="16" fill="#FBBF24" text-anchor="middle">Reflector</text>
  <text x="680" y="132" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">revision tracking</text>
  <text x="680" y="152" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">reconnect / resync</text>

  <!-- Arrow Reflector -> DeltaFIFO -->
  <line x1="770" y1="125" x2="830" y2="125" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- DeltaFIFO -->
  <rect x="830" y="80" width="180" height="90" rx="6" fill="#0a1628" stroke="#A3E635" stroke-width="1.5"/>
  <text x="920" y="110" font-family="Menlo, Consolas, monospace" font-size="16" fill="#A3E635" text-anchor="middle">DeltaFIFO</text>
  <text x="920" y="132" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">dedup per key</text>
  <text x="920" y="152" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8" text-anchor="middle">delta list merge</text>

  <!-- Arrow DeltaFIFO -> Indexer (down) -->
  <line x1="920" y1="170" x2="920" y2="220" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Indexer -->
  <rect x="590" y="220" width="510" height="90" rx="6" fill="#0a1628" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="845" y="252" font-family="Menlo, Consolas, monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">Indexer (local cache)</text>
  <text x="845" y="278" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">in-memory · namespace index · label index · custom index</text>
  <text x="845" y="298" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">read-only from controller · updated by processLoop</text>

  <!-- Arrow Indexer -> EventHandler -->
  <line x1="845" y1="310" x2="845" y2="350" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- EventHandler -->
  <rect x="590" y="350" width="510" height="20" rx="4" fill="#0a1628" stroke="#FBBF24" stroke-width="1"/>
  <text x="845" y="365" font-family="Menlo, Consolas, monospace" font-size="13" fill="#FBBF24" text-anchor="middle">EventHandler: AddFunc / UpdateFunc / DeleteFunc  →  enqueue(key)</text>

  <!-- Arrow out of Informer -> workqueue -->
  <line x1="845" y1="385" x2="845" y2="430" stroke="#FBBF24" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- workqueue -->
  <rect x="590" y="430" width="510" height="100" rx="6" fill="#0a1628" stroke="#FBBF24" stroke-width="2"/>
  <text x="845" y="462" font-family="Menlo, Consolas, monospace" font-size="18" fill="#FBBF24" text-anchor="middle">workqueue</text>
  <text x="845" y="488" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8" text-anchor="middle">dedup · RateLimitingQueue · exponential backoff</text>
  <text x="845" y="510" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">base=5ms  max=1000s  · in-flight key not re-enqueued</text>

  <!-- Arrow workqueue -> Reconcile -->
  <line x1="845" y1="530" x2="845" y2="580" stroke="#A3E635" stroke-width="2" marker-end="url(#arrow-lime)"/>

  <!-- Reconcile box -->
  <rect x="590" y="580" width="510" height="120" rx="6" fill="#0a1628" stroke="#A3E635" stroke-width="2"/>
  <text x="845" y="613" font-family="Menlo, Consolas, monospace" font-size="18" fill="#A3E635" text-anchor="middle">Reconcile(ctx, Request)</text>
  <text x="845" y="638" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8" text-anchor="middle">req = {namespacedName}  ←  no object, no diff</text>
  <text x="845" y="660" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">r.Get() from Indexer  →  compute desired  →  r.Update()</text>
  <text x="845" y="682" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">idempotent · error → requeue · Result.RequeueAfter</text>

  <!-- Arrow Reconcile -> API Server (write back) -->
  <line x1="590" y1="640" x2="260" y2="640" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="420" y="628" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Create/Update/Delete</text>
  <line x1="260" y1="640" x2="260" y2="130" stroke="#5EEAD4" stroke-width="1.5"/>
  <line x1="260" y1="130" x2="250" y2="130" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <!-- Controller chain annotation -->
  <rect x="1240" y="60" width="330" height="480" rx="8" fill="#0a1628" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1405" y="93" font-family="Menlo, Consolas, monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">Controller Chain</text>

  <text x="1260" y="125" font-family="Menlo, Consolas, monospace" font-size="14" fill="#FBBF24">Deployment Controller</text>
  <text x="1260" y="147" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">watch Deployment</text>
  <text x="1260" y="165" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B">→ create/update ReplicaSet</text>

  <line x1="1350" y1="175" x2="1350" y2="200" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <text x="1260" y="220" font-family="Menlo, Consolas, monospace" font-size="14" fill="#FBBF24">ReplicaSet Controller</text>
  <text x="1260" y="242" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">watch ReplicaSet</text>
  <text x="1260" y="260" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B">→ create/delete Pod</text>

  <line x1="1350" y1="270" x2="1350" y2="295" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <text x="1260" y="315" font-family="Menlo, Consolas, monospace" font-size="14" fill="#A3E635">Scheduler</text>
  <text x="1260" y="337" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">watch unscheduled Pod</text>
  <text x="1260" y="355" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B">→ write spec.nodeName</text>

  <line x1="1350" y1="365" x2="1350" y2="390" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <text x="1260" y="410" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5EEAD4">kubelet</text>
  <text x="1260" y="432" font-family="Menlo, Consolas, monospace" font-size="12" fill="#94A3B8">watch Pod on node</text>
  <text x="1260" y="450" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B">→ create container</text>
  <text x="1260" y="468" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B">→ update Pod status</text>

  <text x="1405" y="510" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">each layer: independent</text>
  <text x="1405" y="528" font-family="Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">Reconcile, async, retry</text>

  <!-- Title -->
  <text x="60" y="858" font-family="Menlo, Consolas, monospace" font-size="46" fill="#F8FAFC" font-weight="bold">控制器模式与 Informer 机制</text>
  <text x="60" y="888" font-family="Menlo, Consolas, monospace" font-size="24" fill="#CBD5E1">ListWatcher · DeltaFIFO · Indexer · workqueue · Reconcile</text>
</svg>
