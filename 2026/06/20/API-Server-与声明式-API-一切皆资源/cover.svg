<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101424"/>
      <stop offset="55%" stop-color="#17243A"/>
      <stop offset="100%" stop-color="#1F2E1F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1e2d45" stroke-width="1" opacity="0.4">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="500" y1="0" x2="500" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1100" y1="0" x2="1100" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- kubectl box -->
  <rect x="60" y="60" width="220" height="70" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="170" y="101" font-family="Menlo, Consolas, monospace" font-size="20" fill="#5EEAD4" text-anchor="middle">kubectl apply</text>

  <!-- Arrow: kubectl -> API Server -->
  <line x1="280" y1="95" x2="370" y2="95" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="325" y="88" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">HTTPS</text>

  <!-- API Server outer box -->
  <rect x="370" y="40" width="820" height="660" rx="10" fill="none" stroke="#5EEAD4" stroke-width="2" opacity="0.6"/>
  <text x="780" y="75" font-family="Menlo, Consolas, monospace" font-size="22" fill="#5EEAD4" text-anchor="middle" opacity="0.9">kube-apiserver</text>

  <!-- Step 1: Authentication -->
  <rect x="410" y="100" width="740" height="72" rx="6" fill="#0f1e35" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="540" y="132" font-family="Menlo, Consolas, monospace" font-size="18" fill="#5EEAD4">1. Authentication</text>
  <text x="540" y="158" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">X.509 cert / Bearer token / ServiceAccount JWT / OIDC</text>

  <!-- Arrow down -->
  <line x1="780" y1="172" x2="780" y2="196" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 2: Authorization -->
  <rect x="410" y="196" width="740" height="72" rx="6" fill="#0f1e35" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="540" y="228" font-family="Menlo, Consolas, monospace" font-size="18" fill="#FBBF24">2. Authorization (RBAC)</text>
  <text x="540" y="254" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">SubjectAccessReview · Role · ClusterRoleBinding</text>

  <!-- Arrow down -->
  <line x1="780" y1="268" x2="780" y2="292" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 3: Mutating Admission -->
  <rect x="410" y="292" width="740" height="72" rx="6" fill="#0f1e35" stroke="#A3E635" stroke-width="1.5"/>
  <text x="540" y="324" font-family="Menlo, Consolas, monospace" font-size="18" fill="#A3E635">3. Mutating Admission Webhooks</text>
  <text x="540" y="350" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">sidecar inject · default values · JSON Patch</text>

  <!-- Arrow down -->
  <line x1="780" y1="364" x2="780" y2="388" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 4: Schema Validation -->
  <rect x="410" y="388" width="740" height="72" rx="6" fill="#0f1e35" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="540" y="420" font-family="Menlo, Consolas, monospace" font-size="18" fill="#FBBF24">4. Schema Validation</text>
  <text x="540" y="446" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">OpenAPI structural schema · CEL x-kubernetes-validations</text>

  <!-- Arrow down -->
  <line x1="780" y1="460" x2="780" y2="484" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 5: Validating Admission -->
  <rect x="410" y="484" width="740" height="72" rx="6" fill="#0f1e35" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="540" y="516" font-family="Menlo, Consolas, monospace" font-size="18" fill="#5EEAD4">5. Validating Admission Webhooks</text>
  <text x="540" y="542" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">OPA / Gatekeeper / Kyverno · read-only · parallel</text>

  <!-- Arrow down -->
  <line x1="780" y1="556" x2="780" y2="580" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Step 6: Write etcd -->
  <rect x="410" y="580" width="740" height="72" rx="6" fill="#0f1e35" stroke="#A3E635" stroke-width="1.5"/>
  <text x="540" y="612" font-family="Menlo, Consolas, monospace" font-size="18" fill="#A3E635">6. Write to etcd</text>
  <text x="540" y="638" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94A3B8">resourceVersion optimistic lock · protobuf · CAS txn</text>

  <!-- Arrow: API Server -> etcd -->
  <line x1="780" y1="700" x2="780" y2="770" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arrow-teal)"/>

  <!-- etcd box -->
  <rect x="580" y="770" width="400" height="90" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="780" y="810" font-family="Menlo, Consolas, monospace" font-size="22" fill="#5EEAD4" text-anchor="middle">etcd</text>
  <text x="780" y="840" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B" text-anchor="middle">/registry/apps/deployments/default/nginx</text>

  <!-- SSA annotation -->
  <rect x="1230" y="100" width="320" height="160" rx="6" fill="#0a1628" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1390" y="130" font-family="Menlo, Consolas, monospace" font-size="16" fill="#FBBF24" text-anchor="middle">Server-Side Apply</text>
  <text x="1250" y="158" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">fieldManager ownership</text>
  <text x="1250" y="178" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">managedFields tracking</text>
  <text x="1250" y="198" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">409 on conflict</text>
  <text x="1250" y="218" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">--force-conflicts override</text>
  <text x="1250" y="242" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">PATCH apply-patch+yaml</text>

  <!-- Watch annotation -->
  <rect x="1230" y="290" width="320" height="140" rx="6" fill="#0a1628" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1390" y="320" font-family="Menlo, Consolas, monospace" font-size="16" fill="#A3E635" text-anchor="middle">Watch Stream</text>
  <text x="1250" y="348" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">?watch=true&amp;resourceVersion=N</text>
  <text x="1250" y="368" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">ADDED / MODIFIED / DELETED</text>
  <text x="1250" y="388" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">BOOKMARK heartbeat</text>
  <text x="1250" y="408" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">410 Gone → relist</text>

  <!-- GVK annotation -->
  <rect x="1230" y="460" width="320" height="130" rx="6" fill="#0a1628" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1390" y="490" font-family="Menlo, Consolas, monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">GVK Resolution</text>
  <text x="1250" y="518" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">apps/v1/Deployment</text>
  <text x="1250" y="538" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">→ /apis/apps/v1/namespaces/</text>
  <text x="1250" y="558" font-family="Menlo, Consolas, monospace" font-size="13" fill="#94A3B8">   {ns}/deployments/{name}</text>
  <text x="1250" y="578" font-family="Menlo, Consolas, monospace" font-size="13" fill="#64748B">hub version conversion</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5EEAD4"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="858" font-family="Menlo, Consolas, monospace" font-size="46" fill="#F8FAFC" font-weight="bold">API Server 与声明式 API</text>
  <text x="60" y="888" font-family="Menlo, Consolas, monospace" font-size="24" fill="#CBD5E1">Request Pipeline · GVK · Server-Side Apply · Watch</text>
</svg>
