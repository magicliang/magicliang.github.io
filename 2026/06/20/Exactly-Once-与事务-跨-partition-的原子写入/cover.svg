<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Exactly-Once 与事务：跨 partition 的原子写入</title>
  <desc id="desc">transactional.id + 两阶段提交实现跨 partition 原子性</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 09</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="220" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="214" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Exactly-Once</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">Exactly-Once 与事务</tspan><tspan x="104" dy="64">跨 partition 的原子写入</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">transactional.id + 两阶段提交</tspan><tspan x="108" dy="42">实现跨 partition 原子性</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Transactional Producer -->
    <rect x="920" y="195" width="200" height="50" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1020" y="225" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Txn Producer</text>
    <text x="1020" y="240" font-size="11" fill="#64748b" text-anchor="middle">transactional.id = "order-svc"</text>
    <!-- beginTransaction -->
    <text x="1020" y="270" font-size="13" fill="#f97316" font-weight="600" text-anchor="middle" class="mono">beginTransaction()</text>
    <!-- Three partition writes -->
    <line x1="960" y1="280" x2="900" y2="320" stroke="#64748b" stroke-width="1.5"/>
    <line x1="1020" y1="280" x2="1020" y2="320" stroke="#64748b" stroke-width="1.5"/>
    <line x1="1080" y1="280" x2="1140" y2="320" stroke="#64748b" stroke-width="1.5"/>
    <!-- Partition boxes -->
    <rect x="860" y="325" width="80" height="40" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="900" y="350" font-size="13" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-0</text>
    <rect x="980" y="325" width="80" height="40" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1020" y="350" font-size="13" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-1</text>
    <rect x="1100" y="325" width="80" height="40" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1140" y="350" font-size="13" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-2</text>
    <!-- Transaction Coordinator -->
    <rect x="920" y="400" width="200" height="55" rx="10" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="2"/>
    <text x="1020" y="425" font-size="15" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">Txn Coordinator</text>
    <text x="1020" y="445" font-size="12" fill="#94a3b8" text-anchor="middle">__transaction_state</text>
    <!-- 2PC arrows -->
    <line x1="1020" y1="455" x2="1020" y2="490" stroke="#f97316" stroke-width="2"/>
    <!-- Phase 1: PREPARE -->
    <rect x="920" y="490" width="200" height="35" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="1.5"/>
    <text x="1020" y="513" font-size="14" fill="#f97316" font-weight="600" text-anchor="middle">Phase 1: PREPARE_COMMIT</text>
    <!-- Arrow -->
    <line x1="1020" y1="525" x2="1020" y2="555" stroke="#f97316" stroke-width="2"/>
    <!-- Phase 2: COMMIT markers -->
    <rect x="920" y="555" width="200" height="35" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="1020" y="578" font-size="14" fill="#16a34a" font-weight="600" text-anchor="middle">Phase 2: COMMIT markers</text>
    <!-- Write markers back to partitions -->
    <line x1="960" y1="555" x2="900" y2="365" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="1020" y1="555" x2="1020" y2="365" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="1080" y1="555" x2="1140" y2="365" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Consumer note -->
    <rect x="870" y="615" width="260" height="40" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="1000" y="640" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">Consumer: read_committed → LSO</text>
    <!-- LSO watermark -->
    <rect x="1160" y="615" width="110" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1215" y="635" font-size="12" fill="#ef4444" font-weight="600" text-anchor="middle">LSO watermark</text>
    <text x="1215" y="650" font-size="11" fill="#94a3b8" text-anchor="middle">hides uncommitted</text>
  </g>
  <!-- 底部进度点（18 篇）-->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="280" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
