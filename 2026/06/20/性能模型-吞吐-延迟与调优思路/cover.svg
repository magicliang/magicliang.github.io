<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">性能模型：吞吐、延迟与调优思路</title>
  <desc id="desc">顺序写盘、零拷贝、攒批发送——量化 Kafka 的吞吐-延迟权衡</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 14</text>
  <rect x="104" y="164" width="280" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="244" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Performance Model</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="900"><tspan x="104" dy="0">性能模型</tspan><tspan x="104" dy="64">吞吐、延迟与调优思路</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">顺序写盘、零拷贝、攒批发送</tspan><tspan x="108" dy="42">量化 Kafka 的吞吐-延迟权衡</tspan></text>
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Throughput vs Latency curve -->
    <line x1="890" y1="620" x2="890" y2="220" stroke="#94a3b8" stroke-width="2"/>
    <line x1="890" y1="620" x2="1420" y2="620" stroke="#94a3b8" stroke-width="2"/>
    <text x="875" y="210" font-size="16" fill="#64748b" font-weight="700" text-anchor="end">Throughput</text>
    <text x="1430" y="640" font-size="16" fill="#64748b" font-weight="700" text-anchor="end">Latency</text>
    <!-- Trade-off curve -->
    <path d="M 920 260 C 980 270, 1050 340, 1100 420 S 1200 560, 1380 590" stroke="#0ea5e9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- High throughput region -->
    <circle cx="940" cy="265" r="6" fill="#0ea5e9"/>
    <text x="955" y="255" font-size="14" fill="#0ea5e9" font-weight="700" class="mono">batch.size=64KB</text>
    <text x="955" y="275" font-size="14" fill="#0ea5e9" font-weight="700" class="mono">linger.ms=50</text>
    <!-- Low latency region -->
    <circle cx="1360" cy="585" r="6" fill="#f97316"/>
    <text x="1240" y="570" font-size="14" fill="#f97316" font-weight="700" class="mono">batch.size=1</text>
    <text x="1240" y="590" font-size="14" fill="#f97316" font-weight="700" class="mono">linger.ms=0</text>
    <!-- Knob boxes -->
    <rect x="910" y="360" width="140" height="36" rx="6" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="980" y="384" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">compression</text>
    <rect x="1080" y="430" width="120" height="36" rx="6" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.5"/>
    <text x="1140" y="454" font-size="15" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">acks</text>
    <rect x="1230" y="490" width="160" height="36" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
    <text x="1310" y="514" font-size="15" fill="#16a34a" font-weight="700" text-anchor="middle" class="mono">fetch.min.bytes</text>
    <!-- Arrows showing direction -->
    <path d="M 1050 378 L 960 300" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <path d="M 1140 466 L 1180 540" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
      </marker>
      <marker id="arr2" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8" fill="none" stroke="#f97316" stroke-width="1.5"/>
      </marker>
    </defs>
    <!-- Labels -->
    <text x="1160" y="200" font-size="20" fill="#111827" font-weight="800" text-anchor="middle">Throughput ↔ Latency</text>
    <text x="1160" y="225" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">batching shifts the operating point</text>
  </g>
  <!-- Progress dots (18) -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="496" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="420" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
