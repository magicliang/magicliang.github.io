<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kafka Connect：标准化的数据管道</title>
  <desc id="desc">Connect 架构、Source/Sink Connector、分布式模式与 SMT</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 12</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="220" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="214" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Kafka Connect</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="800"><tspan x="104" dy="0">Kafka Connect</tspan><tspan x="104" dy="64">标准化的数据管道</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">Source/Sink Connector 架构</tspan><tspan x="108" dy="42">分布式模式、SMT 与 Offset 追踪</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- External Sources (left column) -->
    <rect x="870" y="220" width="130" height="46" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="2"/>
    <text x="935" y="249" font-size="15" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">MySQL</text>
    <rect x="870" y="280" width="130" height="46" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="2"/>
    <text x="935" y="309" font-size="15" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">PostgreSQL</text>
    <rect x="870" y="340" width="130" height="46" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="2"/>
    <text x="935" y="369" font-size="15" fill="#92400e" font-weight="700" text-anchor="middle" class="mono">File / API</text>
    <!-- Source label -->
    <text x="935" y="208" font-size="14" fill="#64748b" font-weight="700" text-anchor="middle">External Sources</text>
    <!-- Arrows to Source Connector -->
    <line x1="1000" y1="243" x2="1050" y2="330" stroke="#94a3b8" stroke-width="2"/>
    <line x1="1000" y1="303" x2="1050" y2="330" stroke="#94a3b8" stroke-width="2"/>
    <line x1="1000" y1="363" x2="1050" y2="340" stroke="#94a3b8" stroke-width="2"/>
    <!-- Source Connector -->
    <rect x="1050" y="304" width="160" height="56" rx="10" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1130" y="330" font-size="15" fill="#1e40af" font-weight="700" text-anchor="middle" class="mono">Source</text>
    <text x="1130" y="350" font-size="15" fill="#1e40af" font-weight="700" text-anchor="middle" class="mono">Connector</text>
    <!-- Arrow down to Kafka -->
    <polygon points="1124,366 1136,366 1130,378" fill="#0ea5e9"/>
    <!-- Kafka cluster -->
    <rect x="1050" y="384" width="160" height="56" rx="10" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/>
    <text x="1130" y="418" font-size="18" fill="#ffffff" font-weight="800" text-anchor="middle" class="mono">Kafka</text>
    <!-- Arrow down to Sink -->
    <polygon points="1124,446 1136,446 1130,458" fill="#0ea5e9"/>
    <!-- Sink Connector -->
    <rect x="1050" y="464" width="160" height="56" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1130" y="490" font-size="15" fill="#166534" font-weight="700" text-anchor="middle" class="mono">Sink</text>
    <text x="1130" y="510" font-size="15" fill="#166534" font-weight="700" text-anchor="middle" class="mono">Connector</text>
    <!-- Arrows to External Sinks -->
    <line x1="1210" y1="490" x2="1270" y2="490" stroke="#94a3b8" stroke-width="2"/>
    <line x1="1210" y1="500" x2="1270" y2="560" stroke="#94a3b8" stroke-width="2"/>
    <line x1="1210" y1="480" x2="1270" y2="430" stroke="#94a3b8" stroke-width="2"/>
    <!-- External Sinks (right column) -->
    <rect x="1270" y="410" width="130" height="46" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="1335" y="439" font-size="15" fill="#5b21b6" font-weight="700" text-anchor="middle" class="mono">S3 / HDFS</text>
    <rect x="1270" y="470" width="130" height="46" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="1335" y="499" font-size="15" fill="#5b21b6" font-weight="700" text-anchor="middle" class="mono">Elasticsearch</text>
    <rect x="1270" y="530" width="130" height="46" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="1335" y="559" font-size="15" fill="#5b21b6" font-weight="700" text-anchor="middle" class="mono">Data Lake</text>
    <!-- Sinks label -->
    <text x="1335" y="400" font-size="14" fill="#64748b" font-weight="700" text-anchor="middle">External Sinks</text>
    <!-- SMT box -->
    <rect x="880" y="430" width="140" height="42" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
    <text x="950" y="456" font-size="14" fill="#9f1239" font-weight="700" text-anchor="middle" class="mono">SMT Pipeline</text>
    <!-- Worker label -->
    <text x="1160" y="640" font-size="20" fill="#0ea5e9" font-weight="800" text-anchor="middle">Connect Workers</text>
    <text x="1160" y="665" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">standalone / distributed</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="364" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
