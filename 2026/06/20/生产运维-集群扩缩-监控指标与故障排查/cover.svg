<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">生产运维：集群扩缩、监控指标与故障排查</title>
  <desc id="desc">扩缩容、滚动重启、关键指标、常见故障——Kafka 集群的日常运维</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 16</text>
  <rect x="104" y="164" width="220" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="214" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Operations</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="900"><tspan x="104" dy="0">生产运维</tspan><tspan x="104" dy="64">集群扩缩、监控与故障排查</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">扩缩容、滚动重启、关键指标</tspan><tspan x="108" dy="42">Kafka 集群的日常运维手册</tspan></text>
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Cluster operations diagram -->
    <text x="1160" y="200" font-size="20" fill="#111827" font-weight="800" text-anchor="middle">Cluster Lifecycle</text>
    <!-- 3-broker cluster -->
    <rect x="920" y="240" width="120" height="70" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="980" y="268" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Broker 0</text>
    <text x="980" y="295" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle">Leader: P0,P3</text>
    <rect x="1100" y="240" width="120" height="70" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1160" y="268" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Broker 1</text>
    <text x="1160" y="295" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle">Leader: P1,P4</text>
    <rect x="1280" y="240" width="120" height="70" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1340" y="268" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Broker 2</text>
    <text x="1340" y="295" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle">Leader: P2,P5</text>
    <!-- Scale out arrow -->
    <rect x="890" y="350" width="530" height="40" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1.5"/>
    <text x="1160" y="377" font-size="15" fill="#16a34a" font-weight="700" text-anchor="middle">Scale Out → Add Broker 3 → Reassign Partitions</text>
    <!-- Monitoring panel -->
    <rect x="890" y="410" width="530" height="130" rx="12" fill="#f97316" opacity="0.06" stroke="#f97316" stroke-width="1.5"/>
    <text x="910" y="438" font-size="16" fill="#f97316" font-weight="800">Monitoring</text>
    <text x="910" y="462" font-size="13" fill="#64748b" font-weight="600" class="mono">UnderReplicatedPartitions: 0 ✓</text>
    <text x="910" y="482" font-size="13" fill="#64748b" font-weight="600" class="mono">ActiveControllerCount:    1 ✓</text>
    <text x="910" y="502" font-size="13" fill="#64748b" font-weight="600" class="mono">RequestHandlerIdlePercent: 0.72</text>
    <text x="910" y="522" font-size="13" fill="#64748b" font-weight="600" class="mono">BytesInPerSec:           48 MB/s</text>
    <!-- Failure recovery -->
    <rect x="890" y="560" width="530" height="100" rx="12" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1.5"/>
    <text x="910" y="588" font-size="16" fill="#ef4444" font-weight="800">Failure Recovery</text>
    <text x="910" y="612" font-size="13" fill="#64748b" font-weight="600" class="mono">Broker 1 down → Leader election</text>
    <text x="910" y="632" font-size="13" fill="#64748b" font-weight="600" class="mono">P1 leader: Broker 1 → Broker 0 (ISR)</text>
    <text x="910" y="652" font-size="13" fill="#64748b" font-weight="600" class="mono">P4 leader: Broker 1 → Broker 2 (ISR)</text>
  </g>
  <!-- Progress dots (18) -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="552" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="476" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
