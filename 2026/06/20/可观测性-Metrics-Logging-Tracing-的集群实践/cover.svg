<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Metrics column -->
  <text x="160" y="70" font-family="Menlo,Consolas,monospace" font-size="20" fill="#5EEAD4" text-anchor="middle">Metrics</text>
  <rect x="40" y="85" width="240" height="85" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="160" y="112" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">node-exporter (DaemonSet)</text>
  <text x="160" y="133" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">CPU / mem / disk / net</text>
  <text x="160" y="155" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">hardware-level</text>

  <rect x="40" y="185" width="240" height="85" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="160" y="212" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">kubelet /metrics/cadvisor</text>
  <text x="160" y="233" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">container CPU / mem</text>
  <text x="160" y="255" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Pod-level</text>

  <rect x="40" y="285" width="240" height="100" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="160" y="312" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">kube-state-metrics</text>
  <text x="160" y="334" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">K8s object state</text>
  <text x="160" y="355" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">pending pods / rollout status</text>
  <text x="160" y="374" font-family="Menlo,Consolas,monospace" font-size="11" fill="#FBBF24" text-anchor="middle">≠ metrics-server</text>

  <rect x="40" y="400" width="240" height="100" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="160" y="427" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">metrics-server</text>
  <text x="160" y="449" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">real-time CPU/mem (~15s)</text>
  <text x="160" y="470" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">HPA + kubectl top</text>
  <text x="160" y="491" font-family="Menlo,Consolas,monospace" font-size="11" fill="#A3E635" text-anchor="middle">no persistence</text>

  <rect x="40" y="515" width="240" height="70" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="160" y="542" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">App SDK (Prometheus/OTel)</text>
  <text x="160" y="563" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">QPS / latency / error rate</text>
  <text x="160" y="577" font-family="Menlo,Consolas,monospace" font-size="0" fill="#94A3B8" text-anchor="middle"> </text>

  <!-- Arrow to Prometheus -->
  <line x1="280" y1="380" x2="360" y2="380" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Prometheus box -->
  <rect x="360" y="280" width="220" height="200" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="470" y="310" font-family="Menlo,Consolas,monospace" font-size="16" fill="#FBBF24" text-anchor="middle">Prometheus</text>
  <text x="470" y="335" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">pull-based scrape</text>
  <text x="470" y="357" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">ServiceMonitor CRD</text>
  <text x="470" y="379" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">PrometheusRule (alerts)</text>
  <text x="470" y="401" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Alertmanager routing</text>
  <text x="470" y="423" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">TSDB storage</text>
  <text x="470" y="462" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">→ Grafana dashboards</text>

  <!-- Logging column -->
  <text x="760" y="70" font-family="Menlo,Consolas,monospace" font-size="20" fill="#FBBF24" text-anchor="middle">Logging</text>
  <rect x="640" y="85" width="240" height="85" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="760" y="112" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Pod stdout/stderr</text>
  <text x="760" y="134" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">/var/log/containers/</text>
  <text x="760" y="156" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">kubelet log rotation</text>

  <line x1="760" y1="170" x2="760" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="640" y="210" width="240" height="85" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="760" y="237" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Fluentbit DaemonSet</text>
  <text x="760" y="259" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">mount /var/log/containers</text>
  <text x="760" y="281" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">add K8s metadata labels</text>

  <line x1="760" y1="295" x2="760" y2="335" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="640" y="335" width="240" height="100" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="760" y="362" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">Loki</text>
  <text x="760" y="384" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">label index only (no full-text)</text>
  <text x="760" y="406" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">LogQL query language</text>
  <text x="760" y="427" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">low cost vs Elasticsearch</text>

  <!-- Tracing column -->
  <text x="1120" y="70" font-family="Menlo,Consolas,monospace" font-size="20" fill="#A3E635" text-anchor="middle">Tracing</text>
  <rect x="1000" y="85" width="240" height="85" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="1120" y="112" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">App SDK (OTel)</text>
  <text x="1120" y="134" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">trace spans + context</text>
  <text x="1120" y="156" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">Java/Go/Python/Node.js</text>

  <line x1="1120" y1="170" x2="1120" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="1000" y="210" width="240" height="85" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="1120" y="237" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">OTel Collector</text>
  <text x="1120" y="259" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">receive OTLP/Jaeger/Zipkin</text>
  <text x="1120" y="281" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">filter / sample / batch</text>

  <line x1="1120" y1="295" x2="1120" y2="335" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="1000" y="335" width="240" height="100" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="1120" y="362" font-family="Menlo,Consolas,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">Jaeger / Tempo</text>
  <text x="1120" y="384" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">trace storage + query</text>
  <text x="1120" y="406" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Tempo: trace ID index only</text>
  <text x="1120" y="427" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Grafana: metrics→log→trace</text>

  <!-- Grafana at bottom center -->
  <rect x="580" y="520" width="440" height="80" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="800" y="552" font-family="Menlo,Consolas,monospace" font-size="18" fill="#FBBF24" text-anchor="middle">Grafana</text>
  <text x="800" y="578" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">unified dashboards: Metrics + Logs + Traces</text>
  <text x="800" y="588" font-family="Menlo,Consolas,monospace" font-size="0" fill="#94A3B8" text-anchor="middle"> </text>

  <!-- Arrows into Grafana -->
  <line x1="470" y1="480" x2="680" y2="520" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="760" y1="435" x2="770" y2="520" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="1120" y1="435" x2="920" y2="520" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- kubectl top note -->
  <rect x="360" y="520" width="200" height="60" rx="6" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="460" y="546" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl top</text>
  <text x="460" y="566" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">← metrics-server</text>

  <!-- Title -->
  <text x="80" y="832" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">可观测性</text>
  <text x="80" y="874" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">Metrics · Logging · Tracing — Cluster Observability in Practice</text>
</svg>
