<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Chart box -->
  <rect x="60" y="80" width="320" height="220" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="220" y="110" font-family="Menlo,Consolas,monospace" font-size="18" fill="#FBBF24" text-anchor="middle">Chart</text>
  <text x="220" y="136" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Chart.yaml  (name, version)</text>
  <text x="220" y="158" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">values.yaml  (defaults)</text>
  <text x="220" y="180" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">templates/  (Go template)</text>
  <text x="220" y="202" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">charts/  (dependencies)</text>
  <text x="220" y="224" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">_helpers.tpl  (named templates)</text>
  <text x="220" y="280" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">NOTES.txt  (post-install msg)</text>

  <!-- Arrow down -->
  <line x1="220" y1="300" x2="220" y2="360" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Helm install box -->
  <rect x="60" y="360" width="320" height="190" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="220" y="390" font-family="Menlo,Consolas,monospace" font-size="18" fill="#5EEAD4" text-anchor="middle">helm install / upgrade</text>
  <text x="220" y="416" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">values merge (low → high priority):</text>
  <text x="220" y="438" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">values.yaml &lt; -f custom.yaml &lt; --set</text>
  <text x="220" y="462" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Go template rendering</text>
  <text x="220" y="484" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Sprig functions (100+)</text>
  <text x="220" y="508" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">kubectl apply (manifest set)</text>
  <text x="220" y="530" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">hooks: pre/post install/upgrade/delete</text>

  <!-- Arrow down -->
  <line x1="220" y1="550" x2="220" y2="610" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Release box -->
  <rect x="60" y="610" width="320" height="160" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="220" y="640" font-family="Menlo,Consolas,monospace" font-size="18" fill="#A3E635" text-anchor="middle">Release (Secret)</text>
  <text x="220" y="664" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">sh.helm.release.v1.name.vN</text>
  <text x="220" y="686" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">gzip(manifest set + metadata)</text>
  <text x="220" y="710" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">rollback → re-apply vN manifest</text>
  <text x="220" y="733" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">uninstall → delete all resources</text>
  <text x="220" y="756" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">--history-max limits stored versions</text>

  <!-- Right: Template syntax -->
  <rect x="460" y="80" width="380" height="260" rx="8" fill="none" stroke="#FBBF24" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="650" y="110" font-family="Menlo,Consolas,monospace" font-size="16" fill="#FBBF24" text-anchor="middle">Go Template + Sprig</text>
  <text x="650" y="138" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">{{ .Values.image.tag | default "latest" }}</text>
  <text x="650" y="162" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">{{- if .Values.ingress.enabled }}</text>
  <text x="650" y="186" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">{{- range .Values.env }}</text>
  <text x="650" y="210" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">{{ include "chart.labels" . | nindent 4 }}</text>
  <text x="650" y="234" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">{{ toYaml .Values.resources | indent 10 }}</text>
  <text x="650" y="258" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">{{- (trim leading whitespace)</text>
  <text x="650" y="282" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">nindent = newline + indent</text>
  <text x="650" y="320" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">values: shallow merge (not deep!)</text>

  <!-- Right: Lifecycle -->
  <rect x="460" y="370" width="380" height="200" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="650" y="400" font-family="Menlo,Consolas,monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">Release Lifecycle</text>
  <text x="650" y="426" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">install  →  v1 Secret created</text>
  <text x="650" y="450" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">upgrade  →  v2 Secret created</text>
  <text x="650" y="474" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">rollback 1  →  re-apply v1, create v3</text>
  <text x="650" y="498" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">helm history myrelease</text>
  <text x="650" y="522" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">helm get manifest myrelease</text>
  <text x="650" y="548" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">no Tiller in Helm 3</text>

  <!-- Right: OCI + Limits -->
  <rect x="460" y="595" width="380" height="180" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="650" y="625" font-family="Menlo,Consolas,monospace" font-size="16" fill="#A3E635" text-anchor="middle">Distribution + Limits</text>
  <text x="650" y="651" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">OCI Registry: helm push/pull</text>
  <text x="650" y="673" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Chart Museum: HTTP repo server</text>
  <text x="650" y="697" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">limit: no real-state tracking</text>
  <text x="650" y="719" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">limit: shallow values merge</text>
  <text x="650" y="741" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Day-2 ops → use Operator instead</text>
  <text x="650" y="763" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">GitOps: helm template + Argo CD</text>

  <!-- Title -->
  <text x="920" y="832" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">Helm 与应用打包</text>
  <text x="920" y="874" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">From YAML Templates to Versioned, Reusable Artifacts</text>
</svg>
