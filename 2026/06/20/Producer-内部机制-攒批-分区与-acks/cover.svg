<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Producer 内部机制：攒批、分区与 acks</title>
  <desc id="desc">从 main thread 到 Sender thread，Producer 发送管线全拆解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 03</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="260" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="234" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Producer Pipeline</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">Producer 内部机制</tspan><tspan x="104" dy="64">攒批、分区与 acks</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">从 main thread 到 Sender thread</tspan><tspan x="108" dy="42">Producer 发送管线全拆解</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Main Thread -->
    <rect x="880" y="200" width="180" height="50" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="970" y="232" font-size="18" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Main Thread</text>
    <!-- Arrow down -->
    <line x1="970" y1="250" x2="970" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="990" y="275" font-size="13" fill="#64748b" class="mono">serialize</text>
    <!-- RecordAccumulator -->
    <rect x="870" y="295" width="200" height="55" rx="10" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="2"/>
    <text x="970" y="318" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">RecordAccumulator</text>
    <text x="970" y="338" font-size="13" fill="#94a3b8" text-anchor="middle">batch.size + linger.ms</text>
    <!-- Three partition batches -->
    <rect x="870" y="370" width="60" height="35" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="900" y="393" font-size="12" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-0</text>
    <rect x="940" y="370" width="60" height="35" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="970" y="393" font-size="12" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-1</text>
    <rect x="1010" y="370" width="60" height="35" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1040" y="393" font-size="12" fill="#0ea5e9" font-weight="600" text-anchor="middle">P-2</text>
    <!-- Arrow down -->
    <line x1="970" y1="405" x2="970" y2="440" stroke="#64748b" stroke-width="2"/>
    <text x="990" y="428" font-size="13" fill="#64748b" class="mono">drain</text>
    <!-- Sender Thread -->
    <rect x="880" y="445" width="180" height="50" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="970" y="477" font-size="18" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Sender Thread</text>
    <!-- Arrow down to brokers -->
    <line x1="920" y1="495" x2="890" y2="545" stroke="#64748b" stroke-width="2"/>
    <line x1="970" y1="495" x2="970" y2="545" stroke="#64748b" stroke-width="2"/>
    <line x1="1020" y1="495" x2="1050" y2="545" stroke="#64748b" stroke-width="2"/>
    <!-- Brokers -->
    <rect x="860" y="550" width="70" height="40" rx="8" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
    <text x="895" y="576" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle">Broker 0</text>
    <rect x="940" y="550" width="70" height="40" rx="8" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
    <text x="975" y="576" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle">Broker 1</text>
    <rect x="1020" y="550" width="70" height="40" rx="8" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
    <text x="1055" y="576" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle">Broker 2</text>
    <!-- acks label -->
    <text x="1140" y="520" font-size="16" fill="#f97316" font-weight="700" class="mono">acks=all</text>
    <text x="1140" y="540" font-size="13" fill="#94a3b8">ISR 全部确认</text>
    <!-- Callback -->
    <rect x="1150" y="445" width="130" height="40" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="1.5"/>
    <text x="1215" y="471" font-size="14" fill="#f97316" font-weight="600" text-anchor="middle">Callback / Future</text>
    <line x1="1060" y1="470" x2="1150" y2="465" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- Response arrow -->
    <line x1="970" y1="590" x2="970" y2="630" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="990" y="625" font-size="13" fill="#16a34a" class="mono">ProduceResponse</text>
  </g>
  <!-- 底部进度点（18 篇）-->
  <g>
    <!-- dots: 0-2 completed, 3 current, 4-17 pending -->
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="216" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="112" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
