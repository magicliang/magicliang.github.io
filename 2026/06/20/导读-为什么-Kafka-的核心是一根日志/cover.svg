<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">导读：为什么 Kafka 的核心是一根日志</title>
  <desc id="desc">追加日志是 Kafka 全部机制的起点</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 00</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="230" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="219" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Log Abstraction</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">导读：为什么 Kafka</tspan><tspan x="104" dy="64">的核心是一根日志</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">追加日志是 Kafka 全部机制的起点</tspan><tspan x="108" dy="42">partition、replica、consumer group 皆由此延伸</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Append-only log 示意 -->
    <!-- 日志条目 -->
    <text x="870" y="210" font-size="20" fill="#64748b" font-weight="700" class="mono">Append-Only Log</text>
    <!-- 日志段 -->
    <rect x="870" y="230" width="80" height="50" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="910" y="262" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">0</text>
    <rect x="958" y="230" width="80" height="50" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="998" y="262" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">1</text>
    <rect x="1046" y="230" width="80" height="50" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1086" y="262" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">2</text>
    <rect x="1134" y="230" width="80" height="50" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1174" y="262" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">3</text>
    <rect x="1222" y="230" width="80" height="50" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1262" y="262" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">4</text>
    <rect x="1310" y="230" width="80" height="50" rx="6" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
    <text x="1350" y="262" font-size="16" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">5</text>
    <!-- 追加箭头 -->
    <path d="M 1420 255 L 1450 255" stroke="#f97316" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
    <text x="1455" y="262" font-size="15" fill="#f97316" font-weight="700" class="mono">append</text>
    <defs>
      <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8 Z" fill="#f97316"/>
      </marker>
    </defs>
    <!-- offset 标注 -->
    <text x="870" y="320" font-size="16" fill="#64748b" font-weight="600">offset: 单调递增，不可变</text>
    <!-- 分割线 -->
    <line x1="870" y1="345" x2="1460" y2="345" stroke="#e5e7eb" stroke-width="1.5"/>
    <!-- 传统 MQ 映射 -->
    <text x="870" y="380" font-size="20" fill="#64748b" font-weight="700" class="mono">Traditional MQ Mapping</text>
    <text x="870" y="415" font-size="17" fill="#475569" font-weight="600">produce = append to tail</text>
    <text x="870" y="445" font-size="17" fill="#475569" font-weight="600">consume = read at offset</text>
    <text x="870" y="475" font-size="17" fill="#475569" font-weight="600">replay  = seek to earlier offset</text>
    <!-- 分割线 -->
    <line x1="870" y1="500" x2="1460" y2="500" stroke="#e5e7eb" stroke-width="1.5"/>
    <!-- 模式提炼 -->
    <text x="870" y="535" font-size="20" fill="#64748b" font-weight="700" class="mono">Log as Universal Pattern</text>
    <rect x="870" y="555" width="170" height="36" rx="8" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1"/>
    <text x="955" y="580" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle">Kafka Log</text>
    <rect x="1060" y="555" width="170" height="36" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
    <text x="1145" y="580" font-size="15" fill="#16a34a" font-weight="700" text-anchor="middle">DB WAL</text>
    <rect x="1250" y="555" width="170" height="36" rx="8" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
    <text x="1335" y="580" font-size="15" fill="#f97316" font-weight="700" text-anchor="middle">MySQL Binlog</text>
    <rect x="870" y="605" width="170" height="36" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
    <text x="955" y="630" font-size="15" fill="#8b5cf6" font-weight="700" text-anchor="middle">InnoDB Redo</text>
    <rect x="1060" y="605" width="170" height="36" rx="8" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="1"/>
    <text x="1145" y="630" font-size="15" fill="#ec4899" font-weight="700" text-anchor="middle">RocketMQ CLog</text>
    <rect x="1250" y="605" width="170" height="36" rx="8" fill="#64748b" opacity="0.12" stroke="#64748b" stroke-width="1"/>
    <text x="1335" y="630" font-size="15" fill="#64748b" font-weight="700" text-anchor="middle">Event Sourcing</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <!-- dot 0: current -->
    <circle cx="104" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <!-- dots 1-17: future -->
    <circle cx="132" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="28" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
