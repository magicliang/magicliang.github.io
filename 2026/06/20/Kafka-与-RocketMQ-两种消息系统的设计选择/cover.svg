<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 与 RocketMQ：两种消息系统的设计选择</title>
  <desc id="desc">日志优先 vs 队列优先——同一问题的两种设计答案</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 17</text>
  <rect x="104" y="164" width="300" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="254" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Kafka vs RocketMQ</text>
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="900"><tspan x="104" dy="0">Kafka 与 RocketMQ</tspan><tspan x="104" dy="64">两种消息系统的设计选择</tspan></text>
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="600"><tspan x="108" dy="0">日志优先 vs 队列优先</tspan><tspan x="108" dy="42">同一问题的两种设计答案</tspan></text>
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Kafka vs RocketMQ comparison -->
    <text x="1160" y="200" font-size="20" fill="#111827" font-weight="800" text-anchor="middle">Design Philosophy</text>
    <!-- Kafka side -->
    <rect x="870" y="225" width="270" height="460" rx="16" fill="#0ea5e9" opacity="0.05" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1005" y="258" font-size="20" fill="#0ea5e9" font-weight="800" text-anchor="middle">Kafka</text>
    <text x="1005" y="282" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle">Log-First</text>
    <text x="895" y="320" font-size="13" fill="#475569" font-weight="600" class="mono">Per-Partition Log</text>
    <text x="895" y="350" font-size="13" fill="#475569" font-weight="600" class="mono">ISR Replication</text>
    <text x="895" y="380" font-size="13" fill="#475569" font-weight="600" class="mono">Consumer Group</text>
    <text x="895" y="410" font-size="13" fill="#475569" font-weight="600" class="mono">KRaft Controller</text>
    <text x="895" y="440" font-size="13" fill="#475569" font-weight="600" class="mono">2PC over Log</text>
    <text x="895" y="470" font-size="13" fill="#475569" font-weight="600" class="mono">No Native Delay</text>
    <text x="895" y="510" font-size="13" fill="#0ea5e9" font-weight="700" class="mono">High Throughput</text>
    <text x="895" y="535" font-size="13" fill="#0ea5e9" font-weight="700" class="mono">Streaming</text>
    <!-- RocketMQ side -->
    <rect x="1180" y="225" width="270" height="460" rx="16" fill="#f97316" opacity="0.05" stroke="#f97316" stroke-width="1.5"/>
    <text x="1315" y="258" font-size="20" fill="#f97316" font-weight="800" text-anchor="middle">RocketMQ</text>
    <text x="1315" y="282" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle">Queue-First</text>
    <text x="1205" y="320" font-size="13" fill="#475569" font-weight="600" class="mono">CommitLog + CQ</text>
    <text x="1205" y="350" font-size="13" fill="#475569" font-weight="600" class="mono">DLedger (Raft)</text>
    <text x="1205" y="380" font-size="13" fill="#475569" font-weight="600" class="mono">Push/Pull Consumer</text>
    <text x="1205" y="410" font-size="13" fill="#475569" font-weight="600" class="mono">NameServer</text>
    <text x="1205" y="440" font-size="13" fill="#475569" font-weight="600" class="mono">Half-Message 2PC</text>
    <text x="1205" y="470" font-size="13" fill="#475569" font-weight="600" class="mono">Built-in Delay</text>
    <text x="1205" y="510" font-size="13" fill="#f97316" font-weight="700" class="mono">Low Latency</text>
    <text x="1205" y="535" font-size="13" fill="#f97316" font-weight="700" class="mono">Business Messaging</text>
    <!-- VS divider -->
    <text x="1160" y="430" font-size="28" fill="#94a3b8" font-weight="900" text-anchor="middle">VS</text>
    <!-- Bottom comparison row -->
    <rect x="870" y="600" width="580" height="40" rx="8" fill="#111827" opacity="0.04"/>
    <text x="1005" y="626" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle">Data Pipeline</text>
    <text x="1160" y="626" font-size="14" fill="#94a3b8" font-weight="700" text-anchor="middle">↔</text>
    <text x="1315" y="626" font-size="14" fill="#f97316" font-weight="700" text-anchor="middle">Business Events</text>
  </g>
  <!-- Progress dots (18) -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="580" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
