<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Upgrade sequence column -->
  <text x="200" y="55" font-family="Menlo,Consolas,monospace" font-size="18" fill="#5EEAD4" text-anchor="middle">版本升级顺序</text>

  <rect x="50" y="70" width="300" height="60" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="200" y="96" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">1. etcd snapshot backup</text>
  <text x="200" y="118" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">etcdctl snapshot save /backup/...</text>

  <line x1="200" y1="130" x2="200" y2="155" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="155" width="300" height="60" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="200" y="181" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">2. kube-apiserver</text>
  <text x="200" y="203" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">HA: one at a time</text>

  <line x1="200" y1="215" x2="200" y2="240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="240" width="300" height="60" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="200" y="266" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">3. controller-manager + scheduler</text>
  <text x="200" y="288" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">must not exceed apiserver version</text>

  <line x1="200" y1="300" x2="200" y2="325" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="50" y="325" width="300" height="120" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="200" y="351" font-family="Menlo,Consolas,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">4. kubelet (node by node)</text>
  <text x="200" y="373" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">cordon → drain → upgrade</text>
  <text x="200" y="395" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">systemctl restart kubelet</text>
  <text x="200" y="417" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">uncordon → wait Ready</text>
  <text x="200" y="435" font-family="Menlo,Consolas,monospace" font-size="11" fill="#A3E635" text-anchor="middle">skew policy: kubelet ≤ apiserver - 3</text>

  <!-- PDB column -->
  <text x="620" y="55" font-family="Menlo,Consolas,monospace" font-size="18" fill="#FBBF24" text-anchor="middle">PDB 保护</text>

  <rect x="430" y="70" width="380" height="330" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="620" y="100" font-family="Menlo,Consolas,monospace" font-size="15" fill="#FBBF24" text-anchor="middle">kubectl drain node-X</text>
  <text x="620" y="126" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Eviction API (not DELETE)</text>
  <text x="620" y="152" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">check PDB: minAvailable / maxUnavailable</text>
  <text x="620" y="178" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">allowed: evict pod-A (ready=3, min=2 → ok)</text>
  <text x="620" y="202" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635" text-anchor="middle">blocked: evict pod-B (ready=2, min=2 → 429)</text>
  <text x="620" y="228" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">wait → pod-B ready on another node → retry</text>
  <text x="620" y="256" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">--ignore-daemonsets: skip DaemonSet pods</text>
  <text x="620" y="280" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">--delete-emptydir-data: allow emptyDir pods</text>
  <text x="620" y="306" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">--timeout: fail after N seconds</text>
  <text x="620" y="330" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">cordon: taint unschedulable:NoSchedule</text>
  <text x="620" y="354" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">uncordon: remove taint + unschedulable</text>
  <text x="620" y="380" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">minAvailable=replicas → drain deadlock!</text>

  <!-- etcd backup/restore -->
  <text x="1150" y="55" font-family="Menlo,Consolas,monospace" font-size="18" fill="#A3E635" text-anchor="middle">etcd 备份与恢复</text>

  <rect x="900" y="70" width="480" height="200" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="1140" y="100" font-family="Menlo,Consolas,monospace" font-size="15" fill="#A3E635" text-anchor="middle">备份</text>
  <text x="1140" y="126" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">etcdctl snapshot save /backup/etcd.db</text>
  <text x="1140" y="150" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">etcdctl snapshot status → verify</text>
  <text x="1140" y="175" font-family="Menlo,Consolas,monospace" font-size="15" fill="#A3E635" text-anchor="middle">恢复顺序</text>
  <text x="1140" y="200" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">stop apiserver (move static pod manifest)</text>
  <text x="1140" y="222" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">stop etcd</text>
  <text x="1140" y="244" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">etcdctl snapshot restore → new data-dir</text>
  <text x="1140" y="254" font-family="Menlo,Consolas,monospace" font-size="0" fill="#94A3B8" text-anchor="middle"> </text>

  <!-- Fault diagnosis -->
  <rect x="900" y="285" width="480" height="200" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="1140" y="315" font-family="Menlo,Consolas,monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">故障排查工具链</text>
  <text x="1140" y="341" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl describe node/pod  (conditions + events)</text>
  <text x="1140" y="363" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl logs --previous  (last container)</text>
  <text x="1140" y="385" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">crictl ps / logs  (bypass kubelet)</text>
  <text x="1140" y="407" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl debug node/  (ephemeral container)</text>
  <text x="1140" y="429" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">etcdctl endpoint health / status</text>
  <text x="1140" y="451" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">OOMKilled → increase memory limit</text>
  <text x="1140" y="473" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">Pending → check resources / PVC / taint</text>

  <!-- Capacity box -->
  <rect x="430" y="430" width="380" height="180" rx="8" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="620" y="460" font-family="Menlo,Consolas,monospace" font-size="15" fill="#94A3B8" text-anchor="middle">容量规划指标</text>
  <text x="620" y="486" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Allocatable = Capacity - kube-reserved - system-reserved</text>
  <text x="620" y="510" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">etcd DB size (default quota: 2GB)</text>
  <text x="620" y="532" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Namespace ResourceQuota usage rate</text>
  <text x="620" y="554" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">API Server QPS + latency</text>
  <text x="620" y="578" font-family="Menlo,Consolas,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">plan on Allocatable, not Capacity</text>
  <text x="620" y="600" font-family="Menlo,Consolas,monospace" font-size="0" fill="#94A3B8" text-anchor="middle"> </text>

  <!-- Bottom upgrade flow box -->
  <rect x="50" y="480" width="300" height="120" rx="6" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="200" y="506" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">skew policy (K8s 1.28)</text>
  <text x="200" y="530" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">kubelet ≤ apiserver (max -3 minor)</text>
  <text x="200" y="552" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">controller-mgr ≤ apiserver</text>
  <text x="200" y="574" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl ±1 minor of apiserver</text>
  <text x="200" y="590" font-family="Menlo,Consolas,monospace" font-size="0" fill="#94A3B8" text-anchor="middle"> </text>

  <!-- Title -->
  <text x="80" y="832" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">生产集群运维</text>
  <text x="80" y="874" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">Upgrade · Backup · Fault Diagnosis · Capacity Planning</text>
</svg>
