<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FBBF24"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5EEAD4"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A3E635"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Three-layer title -->
  <text x="80" y="145" font-family="Menlo,monospace" font-size="16" fill="#94A3B8">API Request Flow: 3-Layer Security</text>

  <!-- Layer 1: Authentication -->
  <rect x="80" y="165" width="420" height="140" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="290" y="195" font-family="Menlo,monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">1. Authentication（谁？）</text>
  <text x="290" y="218" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">X.509 cert → CN=username, O=group</text>
  <text x="290" y="238" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">ServiceAccount JWT → expires 1h</text>
  <text x="290" y="258" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">OIDC Token → enterprise IdP</text>
  <text x="290" y="278" font-family="Menlo,monospace" font-size="12" fill="#64748B" text-anchor="middle">→ UserInfo { Username, Groups }</text>
  <text x="290" y="295" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">plugin chain, first match wins</text>

  <!-- Arrow down -->
  <line x1="290" y1="305" x2="290" y2="340" stroke="#5EEAD4" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Layer 2: Authorization -->
  <rect x="80" y="345" width="420" height="150" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="290" y="375" font-family="Menlo,monospace" font-size="16" fill="#FBBF24" text-anchor="middle">2. Authorization（能做什么？）</text>
  <text x="290" y="398" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">RBAC: Subject + Verb + Resource</text>
  <text x="290" y="418" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Role / ClusterRole → verbs on resources</text>
  <text x="290" y="438" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">RoleBinding / ClusterRoleBinding</text>
  <text x="290" y="458" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">pure ALLOW model, no DENY rules</text>
  <text x="290" y="476" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">any matching rule → allow</text>

  <!-- Arrow down -->
  <line x1="290" y1="495" x2="290" y2="530" stroke="#FBBF24" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Admission -->
  <rect x="80" y="535" width="420" height="150" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="290" y="565" font-family="Menlo,monospace" font-size="16" fill="#A3E635" text-anchor="middle">3. Admission Control（允许吗？）</text>
  <text x="290" y="588" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">MutatingWebhook → modify request</text>
  <text x="290" y="608" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">ValidatingWebhook → allow / reject</text>
  <text x="290" y="628" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Pod Security Standards: baseline/restricted</text>
  <text x="290" y="648" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">ResourceQuota / LimitRange</text>
  <text x="290" y="668" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">OPA Gatekeeper, policy-as-code</text>

  <!-- Arrow down to etcd -->
  <line x1="290" y1="685" x2="290" y2="720" stroke="#A3E635" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="190" y="720" width="200" height="40" rx="6" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <text x="290" y="746" font-family="Menlo,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">写入 etcd</text>

  <!-- RBAC Objects diagram on the right -->
  <rect x="620" y="140" width="900" height="560" rx="10" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="1070" y="172" font-family="Menlo,monospace" font-size="16" fill="#CBD5E1" text-anchor="middle">RBAC Object Model</text>

  <!-- Role -->
  <rect x="650" y="195" width="200" height="110" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="750" y="222" font-family="Menlo,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">Role</text>
  <text x="750" y="244" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">namespace-scoped</text>
  <text x="750" y="262" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">verbs: get,list,watch</text>
  <text x="750" y="280" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">resources: pods,secrets</text>
  <text x="750" y="297" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">apiGroups: ["", "apps"]</text>

  <!-- ClusterRole -->
  <rect x="890" y="195" width="200" height="110" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="990" y="222" font-family="Menlo,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">ClusterRole</text>
  <text x="990" y="244" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">cluster-scoped</text>
  <text x="990" y="262" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">nodes, PVs, CRDs</text>
  <text x="990" y="280" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">reusable template</text>
  <text x="990" y="297" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">via RoleBinding</text>

  <!-- RoleBinding -->
  <rect x="650" y="370" width="200" height="110" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="750" y="397" font-family="Menlo,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">RoleBinding</text>
  <text x="750" y="419" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">namespace-scoped</text>
  <text x="750" y="439" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">subjects: User/SA/Group</text>
  <text x="750" y="459" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">roleRef: Role or</text>
  <text x="750" y="472" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">       ClusterRole</text>

  <!-- ClusterRoleBinding -->
  <rect x="890" y="370" width="200" height="110" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="990" y="397" font-family="Menlo,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">ClusterRoleBinding</text>
  <text x="990" y="419" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">cluster-scoped</text>
  <text x="990" y="439" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">subjects: User/SA/Group</text>
  <text x="990" y="459" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">roleRef: ClusterRole</text>
  <text x="990" y="472" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">only ClusterRole</text>

  <!-- Subject box -->
  <rect x="770" y="545" width="220" height="80" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="880" y="575" font-family="Menlo,monospace" font-size="14" fill="#A3E635" text-anchor="middle">Subject</text>
  <text x="880" y="596" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">User / Group</text>
  <text x="880" y="614" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">ServiceAccount</text>

  <!-- Arrows in RBAC diagram -->
  <line x1="750" y1="305" x2="750" y2="370" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="990" y1="305" x2="990" y2="370" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="750" y1="480" x2="850" y2="545" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="990" y1="480" x2="900" y2="545" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- kubectl auth can-i examples -->
  <rect x="1130" y="195" width="360" height="260" rx="6" fill="none" stroke="#64748B" stroke-width="1"/>
  <text x="1145" y="220" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">Verification Commands</text>
  <text x="1145" y="248" font-family="Menlo,monospace" font-size="11" fill="#5EEAD4">$ kubectl auth can-i get pods</text>
  <text x="1145" y="266" font-family="Menlo,monospace" font-size="11" fill="#64748B">  yes</text>
  <text x="1145" y="292" font-family="Menlo,monospace" font-size="11" fill="#5EEAD4">$ kubectl auth can-i delete pods \</text>
  <text x="1145" y="310" font-family="Menlo,monospace" font-size="11" fill="#5EEAD4">  --as=system:serviceaccount:...</text>
  <text x="1145" y="328" font-family="Menlo,monospace" font-size="11" fill="#64748B">  no</text>
  <text x="1145" y="354" font-family="Menlo,monospace" font-size="11" fill="#FBBF24">PSS enforce=restricted</text>
  <text x="1145" y="374" font-family="Menlo,monospace" font-size="11" fill="#64748B">  no privileged</text>
  <text x="1145" y="392" font-family="Menlo,monospace" font-size="11" fill="#64748B">  no hostNetwork/hostPID</text>
  <text x="1145" y="410" font-family="Menlo,monospace" font-size="11" fill="#64748B">  must run as non-root</text>
  <text x="1145" y="430" font-family="Menlo,monospace" font-size="11" fill="#64748B">  must have seccompProfile</text>
  <text x="1145" y="448" font-family="Menlo,monospace" font-size="11" fill="#A3E635">  → reject on violation</text>

  <!-- Title -->
  <text x="80" y="830" font-family="Menlo,monospace" font-size="46" fill="#F8FAFC">RBAC 与安全模型：认证、授权与准入控制</text>
  <text x="80" y="872" font-family="Menlo,monospace" font-size="24" fill="#CBD5E1">Kubernetes Security: Authentication, Authorization and Admission</text>
</svg>
