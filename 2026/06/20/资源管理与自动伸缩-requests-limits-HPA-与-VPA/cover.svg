<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FBBF24"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5EEAD4"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A3E635"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- requests/limits diagram -->
  <text x="80" y="145" font-family="Menlo,monospace" font-size="16" fill="#94A3B8">Scheduling vs Runtime Resource Semantics</text>

  <!-- Node bar -->
  <rect x="80" y="165" width="700" height="60" rx="6" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <text x="90" y="193" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">Node Allocatable: 8 CPU</text>
  <text x="90" y="213" font-family="Menlo,monospace" font-size="11" fill="#64748B">kube-scheduler places pods when: sum(requests) ≤ allocatable</text>

  <!-- Pod A requests bar -->
  <rect x="80" y="245" width="200" height="40" rx="4" fill="#1e3a5f" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="180" y="269" font-family="Menlo,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Pod A requests: 2 CPU</text>
  <!-- Pod A limits extension -->
  <rect x="280" y="245" width="300" height="40" rx="4" fill="#1a2e1a" stroke="#A3E635" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="269" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">limits: 5 CPU (burst range)</text>

  <!-- Pod B requests bar -->
  <rect x="80" y="300" width="300" height="40" rx="4" fill="#1e3a5f" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="230" y="324" font-family="Menlo,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Pod B requests: 3 CPU</text>
  <!-- Pod B limits extension -->
  <rect x="380" y="300" width="200" height="40" rx="4" fill="#1a2e1a" stroke="#A3E635" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="324" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">limits: 5</text>

  <!-- Labels -->
  <text x="82" y="362" font-family="Menlo,monospace" font-size="12" fill="#5EEAD4">= scheduled (requests guarantee)</text>
  <text x="82" y="380" font-family="Menlo,monospace" font-size="12" fill="#A3E635">- - = burst up to limits (CFS throttle on exceed)</text>
  <text x="82" y="398" font-family="Menlo,monospace" font-size="12" fill="#FBBF24">Memory over limits → OOM kill (no throttle)</text>

  <!-- QoS boxes -->
  <text x="80" y="440" font-family="Menlo,monospace" font-size="15" fill="#CBD5E1">QoS &amp; Eviction Priority</text>

  <rect x="80" y="458" width="195" height="80" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="177" y="485" font-family="Menlo,monospace" font-size="13" fill="#A3E635" text-anchor="middle">Guaranteed</text>
  <text x="177" y="505" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">req == limits</text>
  <text x="177" y="525" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">last evicted</text>

  <rect x="290" y="458" width="195" height="80" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="387" y="485" font-family="Menlo,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Burstable</text>
  <text x="387" y="505" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">req &lt; limits</text>
  <text x="387" y="525" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">middle priority</text>

  <rect x="500" y="458" width="195" height="80" rx="6" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <text x="597" y="485" font-family="Menlo,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">BestEffort</text>
  <text x="597" y="505" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">no req/limits</text>
  <text x="597" y="525" font-family="Menlo,monospace" font-size="11" fill="#FBBF24" text-anchor="middle">first evicted</text>

  <!-- Eviction direction arrow -->
  <line x1="695" y1="498" x2="500" y2="498" stroke="#FBBF24" stroke-width="2" marker-end="url(#arr)"/>
  <text x="660" y="520" font-family="Menlo,monospace" font-size="11" fill="#FBBF24" text-anchor="end">evict first</text>

  <!-- HPA / VPA / KEDA section -->
  <rect x="800" y="140" width="750" height="580" rx="10" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="1175" y="172" font-family="Menlo,monospace" font-size="16" fill="#CBD5E1" text-anchor="middle">Autoscaling</text>

  <!-- HPA -->
  <rect x="820" y="195" width="330" height="160" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="985" y="225" font-family="Menlo,monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">HPA (Horizontal)</text>
  <text x="985" y="248" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">adjusts replica count</text>
  <text x="985" y="268" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">target: CPU 60% / custom metrics</text>
  <text x="985" y="288" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">ceil(N × current / target)</text>
  <text x="985" y="310" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">scaleUp window: 60s</text>
  <text x="985" y="328" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">scaleDown window: 300s</text>
  <text x="985" y="345" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">sync every 15s</text>

  <!-- VPA -->
  <rect x="1190" y="195" width="330" height="160" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="1355" y="225" font-family="Menlo,monospace" font-size="15" fill="#FBBF24" text-anchor="middle">VPA (Vertical)</text>
  <text x="1355" y="248" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">adjusts requests/limits</text>
  <text x="1355" y="268" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">Recommender: EWMA history</text>
  <text x="1355" y="288" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">modes: Off/Initial/Auto</text>
  <text x="1355" y="310" font-family="Menlo,monospace" font-size="11" fill="#FBBF24" text-anchor="middle">Auto = Recreate Pod</text>
  <text x="1355" y="330" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">conflict w/ HPA on CPU</text>
  <text x="1355" y="348" font-family="Menlo,monospace" font-size="10" fill="#A3E635" text-anchor="middle">use VPA memory only + HPA CPU</text>

  <!-- KEDA -->
  <rect x="820" y="395" width="700" height="120" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="1170" y="425" font-family="Menlo,monospace" font-size="15" fill="#A3E635" text-anchor="middle">KEDA (Event-Driven)</text>
  <text x="1170" y="448" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">triggers: RabbitMQ / Kafka / Prometheus / Redis / AWS SQS / ...</text>
  <text x="1170" y="468" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">minReplicaCount: 0  →  scale-to-zero supported</text>
  <text x="1170" y="488" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">wraps HPA, extends metric sources to external systems</text>
  <text x="1170" y="505" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">queueLength: 10  →  each pod handles 10 messages</text>

  <!-- ResourceQuota note -->
  <rect x="820" y="540" width="700" height="90" rx="6" fill="none" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="835" y="565" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">ResourceQuota (namespace limit)</text>
  <text x="835" y="588" font-family="Menlo,monospace" font-size="12" fill="#64748B">requests.cpu: 10  |  limits.memory: 80Gi  |  pods: 50</text>
  <text x="835" y="608" font-family="Menlo,monospace" font-size="12" fill="#64748B">LimitRange: default requests/limits when not set by user</text>

  <!-- Title -->
  <text x="80" y="830" font-family="Menlo,monospace" font-size="42" fill="#F8FAFC">资源管理与自动伸缩：requests、limits、HPA 与 VPA</text>
  <text x="80" y="872" font-family="Menlo,monospace" font-size="24" fill="#CBD5E1">Resource Management and Autoscaling in Kubernetes</text>
</svg>
