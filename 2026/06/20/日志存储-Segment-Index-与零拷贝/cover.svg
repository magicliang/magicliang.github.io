<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">日志存储：Segment、Index 与零拷贝</title>
  <desc id="desc">进入单个 partition 内部，看日志文件的组织方式</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 02</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="230" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="219" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Storage Engine</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">日志存储：Segment、</tspan><tspan x="104" dy="64">Index 与零拷贝</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">进入单个 partition 内部</tspan><tspan x="108" dy="42">看日志文件到底怎么组织</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Segment 文件结构 -->
    <text x="870" y="210" font-size="20" fill="#64748b" font-weight="700" class="mono">Partition Directory</text>
    <!-- Segment 0 -->
    <rect x="870" y="228" width="560" height="75" rx="10" fill="#0ea5e9" opacity="0.06" stroke="#0ea5e9" stroke-width="1"/>
    <text x="885" y="252" font-size="14" fill="#64748b" font-weight="700" class="mono">Segment (base offset: 00000000000000000000)</text>
    <rect x="885" y="262" width="160" height="28" rx="5" fill="#0ea5e9" opacity="0.15"/>
    <text x="965" y="282" font-size="12" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">.log (messages)</text>
    <rect x="1055" y="262" width="160" height="28" rx="5" fill="#f97316" opacity="0.15"/>
    <text x="1135" y="282" font-size="12" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">.index (offset)</text>
    <rect x="1225" y="262" width="180" height="28" rx="5" fill="#16a34a" opacity="0.15"/>
    <text x="1315" y="282" font-size="12" fill="#16a34a" font-weight="700" text-anchor="middle" class="mono">.timeindex (time)</text>
    <!-- Segment 1 -->
    <rect x="870" y="312" width="560" height="75" rx="10" fill="#0ea5e9" opacity="0.06" stroke="#0ea5e9" stroke-width="1"/>
    <text x="885" y="336" font-size="14" fill="#64748b" font-weight="700" class="mono">Segment (base offset: 00000000000000005000)</text>
    <rect x="885" y="346" width="160" height="28" rx="5" fill="#0ea5e9" opacity="0.15"/>
    <text x="965" y="366" font-size="12" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">.log</text>
    <rect x="1055" y="346" width="160" height="28" rx="5" fill="#f97316" opacity="0.15"/>
    <text x="1135" y="366" font-size="12" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">.index</text>
    <rect x="1225" y="346" width="180" height="28" rx="5" fill="#16a34a" opacity="0.15"/>
    <text x="1315" y="366" font-size="12" fill="#16a34a" font-weight="700" text-anchor="middle" class="mono">.timeindex</text>
    <!-- Active segment -->
    <rect x="870" y="396" width="560" height="75" rx="10" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="2"/>
    <text x="885" y="420" font-size="14" fill="#f97316" font-weight="700" class="mono">Active Segment (base offset: 00000000000000010000)</text>
    <rect x="885" y="430" width="160" height="28" rx="5" fill="#0ea5e9" opacity="0.15"/>
    <text x="965" y="450" font-size="12" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">.log (appending)</text>
    <rect x="1055" y="430" width="160" height="28" rx="5" fill="#f97316" opacity="0.15"/>
    <text x="1135" y="450" font-size="12" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">.index</text>
    <rect x="1225" y="430" width="180" height="28" rx="5" fill="#16a34a" opacity="0.15"/>
    <text x="1315" y="450" font-size="12" fill="#16a34a" font-weight="700" text-anchor="middle" class="mono">.timeindex</text>
    <!-- 分割线 -->
    <line x1="870" y1="490" x2="1460" y2="490" stroke="#e5e7eb" stroke-width="1.5"/>
    <!-- Zero-copy 路径 -->
    <text x="870" y="525" font-size="20" fill="#64748b" font-weight="700" class="mono">Zero-Copy (sendfile)</text>
    <!-- 路径图 -->
    <rect x="870" y="545" width="110" height="36" rx="8" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1"/>
    <text x="925" y="569" font-size="13" fill="#0ea5e9" font-weight="700" text-anchor="middle">Disk</text>
    <text x="995" y="569" font-size="16" fill="#64748b" font-weight="700">→</text>
    <rect x="1015" y="545" width="130" height="36" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
    <text x="1080" y="569" font-size="13" fill="#16a34a" font-weight="700" text-anchor="middle">Page Cache</text>
    <text x="1160" y="569" font-size="16" fill="#64748b" font-weight="700">→</text>
    <rect x="1180" y="545" width="120" height="36" rx="8" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
    <text x="1240" y="569" font-size="13" fill="#f97316" font-weight="700" text-anchor="middle">NIC Buffer</text>
    <text x="1315" y="569" font-size="16" fill="#64748b" font-weight="700">→</text>
    <rect x="1335" y="545" width="110" height="36" rx="8" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
    <text x="1390" y="569" font-size="13" fill="#8b5cf6" font-weight="700" text-anchor="middle">Network</text>
    <!-- No user-space copy 标注 -->
    <text x="1080" y="610" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle">no user-space buffer copy</text>
    <!-- Sparse index 说明 -->
    <line x1="870" y1="635" x2="1460" y2="635" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="870" y="665" font-size="20" fill="#64748b" font-weight="700" class="mono">Sparse Offset Index</text>
    <text x="870" y="695" font-size="15" fill="#475569" font-weight="600" class="mono">offset 0    → position 0</text>
    <text x="870" y="718" font-size="15" fill="#475569" font-weight="600" class="mono">offset 4096 → position 32768</text>
    <text x="870" y="741" font-size="15" fill="#475569" font-weight="600" class="mono">offset 8192 → position 65536  (binary search)</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <!-- dots 0-1: completed -->
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <!-- dot 2: current -->
    <circle cx="160" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <!-- dots 3-17: future -->
    <circle cx="188" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="84" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
