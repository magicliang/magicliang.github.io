<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">幂等 Producer 与序列号：消息不重不丢的第一层</title>
  <desc id="desc">PID + Sequence Number 实现 broker 端去重</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 04</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="290" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="249" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Idempotent Producer</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">幂等 Producer 与序列号</tspan><tspan x="104" dy="64">消息不重不丢的第一层</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">PID + Sequence Number</tspan><tspan x="108" dy="42">实现 broker 端精确去重</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Producer -->
    <rect x="880" y="210" width="200" height="55" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="980" y="235" font-size="17" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">Producer</text>
    <text x="980" y="255" font-size="13" fill="#64748b" text-anchor="middle">PID=1001, epoch=0</text>
    <!-- Msg with seq -->
    <rect x="895" y="290" width="170" height="40" rx="8" fill="#fef3c7" stroke="#f97316" stroke-width="1.5"/>
    <text x="980" y="316" font-size="14" fill="#f97316" font-weight="600" text-anchor="middle" class="mono">msg(PID=1001, seq=5)</text>
    <!-- Arrow down -->
    <line x1="980" y1="330" x2="980" y2="370" stroke="#64748b" stroke-width="2"/>
    <text x="1000" y="355" font-size="12" fill="#64748b">send + retry</text>
    <!-- Broker -->
    <rect x="870" y="375" width="220" height="160" rx="12" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
    <text x="980" y="400" font-size="17" fill="#16a34a" font-weight="700" text-anchor="middle">Broker (Leader)</text>
    <!-- ProducerStateManager -->
    <rect x="890" y="415" width="180" height="50" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="980" y="436" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle" class="mono">ProducerStateManager</text>
    <text x="980" y="455" font-size="12" fill="#64748b" text-anchor="middle">last_seq[PID=1001] = 5</text>
    <!-- Dedup result -->
    <rect x="890" y="478" width="85" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="932" y="501" font-size="12" fill="#16a34a" font-weight="600" text-anchor="middle">seq=5: dup!</text>
    <rect x="985" y="478" width="85" height="35" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1027" y="501" font-size="12" fill="#0ea5e9" font-weight="600" text-anchor="middle">seq=6: OK</text>
    <!-- Partition log -->
    <rect x="870" y="560" width="220" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="980" y="582" font-size="14" fill="#475569" font-weight="600" text-anchor="middle">Partition Log</text>
    <text x="980" y="598" font-size="12" fill="#94a3b8" text-anchor="middle" class="mono">...| seq=4 | seq=5 | seq=6 |...</text>
    <!-- Arrow from dedup to log -->
    <line x1="1027" y1="513" x2="1000" y2="555" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Epoch bump note -->
    <rect x="1120" y="290" width="160" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1200" y="312" font-size="13" fill="#ef4444" font-weight="600" text-anchor="middle">Restart = new PID</text>
    <text x="1200" y="332" font-size="12" fill="#94a3b8" text-anchor="middle">seq resets to 0</text>
    <text x="1200" y="348" font-size="12" fill="#94a3b8" text-anchor="middle">per-session only</text>
    <!-- dashed line to producer -->
    <line x1="1120" y1="310" x2="1080" y2="240" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>
  <!-- 底部进度点（18 篇）-->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="244" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="140" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
