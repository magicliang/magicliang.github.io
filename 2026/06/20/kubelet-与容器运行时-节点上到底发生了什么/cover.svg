<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- API Server box -->
  <rect x="60" y="60" width="220" height="52" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="170" y="82" font-family="Menlo,Consolas,monospace" font-size="15" fill="#FBBF24" text-anchor="middle">API Server</text>
  <text x="170" y="101" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Pod.spec.nodeName set</text>

  <!-- arrow down to kubelet -->
  <line x1="170" y1="112" x2="170" y2="160" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- kubelet outer box -->
  <rect x="40" y="160" width="560" height="380" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="320" y="186" font-family="Menlo,Consolas,monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">kubelet — syncPod loop</text>

  <!-- Step 1: Admit -->
  <rect x="65" y="196" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#94A3B8" stroke-width="1"/>
  <text x="320" y="219" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">1. Admit — local resource check</text>

  <!-- Step 2: Mount volumes -->
  <rect x="65" y="238" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="320" y="261" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">2. Mount Volumes — CSI driver (PVC / configMap / secret)</text>

  <!-- Step 3: Pull image -->
  <rect x="65" y="280" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#A3E635" stroke-width="1.5"/>
  <text x="320" y="303" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">3. Pull Image — CRI ImageService.PullImage</text>

  <!-- Step 4: RunPodSandbox -->
  <rect x="65" y="322" width="510" height="52" rx="4" fill="#0d1f2d" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="200" y="344" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">4. RunPodSandbox</text>
  <text x="420" y="340" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">pause container → holds netns + ipcns</text>
  <text x="420" y="358" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">CNI: allocate IP, veth pair</text>

  <!-- Step 5: Init containers -->
  <rect x="65" y="380" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="320" y="403" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">5. Init Containers (sequential) — CreateContainer → Start</text>

  <!-- Step 6: App containers -->
  <rect x="65" y="422" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#A3E635" stroke-width="1.5"/>
  <text x="320" y="445" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">6. App Containers (parallel) — CreateContainer → Start</text>

  <!-- Step 7: Probes -->
  <rect x="65" y="464" width="510" height="36" rx="4" fill="#0d1f2d" stroke="#5EEAD4" stroke-width="1"/>
  <text x="320" y="487" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">7. Start Probes goroutines (liveness / readiness / startup)</text>

  <!-- Arrow out of kubelet -->
  <line x1="320" y1="540" x2="320" y2="590" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CRI label on arrow -->
  <text x="330" y="568" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">CRI gRPC</text>

  <!-- containerd chain box -->
  <rect x="120" y="590" width="400" height="130" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="320" y="614" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">containerd</text>

  <!-- shim -->
  <rect x="140" y="624" width="340" height="34" rx="4" fill="#0d1820" stroke="#5EEAD4" stroke-width="1"/>
  <text x="310" y="646" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">containerd-shim-runc-v2</text>

  <!-- runc -->
  <rect x="160" y="664" width="300" height="34" rx="4" fill="#0d1820" stroke="#FBBF24" stroke-width="1"/>
  <text x="310" y="686" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">runc → container process (PID 1)</text>

  <!-- cgroup box (right side) -->
  <rect x="760" y="60" width="420" height="300" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="970" y="86" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">cgroup v2 hierarchy</text>

  <text x="800" y="116" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">/sys/fs/cgroup/kubepods/</text>
  <text x="820" y="140" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">├── burstable/</text>
  <text x="840" y="164" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">│   └── pod&lt;uid&gt;/</text>
  <text x="860" y="188" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4">│       ├── cpu.max</text>
  <text x="1000" y="188" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">= 100000 200000</text>
  <text x="860" y="212" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4">│       └── memory.max</text>
  <text x="1030" y="212" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">= 134217728</text>
  <text x="820" y="240" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">├── guaranteed/</text>
  <text x="820" y="264" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">└── besteffort/</text>
  <text x="800" y="296" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635">OOM score: BestEffort=1000 Guaranteed=-997</text>

  <!-- PLEG box (right side lower) -->
  <rect x="760" y="390" width="420" height="200" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="970" y="416" font-family="Menlo,Consolas,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">PLEG (Pod Lifecycle Event Generator)</text>

  <text x="780" y="446" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">every 1s: ListPodSandbox + ListContainers</text>
  <text x="780" y="470" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">diff vs last snapshot → lifecycle events</text>
  <text x="780" y="494" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24">ContainerStarted / ContainerDied</text>
  <text x="780" y="518" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8">→ trigger syncPod → update API Server</text>
  <text x="780" y="546" font-family="Menlo,Consolas,monospace" font-size="12" fill="#f87171">PLEG not healthy: poll timeout &gt; 3min</text>
  <text x="780" y="566" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">cause: containerd slow / too many containers</text>

  <!-- CRI interface box (right side far) -->
  <rect x="1230" y="60" width="330" height="320" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1395" y="86" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">CRI (gRPC)</text>

  <text x="1250" y="116" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4">ImageService</text>
  <text x="1250" y="138" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  PullImage</text>
  <text x="1250" y="158" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  ListImages</text>
  <text x="1250" y="178" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  RemoveImage</text>

  <text x="1250" y="214" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24">RuntimeService</text>
  <text x="1250" y="236" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  RunPodSandbox</text>
  <text x="1250" y="256" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  CreateContainer</text>
  <text x="1250" y="276" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  StartContainer</text>
  <text x="1250" y="296" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  StopContainer</text>
  <text x="1250" y="316" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  ExecSync</text>
  <text x="1250" y="336" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">  Exec (streaming)</text>

  <text x="1250" y="362" font-family="Menlo,Consolas,monospace" font-size="12" fill="#A3E635">containerd / CRI-O</text>

  <!-- Chinese title -->
  <text x="60" y="840" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">kubelet 与容器运行时</text>
  <!-- English subtitle -->
  <text x="60" y="878" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">kubelet and Container Runtime: what really happens on the node</text>
</svg>
