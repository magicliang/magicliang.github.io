<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Central ClusterIP box -->
  <rect x="620" y="180" width="360" height="90" rx="10" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="2.5"/>
  <text x="800" y="218" font-family="Menlo, monospace" font-size="18" fill="#5EEAD4" text-anchor="middle">ClusterIP (Virtual IP)</text>
  <text x="800" y="248" font-family="Menlo, monospace" font-size="15" fill="#94A3B8" text-anchor="middle">10.96.1.1:80  (no real NIC)</text>

  <!-- Caller Pod -->
  <rect x="140" y="188" width="220" height="75" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="250" y="220" font-family="Menlo, monospace" font-size="16" fill="#FBBF24" text-anchor="middle">Pod A (caller)</text>
  <text x="250" y="247" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">10.244.0.5</text>
  <!-- arrow to ClusterIP -->
  <line x1="360" y1="226" x2="618" y2="226" stroke="#FBBF24" stroke-width="2"/>
  <polygon points="613,220 623,226 613,232" fill="#FBBF24"/>
  <text x="440" y="218" font-family="Menlo, monospace" font-size="13" fill="#FBBF24">TCP connect</text>

  <!-- iptables / IPVS box -->
  <rect x="560" y="330" width="480" height="100" rx="10" fill="#0f2a1f" stroke="#A3E635" stroke-width="2"/>
  <text x="800" y="368" font-family="Menlo, monospace" font-size="17" fill="#A3E635" text-anchor="middle">iptables DNAT  /  IPVS hash table</text>
  <text x="800" y="395" font-family="Menlo, monospace" font-size="14" fill="#64748B" text-anchor="middle">written by kube-proxy, executed by kernel</text>
  <text x="800" y="418" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">10.96.1.1:80  →  select one backend</text>
  <!-- arrow from ClusterIP to rule box -->
  <line x1="800" y1="270" x2="800" y2="328" stroke="#5EEAD4" stroke-width="2"/>
  <polygon points="794,323 800,333 806,323" fill="#5EEAD4"/>

  <!-- Three backend Pods -->
  <rect x="200" y="520" width="220" height="80" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="310" y="553" font-family="Menlo, monospace" font-size="15" fill="#FBBF24" text-anchor="middle">Pod B</text>
  <text x="310" y="577" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">10.244.1.2:80</text>

  <rect x="690" y="520" width="220" height="80" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="800" y="553" font-family="Menlo, monospace" font-size="15" fill="#FBBF24" text-anchor="middle">Pod C</text>
  <text x="800" y="577" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">10.244.1.3:80</text>

  <rect x="1180" y="520" width="220" height="80" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="1290" y="553" font-family="Menlo, monospace" font-size="15" fill="#FBBF24" text-anchor="middle">Pod D</text>
  <text x="1290" y="577" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">10.244.2.4:80</text>

  <!-- arrows from rule box to pods -->
  <line x1="660" y1="430" x2="340" y2="518" stroke="#A3E635" stroke-width="1.8" stroke-dasharray="8,4"/>
  <polygon points="336,512 344,522 350,513" fill="#A3E635"/>
  <text x="430" y="488" font-family="Menlo, monospace" font-size="13" fill="#A3E635">1/3</text>

  <line x1="800" y1="430" x2="800" y2="518" stroke="#A3E635" stroke-width="1.8" stroke-dasharray="8,4"/>
  <polygon points="794,513 800,523 806,513" fill="#A3E635"/>
  <text x="808" y="488" font-family="Menlo, monospace" font-size="13" fill="#A3E635">1/3</text>

  <line x1="940" y1="430" x2="1270" y2="518" stroke="#A3E635" stroke-width="1.8" stroke-dasharray="8,4"/>
  <polygon points="1258,514 1268,522 1272,512" fill="#A3E635"/>
  <text x="1130" y="488" font-family="Menlo, monospace" font-size="13" fill="#A3E635">1/3</text>

  <!-- kube-proxy watch box -->
  <rect x="1050" y="188" width="340" height="100" rx="8" fill="#1a1a2e" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1220" y="222" font-family="Menlo, monospace" font-size="15" fill="#FBBF24" text-anchor="middle">kube-proxy</text>
  <text x="1220" y="248" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">watch EndpointSlice</text>
  <text x="1220" y="270" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">sync iptables / IPVS rules</text>
  <!-- arrow to rule box -->
  <line x1="1150" y1="290" x2="1050" y2="360" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="1043,356 1053,364 1057,353" fill="#FBBF24"/>

  <!-- CoreDNS box -->
  <rect x="60" y="650" width="340" height="85" rx="8" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="230" y="684" font-family="Menlo, monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">CoreDNS</text>
  <text x="230" y="708" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">nginx.default.svc.cluster.local</text>
  <text x="230" y="727" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">→ A 10.96.1.1</text>

  <!-- EndpointSlice box -->
  <rect x="480" y="650" width="340" height="85" rx="8" fill="#0f2a1f" stroke="#A3E635" stroke-width="1.5"/>
  <text x="650" y="684" font-family="Menlo, monospace" font-size="15" fill="#A3E635" text-anchor="middle">EndpointSlice</text>
  <text x="650" y="708" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">shards ≤ 100 endpoints each</text>
  <text x="650" y="727" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">incremental watch by kube-proxy</text>

  <!-- IPVS mode box -->
  <rect x="900" y="650" width="340" height="85" rx="8" fill="#1a1a2e" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1070" y="684" font-family="Menlo, monospace" font-size="15" fill="#FBBF24" text-anchor="middle">IPVS mode</text>
  <text x="1070" y="708" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">O(1) hash table lookup</text>
  <text x="1070" y="727" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">rr / lc / wrr / sh algorithms</text>

  <!-- Title -->
  <text x="60" y="826" font-family="Menlo, monospace" font-size="46" fill="#F8FAFC">Service 与 kube-proxy</text>
  <text x="60" y="874" font-family="Menlo, monospace" font-size="24" fill="#CBD5E1">Virtual IP, iptables DNAT, and IPVS Load Balancing</text>
</svg>
