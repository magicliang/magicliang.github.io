<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title area -->
  <text x="60" y="840" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">调度器深入</text>
  <text x="60" y="878" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">Scheduler: Filter, Score, Preemption and Topology Spread</text>

  <!-- Pending Pod -->
  <rect x="60" y="60" width="200" height="52" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="160" y="82" font-family="Menlo,Consolas,monospace" font-size="15" fill="#FBBF24" text-anchor="middle">Pod Pending</text>
  <text x="160" y="101" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">no nodeName</text>

  <!-- Arrow down to scheduler box -->
  <line x1="160" y1="112" x2="160" y2="156" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scheduling Framework outer box -->
  <rect x="40" y="156" width="640" height="480" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="360" y="180" font-family="Menlo,Consolas,monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">Scheduling Framework</text>

  <!-- PreFilter -->
  <rect x="70" y="190" width="580" height="38" rx="4" fill="#0d1f2d" stroke="#94A3B8" stroke-width="1"/>
  <text x="360" y="214" font-family="Menlo,Consolas,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">PreFilter — 预计算共享上下文</text>

  <!-- Filter -->
  <rect x="70" y="236" width="580" height="52" rx="4" fill="#0d1f2d" stroke="#f87171" stroke-width="1.5"/>
  <text x="200" y="258" font-family="Menlo,Consolas,monospace" font-size="14" fill="#f87171" text-anchor="middle">Filter</text>
  <text x="450" y="252" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">NodeResourcesFit · NodeSelector</text>
  <text x="450" y="270" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">TaintToleration · PodAffinity</text>

  <!-- PostFilter / Preemption -->
  <rect x="70" y="296" width="580" height="52" rx="4" fill="#1a1220" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="318" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">PostFilter</text>
  <text x="420" y="314" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">feasible=0 → 触发抢占</text>
  <text x="420" y="332" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">驱逐低优先级 Pod</text>

  <!-- Score -->
  <rect x="70" y="356" width="580" height="52" rx="4" fill="#0d1f2d" stroke="#A3E635" stroke-width="1.5"/>
  <text x="200" y="378" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">Score</text>
  <text x="440" y="374" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">LeastAllocated · ImageLocality</text>
  <text x="440" y="392" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">NodeAffinity · InterPodAffinity</text>

  <!-- Reserve -->
  <rect x="70" y="416" width="580" height="38" rx="4" fill="#0d1f2d" stroke="#94A3B8" stroke-width="1"/>
  <text x="360" y="440" font-family="Menlo,Consolas,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">Reserve — 乐观锁定资源</text>

  <!-- Bind -->
  <rect x="70" y="462" width="580" height="38" rx="4" fill="#0d1f2d" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="360" y="486" font-family="Menlo,Consolas,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">Bind — 写入 Pod.spec.nodeName</text>

  <!-- PostBind -->
  <rect x="70" y="508" width="580" height="38" rx="4" fill="#0d1f2d" stroke="#94A3B8" stroke-width="1"/>
  <text x="360" y="532" font-family="Menlo,Consolas,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">PostBind — 绑定后通知</text>

  <!-- Filter result label -->
  <text x="660" y="270" font-family="Menlo,Consolas,monospace" font-size="13" fill="#f87171">→ feasible nodes</text>
  <!-- Score result label -->
  <text x="660" y="390" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635">→ ranked nodes</text>

  <!-- Arrow out of framework -->
  <line x1="360" y1="636" x2="360" y2="680" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="220" y="680" width="280" height="52" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="360" y="702" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">Pod.spec.nodeName = node-X</text>
  <text x="360" y="722" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">kubelet syncPod begins</text>

  <!-- PriorityClass box (right side) -->
  <rect x="760" y="156" width="320" height="180" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="920" y="180" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">PriorityClass</text>
  <text x="920" y="204" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">high-priority: 1000</text>
  <text x="920" y="224" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">low-priority:  100</text>
  <text x="920" y="248" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">ActiveQ sorted by priority</text>
  <text x="920" y="268" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">high → scheduled first</text>
  <text x="920" y="292" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">nominatedNodeName during eviction</text>
  <text x="920" y="312" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">wait gracePeriod → rebind</text>

  <!-- TopologySpread box (right side) -->
  <rect x="760" y="356" width="320" height="200" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="920" y="380" font-family="Menlo,Consolas,monospace" font-size="14" fill="#A3E635" text-anchor="middle">PodTopologySpread</text>
  <text x="920" y="404" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">maxSkew: 1</text>
  <text x="920" y="424" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">topologyKey: zone</text>
  <text x="920" y="444" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">zone-a: ███ 3</text>
  <text x="920" y="464" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">zone-b: ██  2  ← schedule here</text>
  <text x="920" y="484" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">zone-c: ██  2</text>
  <text x="920" y="510" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">DoNotSchedule → hard constraint</text>
  <text x="920" y="530" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">ScheduleAnyway → soft constraint</text>

  <!-- Nodes cluster diagram (far right) -->
  <rect x="1140" y="156" width="400" height="420" rx="8" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1340" y="180" font-family="Menlo,Consolas,monospace" font-size="14" fill="#94A3B8" text-anchor="middle">Cluster Nodes</text>

  <!-- node boxes -->
  <rect x="1160" y="196" width="160" height="80" rx="4" fill="#0d1820" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1240" y="218" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">node-1</text>
  <text x="1240" y="238" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">cpu: 60% used</text>
  <text x="1240" y="256" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">mem: 40% used</text>
  <text x="1240" y="270" font-family="Menlo,Consolas,monospace" font-size="11" fill="#A3E635" text-anchor="middle">score: 72</text>

  <rect x="1360" y="196" width="160" height="80" rx="4" fill="#0d1820" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1440" y="218" font-family="Menlo,Consolas,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">node-2</text>
  <text x="1440" y="238" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">cpu: 30% used</text>
  <text x="1440" y="256" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">mem: 25% used</text>
  <text x="1440" y="270" font-family="Menlo,Consolas,monospace" font-size="11" fill="#A3E635" text-anchor="middle">score: 88 ← winner</text>

  <rect x="1160" y="308" width="160" height="80" rx="4" fill="#0d1820" stroke="#94A3B8" stroke-width="1"/>
  <text x="1240" y="330" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">node-3</text>
  <text x="1240" y="350" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Taint: NoSchedule</text>
  <text x="1240" y="368" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">no toleration</text>
  <text x="1240" y="382" font-family="Menlo,Consolas,monospace" font-size="11" fill="#f87171" text-anchor="middle">filtered out</text>

  <rect x="1360" y="308" width="160" height="80" rx="4" fill="#0d1820" stroke="#94A3B8" stroke-width="1"/>
  <text x="1440" y="330" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">node-4</text>
  <text x="1440" y="350" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">cpu: insufficient</text>
  <text x="1440" y="368" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">requests exceed</text>
  <text x="1440" y="382" font-family="Menlo,Consolas,monospace" font-size="11" fill="#f87171" text-anchor="middle">filtered out</text>
</svg>
