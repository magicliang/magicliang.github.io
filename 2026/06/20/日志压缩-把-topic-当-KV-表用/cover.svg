<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">日志压缩：把 topic 当 KV 表用</title>
  <desc id="desc">Log Compaction 语义：按 key 保留最新 value、Cleaner 线程、Tombstone 与 __consumer_offsets</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 10</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="240" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="224" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Log Compaction</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">日志压缩</tspan><tspan x="104" dy="64">把 topic 当 KV 表用</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">Log Compaction 语义：按 key 保留最新 value</tspan><tspan x="108" dy="42">Cleaner 线程、Tombstone 与 __consumer_offsets</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- 压缩前日志 -->
    <text x="1060" y="200" font-size="14" fill="#64748b" font-weight="700" text-anchor="middle">压缩前</text>
    <!-- 日志条目 - 压缩前 -->
    <g transform="translate(880, 215)">
      <rect x="0" y="0" width="68" height="36" rx="5" fill="#0ea5e9" opacity="0.5" stroke="#0ea5e9" stroke-width="1"/>
      <text x="34" y="16" font-size="10" fill="#fff" text-anchor="middle" class="mono">K1:V1</text>
      <text x="34" y="30" font-size="9" fill="#0ea5e9" text-anchor="middle" class="mono">off=0</text>

      <rect x="74" y="0" width="68" height="36" rx="5" fill="#f97316" opacity="0.4" stroke="#f97316" stroke-width="1"/>
      <text x="108" y="16" font-size="10" fill="#7c2d12" text-anchor="middle" class="mono">K2:V1</text>
      <text x="108" y="30" font-size="9" fill="#f97316" text-anchor="middle" class="mono">off=1</text>

      <rect x="148" y="0" width="68" height="36" rx="5" fill="#0ea5e9" opacity="0.5" stroke="#0ea5e9" stroke-width="1"/>
      <text x="182" y="16" font-size="10" fill="#fff" text-anchor="middle" class="mono">K1:V2</text>
      <text x="182" y="30" font-size="9" fill="#0ea5e9" text-anchor="middle" class="mono">off=2</text>

      <rect x="222" y="0" width="68" height="36" rx="5" fill="#16a34a" opacity="0.4" stroke="#16a34a" stroke-width="1"/>
      <text x="256" y="16" font-size="10" fill="#14532d" text-anchor="middle" class="mono">K3:V1</text>
      <text x="256" y="30" font-size="9" fill="#16a34a" text-anchor="middle" class="mono">off=3</text>

      <rect x="296" y="0" width="68" height="36" rx="5" fill="#f97316" opacity="0.4" stroke="#f97316" stroke-width="1"/>
      <text x="330" y="16" font-size="10" fill="#7c2d12" text-anchor="middle" class="mono">K2:V2</text>
      <text x="330" y="30" font-size="9" fill="#f97316" text-anchor="middle" class="mono">off=4</text>
    </g>
    <g transform="translate(880, 260)">
      <rect x="0" y="0" width="68" height="36" rx="5" fill="#0ea5e9" opacity="0.5" stroke="#0ea5e9" stroke-width="1"/>
      <text x="34" y="16" font-size="10" fill="#fff" text-anchor="middle" class="mono">K1:V3</text>
      <text x="34" y="30" font-size="9" fill="#0ea5e9" text-anchor="middle" class="mono">off=5</text>

      <rect x="74" y="0" width="68" height="36" rx="5" fill="#64748b" opacity="0.3" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="108" y="16" font-size="10" fill="#64748b" text-anchor="middle" class="mono">K3:∅</text>
      <text x="108" y="30" font-size="9" fill="#94a3b8" text-anchor="middle" class="mono">off=6</text>
    </g>
    <!-- Cleaner 箭头 -->
    <text x="1060" y="340" font-size="28" fill="#f97316" font-weight="700" text-anchor="middle">⟱ Cleaner</text>
    <text x="1060" y="362" font-size="12" fill="#94a3b8" font-weight="600" text-anchor="middle">dirty ratio &gt; min.cleanable.dirty.ratio</text>
    <!-- 压缩后日志 -->
    <text x="1060" y="400" font-size="14" fill="#64748b" font-weight="700" text-anchor="middle">压缩后</text>
    <g transform="translate(910, 415)">
      <!-- K1 只保留 V3 -->
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#0ea5e9" opacity="0.7" stroke="#0ea5e9" stroke-width="2"/>
      <text x="40" y="17" font-size="11" fill="#fff" text-anchor="middle" class="mono">K1:V3</text>
      <text x="40" y="33" font-size="10" fill="#bae6fd" text-anchor="middle" class="mono">off=5</text>
      <!-- K2 只保留 V2 -->
      <rect x="90" y="0" width="80" height="40" rx="6" fill="#f97316" opacity="0.6" stroke="#f97316" stroke-width="2"/>
      <text x="130" y="17" font-size="11" fill="#fff" text-anchor="middle" class="mono">K2:V2</text>
      <text x="130" y="33" font-size="10" fill="#fed7aa" text-anchor="middle" class="mono">off=4</text>
      <!-- K3 tombstone -->
      <rect x="180" y="0" width="80" height="40" rx="6" fill="#64748b" opacity="0.3" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="220" y="17" font-size="11" fill="#64748b" text-anchor="middle" class="mono">K3:∅</text>
      <text x="220" y="33" font-size="10" fill="#94a3b8" text-anchor="middle" class="mono">tombstone</text>
    </g>
    <!-- 标注 -->
    <rect x="870" y="490" width="540" height="80" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="1140" y="515" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">每个 key 只保留最新 value</text>
    <text x="1140" y="537" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">tombstone (value=null) 标记删除，在 delete.retention.ms 后清除</text>
    <text x="1140" y="559" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">offset 不连续但全局有序</text>
    <!-- 图例 -->
    <rect x="880" y="590" width="14" height="14" rx="3" fill="#0ea5e9" opacity="0.7"/>
    <text x="900" y="602" font-size="12" fill="#64748b">保留</text>
    <rect x="950" y="590" width="14" height="14" rx="3" fill="#cbd5e1" opacity="0.5"/>
    <text x="970" y="602" font-size="12" fill="#64748b">清除</text>
    <rect x="1030" y="590" width="14" height="14" rx="3" fill="#64748b" opacity="0.3" stroke="#64748b" stroke-dasharray="3,2"/>
    <text x="1050" y="602" font-size="12" fill="#64748b">Tombstone</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="384" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="308" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
