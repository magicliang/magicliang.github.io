<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FBBF24"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5EEAD4"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A3E635"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ConfigMap box -->
  <rect x="80" y="160" width="240" height="130" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="200" y="195" font-family="Menlo,monospace" font-size="17" fill="#5EEAD4" text-anchor="middle">ConfigMap</text>
  <text x="200" y="218" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">DB_HOST: postgres</text>
  <text x="200" y="238" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">LOG_LEVEL: info</text>
  <text x="200" y="258" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">nginx.conf: |</text>
  <text x="200" y="278" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">non-sensitive config</text>

  <!-- Secret box -->
  <rect x="80" y="330" width="240" height="130" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="200" y="363" font-family="Menlo,monospace" font-size="17" fill="#FBBF24" text-anchor="middle">Secret</text>
  <text x="200" y="386" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">password: czNjcjN0</text>
  <text x="200" y="406" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">tls.crt: LS0tLS1...  </text>
  <text x="200" y="426" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">type: Opaque</text>
  <text x="200" y="446" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">base64 encoded</text>

  <!-- Injection methods -->
  <rect x="430" y="160" width="230" height="80" rx="8" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="545" y="193" font-family="Menlo,monospace" font-size="14" fill="#CBD5E1" text-anchor="middle">ENV Variable</text>
  <text x="545" y="215" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">envFrom / env.valueFrom</text>
  <text x="545" y="232" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">Pod start only, no hot-reload</text>

  <rect x="430" y="280" width="230" height="80" rx="8" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="545" y="313" font-family="Menlo,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">Volume Mount</text>
  <text x="545" y="335" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">file per key, atomic symlink</text>
  <text x="545" y="352" font-family="Menlo,monospace" font-size="11" fill="#A3E635" text-anchor="middle">hot-reload: ~60s delay</text>

  <!-- Arrows from ConfigMap/Secret to injection methods -->
  <line x1="320" y1="220" x2="430" y2="200" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="320" y1="395" x2="430" y2="320" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="230" x2="430" y2="310" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- Container box -->
  <rect x="760" y="200" width="240" height="140" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="880" y="233" font-family="Menlo,monospace" font-size="15" fill="#A3E635" text-anchor="middle">Container</text>
  <text x="880" y="256" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">env: DB_HOST=postgres</text>
  <text x="880" y="276" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">file: /config/LOG_LEVEL</text>
  <text x="880" y="296" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">file: /secrets/password</text>
  <text x="880" y="316" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">process reads files/env</text>

  <!-- Arrows from injection to container -->
  <line x1="660" y1="200" x2="760" y2="240" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="660" y1="320" x2="760" y2="300" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- External Secrets section -->
  <rect x="1050" y="140" width="490" height="360" rx="10" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="1295" y="172" font-family="Menlo,monospace" font-size="15" fill="#CBD5E1" text-anchor="middle">External Secret Integration</text>

  <!-- Vault -->
  <rect x="1070" y="195" width="140" height="70" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1140" y="227" font-family="Menlo,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">HashiCorp</text>
  <text x="1140" y="247" font-family="Menlo,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Vault</text>

  <!-- AWS SM -->
  <rect x="1240" y="195" width="140" height="70" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1310" y="222" font-family="Menlo,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">AWS Secrets</text>
  <text x="1310" y="242" font-family="Menlo,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">Manager</text>
  <text x="1310" y="258" font-family="Menlo,monospace" font-size="11" fill="#64748B" text-anchor="middle">GCP/Azure KV too</text>

  <!-- ESO -->
  <rect x="1070" y="315" width="140" height="70" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1140" y="342" font-family="Menlo,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">External</text>
  <text x="1140" y="360" font-family="Menlo,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Secrets Op.</text>
  <text x="1140" y="376" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">sync → K8s Secret</text>

  <!-- CSI Driver -->
  <rect x="1240" y="315" width="140" height="70" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1310" y="340" font-family="Menlo,monospace" font-size="12" fill="#A3E635" text-anchor="middle">CSI Secret</text>
  <text x="1310" y="358" font-family="Menlo,monospace" font-size="12" fill="#A3E635" text-anchor="middle">Store Driver</text>
  <text x="1310" y="374" font-family="Menlo,monospace" font-size="10" fill="#64748B" text-anchor="middle">no etcd storage</text>

  <!-- Arrows in external section -->
  <line x1="1140" y1="265" x2="1140" y2="315" stroke="#5EEAD4" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="1310" y1="265" x2="1310" y2="315" stroke="#A3E635" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="1170" y1="230" x2="1240" y2="230" stroke="#FBBF24" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Immutable note -->
  <rect x="80" y="510" width="550" height="60" rx="6" fill="none" stroke="#64748B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="100" y="535" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">Immutable ConfigMap/Secret (GA 1.21)</text>
  <text x="100" y="556" font-family="Menlo,monospace" font-size="12" fill="#64748B">immutable: true  →  no API watch pressure, prevents accidental change</text>

  <!-- Title -->
  <text x="80" y="830" font-family="Menlo,monospace" font-size="46" fill="#F8FAFC">配置与密钥管理：ConfigMap、Secret 与外部集成</text>
  <text x="80" y="872" font-family="Menlo,monospace" font-size="24" fill="#CBD5E1">Configuration and Secret Management in Kubernetes</text>
</svg>
