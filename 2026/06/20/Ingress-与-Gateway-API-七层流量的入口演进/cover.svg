<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Section label: Ingress (left) -->
  <text x="80" y="80" font-family="Menlo, monospace" font-size="22" fill="#5EEAD4">Ingress 架构（单层）</text>

  <!-- External request -->
  <rect x="80" y="100" width="180" height="60" rx="8" fill="#1a1a2e" stroke="#64748B" stroke-width="1.5"/>
  <text x="170" y="136" font-family="Menlo, monospace" font-size="15" fill="#94A3B8" text-anchor="middle">外部请求</text>
  <line x1="260" y1="130" x2="320" y2="130" stroke="#64748B" stroke-width="1.5"/>
  <polygon points="315,124 325,130 315,136" fill="#64748B"/>

  <!-- Cloud LB / NodePort -->
  <rect x="320" y="100" width="200" height="60" rx="8" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="420" y="128" font-family="Menlo, monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">LoadBalancer</text>
  <text x="420" y="149" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">Service / NodePort</text>
  <line x1="520" y1="130" x2="580" y2="130" stroke="#5EEAD4" stroke-width="1.5"/>
  <polygon points="575,124 585,130 575,136" fill="#5EEAD4"/>

  <!-- Ingress Controller -->
  <rect x="580" y="85" width="260" height="90" rx="8" fill="#0f2a1f" stroke="#A3E635" stroke-width="2"/>
  <text x="710" y="120" font-family="Menlo, monospace" font-size="16" fill="#A3E635" text-anchor="middle">Ingress Controller</text>
  <text x="710" y="143" font-family="Menlo, monospace" font-size="13" fill="#64748B" text-anchor="middle">Nginx / Traefik / HAProxy</text>
  <text x="710" y="163" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">watch Ingress → reload nginx.conf</text>

  <!-- Ingress resource box -->
  <rect x="580" y="230" width="260" height="110" rx="8" fill="#1a1a2e" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="710" y="260" font-family="Menlo, monospace" font-size="14" fill="#FBBF24" text-anchor="middle">Ingress 资源</text>
  <text x="710" y="282" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">host: api.example.com</text>
  <text x="710" y="300" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">path: /v1/* → svc-v1:80</text>
  <text x="710" y="318" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">annotations: nginx.ingress.../canary</text>
  <text x="710" y="333" font-family="Menlo, monospace" font-size="11" fill="#475569" text-anchor="middle">(annotation hell per-controller)</text>
  <!-- watch arrow -->
  <line x1="710" y1="230" x2="710" y2="178" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="704,183 710,173 716,183" fill="#FBBF24"/>

  <!-- Backend Services -->
  <rect x="920" y="100" width="180" height="60" rx="6" fill="#1a2744" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1010" y="136" font-family="Menlo, monospace" font-size="14" fill="#FBBF24" text-anchor="middle">Service / Pod</text>
  <line x1="840" y1="130" x2="918" y2="130" stroke="#A3E635" stroke-width="1.5"/>
  <polygon points="913,124 923,130 913,136" fill="#A3E635"/>

  <!-- Divider -->
  <line x1="80" y1="390" x2="1540" y2="390" stroke="#334155" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Section label: Gateway API (right) -->
  <text x="80" y="425" font-family="Menlo, monospace" font-size="22" fill="#5EEAD4">Gateway API 架构（三层分离）</text>

  <!-- Role labels -->
  <text x="130" y="468" font-family="Menlo, monospace" font-size="14" fill="#64748B">基础设施团队</text>
  <text x="560" y="468" font-family="Menlo, monospace" font-size="14" fill="#64748B">平台团队</text>
  <text x="1010" y="468" font-family="Menlo, monospace" font-size="14" fill="#64748B">应用团队</text>

  <!-- GatewayClass -->
  <rect x="80" y="480" width="320" height="80" rx="8" fill="#0f1f3d" stroke="#5EEAD4" stroke-width="2"/>
  <text x="240" y="513" font-family="Menlo, monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">GatewayClass</text>
  <text x="240" y="538" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">controllerName: envoy-gateway</text>
  <text x="240" y="555" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">网关类型 / 实现</text>

  <!-- arrow GatewayClass → Gateway -->
  <line x1="400" y1="520" x2="510" y2="520" stroke="#5EEAD4" stroke-width="2"/>
  <polygon points="505,514 515,520 505,526" fill="#5EEAD4"/>

  <!-- Gateway -->
  <rect x="510" y="480" width="320" height="100" rx="8" fill="#0f2a1f" stroke="#A3E635" stroke-width="2"/>
  <text x="670" y="513" font-family="Menlo, monospace" font-size="16" fill="#A3E635" text-anchor="middle">Gateway</text>
  <text x="670" y="538" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">listeners: HTTPS :443</text>
  <text x="670" y="558" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">tls: cert-secret</text>
  <text x="670" y="575" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">监听端口 / TLS</text>

  <!-- arrow Gateway → HTTPRoute -->
  <line x1="830" y1="520" x2="940" y2="520" stroke="#A3E635" stroke-width="2"/>
  <polygon points="935,514 945,520 935,526" fill="#A3E635"/>

  <!-- HTTPRoute -->
  <rect x="940" y="460" width="340" height="100" rx="8" fill="#1a2744" stroke="#FBBF24" stroke-width="2"/>
  <text x="1110" y="492" font-family="Menlo, monospace" font-size="16" fill="#FBBF24" text-anchor="middle">HTTPRoute</text>
  <text x="1110" y="515" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">path: /api  weight: 90/10</text>
  <text x="1110" y="535" font-family="Menlo, monospace" font-size="13" fill="#94A3B8" text-anchor="middle">header match, redirect, rewrite</text>
  <text x="1110" y="553" font-family="Menlo, monospace" font-size="12" fill="#64748B" text-anchor="middle">路由规则 / 后端选择</text>

  <!-- TCPRoute -->
  <rect x="940" y="580" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1020" y="615" font-family="Menlo, monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">TCPRoute</text>

  <!-- GRPCRoute -->
  <rect x="1120" y="580" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1200" y="615" font-family="Menlo, monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">GRPCRoute</text>

  <!-- backend services -->
  <rect x="1380" y="480" width="160" height="60" rx="6" fill="#1a2744" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1460" y="515" font-family="Menlo, monospace" font-size="14" fill="#FBBF24" text-anchor="middle">stable:80</text>
  <rect x="1380" y="560" width="160" height="60" rx="6" fill="#1a2744" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1460" y="595" font-family="Menlo, monospace" font-size="14" fill="#A3E635" text-anchor="middle">canary:80</text>
  <!-- arrows -->
  <line x1="1280" y1="505" x2="1378" y2="505" stroke="#FBBF24" stroke-width="1.5"/>
  <polygon points="1373,499 1383,505 1373,511" fill="#FBBF24"/>
  <line x1="1280" y1="520" x2="1350" y2="588" stroke="#A3E635" stroke-width="1.5"/>
  <polygon points="1345,582 1353,592 1359,582" fill="#A3E635"/>

  <!-- weight labels -->
  <text x="1310" y="498" font-family="Menlo, monospace" font-size="13" fill="#FBBF24">90%</text>
  <text x="1310" y="558" font-family="Menlo, monospace" font-size="13" fill="#A3E635">10%</text>

  <!-- Policy Attachment note -->
  <rect x="80" y="670" width="740" height="70" rx="8" fill="#0a0a18" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="700" font-family="Menlo, monospace" font-size="14" fill="#64748B">Policy Attachment: 限流 / 认证 / 重试策略附加到 HTTPRoute 或 Gateway</text>
  <text x="100" y="724" font-family="Menlo, monospace" font-size="14" fill="#64748B">跨命名空间路由: HTTPRoute (app ns) → parentRef Gateway (infra ns) via ReferenceGrant</text>

  <!-- Title -->
  <text x="60" y="826" font-family="Menlo, monospace" font-size="46" fill="#F8FAFC">Ingress 与 Gateway API</text>
  <text x="60" y="874" font-family="Menlo, monospace" font-size="24" fill="#CBD5E1">L7 Traffic Ingress Evolution: From Annotations to Structured Roles</text>
</svg>
