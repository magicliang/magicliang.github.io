<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- kubectl apply box -->
  <rect x="80" y="80" width="220" height="56" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="190" y="114" font-family="Menlo,Consolas,monospace" font-size="18" fill="#5EEAD4" text-anchor="middle">kubectl apply</text>

  <!-- arrow down -->
  <line x1="190" y1="136" x2="190" y2="190" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- etcd box -->
  <rect x="80" y="190" width="220" height="56" rx="6" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="190" y="218" font-family="Menlo,Consolas,monospace" font-size="16" fill="#FBBF24" text-anchor="middle">etcd</text>
  <text x="190" y="237" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">phase=Pending</text>

  <!-- arrow down -->
  <line x1="190" y1="246" x2="190" y2="300" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- scheduler box -->
  <rect x="80" y="300" width="220" height="56" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="190" y="328" font-family="Menlo,Consolas,monospace" font-size="16" fill="#A3E635" text-anchor="middle">Scheduler</text>
  <text x="190" y="347" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">binds → nodeName</text>

  <!-- arrow down -->
  <line x1="190" y1="356" x2="190" y2="410" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- kubelet box -->
  <rect x="80" y="410" width="220" height="56" rx="6" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="190" y="438" font-family="Menlo,Consolas,monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">kubelet</text>
  <text x="190" y="457" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">syncPod loop</text>

  <!-- arrow right from kubelet to init containers -->
  <line x1="300" y1="438" x2="380" y2="438" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- init containers group -->
  <rect x="380" y="390" width="280" height="96" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="520" y="412" font-family="Menlo,Consolas,monospace" font-size="14" fill="#FBBF24" text-anchor="middle">Init Containers</text>
  <text x="520" y="432" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">sequential, exit 0</text>
  <text x="520" y="452" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">→ Initialized=True</text>
  <text x="520" y="472" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">retry w/ backoff on fail</text>

  <!-- arrow right from init to probes -->
  <line x1="660" y1="438" x2="740" y2="438" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- probes group -->
  <rect x="740" y="340" width="320" height="240" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="900" y="366" font-family="Menlo,Consolas,monospace" font-size="14" fill="#5EEAD4" text-anchor="middle">Probes</text>

  <!-- startupProbe -->
  <rect x="760" y="375" width="280" height="44" rx="4" fill="#1a2a3a" stroke="#A3E635" stroke-width="1.5"/>
  <text x="900" y="395" font-family="Menlo,Consolas,monospace" font-size="13" fill="#A3E635" text-anchor="middle">startupProbe</text>
  <text x="900" y="411" font-family="Menlo,Consolas,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">fail → delay liveness+readiness</text>

  <!-- readinessProbe -->
  <rect x="760" y="430" width="280" height="44" rx="4" fill="#1a2a3a" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="900" y="450" font-family="Menlo,Consolas,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">readinessProbe</text>
  <text x="900" y="466" font-family="Menlo,Consolas,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">fail → remove from Endpoints</text>

  <!-- livenessProbe -->
  <rect x="760" y="485" width="280" height="44" rx="4" fill="#1a2a3a" stroke="#f87171" stroke-width="1.5"/>
  <text x="900" y="505" font-family="Menlo,Consolas,monospace" font-size="13" fill="#f87171" text-anchor="middle">livenessProbe</text>
  <text x="900" y="521" font-family="Menlo,Consolas,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">fail → restart container</text>

  <!-- Running state -->
  <rect x="740" y="620" width="320" height="56" rx="6" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="900" y="648" font-family="Menlo,Consolas,monospace" font-size="16" fill="#A3E635" text-anchor="middle">phase=Running</text>
  <text x="900" y="667" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Ready=true, in Endpoints</text>

  <!-- arrow down probes to running -->
  <line x1="900" y1="580" x2="900" y2="620" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Terminating section -->
  <rect x="1140" y="340" width="360" height="200" rx="6" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1320" y="366" font-family="Menlo,Consolas,monospace" font-size="14" fill="#f87171" text-anchor="middle">Termination</text>
  <text x="1320" y="392" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">1. preStop hook</text>
  <text x="1320" y="414" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">2. SIGTERM</text>
  <text x="1320" y="436" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">3. gracePeriodSeconds</text>
  <text x="1320" y="458" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">4. SIGKILL (timeout)</text>
  <text x="1320" y="492" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">remove from Endpoints first</text>
  <text x="1320" y="512" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">→ Succeeded / Failed</text>

  <!-- arrow from Running to Termination -->
  <line x1="1060" y1="648" x2="1140" y2="480" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="1100" y="570" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">kubectl delete</text>

  <!-- phase flow labels -->
  <text x="50" y="175" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">phase=Pending</text>
  <text x="50" y="290" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">PodScheduled</text>
  <text x="50" y="400" font-family="Menlo,Consolas,monospace" font-size="12" fill="#94A3B8">ContainerCreating</text>

  <!-- conditions column -->
  <rect x="80" y="560" width="220" height="120" rx="6" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="190" y="582" font-family="Menlo,Consolas,monospace" font-size="13" fill="#94A3B8" text-anchor="middle">Conditions</text>
  <text x="190" y="602" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">PodScheduled=True</text>
  <text x="190" y="620" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Initialized=True</text>
  <text x="190" y="638" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">ContainersReady=True</text>
  <text x="190" y="656" font-family="Menlo,Consolas,monospace" font-size="12" fill="#5EEAD4" text-anchor="middle">Ready=True</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Chinese title -->
  <text x="60" y="840" font-family="Menlo,Consolas,monospace" font-size="46" fill="#F8FAFC">Pod 生命周期</text>
  <!-- English subtitle -->
  <text x="60" y="878" font-family="Menlo,Consolas,monospace" font-size="24" fill="#CBD5E1">From Pending to Running: the complete state transition path</text>
</svg>
