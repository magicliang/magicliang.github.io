<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Controller 与 KRaft：从 ZooKeeper 到内置共识</title>
  <desc id="desc">ZooKeeper 模式下的 Controller 选举与职责、KRaft 架构：内置 Raft 共识与元数据日志</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 08</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="250" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="229" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">KRaft Consensus</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">Controller 与 KRaft</tspan><tspan x="104" dy="64">从 ZooKeeper 到内置共识</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">ZooKeeper 模式下的 Controller 选举与职责</tspan><tspan x="108" dy="42">KRaft 架构：内置 Raft 共识与元数据日志</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- 左半：ZooKeeper 模式 -->
    <text x="960" y="200" font-size="15" fill="#64748b" font-weight="700" text-anchor="middle">ZooKeeper 模式</text>
    <!-- ZK 集群 -->
    <rect x="895" y="220" width="130" height="100" rx="10" fill="#64748b" opacity="0.08" stroke="#64748b" stroke-width="1.5"/>
    <text x="960" y="248" font-size="12" fill="#64748b" font-weight="700" text-anchor="middle">ZooKeeper Ensemble</text>
    <circle cx="925" cy="285" r="14" fill="#64748b" opacity="0.2" stroke="#64748b" stroke-width="1"/>
    <text x="925" y="289" font-size="9" fill="#64748b" font-weight="600" text-anchor="middle">ZK1</text>
    <circle cx="960" cy="285" r="14" fill="#64748b" opacity="0.2" stroke="#64748b" stroke-width="1"/>
    <text x="960" y="289" font-size="9" fill="#64748b" font-weight="600" text-anchor="middle">ZK2</text>
    <circle cx="995" cy="285" r="14" fill="#64748b" opacity="0.2" stroke="#64748b" stroke-width="1"/>
    <text x="995" y="289" font-size="9" fill="#64748b" font-weight="600" text-anchor="middle">ZK3</text>
    <!-- Controller Broker -->
    <rect x="910" y="350" width="100" height="40" rx="8" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
    <text x="960" y="375" font-size="12" fill="#f97316" font-weight="700" text-anchor="middle">Controller</text>
    <line x1="960" y1="320" x2="960" y2="350" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
    <!-- Brokers -->
    <rect x="880" y="410" width="60" height="32" rx="6" fill="#64748b" opacity="0.1" stroke="#64748b" stroke-width="1"/>
    <text x="910" y="431" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle">B-0</text>
    <rect x="950" y="410" width="60" height="32" rx="6" fill="#64748b" opacity="0.1" stroke="#64748b" stroke-width="1"/>
    <text x="980" y="431" font-size="10" fill="#64748b" font-weight="600" text-anchor="middle">B-1</text>
    <!-- 过渡箭头 -->
    <text x="1100" y="340" font-size="32" fill="#f97316" font-weight="800" text-anchor="middle">→</text>
    <text x="1100" y="365" font-size="12" fill="#f97316" font-weight="600" text-anchor="middle">KIP-500</text>
    <!-- 右半：KRaft 模式 -->
    <text x="1310" y="200" font-size="15" fill="#0ea5e9" font-weight="700" text-anchor="middle">KRaft 模式</text>
    <!-- Controller Quorum -->
    <rect x="1220" y="220" width="180" height="110" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1310" y="248" font-size="12" fill="#0ea5e9" font-weight="700" text-anchor="middle">Controller Quorum</text>
    <circle cx="1265" cy="290" r="18" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1265" y="295" font-size="9" fill="#0ea5e9" font-weight="700" text-anchor="middle">Active</text>
    <circle cx="1310" cy="290" r="16" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1"/>
    <text x="1310" y="295" font-size="9" fill="#0ea5e9" font-weight="600" text-anchor="middle">Voter</text>
    <circle cx="1355" cy="290" r="16" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1"/>
    <text x="1355" y="295" font-size="9" fill="#0ea5e9" font-weight="600" text-anchor="middle">Voter</text>
    <!-- __cluster_metadata -->
    <rect x="1230" y="355" width="160" height="36" rx="8" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1310" y="378" font-size="11" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">__cluster_metadata</text>
    <line x1="1310" y1="330" x2="1310" y2="355" stroke="#0ea5e9" stroke-width="1.2"/>
    <!-- Brokers -->
    <rect x="1235" y="415" width="60" height="32" rx="6" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <text x="1265" y="436" font-size="10" fill="#0ea5e9" font-weight="600" text-anchor="middle">B-0</text>
    <rect x="1305" y="415" width="60" height="32" rx="6" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <text x="1335" y="436" font-size="10" fill="#0ea5e9" font-weight="600" text-anchor="middle">B-1</text>
    <rect x="1375" y="415" width="60" height="32" rx="6" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <text x="1405" y="436" font-size="10" fill="#0ea5e9" font-weight="600" text-anchor="middle">B-2</text>
    <line x1="1310" y1="391" x2="1265" y2="415" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <line x1="1310" y1="391" x2="1335" y2="415" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <line x1="1310" y1="391" x2="1405" y2="415" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <!-- 对比标签 -->
    <text x="960" y="480" font-size="12" fill="#64748b" font-weight="600" text-anchor="middle">外部协调 + 临时节点</text>
    <text x="1310" y="480" font-size="12" fill="#0ea5e9" font-weight="600" text-anchor="middle">内置共识 + 元数据日志</text>
    <!-- 底部对比 -->
    <rect x="870" y="510" width="580" height="60" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="1160" y="535" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">ZK: 临时节点 + Watch → Controller 选举</text>
    <text x="1160" y="556" font-size="13" fill="#475569" font-weight="600" text-anchor="middle">KRaft: Raft 日志 + Quorum → Active Controller</text>
    <!-- 图例 -->
    <circle cx="880" cy="600" r="6" fill="#64748b" opacity="0.3"/>
    <text x="895" y="604" font-size="12" fill="#64748b">ZooKeeper</text>
    <circle cx="985" cy="600" r="6" fill="#0ea5e9" opacity="0.3"/>
    <text x="1000" y="604" font-size="12" fill="#0ea5e9">KRaft</text>
    <circle cx="1075" cy="600" r="6" fill="#f97316" opacity="0.3"/>
    <text x="1090" y="604" font-size="12" fill="#f97316">Controller</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="300" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="328" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="252" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
