<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Offset 管理：提交、重置与消费语义</title>
  <desc id="desc">consumer 读到哪里了，怎么记住</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 06</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="290" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="249" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Offset Management</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">Offset 管理</tspan><tspan x="104" dy="64">提交、重置与消费语义</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">consumer 读到哪里了</tspan><tspan x="108" dy="42">怎么记住</tspan></text>
  <!-- 右侧主图区：830,155 ~ 1490,715（660x560）-->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Partition 日志条 -->
    <text x="880" y="210" font-size="18" fill="#64748b" font-weight="700" class="mono">Partition-0 Log</text>
    <!-- 日志格子 -->
    <rect x="880" y="225" width="56" height="44" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="908" y="253" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle" class="mono">0</text>
    <rect x="940" y="225" width="56" height="44" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="968" y="253" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle" class="mono">1</text>
    <rect x="1000" y="225" width="56" height="44" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="1028" y="253" font-size="14" fill="#64748b" font-weight="600" text-anchor="middle" class="mono">2</text>
    <rect x="1060" y="225" width="56" height="44" rx="6" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1088" y="253" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">3</text>
    <rect x="1120" y="225" width="56" height="44" rx="6" fill="#0ea5e9" opacity="0.2" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1148" y="253" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">4</text>
    <rect x="1180" y="225" width="56" height="44" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
    <text x="1208" y="253" font-size="14" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">5</text>
    <rect x="1240" y="225" width="56" height="44" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
    <text x="1268" y="253" font-size="14" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">6</text>
    <rect x="1300" y="225" width="56" height="44" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
    <text x="1328" y="253" font-size="14" fill="#f97316" font-weight="700" text-anchor="middle" class="mono">7</text>
    <rect x="1360" y="225" width="56" height="44" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="1388" y="253" font-size="14" fill="#cbd5e1" font-weight="600" text-anchor="middle" class="mono">...</text>
    <!-- 三个指针 -->
    <!-- committed offset 指针 -->
    <line x1="1060" y1="285" x2="1060" y2="330" stroke="#16a34a" stroke-width="2.5"/>
    <polygon points="1060,280 1054,292 1066,292" fill="#16a34a"/>
    <text x="1060" y="352" font-size="14" fill="#16a34a" font-weight="700" text-anchor="middle">committed</text>
    <text x="1060" y="370" font-size="13" fill="#16a34a" font-weight="600" text-anchor="middle" class="mono">offset=3</text>
    <!-- current position 指针 -->
    <line x1="1180" y1="285" x2="1180" y2="410" stroke="#0ea5e9" stroke-width="2.5"/>
    <polygon points="1180,280 1174,292 1186,292" fill="#0ea5e9"/>
    <text x="1180" y="432" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle">position</text>
    <text x="1180" y="450" font-size="13" fill="#0ea5e9" font-weight="600" text-anchor="middle" class="mono">offset=5</text>
    <!-- log-end offset 指针 -->
    <line x1="1360" y1="285" x2="1360" y2="330" stroke="#f97316" stroke-width="2.5"/>
    <polygon points="1360,280 1354,292 1366,292" fill="#f97316"/>
    <text x="1360" y="352" font-size="14" fill="#f97316" font-weight="700" text-anchor="middle">LEO</text>
    <text x="1360" y="370" font-size="13" fill="#f97316" font-weight="600" text-anchor="middle" class="mono">offset=8</text>
    <!-- Consumer lag 标注 -->
    <line x1="1072" y1="395" x2="1348" y2="395" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="1210" y="390" font-size="13" fill="#ef4444" font-weight="700" text-anchor="middle">consumer lag = 5</text>
    <!-- __consumer_offsets 框 -->
    <rect x="880" y="490" width="560" height="60" rx="12" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1160" y="527" font-size="18" fill="#0ea5e9" font-weight="700" text-anchor="middle" class="mono">__consumer_offsets (compacted topic)</text>
    <!-- 提交箭头 -->
    <line x1="1060" y1="375" x2="1060" y2="490" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="1060,488 1054,476 1066,476" fill="#16a34a"/>
    <text x="1040" y="475" font-size="12" fill="#16a34a" font-weight="600" text-anchor="end">commit</text>
    <!-- auto vs manual 标签 -->
    <text x="920" y="590" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">auto-commit</text>
    <text x="1160" y="590" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">commitSync()</text>
    <text x="1370" y="590" font-size="15" fill="#64748b" font-weight="600" text-anchor="middle">commitAsync()</text>
    <!-- 分隔线 -->
    <line x1="1040" y1="570" x2="1040" y2="600" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="1270" y1="570" x2="1270" y2="600" stroke="#e2e8f0" stroke-width="1"/>
    <!-- 底部语义标签 -->
    <text x="1160" y="670" font-size="14" fill="#94a3b8" font-weight="600" text-anchor="middle" class="mono">at-least-once · at-most-once · exactly-once</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="160" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="188" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="216" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="244" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="272" cy="808" r="7" fill="#0ea5e9" opacity="1"/>
    <circle cx="300" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="328" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="356" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="384" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="412" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="440" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="468" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="496" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="524" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="552" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <circle cx="580" cy="808" r="4" fill="#cbd5e1" opacity="0.75"/>
    <rect x="104" y="834" width="504" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="104" y="834" width="196" height="6" rx="3" fill="#f97316"/>
  </g>
  <text x="104" y="780" font-size="23" fill="#64748b" font-weight="700" text-anchor="start">Apache Kafka / 深入系列</text>
  <text x="1480" y="808" font-size="24" fill="#64748b" font-weight="700" text-anchor="end">append-only log, distributed commit</text>
</svg>
