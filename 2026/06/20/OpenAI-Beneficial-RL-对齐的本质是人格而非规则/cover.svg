<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">对齐的本质是人格而非规则</title>
  <desc id="desc">从规则系统到人格特质：5%的有益数据驱动跨域对齐泛化</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#101630"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <radialGradient id="auraA" cx="30%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraB" cx="72%" cy="55%" r="42%">
      <stop offset="0%" stop-color="#34d399" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity=".9"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#a78bfa" stroke-opacity=".04"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .kicker { font-size: 20px; font-weight: 700; fill: #a78bfa; letter-spacing: 2px; }
      .heading { font-size: 52px; font-weight: 800; fill: #f1f5f9; }
      .sub { font-size: 22px; font-weight: 400; fill: #94a3b8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#auraA)"/>
  <rect width="1600" height="900" fill="url(#auraB)"/>

  <!-- Central persona nucleus -->
  <circle cx="800" cy="380" r="120" fill="url(#core)" opacity=".7"/>
  <circle cx="800" cy="380" r="60" fill="#a78bfa" opacity=".3" filter="url(#glow)"/>
  <circle cx="800" cy="380" r="18" fill="#e0e7ff" opacity=".9"/>

  <!-- Trait orbits -->
  <ellipse cx="800" cy="380" rx="200" ry="80" fill="none" stroke="#a78bfa" stroke-opacity=".25" stroke-width="1" transform="rotate(-15 800 380)"/>
  <ellipse cx="800" cy="380" rx="260" ry="105" fill="none" stroke="#34d399" stroke-opacity=".2" stroke-width="1" transform="rotate(10 800 380)"/>
  <ellipse cx="800" cy="380" rx="320" ry="130" fill="none" stroke="#60a5fa" stroke-opacity=".15" stroke-width="1" transform="rotate(-5 800 380)"/>

  <!-- Trait nodes on orbits -->
  <circle cx="620" cy="340" r="8" fill="#a78bfa" opacity=".8" filter="url(#glow)"/>
  <circle cx="980" cy="360" r="7" fill="#34d399" opacity=".8" filter="url(#glow)"/>
  <circle cx="720" cy="440" r="6" fill="#60a5fa" opacity=".7" filter="url(#glow)"/>
  <circle cx="900" cy="300" r="7" fill="#f9a8d4" opacity=".7" filter="url(#glow)"/>
  <circle cx="560" cy="390" r="5" fill="#fbbf24" opacity=".6" filter="url(#glow)"/>
  <circle cx="1040" cy="410" r="6" fill="#5eead4" opacity=".7" filter="url(#glow)"/>
  <circle cx="680" cy="280" r="5" fill="#c4b5fd" opacity=".6" filter="url(#glow)"/>
  <circle cx="930" cy="460" r="5" fill="#86efac" opacity=".6" filter="url(#glow)"/>

  <!-- Connection lines from core to traits (showing generalization) -->
  <line x1="800" y1="380" x2="620" y2="340" stroke="#a78bfa" stroke-opacity=".15" stroke-width="1"/>
  <line x1="800" y1="380" x2="980" y2="360" stroke="#34d399" stroke-opacity=".15" stroke-width="1"/>
  <line x1="800" y1="380" x2="720" y2="440" stroke="#60a5fa" stroke-opacity=".12" stroke-width="1"/>
  <line x1="800" y1="380" x2="900" y2="300" stroke="#f9a8d4" stroke-opacity=".12" stroke-width="1"/>
  <line x1="800" y1="380" x2="560" y2="390" stroke="#fbbf24" stroke-opacity=".1" stroke-width="1"/>
  <line x1="800" y1="380" x2="1040" y2="410" stroke="#5eead4" stroke-opacity=".12" stroke-width="1"/>

  <!-- Crossed-out rules (left side metaphor) -->
  <g opacity=".3" transform="translate(160, 320)">
    <rect x="0" y="0" width="140" height="20" rx="3" fill="#475569"/>
    <rect x="0" y="30" width="120" height="20" rx="3" fill="#475569"/>
    <rect x="0" y="60" width="130" height="20" rx="3" fill="#475569"/>
    <line x1="-10" y1="-10" x2="150" y2="90" stroke="#ef4444" stroke-width="2.5" stroke-opacity=".6"/>
    <line x1="150" y1="-10" x2="-10" y2="90" stroke="#ef4444" stroke-width="2.5" stroke-opacity=".6"/>
  </g>

  <!-- 5% label -->
  <text x="1240" y="360" class="font" font-size="72" font-weight="900" fill="#34d399" opacity=".25">5%</text>
  <text x="1240" y="395" class="font" font-size="16" fill="#34d399" opacity=".4">beneficial traits</text>

  <!-- Text content -->
  <text x="800" y="640" text-anchor="middle" class="font kicker">OPENAI BENEFICIAL RL · 2026</text>
  <text x="800" y="710" text-anchor="middle" class="font heading">对齐的本质是人格而非规则</text>
  <text x="800" y="770" text-anchor="middle" class="font sub">5% 有益特质数据 → 跨域泛化 → 能力与对齐同步提升</text>
</svg>
