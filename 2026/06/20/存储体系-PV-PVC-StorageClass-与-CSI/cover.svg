<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#101424"/>
      <stop offset="55%" style="stop-color:#17243A"/>
      <stop offset="100%" style="stop-color:#1F2E1F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- PVC box -->
  <rect x="80" y="200" width="220" height="110" rx="8" fill="none" stroke="#5EEAD4" stroke-width="2"/>
  <text x="190" y="248" font-family="Menlo,monospace" font-size="16" fill="#5EEAD4" text-anchor="middle">PVC</text>
  <text x="190" y="270" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">accessMode: RWO</text>
  <text x="190" y="290" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">storage: 20Gi</text>

  <!-- Arrow PVC -> PV -->
  <line x1="300" y1="255" x2="420" y2="255" stroke="#FBBF24" stroke-width="2" marker-end="url(#arr)"/>
  <text x="360" y="245" font-family="Menlo,monospace" font-size="12" fill="#FBBF24" text-anchor="middle">Bind</text>

  <!-- PV box -->
  <rect x="420" y="200" width="220" height="110" rx="8" fill="none" stroke="#FBBF24" stroke-width="2"/>
  <text x="530" y="248" font-family="Menlo,monospace" font-size="16" fill="#FBBF24" text-anchor="middle">PV</text>
  <text x="530" y="270" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">capacity: 20Gi</text>
  <text x="530" y="290" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">nfs / ebs / ceph</text>

  <!-- Arrow PV -> Storage -->
  <line x1="640" y1="255" x2="760" y2="255" stroke="#A3E635" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Physical Storage box -->
  <rect x="760" y="200" width="240" height="110" rx="8" fill="none" stroke="#A3E635" stroke-width="2"/>
  <text x="880" y="243" font-family="Menlo,monospace" font-size="16" fill="#A3E635" text-anchor="middle">Physical Storage</text>
  <text x="880" y="265" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">AWS EBS / NFS</text>
  <text x="880" y="285" font-family="Menlo,monospace" font-size="12" fill="#94A3B8" text-anchor="middle">Ceph / Local Disk</text>

  <!-- StorageClass box -->
  <rect x="340" y="380" width="260" height="100" rx="8" fill="none" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="470" y="420" font-family="Menlo,monospace" font-size="15" fill="#5EEAD4" text-anchor="middle">StorageClass</text>
  <text x="470" y="442" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">provisioner: ebs.csi.aws.com</text>
  <text x="470" y="462" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">reclaimPolicy: Delete</text>

  <!-- Arrow StorageClass -> PV (dynamic provisioning) -->
  <line x1="470" y1="380" x2="530" y2="310" stroke="#5EEAD4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <text x="530" y="370" font-family="Menlo,monospace" font-size="11" fill="#5EEAD4" text-anchor="middle">Dynamic</text>

  <!-- CSI section -->
  <rect x="1000" y="160" width="520" height="340" rx="10" fill="none" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="1260" y="195" font-family="Menlo,monospace" font-size="16" fill="#CBD5E1" text-anchor="middle">CSI Plugin Architecture</text>

  <!-- Controller Plugin -->
  <rect x="1020" y="215" width="220" height="120" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="1130" y="242" font-family="Menlo,monospace" font-size="13" fill="#FBBF24" text-anchor="middle">Controller Plugin</text>
  <text x="1130" y="262" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">CreateVolume</text>
  <text x="1130" y="280" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">ControllerPublish</text>
  <text x="1130" y="298" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">CreateSnapshot</text>
  <text x="1130" y="316" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">Deployment (cluster)</text>

  <!-- Node Plugin -->
  <rect x="1280" y="215" width="220" height="120" rx="6" fill="none" stroke="#A3E635" stroke-width="1.5"/>
  <text x="1390" y="242" font-family="Menlo,monospace" font-size="13" fill="#A3E635" text-anchor="middle">Node Plugin</text>
  <text x="1390" y="262" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">NodeStageVolume</text>
  <text x="1390" y="280" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">NodePublishVolume</text>
  <text x="1390" y="298" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">bind mount to Pod</text>
  <text x="1390" y="316" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">DaemonSet (per node)</text>

  <!-- kubelet -->
  <rect x="1130" y="370" width="220" height="80" rx="6" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="1240" y="403" font-family="Menlo,monospace" font-size="13" fill="#5EEAD4" text-anchor="middle">kubelet</text>
  <text x="1240" y="423" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">VolumeManager</text>
  <text x="1240" y="440" font-family="Menlo,monospace" font-size="11" fill="#94A3B8" text-anchor="middle">calls CSI via gRPC</text>

  <!-- kubelet -> Node Plugin -->
  <line x1="1350" y1="370" x2="1350" y2="335" stroke="#A3E635" stroke-width="1.5" marker-end="url(#arr2)"/>
  <!-- kubelet -> Controller -->
  <line x1="1130" y1="370" x2="1130" y2="335" stroke="#FBBF24" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ReclaimPolicy labels -->
  <text x="80" y="540" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">ReclaimPolicy:</text>
  <text x="80" y="560" font-family="Menlo,monospace" font-size="13" fill="#5EEAD4">  Retain  →  数据保留，手动清理</text>
  <text x="80" y="580" font-family="Menlo,monospace" font-size="13" fill="#FBBF24">  Delete  →  自动删除云盘</text>

  <!-- AccessMode labels -->
  <text x="80" y="620" font-family="Menlo,monospace" font-size="13" fill="#94A3B8">AccessMode:</text>
  <text x="80" y="640" font-family="Menlo,monospace" font-size="13" fill="#5EEAD4">  RWO → 单节点  |  RWX → 多节点  |  ROX → 多节点只读</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FBBF24"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A3E635"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5EEAD4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="80" y="830" font-family="Menlo,monospace" font-size="46" fill="#F8FAFC">存储体系：PV、PVC、StorageClass 与 CSI</text>
  <text x="80" y="872" font-family="Menlo,monospace" font-size="24" fill="#CBD5E1">Kubernetes Storage: PV, PVC, StorageClass and CSI</text>
</svg>
