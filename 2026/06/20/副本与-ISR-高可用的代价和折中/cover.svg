<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">副本与 ISR：高可用的代价和折中</title>
  <desc id="desc">Leader-Follower 副本模型、ISR 收缩与扩展、High Watermark 与 Leader Epoch 防日志分叉</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf7"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f3"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dbe4e6" stroke-width="1" opacity="0.55"/>
      <circle cx="0" cy="0" r="1.6" fill="#94a3b8" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.62"/>
  <!-- 装饰圆 -->
  <circle cx="1430" cy="88" r="190" fill="#0ea5e9" opacity="0.09"/>
  <circle cx="116" cy="742" r="240" fill="#16a34a" opacity="0.08"/>
  <path d="M 88 126 C 310 38, 498 102, 690 54" stroke="#f97316" stroke-width="8" stroke-linecap="round" opacity="0.34" fill="none"/>
  <!-- 系列标签 -->
  <text x="104" y="134" font-size="25" fill="#0ea5e9" font-weight="800">深入 KAFKA / 07</text>
  <!-- 主题胶囊 -->
  <rect x="104" y="164" width="280" height="46" rx="23" fill="#ffffff" opacity="0.86" stroke="#0ea5e9" stroke-width="2"/>
  <text x="244" y="195" font-size="25" fill="#111827" font-weight="800" text-anchor="middle">Replication &amp; ISR</text>
  <!-- 标题 -->
  <text x="104" y="304" font-size="52" fill="#111827" font-weight="850"><tspan x="104" dy="0">副本与 ISR</tspan><tspan x="104" dy="64">高可用的代价和折中</tspan></text>
  <!-- 副标题 -->
  <text x="108" y="458" font-size="29" fill="#475569" font-weight="650"><tspan x="108" dy="0">Leader-Follower 副本模型、ISR 收缩与扩展</tspan><tspan x="108" dy="42">High Watermark 与 Leader Epoch 防日志分叉</tspan></text>
  <!-- 右侧主图区 -->
  <g opacity="0.96">
    <rect x="830" y="155" width="660" height="560" rx="34" fill="#ffffff" opacity="0.88" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
    <!-- Leader 节点 -->
    <rect x="1010" y="195" width="300" height="72" rx="12" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
    <text x="1160" y="222" font-size="16" fill="#0ea5e9" font-weight="700" text-anchor="middle">LEADER (Broker-0)</text>
    <!-- Leader 日志段 -->
    <g transform="translate(1030, 238)">
      <rect x="0" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.6"/>
      <text x="20" y="15" font-size="10" fill="#fff" text-anchor="middle" class="mono">0</text>
      <rect x="44" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.6"/>
      <text x="64" y="15" font-size="10" fill="#fff" text-anchor="middle" class="mono">1</text>
      <rect x="88" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.6"/>
      <text x="108" y="15" font-size="10" fill="#fff" text-anchor="middle" class="mono">2</text>
      <rect x="132" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.6"/>
      <text x="152" y="15" font-size="10" fill="#fff" text-anchor="middle" class="mono">3</text>
      <rect x="176" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.6"/>
      <text x="196" y="15" font-size="10" fill="#fff" text-anchor="middle" class="mono">4</text>
      <rect x="220" y="0" width="40" height="22" rx="3" fill="#0ea5e9" opacity="0.3"/>
      <text x="240" y="15" font-size="10" fill="#0ea5e9" text-anchor="middle" class="mono">5</text>
    </g>
    <!-- HW 线 -->
    <line x1="1206" y1="232" x2="1206" y2="268" stroke="#f97316" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="1206" y="285" font-size="11" fill="#f97316" font-weight="700" text-anchor="middle">HW=4</text>
    <text x="1280" y="285" font-size="11" fill="#94a3b8" font-weight="600" text-anchor="middle">LEO=6</text>
    <!-- Fetch 箭头 -->
    <line x1="1060" y1="300" x2="1060" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <text x="1075" y="340" font-size="11" fill="#64748b" class="mono">Fetch</text>
    <line x1="1260" y1="300" x2="1260" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowDown)"/>
    <text x="1275" y="340" font-size="11" fill="#64748b" class="mono">Fetch</text>
    <!-- ISR 边界 -->
    <rect x="880" y="180" width="580" height="320" rx="20" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8,4" opacity="0.5"/>
    <text x="900" y="490" font-size="14" fill="#0ea5e9" font-weight="700" opacity="0.7">ISR = {0, 1, 2}</text>
    <!-- Follower 1 -->
    <rect x="920" y="385" width="230" height="62" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1035" y="410" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle">FOLLOWER (Broker-1)</text>
    <g transform="translate(940, 425)">
      <rect x="0" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="17" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">0</text>
      <rect x="38" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="55" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">1</text>
      <rect x="76" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="93" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">2</text>
      <rect x="114" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="131" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">3</text>
      <rect x="152" y="0" width="34" height="18" rx="3" fill="#cbd5e1" opacity="0.5"/>
      <text x="169" y="13" font-size="9" fill="#64748b" text-anchor="middle" class="mono">…</text>
    </g>
    <!-- Follower 2 -->
    <rect x="1170" y="385" width="230" height="62" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="1285" y="410" font-size="14" fill="#0ea5e9" font-weight="700" text-anchor="middle">FOLLOWER (Broker-2)</text>
    <g transform="translate(1190, 425)">
      <rect x="0" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="17" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">0</text>
      <rect x="38" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="55" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">1</text>
      <rect x="76" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="93" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">2</text>
      <rect x="114" y="0" width="34" height="18" rx="3" fill="#0ea5e9" opacity="0.5"/>
      <text x="131" y="13" font-size="9" fill="#fff" text-anchor="middle" class="mono">3</text>
      <rect x="152" y="0" width="34" height="18" rx="3" fill="#cbd5e1" opacity="0.5"/>
      <text x="169" y="13" font-size="9" fill="#64748b" text-anchor="middle" class="mono">…</text>
    </g>
    <!-- 说明 -->
    <text x="1160" y="540" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle">acks=all : 等待所有 ISR 副本确认</text>
    <text x="1160" y="562" font-size="13" fill="#64748b" font-weight="600" text-anchor="middle">min.insync.replicas=2 : 至少 2 个副本在线</text>
    <!-- 图例 -->
    <rect x="870" y="590" width="14" height="14" rx="3" fill="#0ea5e9" opacity="0.6"/>
    <text x="892" y="602" font-size="12" fill="#64748b">已复制</text>
    <rect x="960" y="590" width="14" height="14" rx="3" fill="#0ea5e9" opacity="0.3"/>
    <text x="982" y="602" font-size="12" fill="#64748b">未复制</text>
    <line x1="1060" y1="597" x2="1090" y2="597" stroke="#f97316" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="1098" y="602" font-size="12" fill="#64748b">High Watermark</text>
  </g>
  <!-- 底部进度点（18 篇） -->
  <g>
    <circle cx="104" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="132" cy="808" r="4" fill="#0ea5e9" opacity="0.75"/>
