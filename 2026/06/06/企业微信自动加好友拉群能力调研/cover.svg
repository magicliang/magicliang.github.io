<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="50%" stop-color="#1b3a4b"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg8)"/>
  <pattern id="dots8" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots8)"/>

  <!-- Top label -->
  <text x="60" y="72" font-size="13" fill="#07c160" letter-spacing="3" font-weight="600" opacity="0.9">ENTERPRISE WECHAT API</text>
  <line x1="60" y1="82" x2="305" y2="82" stroke="#07c160" stroke-width="1" opacity="0.4"/>

  <!-- Main title -->
  <text x="60" y="148" font-size="44" font-weight="700" fill="white">企业微信自动加好友拉群</text>
  <!-- Subtitle -->
  <text x="60" y="196" font-size="20" fill="#7090a0">官方 API 能力边界与架构方案</text>

  <!-- Flow diagram: chat-bubble style nodes -->
  <!-- Node 1: External Contact -->
  <g transform="translate(80, 260)">
    <rect x="0" y="0" width="190" height="70" rx="14" fill="#07c160" opacity="0.15"/>
    <rect x="0" y="0" width="190" height="70" rx="14" fill="none" stroke="#07c160" stroke-width="2"/>
    <!-- Bubble tail -->
    <polygon points="20,70 40,70 30,86" fill="#07c160" opacity="0.15"/>
    <polygon points="20,70 40,70 30,86" fill="none" stroke="#07c160" stroke-width="2"/>
    <text x="95" y="30" font-size="13" fill="#07c160" text-anchor="middle" font-weight="600">External Contact</text>
    <text x="95" y="52" font-size="11" fill="#5090a0" text-anchor="middle">外部联系人</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(280, 280)">
    <line x1="0" y1="25" x2="80" y2="25" stroke="#07c160" stroke-width="2"/>
    <polygon points="80,17 96,25 80,33" fill="#07c160"/>
    <text x="40" y="14" font-size="10" fill="#5090a0" text-anchor="middle">添加申请</text>
    <text x="40" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">external_userid</text>
  </g>

  <!-- Node 2: Add Friend -->
  <g transform="translate(376, 260)">
    <rect x="0" y="0" width="190" height="70" rx="14" fill="#1890ff" opacity="0.12"/>
    <rect x="0" y="0" width="190" height="70" rx="14" fill="none" stroke="#1890ff" stroke-width="2"/>
    <polygon points="20,70 40,70 30,86" fill="#1890ff" opacity="0.12"/>
    <polygon points="20,70 40,70 30,86" fill="none" stroke="#1890ff" stroke-width="2"/>
    <text x="95" y="30" font-size="13" fill="#1890ff" text-anchor="middle" font-weight="600">Add Friend API</text>
    <text x="95" y="52" font-size="11" fill="#5090a0" text-anchor="middle">加好友接口</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(576, 280)">
    <line x1="0" y1="25" x2="80" y2="25" stroke="#1890ff" stroke-width="2"/>
    <polygon points="80,17 96,25 80,33" fill="#1890ff"/>
    <text x="40" y="14" font-size="10" fill="#5090a0" text-anchor="middle">拉群邀请</text>
    <text x="40" y="42" font-size="9" fill="#4a6a7a" text-anchor="middle">appchat / groupchat</text>
  </g>

  <!-- Node 3: Group Chat -->
  <g transform="translate(672, 260)">
    <rect x="0" y="0" width="190" height="70" rx="14" fill="#07c160" opacity="0.15"/>
    <rect x="0" y="0" width="190" height="70" rx="14" fill="none" stroke="#07c160" stroke-width="2"/>
    <polygon points="20,70 40,70 30,86" fill="#07c160" opacity="0.15"/>
    <polygon points="20,70 40,70 30,86" fill="none" stroke="#07c160" stroke-width="2"/>
    <text x="95" y="30" font-size="13" fill="#07c160" text-anchor="middle" font-weight="600">Group Chat</text>
    <text x="95" y="52" font-size="11" fill="#5090a0" text-anchor="middle">微信群</text>
  </g>

  <!-- API Boundary box -->
  <rect x="80" y="390" width="420" height="140" rx="8" fill="#0d1b2a" stroke="#07c160" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="290" y="415" font-size="12" fill="#07c160" text-anchor="middle" opacity="0.8">官方 API 能力</text>
  <text x="100" y="440" font-size="11" fill="#5090a0">✓ 获取客户列表 (GET /customer)</text>
  <text x="100" y="460" font-size="11" fill="#5090a0">✓ 发送欢迎语 (welcome_code)</text>
  <text x="100" y="480" font-size="11" fill="#5090a0">✓ 群聊消息推送 (appchat/send)</text>
  <text x="100" y="500" font-size="11" fill="#ef4444" opacity="0.7">✗ 主动添加外部联系人（受限）</text>

  <!-- Architecture solution box -->
  <rect x="540" y="390" width="360" height="140" rx="8" fill="#0d1b2a" stroke="#1890ff" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="720" y="415" font-size="12" fill="#1890ff" text-anchor="middle" opacity="0.8">架构方案</text>
  <text x="560" y="440" font-size="11" fill="#5090a0">→ 渠道活码 (channel QR)</text>
  <text x="560" y="460" font-size="11" fill="#5090a0">→ 扫码自动欢迎 + 打标签</text>
  <text x="560" y="480" font-size="11" fill="#5090a0">→ Webhook 事件驱动拉群</text>
  <text x="560" y="500" font-size="11" fill="#07c160" opacity="0.8">→ 合规 + 可审计</text>

  <!-- Right: WeChat icon style badge -->
  <g transform="translate(960, 245)">
    <rect x="0" y="0" width="180" height="180" rx="30" fill="#07c160" opacity="0.12"/>
    <rect x="0" y="0" width="180" height="180" rx="30" fill="none" stroke="#07c160" stroke-width="2" opacity="0.5"/>
    <!-- Simple WeChat-style two bubbles -->
    <ellipse cx="80" cy="75" rx="52" ry="40" fill="#07c160" opacity="0.5"/>
    <ellipse cx="105" cy="105" rx="44" ry="34" fill="#1890ff" opacity="0.45"/>
    <circle cx="62" cy="72" r="5" fill="white" opacity="0.8"/>
    <circle cx="82" cy="72" r="5" fill="white" opacity="0.8"/>
    <circle cx="102" cy="72" r="5" fill="white" opacity="0.8"/>
    <circle cx="92" cy="103" r="4" fill="white" opacity="0.7"/>
    <circle cx="110" cy="103" r="4" fill="white" opacity="0.7"/>
    <text x="90" y="155" font-size="12" fill="#07c160" text-anchor="middle">企业微信</text>
    <text x="90" y="173" font-size="10" fill="#5090a0" text-anchor="middle">WeCom</text>
  </g>

  <!-- Bottom bar -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#1b3a4b" stroke-width="1"/>
  <text x="60" y="608" font-size="12" fill="#305060">守株阁 · 企业微信 · API 架构</text>
</svg>
