<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.55)"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(246,211,101,0.8)"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="2">WORLD MODELS &amp; JEPA ROADMAP</text>
  <text x="600" y="100" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">Joint Embedding Predictive Architecture</text>
  <!-- TOP BRANCH: x → Encoder → sx -->
  <!-- x input -->
  <rect x="72" y="183" width="115" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="130" y="207" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="22" font-weight="700" font-style="italic">x</text>
  <text x="130" y="228" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">input signal</text>
  <!-- Arrow x → Encoder top -->
  <line x1="187" y1="212" x2="265" y2="212" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Encoder top -->
  <rect x="269" y="183" width="145" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="342" y="207" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Encoder</text>
  <text x="342" y="227" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">f(x)</text>
  <!-- Arrow Encoder → sx -->
  <line x1="414" y1="212" x2="492" y2="212" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- sx embedding -->
  <rect x="496" y="183" width="135" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(180,140,240,0.45)" stroke-width="1.5"/>
  <text x="564" y="207" text-anchor="middle" fill="#c0a0f0" font-family="system-ui,sans-serif" font-size="20" font-weight="700" font-style="italic">s<tspan font-size="13" dy="4">x</tspan></text>
  <text x="564" y="232" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">embedding</text>
  <!-- BOTTOM BRANCH: y → Encoder → sy -->
  <!-- y input -->
  <rect x="72" y="390" width="115" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="130" y="414" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="22" font-weight="700" font-style="italic">y</text>
  <text x="130" y="435" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">target signal</text>
  <!-- Arrow y → Encoder bottom -->
  <line x1="187" y1="419" x2="265" y2="419" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Encoder bottom -->
  <rect x="269" y="390" width="145" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="342" y="414" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Encoder</text>
  <text x="342" y="434" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">g(y)</text>
  <!-- Arrow Encoder → sy -->
  <line x1="414" y1="419" x2="492" y2="419" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- sy embedding -->
  <rect x="496" y="390" width="135" height="58" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(180,140,240,0.45)" stroke-width="1.5"/>
  <text x="564" y="414" text-anchor="middle" fill="#c0a0f0" font-family="system-ui,sans-serif" font-size="20" font-weight="700" font-style="italic">s<tspan font-size="13" dy="4">y</tspan></text>
  <text x="564" y="439" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">target emb.</text>
  <!-- PREDICTOR center (accent gradient + glow) -->
  <rect x="648" y="278" width="205" height="75" rx="14" fill="url(#accent)" opacity="0.92" filter="url(#glow)"/>
  <text x="751" y="310" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="21" font-weight="700">Predictor</text>
  <text x="751" y="334" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-family="system-ui,sans-serif" font-size="13">p(sx, z) → ŝy</text>
  <!-- z latent variable (gold) -->
  <rect x="824" y="170" width="125" height="52" rx="10" fill="rgba(246,211,101,0.1)" stroke="rgba(246,211,101,0.38)" stroke-width="1.5"/>
  <text x="887" y="192" text-anchor="middle" fill="#f6d365" font-family="system-ui,sans-serif" font-size="20" font-weight="700" font-style="italic">z</text>
  <text x="887" y="212" text-anchor="middle" fill="#c09050" font-family="system-ui,sans-serif" font-size="11">latent variable</text>
  <!-- Arrow z → Predictor -->
  <line x1="880" y1="222" x2="826" y2="288" stroke="rgba(246,211,101,0.52)" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gold)"/>
  <!-- Arrow sx → Predictor -->
  <line x1="631" y1="212" x2="674" y2="287" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Arrow Predictor → ŝy -->
  <line x1="751" y1="353" x2="751" y2="402" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- ŝy predicted embedding (dashed border) -->
  <rect x="683" y="406" width="136" height="58" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(180,140,240,0.52)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="751" y="430" text-anchor="middle" fill="#c0a0f0" font-family="system-ui,sans-serif" font-size="20" font-weight="700" font-style="italic">ŝ<tspan font-size="13" dy="4">y</tspan></text>
  <text x="751" y="455" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="11">predicted emb.</text>
  <!-- Loss comparison label -->
  <line x1="683" y1="438" x2="633" y2="430" stroke="rgba(220,120,80,0.5)" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="590" y="460" text-anchor="middle" fill="rgba(220,120,80,0.65)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">minimize ‖ŝy − sy‖</text>
  <!-- Right side note -->
  <text x="1060" y="300" text-anchor="middle" fill="rgba(180,180,255,0.45)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">No pixel</text>
  <text x="1060" y="318" text-anchor="middle" fill="rgba(180,180,255,0.45)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">reconstruction</text>
  <text x="1060" y="336" text-anchor="middle" fill="rgba(180,180,255,0.45)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">needed</text>
  <!-- Bottom formula -->
  <text x="600" y="508" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="13" opacity="0.75">Predict in embedding space · Avoid generative collapse · Learn structure</text>
  <!-- Series label pill -->
  <rect x="440" y="555" width="320" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">LeCun LLM &amp; AGI Series</text>
</svg>
