<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="28" font-weight="700" letter-spacing="2">OBJECTIVE-DRIVEN AI ARCHITECTURE</text>
  <text x="600" y="104" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="16">LeCun's Path Towards Autonomous Machine Intelligence</text>
  <!-- World Model (center) -->
  <rect x="460" y="240" width="280" height="80" rx="12" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <text x="600" y="287" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="22" font-weight="700">World Model</text>
  <!-- Perception -->
  <rect x="80" y="250" width="180" height="60" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="170" y="286" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17">Perception</text>
  <!-- Cost Module -->
  <rect x="940" y="250" width="180" height="60" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="1030" y="286" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17">Cost Module</text>
  <!-- Actor -->
  <rect x="510" y="400" width="180" height="60" rx="10" fill="rgba(255,255,255,0.07)" stroke="#fc5c7d" stroke-width="1.5"/>
  <text x="600" y="436" text-anchor="middle" fill="#fc5c7d" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Actor / Planner</text>
  <!-- Memory -->
  <rect x="510" y="130" width="180" height="60" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="600" y="166" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17">Memory</text>
  <!-- LLM (interface) -->
  <rect x="80" y="410" width="180" height="60" rx="10" fill="rgba(246,211,101,0.1)" stroke="#f6d365" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="170" y="446" text-anchor="middle" fill="#f6d365" font-family="system-ui,sans-serif" font-size="17">LLM Interface</text>
  <!-- Configurator -->
  <rect x="940" y="410" width="180" height="60" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="1030" y="446" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17">Configurator</text>
  <!-- Arrows -->
  <g stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.5)"/></marker></defs>
    <!-- Perception to World Model -->
    <line x1="260" y1="280" x2="456" y2="280"/>
    <!-- World Model to Cost -->
    <line x1="740" y1="280" x2="936" y2="280"/>
    <!-- Memory to World Model -->
    <line x1="600" y1="190" x2="600" y2="236"/>
    <!-- World Model to Actor -->
    <line x1="600" y1="320" x2="600" y2="396"/>
    <!-- LLM to Perception -->
    <line x1="170" y1="410" x2="170" y2="314"/>
    <!-- Configurator to Cost -->
    <line x1="1030" y1="410" x2="1030" y2="314"/>
  </g>
  <!-- Bottom label -->
  <text x="600" y="540" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="14" opacity="0.8">state + action → predicted future state → cost → selected action</text>
  <!-- Series label -->
  <rect x="440" y="570" width="320" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="590" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">LeCun LLM &amp; AGI Series</text>
</svg>