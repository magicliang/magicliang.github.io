<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <linearGradient id="funnel1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#fda085" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="funnel2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#fda085" stop-opacity="0.52"/>
    </linearGradient>
    <linearGradient id="funnel3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#fda085" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.55)"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(246,211,101,0.8)"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(102,126,234,0.8)"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="23" font-weight="700" letter-spacing="2">DATA BOTTLENECK &amp; AUTONOMOUS LEARNING</text>
  <text x="600" y="97" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">Electronic Fruit Fly &amp; Self-Supervised Path</text>
  <!-- FUNNEL LEFT SIDE -->
  <!-- Level 1: Internet Text (widest, gold) -->
  <rect x="55" y="155" width="390" height="68" rx="10" fill="url(#funnel1)" stroke="rgba(246,211,101,0.45)" stroke-width="1.5"/>
  <text x="250" y="184" text-anchor="middle" fill="#1a0e00" font-family="system-ui,sans-serif" font-size="17" font-weight="700">Internet Text &amp; Images</text>
  <text x="250" y="207" text-anchor="middle" fill="#2a1800" font-family="system-ui,sans-serif" font-size="12">Trillions of tokens — but shallow</text>
  <!-- Funnel neck 1→2 -->
  <polygon points="135,223 365,223 320,268 180,268" fill="rgba(246,211,101,0.1)" stroke="rgba(246,211,101,0.18)" stroke-width="1"/>
  <!-- Level 2: Curated Data (medium) -->
  <rect x="130" y="271" width="240" height="63" rx="10" fill="url(#funnel2)" stroke="rgba(246,211,101,0.35)" stroke-width="1.5"/>
  <text x="250" y="297" text-anchor="middle" fill="#1a0e00" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Curated Data</text>
  <text x="250" y="318" text-anchor="middle" fill="#2a1800" font-family="system-ui,sans-serif" font-size="12">Filtered, labeled, structured</text>
  <!-- Funnel neck 2→3 -->
  <polygon points="172,334 328,334 298,378 202,378" fill="rgba(246,211,101,0.07)" stroke="rgba(246,211,101,0.12)" stroke-width="1"/>
  <!-- Level 3: Embodied Experience (narrow) -->
  <rect x="175" y="381" width="150" height="60" rx="10" fill="url(#funnel3)" stroke="rgba(246,211,101,0.28)" stroke-width="1.5"/>
  <text x="250" y="405" text-anchor="middle" fill="#c09050" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Embodied Exp.</text>
  <text x="250" y="425" text-anchor="middle" fill="#8a6030" font-family="system-ui,sans-serif" font-size="11">Rich but scarce</text>
  <!-- Funnel label -->
  <text x="250" y="472" text-anchor="middle" fill="rgba(246,211,101,0.5)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">Data bottleneck narrows</text>
  <!-- Vertical divider -->
  <line x1="510" y1="140" x2="510" y2="500" stroke="rgba(255,255,255,0.09)" stroke-width="1" stroke-dasharray="5,5"/>
  <!-- RIGHT SIDE: Electronic Fruit Fly circle -->
  <circle cx="800" cy="308" r="84" fill="rgba(102,126,234,0.11)" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="800" y="300" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Electronic</text>
  <text x="800" y="319" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Fruit Fly</text>
  <text x="800" y="338" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="11">Minimal agent</text>
  <!-- Autonomous learning loop arrows around circle -->
  <!-- Top: Sense -->
  <path d="M 758 228 A 84 84 0 0 1 842 228" stroke="rgba(102,126,234,0.72)" stroke-width="2" fill="none" marker-end="url(#arrow-accent)"/>
  <text x="800" y="216" text-anchor="middle" fill="#a0b0f0" font-family="system-ui,sans-serif" font-size="12">Sense</text>
  <!-- Right: Act -->
  <path d="M 882 265 A 84 84 0 0 1 882 351" stroke="rgba(102,126,234,0.72)" stroke-width="2" fill="none" marker-end="url(#arrow-accent)"/>
  <text x="918" y="315" text-anchor="middle" fill="#a0b0f0" font-family="system-ui,sans-serif" font-size="12">Act</text>
  <!-- Bottom: Learn -->
  <path d="M 842 388 A 84 84 0 0 1 758 388" stroke="rgba(102,126,234,0.72)" stroke-width="2" fill="none" marker-end="url(#arrow-accent)"/>
  <text x="800" y="408" text-anchor="middle" fill="#a0b0f0" font-family="system-ui,sans-serif" font-size="12">Learn</text>
  <!-- Left: Model -->
  <path d="M 718 351 A 84 84 0 0 1 718 265" stroke="rgba(102,126,234,0.72)" stroke-width="2" fill="none" marker-end="url(#arrow-accent)"/>
  <text x="680" y="315" text-anchor="middle" fill="#a0b0f0" font-family="system-ui,sans-serif" font-size="12">Model</text>
  <!-- Self-supervised label -->
  <text x="800" y="460" text-anchor="middle" fill="rgba(180,180,255,0.52)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">Self-supervised · No human labels</text>
  <!-- Scale-up arrow (right) -->
  <line x1="887" y1="308" x2="990" y2="308" stroke="rgba(246,211,101,0.45)" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-gold)"/>
  <text x="1060" y="290" text-anchor="middle" fill="rgba(246,211,101,0.65)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">Scale toward</text>
  <text x="1060" y="307" text-anchor="middle" fill="rgba(246,211,101,0.65)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">mammal-level</text>
  <text x="1060" y="324" text-anchor="middle" fill="rgba(246,211,101,0.65)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">intelligence</text>
  <!-- Bottom formula -->
  <text x="600" y="508" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="13" opacity="0.75">No labels needed · World model · Curiosity-driven autonomous exploration</text>
  <!-- Series label pill -->
  <rect x="440" y="555" width="320" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">LeCun LLM &amp; AGI Series</text>
</svg>
