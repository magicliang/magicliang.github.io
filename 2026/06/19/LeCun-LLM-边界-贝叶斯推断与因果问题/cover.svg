<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(220,80,80,0.7)"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="2">LLM BOUNDARY: BAYESIAN &amp; CAUSAL</text>
  <text x="600" y="100" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">Why Token Prediction Cannot Capture Reasoning</text>
  <!-- LLM box (left, accent gradient) -->
  <rect x="75" y="225" width="190" height="75" rx="12" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <text x="170" y="257" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="21" font-weight="700">LLM</text>
  <text x="170" y="280" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="system-ui,sans-serif" font-size="12">Token Predictor  P(w|ctx)</text>
  <!-- Arrow LLM → Next Token -->
  <line x1="265" y1="263" x2="345" y2="263" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Next Token box -->
  <rect x="349" y="230" width="175" height="65" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="437" y="258" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Next Token</text>
  <text x="437" y="278" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="12">argmax P(w|context)</text>
  <!-- Barrier dashed vertical line -->
  <line x1="595" y1="155" x2="595" y2="495" stroke="rgba(220,60,60,0.45)" stroke-width="2" stroke-dasharray="8,5"/>
  <!-- X mark on barrier -->
  <text x="595" y="308" text-anchor="middle" fill="rgba(220,60,60,0.88)" font-family="system-ui,sans-serif" font-size="40" font-weight="700" filter="url(#glow)">✕</text>
  <text x="595" y="344" text-anchor="middle" fill="rgba(220,80,80,0.6)" font-family="system-ui,sans-serif" font-size="11">LLM cannot cross</text>
  <!-- Dashed blocked arrows toward barrier -->
  <line x1="526" y1="250" x2="587" y2="250" stroke="rgba(200,80,80,0.5)" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-red)"/>
  <line x1="526" y1="400" x2="587" y2="400" stroke="rgba(200,80,80,0.5)" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-red)"/>
  <!-- Bayesian Inference box (right top, dashed border) -->
  <rect x="660" y="185" width="250" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(150,150,220,0.4)" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="785" y="220" text-anchor="middle" fill="#b0b0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Bayesian Inference</text>
  <text x="785" y="244" text-anchor="middle" fill="#6a6a9a" font-family="system-ui,sans-serif" font-size="12">P(hypothesis | evidence)</text>
  <text x="785" y="262" text-anchor="middle" fill="#6a6a9a" font-family="system-ui,sans-serif" font-size="12">Uncertainty quantification</text>
  <!-- Causal Reasoning box (right bottom, dashed border) -->
  <rect x="660" y="345" width="250" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(150,150,220,0.4)" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="785" y="380" text-anchor="middle" fill="#b0b0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Causal Reasoning</text>
  <text x="785" y="403" text-anchor="middle" fill="#6a6a9a" font-family="system-ui,sans-serif" font-size="12">do(X) → Y · Counterfactuals</text>
  <text x="785" y="421" text-anchor="middle" fill="#6a6a9a" font-family="system-ui,sans-serif" font-size="12">Intervention &amp; Confounding</text>
  <!-- Right-side note -->
  <text x="1010" y="270" text-anchor="middle" fill="rgba(180,180,255,0.42)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">Unreachable by</text>
  <text x="1010" y="287" text-anchor="middle" fill="rgba(180,180,255,0.42)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">token prediction</text>
  <!-- Bottom formula -->
  <text x="600" y="508" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="13" opacity="0.75">P(next token | context)  ≠  P(cause | effect)  ≠  do-calculus</text>
  <!-- Series label pill -->
  <rect x="440" y="555" width="320" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">LeCun LLM &amp; AGI Series</text>
</svg>
