<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#fda085"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.55)"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(246,211,101,0.75)"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" fill="url(#gold)" font-family="system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="2">VLA, ROBOTICS &amp; EMBODIED AI</text>
  <text x="600" y="100" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">Physical Intelligence Beyond Language Models</text>
  <!-- VLA center box (accent gradient + glow) -->
  <rect x="460" y="237" width="280" height="78" rx="14" fill="url(#accent)" opacity="0.92" filter="url(#glow)"/>
  <text x="600" y="271" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="22" font-weight="700">VLA Agent</text>
  <text x="600" y="295" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="system-ui,sans-serif" font-size="13">Vision-Language-Action</text>
  <!-- Vision box (top-left) -->
  <rect x="120" y="155" width="185" height="65" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="213" y="183" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Vision</text>
  <text x="213" y="204" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="12">Perception / Sensors</text>
  <!-- Language box (top-right) -->
  <rect x="895" y="155" width="185" height="65" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="988" y="183" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Language</text>
  <text x="988" y="204" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="12">Instruction / Goal</text>
  <!-- Action box (bottom-left) -->
  <rect x="120" y="397" width="185" height="65" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text x="213" y="425" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Action</text>
  <text x="213" y="446" text-anchor="middle" fill="#888" font-family="system-ui,sans-serif" font-size="12">Motor Control</text>
  <!-- Physical World box (bottom-center, gold border) -->
  <rect x="460" y="397" width="280" height="65" rx="10" fill="rgba(246,211,101,0.08)" stroke="rgba(246,211,101,0.38)" stroke-width="1.5"/>
  <text x="600" y="426" text-anchor="middle" fill="#f6d365" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Physical World</text>
  <text x="600" y="447" text-anchor="middle" fill="#c09050" font-family="system-ui,sans-serif" font-size="12">3D Space · Physics · Objects</text>
  <!-- Arrows: Vision → VLA -->
  <line x1="305" y1="190" x2="456" y2="263" stroke="rgba(255,255,255,0.38)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Arrows: Language → VLA -->
  <line x1="895" y1="190" x2="744" y2="263" stroke="rgba(255,255,255,0.38)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Arrows: VLA → Action -->
  <line x1="460" y1="297" x2="305" y2="405" stroke="rgba(255,255,255,0.38)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Arrows: VLA → Physical World -->
  <line x1="600" y1="315" x2="600" y2="393" stroke="rgba(255,255,255,0.38)" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- Feedback arc: Physical World → Vision -->
  <path d="M 460 430 C 330 430 260 360 260 310 C 260 270 265 230 308 212" stroke="rgba(246,211,101,0.5)" stroke-width="1.6" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow-gold)"/>
  <text x="268" y="328" text-anchor="middle" fill="rgba(246,211,101,0.52)" font-family="system-ui,sans-serif" font-size="11" font-style="italic">feedback</text>
  <!-- Right side note -->
  <text x="990" y="370" text-anchor="middle" fill="rgba(180,180,255,0.5)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">Embodied loop:</text>
  <text x="990" y="388" text-anchor="middle" fill="rgba(180,180,255,0.5)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">perceive → plan → act</text>
  <!-- Bottom formula -->
  <text x="600" y="505" text-anchor="middle" fill="#667eea" font-family="system-ui,sans-serif" font-size="13" opacity="0.75">Language alone ≠ Physical Grounding · Action ≠ Token</text>
  <!-- Series label pill -->
  <rect x="440" y="555" width="320" height="30" rx="15" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">LeCun LLM &amp; AGI Series</text>
</svg>
