<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Aggregation Framework cover</title>
  <desc id="desc">Bucket, metric, and pipeline aggregation layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Aggregation</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">bucket · metric · pipeline · nested composition</text>
  </g>
  <g transform="translate(130 270)">
    <rect x="0" y="0" width="260" height="70" rx="14" fill="url(#hot)"/>
    <text x="20" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">Bucket Aggs</text>
    <text x="20" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="13">terms · date_histogram · range</text>
    <rect x="290" y="0" width="260" height="70" rx="14" fill="url(#cool)"/>
    <text x="310" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">Metric Aggs</text>
    <text x="310" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="13">avg · sum · cardinality · percentiles</text>
    <rect x="580" y="0" width="260" height="70" rx="14" fill="#dbeafe" opacity="0.94"/>
    <text x="600" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">Pipeline Aggs</text>
    <text x="600" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="13">derivative · moving_avg · bucket_sort</text>
  </g>
  <g transform="translate(130 390)">
    <path d="M130 0 V40" stroke="#f97316" stroke-width="3"/><path d="M420 0 V40" stroke="#2dd4bf" stroke-width="3"/><path d="M710 0 V40" stroke="#93c5fd" stroke-width="3"/>
    <rect x="0" y="50" width="840" height="56" rx="14" fill="#f8fafc" opacity="0.08"/>
    <rect x="0" y="50" width="840" height="56" rx="14" fill="none" stroke="#dbeafe" opacity="0.25"/>
    <text x="24" y="84" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">query → filter docs → bucket → metric → pipeline → response</text>
  </g>
  <g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">real-time analytics on search results via doc values</text></g>
</svg>
