<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Segment Merge and ILM cover</title><desc id="desc">Segment lifecycle: write, merge, ILM tiered storage.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Merge &amp; ILM</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">segment merge · tiered merge policy · hot-warm-cold-frozen</text></g><g transform="translate(100 280)"><rect x="0" y="0" width="60" height="40" rx="6" fill="#94a3b8" opacity="0.6"/><rect x="70" y="0" width="60" height="40" rx="6" fill="#94a3b8" opacity="0.6"/><rect x="140" y="0" width="60" height="40" rx="6" fill="#94a3b8" opacity="0.6"/><rect x="210" y="0" width="60" height="40" rx="6" fill="#94a3b8" opacity="0.6"/><text x="10" y="26" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="12">s0</text><text x="80" y="26" fill="#f8fafc" font