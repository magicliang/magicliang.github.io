<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Lucene Internals cover</title>
  <desc id="desc">Segment structure with inverted index, doc values, and stored fields.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Lucene Internals</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">segment · inverted index · doc values · stored fields</text>
  </g>
  <g transform="translate(130 260)">
    <text x="0" y="-12" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">SEGMENT (immutable)</text>
    <rect x="0" y="8" width="420" height="220" rx="16" fill="#f8fafc" opacity="0.08"/>
    <rect x="0" y="8" width="420" height="220" rx="16" fill="none" stroke="#dbeafe" opacity="0.3"/>
    <rect x="20" y="30" width="170" height="50" rx="10" fill="url(#hot)"/>
    <text x="36" y="62" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Inverted Index</text>
    <rect x="20" y="95" width="170" height="50" rx="10" fill="url(#cool)"/>
    <text x="50" y="127" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Doc Values</text>
    <rect x="20" y="160" width="170" height="50" rx="10" fill="#e0e7ff" opacity="0.9"/>
    <text x="36" y="192" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Stored Fields</text>
    <rect x="230" y="30" width="170" height="50" rx="10" fill="#fef3c7" opacity="0.9"/>
    <text x="272" y="62" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Norms</text>
    <rect x="230" y="95" width="170" height="50" rx="10" fill="#ccfbf1" opacity="0.9"/>
    <text x="272" y="127" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Points</text>
    <rect x="230" y="160" width="170" height="50" rx="10" fill="#dbeafe" opacity="0.9"/>
    <text x="252" y="192" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Term Vectors</text>
  </g>
  <g transform="translate(620 260)">
    <text x="0" y="-12" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">SHARD = Lucene Index</text>
    <rect x="0" y="16" width="120" height="56" rx="10" fill="#94a3b8" opacity="0.5"/><text x="16" y="50" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Segment 0</text>
    <rect x="0" y="84" width="120" height="56" rx="10" fill="#94a3b8" opacity="0.5"/><text x="16" y="118" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Segment 1</text>
    <rect x="0" y="152" width="120" height="56" rx="10" fill="#94a3b8" opacity="0.5"/><text x="16" y="186" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Segment 2</text>
    <path d="M140 44 H200" stroke="url(#hot)" stroke-width="4" stroke-linecap="round"/>
    <path d="M140 112 H200" stroke="url(#hot)" stroke-width="4" stroke-linecap="round"/>
    <path d="M140 112 C170 112 170 180 200 180" fill="none" stroke="url(#cool)" stroke-width="3" stroke-linecap="round"/>
    <rect x="210" y="90" width="160" height="56" rx="12" fill="url(#cool)" opacity="0.2"/>
    <rect x="210" y="90" width="160" height="56" rx="12" fill="none" stroke="#38bdf8" opacity="0.6"/>
    <text x="240" y="124" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="17" font-weight="700">merge →</text>
  </g>
  <g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">segments are immutable; new writes create new segments</text></g>
</svg>
