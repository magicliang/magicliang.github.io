<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Production Operations cover</title><desc id="desc">Layered monitoring: cluster, node, index, query diagnostics.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Production Ops</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">cluster health · node resources · index metrics · troubleshooting</text></g><g transform="translate(130 270)"><rect x="0" y="0" width="840" height="50" rx="10" fill="url(#hot)" opacity="0.2"/><rect x="0" y="0" width="840" height="50" rx="10" fill="none" stroke="#f97316" opacity="0.5"/><text x="24" y="32" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">L1  Cluster Health: green / yellow / red</text><rect x="0" y="64" width="840" height="50" rx="10" fill="url(#cool)" opacity="0.15"/><rect x="0" y="64" width="840" height="50" rx="10" fill="none" stroke="#2dd4bf" opacity="0.4"/><text x="24" y="96" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">L2  Node Resources: JVM heap, GC, disk, filesystem cache</text><rect x="0" y="128" width="840" height="50" rx="10" fill="#dbeafe" opacity="0.1"/><rect x="0" y="128" width="840" height="50" rx="10" fill="none" stroke="#93c5fd" opacity="0.4"/><text x="24" y="160" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">L3  Index Performance: indexing rate, search latency, rejections</text><rect x="0" y="192" width="840" height="50" rx="10" fill="#f8fafc" opacity="0.06"/><rect x="0" y="192" width="840" height="50" rx="10" fill="none" stroke="#94a3b8" opacity="0.3"/><text x="24" y="224" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">L4  Query Diagnostics: slow log, profile, allocation explain</text></g><g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">monitor from top (cluster) down to bottom (individual queries)</text></g></svg>
