<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BM25 Scoring cover</title>
  <desc id="desc">BM25 scoring factors: IDF, term frequency saturation, field length normalization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">BM25 Scoring</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">IDF · term frequency saturation · length normalization</text>
  </g>
  <g transform="translate(130 280)">
    <rect x="0" y="0" width="240" height="80" rx="14" fill="url(#hot)"/>
    <text x="20" y="32" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">IDF</text>
    <text x="20" y="58" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14">rare terms score higher</text>
    <rect x="270" y="0" width="240" height="80" rx="14" fill="url(#cool)"/>
    <text x="290" y="32" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">TF Saturation</text>
    <text x="290" y="58" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14">diminishing returns on freq</text>
    <rect x="540" y="0" width="240" height="80" rx="14" fill="#dbeafe" opacity="0.94"/>
    <text x="560" y="32" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">Length Norm</text>
    <text x="560" y="58" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14">shorter docs score higher</text>
  </g>
  <g transform="translate(130 410)">
    <path d="M120 0 V40" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <path d="M390 0 V40" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
    <path d="M660 0 V40" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
    <path d="M120 40 H660" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <rect x="280" y="50" width="220" height="56" rx="14" fill="#f8fafc" opacity="0.12"/>
    <rect x="280" y="50" width="220" height="56" rx="14" fill="none" stroke="#f97316" opacity="0.5"/>
    <text x="310" y="84" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="700">score = × × </text>
  </g>
  <g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">score = IDF × TF_saturation(k1) × length_norm(b)</text></g>
</svg>
