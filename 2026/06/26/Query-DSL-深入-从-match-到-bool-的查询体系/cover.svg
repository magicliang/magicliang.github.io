<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Query DSL cover</title>
  <desc id="desc">Query type taxonomy: full-text, exact, geo, compound queries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Query DSL</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">full-text · exact match · fuzzy · geo · bool composition</text>
  </g>
  <g transform="translate(100 250)">
    <rect x="0" y="0" width="230" height="56" rx="12" fill="url(#hot)"/>
    <text x="18" y="24" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Full-Text (analyzer)</text>
    <text x="18" y="44" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">match · match_phrase · fuzzy</text>
    <rect x="250" y="0" width="230" height="56" rx="12" fill="url(#cool)"/>
    <text x="268" y="24" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Exact (no analyzer)</text>
    <text x="268" y="44" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">term · terms · range · exists</text>
    <rect x="500" y="0" width="230" height="56" rx="12" fill="#ccfbf1" opacity="0.94"/>
    <text x="518" y="24" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Geo (spatial)</text>
    <text x="518" y="44" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">geo_distance · geo_bbox · shape</text>
    <rect x="750" y="0" width="230" height="56" rx="12" fill="#e0e7ff" opacity="0.94"/>
    <text x="768" y="24" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Compound</text>
    <text x="768" y="44" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">bool · boosting · dis_max</text>
  </g>
  <g transform="translate(100 350)">
    <path d="M115 0 V30" stroke="#f97316" stroke-width="2" stroke-dasharray="5 4"/>
    <path d="M365 0 V30" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="5 4"/>
    <path d="M615 0 V30" stroke="#86efac" stroke-width="2" stroke-dasharray="5 4"/>
    <path d="M865 0 V30" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="5 4"/>
    <rect x="0" y="40" width="980" height="70" rx="16" fill="#f8fafc" opacity="0.08"/>
    <rect x="0" y="40" width="980" height="70" rx="16" fill="none" stroke="#dbeafe" opacity="0.25"/>
    <text x="24" y="72" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">query context (scored)</text>
    <text x="24" y="96" fill="#94a3b8" font-family="Inter, PingFang SC, sans-serif" font-size="15">must / should → BM25</text>
    <text x="500" y="72" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="600">filter context (not scored, cacheable)</text>
    <text x="500" y="96" fill="#94a3b8" font-family="Inter, PingFang SC, sans-serif" font-size="15">filter / must_not → bitset</text>
  </g>
  <g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">query context scores with BM25; filter context caches as bitsets</text></g>
</svg>
