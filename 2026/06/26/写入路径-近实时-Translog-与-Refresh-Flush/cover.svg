<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Write Path cover</title>
  <desc id="desc">Near-real-time write path: buffer, translog, refresh, flush.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Write Path</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">near-real-time · translog · refresh · flush</text>
  </g>
  <g transform="translate(100 270)">
    <rect x="0" y="0" width="130" height="60" rx="12" fill="url(#hot)"/>
    <text x="16" y="36" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Document</text>
    <path d="M145 30 H190" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
    <path d="M175 18 L195 30 L175 42" fill="none" stroke="#facc15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="205" y="0" width="160" height="60" rx="12" fill="#fef3c7" opacity="0.9"/>
    <text x="220" y="26" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">In-Memory</text>
    <text x="220" y="46" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Buffer</text>
    <path d="M380 30 H425" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
    <text x="382" y="80" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="14">refresh (1s)</text>
    <rect x="440" y="0" width="160" height="60" rx="12" fill="url(#cool)"/>
    <text x="460" y="26" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">New Segment</text>
    <text x="460" y="46" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14">(searchable)</text>
    <path d="M615 30 H660" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <text x="618" y="80" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="14">flush</text>
    <rect x="675" y="0" width="160" height="60" rx="12" fill="#dbeafe" opacity="0.94"/>
    <text x="695" y="26" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Committed</text>
    <text x="695" y="46" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14">(on disk)</text>
  </g>
  <g transform="translate(100 390)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">TRANSLOG (WAL)</text>
    <rect x="0" y="14" width="835" height="50" rx="12" fill="#f97316" opacity="0.12"/>
    <rect x="0" y="14" width="835" height="50" rx="12" fill="none" stroke="#f97316" opacity="0.4"/>
    <text x="20" y="46" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="16">every write is appended to translog → durability before flush</text>
    <path d="M285 0 V14" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
    <path d="M520 -90 V14" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">document → buffer + translog → refresh → segment → flush → disk</text></g>
</svg>
