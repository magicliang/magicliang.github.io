<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mapping cover</title>
  <desc id="desc">JSON document fields mapped to Lucene field types.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Mapping</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">field types · dynamic mapping · multi-fields</text>
  </g>
  <g transform="translate(130 270)">
    <text x="0" y="-12" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">JSON DOCUMENT</text>
    <rect x="0" y="8" width="280" height="180" rx="14" fill="#f8fafc" opacity="0.08"/>
    <text x="20" y="45" fill="#94a3b8" font-family="monospace" font-size="15">{ "title": "...",</text>
    <text x="20" y="70" fill="#94a3b8" font-family="monospace" font-size="15">  "price": 29.99,</text>
    <text x="20" y="95" fill="#94a3b8" font-family="monospace" font-size="15">  "date": "2026-01",</text>
    <text x="20" y="120" fill="#94a3b8" font-family="monospace" font-size="15">  "tags": ["a","b"],</text>
    <text x="20" y="145" fill="#94a3b8" font-family="monospace" font-size="15">  "location": {...} }</text>
  </g>
  <g transform="translate(430 280)">
    <path d="M0 60 H80" stroke="url(#hot)" stroke-width="6" stroke-linecap="round"/>
    <path d="M54 36 L82 60 L54 84" fill="none" stroke="#facc15" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="10" y="110" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="16">mapping</text>
  </g>
  <g transform="translate(550 260)">
    <text x="0" y="-12" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">LUCENE FIELDS</text>
    <rect x="0" y="8" width="200" height="38" rx="8" fill="url(#hot)"/><text x="16" y="34" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">text → inverted index</text>
    <rect x="0" y="56" width="200" height="38" rx="8" fill="url(#cool)"/><text x="16" y="82" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">keyword → exact term</text>
    <rect x="0" y="104" width="200" height="38" rx="8" fill="#ccfbf1" opacity="0.9"/><text x="16" y="130" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">double → BKD-tree</text>
    <rect x="0" y="152" width="200" height="38" rx="8" fill="#fef3c7" opacity="0.9"/><text x="16" y="178" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">date → BKD-tree</text>
    <rect x="230" y="8" width="200" height="38" rx="8" fill="#e0e7ff" opacity="0.9"/><text x="246" y="34" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">geo_point → BKD-tree</text>
    <rect x="230" y="56" width="200" height="38" rx="8" fill="#dbeafe" opacity="0.9"/><text x="246" y="82" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">nested → sub-docs</text>
  </g>
  <g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">mapping defines how JSON fields become Lucene index structures</text></g>
</svg>
