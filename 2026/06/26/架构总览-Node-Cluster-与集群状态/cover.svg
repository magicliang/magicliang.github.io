<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Cluster Architecture cover</title>
  <desc id="desc">Node roles, cluster state, and shard routing in an Elasticsearch cluster.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Cluster Architecture</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">node roles · cluster state · shard routing</text>
  </g>
  <g transform="translate(150 280)">
    <rect x="0" y="0" width="140" height="70" rx="14" fill="#dbeafe" opacity="0.94"/>
    <text x="22" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Master</text>
    <text x="22" y="52" fill="#334155" font-family="Inter, PingFang SC, sans-serif" font-size="13">cluster state</text>
    <rect x="180" y="0" width="140" height="70" rx="14" fill="#ccfbf1" opacity="0.94"/>
    <text x="202" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Data Node 1</text>
    <text x="202" y="52" fill="#334155" font-family="Inter, PingFang SC, sans-serif" font-size="13">P0 R1</text>
    <rect x="360" y="0" width="140" height="70" rx="14" fill="#ccfbf1" opacity="0.94"/>
    <text x="382" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Data Node 2</text>
    <text x="382" y="52" fill="#334155" font-family="Inter, PingFang SC, sans-serif" font-size="13">P1 R0</text>
    <rect x="540" y="0" width="140" height="70" rx="14" fill="#fef3c7" opacity="0.94"/>
    <text x="562" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Coordinating</text>
    <text x="562" y="52" fill="#334155" font-family="Inter, PingFang SC, sans-serif" font-size="13">query routing</text>
  </g>
  <g transform="translate(150 400)">
    <rect x="0" y="0" width="680" height="60" rx="12" fill="url(#hot)" opacity="0.15"/>
    <rect x="0" y="0" width="680" height="60" rx="12" fill="none" stroke="#f97316" opacity="0.5"/>
    <text x="24" y="38" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">Cluster State: metadata + routing table + nodes</text>
  </g>
  <path d="M220 350 V390" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M400 350 V390" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M580 350 V390" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <g transform="translate(130 490)">
    <text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">master broadcasts full cluster state to every node</text>
  </g>
</svg>
