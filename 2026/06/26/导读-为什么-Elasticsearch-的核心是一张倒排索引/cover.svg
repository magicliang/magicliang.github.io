<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Inverted Index cover</title>
  <desc id="desc">A technical cover showing the inverted index structure: terms mapping to posting lists and documents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#18332f"/>
      <stop offset="1" stop-color="#2b253b"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>

  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Inverted Index</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">term dictionary · posting list · document store</text>
  </g>

  <g transform="translate(130 265)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">TERMS</text>
    <rect x="0" y="0" width="120" height="48" rx="10" fill="url(#hot)"/>
    <text x="22" y="32" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">search</text>
    <rect x="0" y="62" width="120" height="48" rx="10" fill="url(#hot)" opacity="0.8"/>
    <text x="22" y="94" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">engine</text>
    <rect x="0" y="124" width="120" height="48" rx="10" fill="url(#hot)" opacity="0.6"/>
    <text x="22" y="156" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">index</text>
  </g>

  <g transform="translate(280 265)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">POSTING LISTS</text>
    <path d="M0 24 H30" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="4" width="200" height="40" rx="8" fill="#ecfeff" opacity="0.9"/>
    <text x="52" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15">doc1, doc2, doc3</text>
    <path d="M0 86 H30" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="66" width="160" height="40" rx="8" fill="#ecfeff" opacity="0.9"/>
    <text x="52" y="92" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15">doc1, doc3</text>
    <path d="M0 148 H30" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <rect x="40" y="128" width="200" height="40" rx="8" fill="#ecfeff" opacity="0.9"/>
    <text x="52" y="154" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15">doc1, doc2, doc4</text>
  </g>

  <g transform="translate(720 245)" filter="url(#shadow)">
    <text x="0" y="-24" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="600">DOCUMENTS</text>
    <rect x="0" y="0" width="110" height="56" rx="14" fill="#dbeafe" opacity="0.94"/>
    <text x="32" y="36" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">doc1</text>
    <rect x="130" y="0" width="110" height="56" rx="14" fill="#ccfbf1" opacity="0.94"/>
    <text x="162" y="36" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">doc2</text>
    <rect x="0" y="76" width="110" height="56" rx="14" fill="#fef3c7" opacity="0.94"/>
    <text x="32" y="112" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">doc3</text>
    <rect x="130" y="76" width="110" height="56" rx="14" fill="#e0e7ff" opacity="0.94"/>
    <text x="162" y="112" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">doc4</text>

    <path d="M-180 24 C-120 24 -60 28 0 28" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
    <path d="M-180 86 C-120 86 -60 52 0 52" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
    <path d="M-180 148 C-120 148 -60 100 0 100" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(130 480)">
    <text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">term → posting list → document: the core abstraction</text>
  </g>
</svg>
