<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Performance Model cover</title><desc id="desc">Search latency and write throughput factors.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Performance Model</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">search latency · write throughput · memory model · tuning</text></g><g transform="translate(100 270)"><rect x="0" y="0" width="420" height="180" rx="16" fill="#f8fafc" opacity="0.06"/><text x="20" y="-10" fill="url(#hot)" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">Search Latency Factors</text><text x="20" y="34" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• segment count</text><text x="20" y="60" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• query complexity</text><text x="20" y="86" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• shard count (scatter-gather)</text><text x="20" y="112" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• filesystem cache hit rate</text><text x="20" y="138" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• doc values vs fielddata</text></g><g transform="translate(560 270)"><rect x="0" y="0" width="420" height="180" rx="16" fill="#f8fafc" opacity="0.06"/><text x="20" y="-10" fill="url(#cool)" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">Write Throughput Factors</text><text x="20" y="34" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• refresh_interval</text><text x="20" y="60" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• bulk size</text><text x="20" y="86" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• replica count</text><text x="20" y="112" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• translog durability</text><text x="20" y="138" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• merge pressure</text></g><g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">locate the bottleneck first, then tune the specific factor</text></g></svg>
