<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Query Then Fetch cover</title>
  <desc id="desc">Two-phase distributed search: scatter query, gather fetch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Query Then Fetch</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">scatter · local search · global merge · fetch _source</text>
  </g>
  <g transform="translate(130 260)">
    <rect x="280" y="-10" width="180" height="56" rx="14" fill="url(#hot)"/>
    <text x="300" y="24" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="17" font-weight="700">Coordinating</text>
    <text x="0" y="-30" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">PHASE 1: QUERY</text>
    <path d="M280 18 C220 18 180 70 130 70" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <path d="M370 46 V70" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <path d="M460 18 C520 18 560 70 610 70" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <rect x="60" y="55" width="140" height="48" rx="10" fill="#dbeafe" opacity="0.9"/>
    <text x="90" y="84" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Shard 0</text>
    <rect x="300" y="55" width="140" height="48" rx="10" fill="#ccfbf1" opacity="0.9"/>
    <text x="330" y="84" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Shard 1</text>
    <rect x="540" y="55" width="140" height="48" rx="10" fill="#fef3c7" opacity="0.9"/>
    <text x="570" y="84" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="600">Shard 2</text>
    <text x="80" y="126" fill="#94a3b8" font-family="Inter, PingFang SC, sans-serif" font-size="13">→ top-N ids+scores</text>
    <text x="320" y="126" fill="#94a3b8" font-family="Inter, PingFang SC, sans-serif" font-size="13">→ top-N ids+scores</text>
    <text x="560" y="126" fill="#94a3b8" font-family="Inter, PingFang SC, sans-serif" font-size="13">→ top-N ids+scores</text>
  </g>
  <g transform="translate(130 430)">
    <text x="0" y="-30" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="600">PHASE 2: FETCH</text>
    <rect x="0" y="0" width="220" height="48" rx="12" fill="url(#cool)"/>
    <text x="20" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">Global Sort + Fetch _source</text>
    <path d="M240 24 H320" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
    <path d="M298 10 L325 24 L298 38" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="340" y="0" width="140" height="48" rx="12" fill="#f8fafc" opacity="0.12"/>
    <text x="362" y="30" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">Response</text>
  </g>
</svg>
