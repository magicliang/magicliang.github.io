<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Analysis Pipeline cover</title>
  <desc id="desc">Three-stage text analysis: character filters, tokenizer, token filters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/>
  <rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/>
  <g transform="translate(130 145)" filter="url(#shadow)">
    <text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Analysis Pipeline</text>
    <text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">char filter · tokenizer · token filter</text>
  </g>
  <g transform="translate(100 280)">
    <rect x="0" y="0" width="180" height="70" rx="14" fill="#94a3b8" opacity="0.6"/>
    <text x="22" y="30" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">Raw Text</text>
    <text x="22" y="52" fill="#cbd5e1" font-family="monospace" font-size="13">"The Quick Fox!"</text>
    <path d="M195 35 H240" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
    <path d="M222 20 L245 35 L222 50" fill="none" stroke="#facc15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="255" y="0" width="160" height="70" rx="14" fill="url(#hot)"/>
    <text x="275" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">Char Filter</text>
    <text x="275" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">html_strip, mapping</text>
    <path d="M430 35 H475" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
    <path d="M457 20 L480 35 L457 50" fill="none" stroke="#facc15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="490" y="0" width="160" height="70" rx="14" fill="url(#cool)"/>
    <text x="515" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">Tokenizer</text>
    <text x="515" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">standard, whitespace</text>
    <path d="M665 35 H710" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
    <path d="M692 20 L715 35 L692 50" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="725" y="0" width="160" height="70" rx="14" fill="#e0e7ff" opacity="0.94"/>
    <text x="745" y="30" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="15" font-weight="700">Token Filter</text>
    <text x="745" y="52" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="12">lowercase, stop, stem</text>
  </g>
  <g transform="translate(100 400)">
    <path d="M800 -65 L900 0" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <rect x="900" y="-20" width="160" height="60" rx="12" fill="#f8fafc" opacity="0.12"/>
    <rect x="900" y="-20" width="160" height="60" rx="12" fill="none" stroke="#2dd4bf" opacity="0.5"/>
    <text x="920" y="6" fill="#f8fafc" font-family="monospace" font-size="14">["the","quick",</text>
    <text x="920" y="26" fill="#f8fafc" font-family="monospace" font-size="14"> "fox"]</text>
  </g>
  <g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">text → char filter → tokenizer → token filter → terms</text></g>
</svg>
