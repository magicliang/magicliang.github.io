<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">ES vs Solr cover</title><desc id="desc">Two search engines compared: Elasticsearch and Apache Solr.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">ES vs Solr</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">shared Lucene core · different design choices · different ecosystems</text></g><g transform="translate(130 270)"><rect x="0" y="0" width="380" height="200" rx="18" fill="url(#hot)" opacity="0.12"/><rect x="0" y="0" width="380" height="200" rx="18" fill="none" stroke="#f97316" opacity="0.4"/><text x="110" y="36" fill="#f97316" font-family="Inter, PingFang SC, sans-serif" font-size="24" font-weight="700">Elasticsearch</text><text x="24" y="72" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• Native distributed (built-in)</text><text x="24" y="98" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• JSON API, convention defaults</text><text x="24" y="124" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• NRT by design (1s refresh)</text><text x="24" y="150" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• ELK ecosystem</text><text x="24" y="176" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• SSPL + Elastic License</text></g><g transform="translate(560 270)"><rect x="0" y="0" width="380" height="200" rx="18" fill="url(#cool)" opacity="0.12"/><rect x="0" y="0" width="380" height="200" rx="18" fill="none" stroke="#2dd4bf" opacity="0.4"/><text x="120" y="36" fill="#2dd4bf" font-family="Inter, PingFang SC, sans-serif" font-size="24" font-weight="700">Apache Solr</text><text x="24" y="72" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• SolrCloud + ZooKeeper</text><text x="24" y="98" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• XML config, explicit schema</text><text x="24" y="124" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• Soft/hard commit model</text><text x="24" y="150" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• Standalone / Hadoop ecosystem</text><text x="24" y="176" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="15">• Apache License 2.0</text></g><g transform="translate(440 330)"><rect x="0" y="0" width="160" height="50" rx="12" fill="#f8fafc" opacity="0.12"/><rect x="0" y="0" width="160" height="50" rx="12" fill="none" stroke="#dbeafe" opacity="0.4"/><text x="26" y="32" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="18" font-weight="700">Apache Lucene</text></g><g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">both build on Lucene; they differ in distribution, config, and ecosystem</text></g></svg>
