<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Shard Routing cover</title><desc id="desc">Hash-based shard routing formula.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#38bdf8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Shard Routing</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">hash routing · fixed denominator · allocation awareness</text></g><g transform="translate(130 280)"><rect x="0" y="0" width="800" height="70" rx="16" fill="#f8fafc" opacity="0.08"/><rect x="0" y="0" width="800" height="70" rx="16" fill="none" stroke="#f97316" opacity="0.4"/><text x="30" y="44" fill="#f8fafc" font-family="monospace" font-size="26">shard = hash(_routing) % number_of_primary_shards</text></g><g transform="translate(130 400)"><rect x="0" y="0" width="160" height="60" rx="12" fill="url(#hot)"/><text x="20" y="38" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">Document</text><path d="M175 30 H240" stroke="#f97316" stroke-width="4" stroke-linecap="round"/><rect x="255" y="0" width="140" height="60" rx="12" fill="url(#cool)"/><text x="280" y="38" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">hash()</text><path d="M410 30 H475" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/><rect x="490" y="-10" width="100" height="36" rx="8" fill="#dbeafe" opacity="0.9"/><text x="510" y="16" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Shard 0</text><rect x="490" y="34" width="100" height="36" rx="8" fill="#ccfbf1" opacity="0.9"/><text x="510" y="60" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Shard 1</text><rect x="610" y="-10" width="100" height="36" rx="8" fill="#fef3c7" opacity="0.9"/><text x="630" y="16" fill="#0f172a" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">Shard 2</text></g><g transform="translate(130 500)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">fixed denominator means shard count is immutable after creation</text></g></svg>
