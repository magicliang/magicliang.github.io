<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Security cover</title><desc id="desc">Onion model: TLS, authentication, authorization, audit.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101820"/><stop offset="0.48" stop-color="#18332f"/><stop offset="1" stop-color="#2b253b"/></linearGradient><linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f97316"/><stop offset="1" stop-color="#facc15"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/></filter></defs><rect width="1200" height="630" fill="url(#bg)"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="#f8fafc" opacity="0.06"/><rect x="72" y="74" width="1056" height="482" rx="28" fill="none" stroke="#dbeafe" opacity="0.16"/><g transform="translate(130 145)" filter="url(#shadow)"><text x="0" y="0" fill="#f8fafc" font-family="Inter, PingFang SC, sans-serif" font-size="54" font-weight="700">Security</text><text x="2" y="48" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="24">TLS encryption · realm chain · RBAC · audit logging</text></g><g transform="translate(350 260)"><ellipse cx="200" cy="130" rx="200" ry="130" fill="none" stroke="#f97316" stroke-width="2" opacity="0.4"/><text x="120" y="20" fill="#f97316" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">TLS Encryption</text><ellipse cx="200" cy="130" rx="155" ry="100" fill="none" stroke="#facc15" stroke-width="2" opacity="0.5"/><text x="130" y="55" fill="#facc15" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">Authentication</text><ellipse cx="200" cy="130" rx="110" ry="70" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.6"/><text x="140" y="90" fill="#2dd4bf" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">Authorization</text><ellipse cx="200" cy="130" rx="65" ry="40" fill="#38bdf8" opacity="0.15"/><ellipse cx="200" cy="130" rx="65" ry="40" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.7"/><text x="172" y="135" fill="#38bdf8" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="600">Audit</text></g><g transform="translate(130 510)"><text x="0" y="0" fill="#cbd5e1" font-family="Inter, PingFang SC, sans-serif" font-size="19">request → TLS → authenticate (realm chain) → authorize (RBAC) → audit</text></g></svg>
