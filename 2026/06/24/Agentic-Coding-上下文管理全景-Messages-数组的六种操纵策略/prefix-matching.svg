<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Title -->
  <text x="80" y="70" fill="#f4fbff" font-size="36" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Prompt Cache 前缀匹配：多轮对话的缓存命中与失效</text>
  <text x="80" y="105" fill="#9fb8c8" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">缓存按 tools → system → messages 顺序拼成字节串，从头逐字节比对</text>

  <!-- Legend -->
  <g transform="translate(1050 58)">
    <rect x="0" y="0" width="20" height="20" rx="4" fill="#ffbd7a" opacity="0.8"/>
    <text x="28" y="15" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Cache Write（全价）</text>
    <rect x="200" y="0" width="20" height="20" rx="4" fill="#4ade80" opacity="0.8"/>
    <text x="228" y="15" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Cache Read（0.1×）</text>
    <rect x="410" y="0" width="20" height="20" rx="4" fill="#ff6b7a" opacity="0.8"/>
    <text x="438" y="15" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Cache Miss（全价）</text>
  </g>

  <!-- Round 1 -->
  <g transform="translate(80 150)">
    <text x="0" y="28" fill="#7be6ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">第 1 轮</text>
    <text x="0" y="52" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">全新请求，全部写入缓存</text>

    <!-- Tools block -->
    <rect x="120" y="8" width="300" height="60" rx="12" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.6"/>
    <text x="140" y="32" fill="#ffbd7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">TOOLS</text>
    <text x="140" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[read_file, write_file]</text>

    <!-- System block -->
    <rect x="430" y="8" width="340" height="60" rx="12" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.6"/>
    <text x="450" y="32" fill="#ffbd7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">SYSTEM</text>
    <text x="450" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"You are a coding agent..."</text>

    <!-- Messages block -->
    <rect x="780" y="8" width="660" height="60" rx="12" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.6"/>
    <text x="800" y="32" fill="#ffbd7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">MESSAGES</text>
    <text x="800" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[user: "读一下 config.yaml"]</text>

    <!-- Arrow label -->
    <text x="1200" y="45" fill="#ffbd7a" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">← 全部 cache write</text>
  </g>

  <!-- Round 2 -->
  <g transform="translate(80 310)">
    <text x="0" y="28" fill="#7be6ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">第 2 轮</text>
    <text x="0" y="52" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">追加新消息，前缀命中缓存</text>

    <!-- Tools block (cache read) -->
    <rect x="120" y="8" width="300" height="60" rx="12" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.6"/>
    <text x="140" y="32" fill="#4ade80" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">TOOLS ✓ cache read</text>
    <text x="140" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[read_file, write_file]  ← 字节相同</text>

    <!-- System block (cache read) -->
    <rect x="430" y="8" width="340" height="60" rx="12" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.6"/>
    <text x="450" y="32" fill="#4ade80" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">SYSTEM ✓ cache read</text>
    <text x="450" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"You are a coding agent..."  ← 字节相同</text>

    <!-- Messages old part (cache read) -->
    <rect x="780" y="8" width="380" height="60" rx="12" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.6"/>
    <text x="800" y="32" fill="#4ade80" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">旧 MESSAGES ✓ cache read</text>
    <text x="800" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[user: "读一下..."] [asst: "内容是..."]</text>

    <!-- Messages new part (cache write) -->
    <rect x="1170" y="8" width="270" height="60" rx="12" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.6"/>
    <text x="1190" y="32" fill="#ffbd7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">新增 ← cache write</text>
    <text x="1190" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[user: "把 port 改成 8080"]</text>

    <!-- Cost annotation -->
    <text x="120" y="90" fill="#4ade80" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">绝大部分输入 token 以 0.1× 结算 → 成本降低约 90%</text>
  </g>

  <!-- Round 3 (tools changed) -->
  <g transform="translate(80 480)">
    <text x="0" y="28" fill="#7be6ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">第 3 轮</text>
    <text x="0" y="52" fill="#ff6b7a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">tools 变了 → 从头全部失效</text>

    <!-- Tools block (CHANGED - cache miss) -->
    <rect x="120" y="8" width="300" height="60" rx="12" fill="#ff6b7a" fill-opacity="0.12" stroke="#ff6b7a" stroke-opacity="0.6"/>
    <text x="140" y="32" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">TOOLS ✗ 内容变了！</text>
    <text x="140" y="52" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">[read_file, write_file, search]</text>

    <!-- System block (cascade miss) -->
    <rect x="430" y="8" width="340" height="60" rx="12" fill="#ff6b7a" fill-opacity="0.08" stroke="#ff6b7a" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    <text x="450" y="32" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">SYSTEM ✗ 前缀已断</text>
    <text x="450" y="52" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">内容没变，但前面断了 → 失效</text>

    <!-- Messages block (cascade miss) -->
    <rect x="780" y="8" width="660" height="60" rx="12" fill="#ff6b7a" fill-opacity="0.08" stroke="#ff6b7a" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    <text x="800" y="32" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">MESSAGES ✗ 前缀已断</text>
    <text x="800" y="52" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">内容没变，但前面断了 → 失效</text>

    <!-- Cost annotation -->
    <text x="120" y="90" fill="#ff6b7a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">全部 cache miss → 整个请求按全价计费，重新写入缓存</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(80 650)">
    <rect x="0" y="0" width="1440" height="200" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#58d7ff" stroke-opacity="0.3"/>

    <text x="40" y="40" fill="#f4fbff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">核心规则</text>

    <text x="40" y="75" fill="#7be6ff" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">1. 缓存是前缀匹配——从 tools 开头逐字节比对，匹配到哪就缓存到哪</text>
    <text x="40" y="105" fill="#7be6ff" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">2. 多轮追加天然友好——旧 block 不变，新 block 追加，前缀单调增长</text>
    <text x="40" y="135" fill="#7be6ff" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">3. 任何前缀变动都是连锁失效——tools 变了，system 和 messages 全部重建</text>
    <text x="40" y="170" fill="#ffbd7a" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">→ 操纵 messages 数组的每一步都要考虑：这个操作会不会打破前缀？</text>
  </g>
</svg>