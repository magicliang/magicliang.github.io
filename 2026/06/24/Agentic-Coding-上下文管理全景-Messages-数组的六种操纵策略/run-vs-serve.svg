<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Title -->
  <text x="80" y="65" fill="#f4fbff" font-size="36" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Run 模式 vs Serve 模式：消息结构与缓存命中</text>
  <text x="80" y="98" fill="#9fb8c8" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">同样的多轮对话，不同的消息组织方式 → 截然不同的缓存效率</text>

  <!-- Divider -->
  <line x1="780" y1="130" x2="780" y2="860" stroke="#58d7ff" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="780" y="125" fill="#58d7ff" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">VS</text>

  <!-- ===== LEFT: Run Mode ===== -->
  <g transform="translate(60 130)">
    <text x="0" y="30" fill="#ff6b7a" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Run 模式</text>
    <text x="0" y="56" fill="#9fb8c8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">opencode run -- "$PROMPT"</text>
    <text x="0" y="78" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">每轮把历史拼成一个 user message block</text>

    <!-- Round 1 -->
    <text x="0" y="120" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 1 轮请求</text>
    <rect x="0" y="130" width="660" height="60" rx="10" fill="#ff6b7a" fill-opacity="0.08" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="16" y="152" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages: [ 1 个 user block ]</text>
    <text x="16" y="175" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">"问题 1"</text>
    <text x="580" y="165" fill="#ffbd7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">cache write</text>

    <!-- Round 2 -->
    <text x="0" y="220" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 2 轮请求</text>
    <rect x="0" y="230" width="660" height="80" rx="10" fill="#ff6b7a" fill-opacity="0.08" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="16" y="252" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages: [ 1 个 user block，内容更长了 ]</text>
    <text x="16" y="275" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">"历史对话：\n[user] 问题1\n[assistant] 回答1\n当前问题：问题2"</text>
    <text x="16" y="298" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">← 整个 block 内容变了 → 和第 1 轮的前缀不同 → cache miss！</text>

    <!-- Round 3 -->
    <text x="0" y="340" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 3 轮请求</text>
    <rect x="0" y="350" width="660" height="80" rx="10" fill="#ff6b7a" fill-opacity="0.08" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="16" y="372" fill="#ff6b7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages: [ 1 个 user block，内容又更长了 ]</text>
    <text x="16" y="395" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">"历史对话：\n[user] 问题1\n[asst] 回答1\n[user] 问题2\n[asst] 回答2\n当前：问题3"</text>
    <text x="16" y="418" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">← 又变了 → cache miss！</text>

    <!-- Result box -->
    <rect x="0" y="460" width="660" height="80" rx="12" fill="#ff6b7a" fill-opacity="0.06" stroke="#ff6b7a" stroke-opacity="0.3"/>
    <text x="20" y="490" fill="#ff6b7a" font-size="16" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">结果：每轮都是全新前缀 → 永远 cache miss</text>
    <text x="20" y="518" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">第 20 轮时，60000 token 全部全价计费</text>

    <!-- Key insight -->
    <text x="0" y="590" fill="#ffbd7a" font-size="15" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">根因：一个不断变长的 block ≠ 多个独立 block 逐个追加</text>
    <text x="0" y="616" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">缓存比的是 block 级别的字节相同，</text>
    <text x="0" y="638" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">不是一个大文本字符串内部的子串前缀。</text>
  </g>

  <!-- ===== RIGHT: Serve Mode ===== -->
  <g transform="translate(830 130)">
    <text x="0" y="30" fill="#4ade80" font-size="26" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Serve 模式</text>
    <text x="0" y="56" fill="#9fb8c8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">opencode serve → /session/{id}/prompt_async</text>
    <text x="0" y="78" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">每轮在 messages 数组末尾追加独立 block</text>

    <!-- Round 1 -->
    <text x="0" y="120" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 1 轮请求</text>
    <rect x="0" y="130" width="660" height="60" rx="10" fill="#ffbd7a" fill-opacity="0.08" stroke="#ffbd7a" stroke-opacity="0.4"/>
    <text x="16" y="152" fill="#ffbd7a" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages:</text>
    <rect x="110" y="140" width="140" height="32" rx="6" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.5"/>
    <text x="126" y="161" fill="#ffbd7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user: "问题 1"</text>
    <text x="530" y="165" fill="#ffbd7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">cache write</text>

    <!-- Round 2 -->
    <text x="0" y="220" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 2 轮请求</text>
    <rect x="0" y="230" width="660" height="80" rx="10" fill="#0a1d2c" fill-opacity="0.4" stroke="#4ade80" stroke-opacity="0.3"/>
    <text x="16" y="252" fill="#4ade80" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages:</text>
    <!-- Old blocks (cache hit) -->
    <rect x="110" y="240" width="140" height="28" rx="6" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.5"/>
    <text x="126" y="259" fill="#4ade80" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">user: "问题 1" ✓</text>
    <rect x="258" y="240" width="140" height="28" rx="6" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.5"/>
    <text x="274" y="259" fill="#4ade80" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">asst: "回答 1" ✓</text>
    <!-- New block (cache write) -->
    <rect x="406" y="240" width="140" height="28" rx="6" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.5"/>
    <text x="422" y="259" fill="#ffbd7a" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">user: "问题 2" ✚</text>
    <text x="16" y="298" fill="#4ade80" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">旧 block 字节相同 → cache read；只有新 block 付全价</text>

    <!-- Round 3 -->
    <text x="0" y="340" fill="#cfe4ef" font-size="14" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">第 3 轮请求</text>
    <rect x="0" y="350" width="660" height="80" rx="10" fill="#0a1d2c" fill-opacity="0.4" stroke="#4ade80" stroke-opacity="0.3"/>
    <text x="16" y="372" fill="#4ade80" font-size="13" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">messages:</text>
    <rect x="110" y="360" width="90" height="24" rx="4" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="120" y="377" fill="#4ade80" font-size="10" font-family="Arial">user 1 ✓</text>
    <rect x="206" y="360" width="90" height="24" rx="4" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="216" y="377" fill="#4ade80" font-size="10" font-family="Arial">asst 1 ✓</text>
    <rect x="302" y="360" width="90" height="24" rx="4" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="312" y="377" fill="#4ade80" font-size="10" font-family="Arial">user 2 ✓</text>
    <rect x="398" y="360" width="90" height="24" rx="4" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="408" y="377" fill="#4ade80" font-size="10" font-family="Arial">asst 2 ✓</text>
    <rect x="494" y="360" width="90" height="24" rx="4" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.5"/>
    <text x="504" y="377" fill="#ffbd7a" font-size="10" font-weight="600" font-family="Arial">user 3 ✚</text>
    <text x="16" y="418" fill="#4ade80" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">4 个旧 block 全部 cache read，只有 user 3 是 cache write</text>

    <!-- Result box -->
    <rect x="0" y="460" width="660" height="80" rx="12" fill="#4ade80" fill-opacity="0.06" stroke="#4ade80" stroke-opacity="0.3"/>
    <text x="20" y="490" fill="#4ade80" font-size="16" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">结果：前缀单调增长 → 每轮大部分 cache read</text>
    <text x="20" y="518" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">第 20 轮时，57000 token 按 0.1× 计费，只有 3000 全价</text>

    <!-- Cost comparison -->
    <text x="0" y="590" fill="#4ade80" font-size="15" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">成本对比（第 20 轮，Anthropic 定价）</text>
    <text x="0" y="618" fill="#ff6b7a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">Run 模式：60000 × 1.0× = 60000 单位</text>
    <text x="0" y="642" fill="#4ade80" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">Serve 模式：57000 × 0.1× + 3000 × 1.0× = 8700 单位</text>
    <text x="0" y="668" fill="#ffbd7a" font-size="15" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">→ Serve 模式输入成本约为 Run 模式的 1/7</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(80 780)">
    <rect x="0" y="0" width="1440" height="80" rx="14" fill="#0a1d2c" fill-opacity="0.5" stroke="#58d7ff" stroke-opacity="0.2"/>
    <text x="40" y="36" fill="#ffbd7a" font-size="17" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">架构层面的选择比配置调优的影响大一个数量级</text>
    <text x="40" y="62" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">如果底层支持 serve 模式，优先选 serve 模式的增量追加路径，而不是在 run 模式上调 compaction 参数。</text>
  </g>
</svg>