<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#58d7ff"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#ffbd7a"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Title -->
  <text x="80" y="65" fill="#f4fbff" font-size="36" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">六种操纵策略对 Messages 数组的影响</text>
  <text x="80" y="98" fill="#9fb8c8" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">每种策略如何改变数组内容，以及对 Prompt Cache 前缀的影响</text>

  <!-- Panel 1: Append -->
  <g transform="translate(60 130)">
    <rect x="0" y="0" width="460" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#4ade80" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">追加 Append</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">末尾追加新消息，不动旧内容</text>
    <!-- Array boxes -->
    <rect x="24" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="40" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user 1</text>
    <rect x="112" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="128" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">asst 1</text>
    <rect x="200" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="216" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">tool 1</text>
    <rect x="288" y="80" width="80" height="36" rx="6" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-opacity="0.7"/>
    <text x="300" y="103" fill="#4ade80" font-size="12" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">user 2 ✚</text>
    <!-- Cache label -->
    <rect x="24" y="135" width="130" height="28" rx="8" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="38" y="154" fill="#4ade80" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 ✓ 前缀不变</text>
    <text x="24" y="195" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">旧 block 不动，新 block 追加在末尾</text>
  </g>

  <!-- Panel 2: Truncate -->
  <g transform="translate(550 130)">
    <rect x="0" y="0" width="460" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#ffbd7a" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#ffbd7a" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">截断 Truncate</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">裁剪单条消息，只保留前 N token</text>
    <!-- Array boxes -->
    <rect x="24" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="40" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user 1</text>
    <rect x="112" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="128" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">asst 1</text>
    <rect x="200" y="80" width="130" height="36" rx="6" fill="#ffbd7a" fill-opacity="0.15" stroke="#ffbd7a" stroke-opacity="0.6"/>
    <text x="212" y="103" fill="#ffbd7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">tool result ✂️</text>
    <line x1="290" y1="78" x2="290" y2="118" stroke="#ffbd7a" stroke-width="2" stroke-dasharray="4 3"/>
    <!-- Cache label -->
    <rect x="24" y="135" width="170" height="28" rx="8" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="38" y="154" fill="#4ade80" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 ✓ 通常不影响前缀</text>
    <text x="24" y="195" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">截断发生在当轮新消息，前缀仍完整</text>
  </g>

  <!-- Panel 3: Prune -->
  <g transform="translate(1040 130)">
    <rect x="0" y="0" width="500" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#ff6b7a" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">丢弃 Prune / Drop</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">移除整条消息（选择性 / 滑动窗口）</text>
    <!-- Array boxes with removal -->
    <rect x="24" y="80" width="80" height="36" rx="6" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4" stroke-dasharray="4 3"/>
    <text x="40" y="103" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif" text-decoration="line-through">tool 旧</text>
    <rect x="112" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="128" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user 2</text>
    <rect x="200" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="216" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">asst 2</text>
    <rect x="288" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="304" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user 3</text>
    <!-- Cache label -->
    <rect x="24" y="135" width="190" height="28" rx="8" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="38" y="154" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 ✗ 移除点后全部失效</text>
    <text x="24" y="195" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">选择性丢弃保留骨架，滑动窗口直接截头</text>
  </g>

  <!-- Panel 4: Compact -->
  <g transform="translate(60 390)">
    <rect x="0" y="0" width="460" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#c084fc" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#c084fc" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">摘要 Compact / Summarize</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">LLM 生成摘要，替换原始数组</text>
    <!-- Before: many blocks -->
    <text x="24" y="85" fill="#9fb8c8" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">Before (40 条, 80K tok):</text>
    <rect x="24" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <rect x="68" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <rect x="112" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <rect x="156" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <text x="202" y="109" fill="#9fb8c8" font-size="12" font-family="Arial">···</text>
    <rect x="228" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <rect x="272" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.3"/>
    <!-- Arrow -->
    <text x="330" y="109" fill="#c084fc" font-size="18" font-family="Arial">→</text>
    <!-- After: summary + recent -->
    <text x="360" y="85" fill="#9fb8c8" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">After (9 条, 22K tok):</text>
    <rect x="360" y="92" width="120" height="24" rx="4" fill="#c084fc" fill-opacity="0.2" stroke="#c084fc" stroke-opacity="0.6"/>
    <text x="372" y="109" fill="#c084fc" font-size="11" font-weight="600" font-family="Arial, 'PingFang SC', sans-serif">摘要 (2K tok)</text>
    <rect x="486" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <rect x="530" y="92" width="40" height="24" rx="4" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>

    <!-- Cache label -->
    <rect x="24" y="135" width="190" height="28" rx="8" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="38" y="154" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 △ 改写点后的前缀重建</text>
    <text x="24" y="195" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">更早的 tools / system 稳定前缀仍可能保留</text>
  </g>

  <!-- Panel 5: Externalize -->
  <g transform="translate(550 390)">
    <rect x="0" y="0" width="460" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#58d7ff" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#58d7ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">外化 Externalize</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">信息搬到数组外部存储</text>
    <!-- Array stays same -->
    <rect x="24" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="40" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">user 1</text>
    <rect x="112" y="80" width="80" height="36" rx="6" fill="#143247" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="128" y="103" fill="#cfe4ef" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">asst 1</text>
    <!-- Arrow pointing out -->
    <line x1="250" y1="98" x2="330" y2="98" stroke="#58d7ff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- External storage -->
    <rect x="340" y="78" width="100" height="40" rx="8" fill="#1a2a3a" stroke="#58d7ff" stroke-opacity="0.4" stroke-dasharray="4 3"/>
    <text x="352" y="103" fill="#58d7ff" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">📁 memory</text>
    <!-- Cache label -->
    <rect x="24" y="135" width="160" height="28" rx="8" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4"/>
    <text x="38" y="154" fill="#4ade80" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 △ 取决于指针与回灌位置</text>
    <text x="24" y="195" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">大材料留在外部；取回结果进入可变尾部</text>
  </g>

  <!-- Panel 6: Replay -->
  <g transform="translate(1040 390)">
    <rect x="0" y="0" width="500" height="220" rx="16" fill="#0a1d2c" fill-opacity="0.6" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="24" y="36" fill="#ff6b7a" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">重放 Replay</text>
    <text x="24" y="60" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">每次请求重建整个数组</text>
    <!-- Round 1 -->
    <text x="24" y="85" fill="#9fb8c8" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">轮 1:</text>
    <rect x="60" y="74" width="200" height="22" rx="4" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="72" y="90" fill="#ff6b7a" font-size="10" font-family="Arial, 'PingFang SC', sans-serif">[历史 + 问题1]</text>
    <!-- Round 2 -->
    <text x="24" y="112" fill="#9fb8c8" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">轮 2:</text>
    <rect x="60" y="100" width="300" height="22" rx="4" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="72" y="116" fill="#ff6b7a" font-size="10" font-family="Arial, 'PingFang SC', sans-serif">[历史 + 问题1 + 回答1 + 问题2]</text>
    <!-- Round 3 -->
    <text x="24" y="138" fill="#9fb8c8" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">轮 3:</text>
    <rect x="60" y="126" width="400" height="22" rx="4" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="72" y="142" fill="#ff6b7a" font-size="10" font-family="Arial, 'PingFang SC', sans-serif">[历史 + 问题1 + 回答1 + 问题2 + 回答2 + 问题3]</text>

    <!-- Cache label -->
    <rect x="24" y="165" width="180" height="28" rx="8" fill="#ff6b7a" fill-opacity="0.1" stroke="#ff6b7a" stroke-opacity="0.4"/>
    <text x="38" y="184" fill="#ff6b7a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">缓存 △ 取决于确定性前缀</text>
    <text x="24" y="212" fill="#9fb8c8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">排序、wrapper、时间戳和 TTL 都会改变结果</text>
  </g>

  <!-- Bottom: cache-friendliness scale -->
  <g transform="translate(80 660)">
    <rect x="0" y="0" width="1440" height="200" rx="16" fill="#0a1d2c" fill-opacity="0.4" stroke="#58d7ff" stroke-opacity="0.2"/>
    <text x="40" y="40" fill="#f4fbff" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">不要按策略名称给缓存命中率排序：先锁定实验变量</text>
    <!-- Scale bar -->
    <rect x="40" y="60" width="1360" height="40" rx="10" fill="#0a1520"/>
    <!-- Gradient fill for scale -->
    <rect x="40" y="60" width="226" height="40" rx="10" fill="#4ade80" fill-opacity="0.2"/>
    <rect x="266" y="60" width="228" height="40" fill="#4ade80" fill-opacity="0.12"/>
    <rect x="494" y="60" width="228" height="40" fill="#ffbd7a" fill-opacity="0.08"/>
    <rect x="722" y="60" width="228" height="40" fill="#ff6b7a" fill-opacity="0.08"/>
    <rect x="950" y="60" width="228" height="40" fill="#ff6b7a" fill-opacity="0.12"/>
    <rect x="1178" y="60" width="222" height="40" rx="10" fill="#ff6b7a" fill-opacity="0.2"/>
    <!-- Labels -->
    <text x="100" y="86" fill="#4ade80" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">Provider</text>
    <text x="330" y="86" fill="#4ade80" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">模型 / API</text>
    <text x="560" y="86" fill="#ffbd7a" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">TTL</text>
    <text x="790" y="86" fill="#ff6b7a" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">缓存断点</text>
    <text x="1020" y="86" fill="#ff6b7a" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">结构 / 顺序</text>
    <text x="1290" y="86" fill="#ff6b7a" font-size="14" font-weight="600" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif">原始 usage</text>
    <!-- Arrows -->
    <text x="40" y="130" fill="#4ade80" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">← 锁定条件</text>
    <text x="1300" y="130" fill="#ff6b7a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">读取结果 →</text>

    <text x="40" y="170" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">核心原则：找出最早差异点，并用 cache read / cache write / uncached usage 验证，不能按产品名或策略名推断。</text>
  </g>
</svg>
