<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SDD 与超级个体：AI 时代的人机协作范式</title>
  <desc id="desc">Spec 先定义一个小系统，再以强结构约束扩展为大系统。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#162033"/>
      <stop offset=".5" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#2a2539"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#bfdbfe" stroke-opacity=".065"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity=".4"/>
    </filter>
    <style>
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:58px;font-weight:820;fill:#f8fafc}
      .sub{font-size:27px;font-weight:500;fill:#ddd6fe}
      .label{font-size:25px;font-weight:760;fill:#eef2ff}
      .small{font-size:20px;font-weight:520;fill:#cbd5e1}
      .card{fill:#111827;stroke:#a78bfa;stroke-width:3;filter:url(#shadow)}
      .mini{fill:#172554;stroke:#93c5fd;stroke-width:2.5}
      .out{fill:#052e2b;stroke:#6ee7b7;stroke-width:3}
      .line{stroke:#c4b5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .green{stroke:#6ee7b7}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g class="font">
    <text x="105" y="124" class="title">SDD 与超级个体</text>
    <text x="108" y="181" class="sub">先造精确小系统，再让大系统沿着约束展开</text>
  </g>
  <g class="font" transform="translate(145 286)">
    <rect class="card" width="390" height="338" rx="26"/>
    <text x="58" y="68" class="label">Spec 核心</text>
    <rect class="mini" x="58" y="112" width="118" height="64" rx="16"/>
    <text x="117" y="153" text-anchor="middle" class="small">Goal</text>
    <rect class="mini" x="214" y="112" width="118" height="64" rx="16"/>
    <text x="273" y="153" text-anchor="middle" class="small">Non-goal</text>
    <rect class="mini" x="58" y="210" width="274" height="64" rx="16"/>
    <text x="195" y="251" text-anchor="middle" class="small">Acceptance Tests</text>
  </g>
  <path class="line" d="M555 455H760" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10Z" fill="#c4b5fd"/>
    </marker>
  </defs>
  <g class="font" transform="translate(765 236)">
    <rect class="out" width="690" height="438" rx="30"/>
    <text x="62" y="76" class="label">大系统的展开路径</text>
    <g transform="translate(64 126)">
      <rect class="mini" width="154" height="76" rx="18"/>
      <text x="77" y="48" text-anchor="middle" class="small">Plan</text>
      <rect class="mini" x="202" width="154" height="76" rx="18"/>
      <text x="279" y="48" text-anchor="middle" class="small">Build</text>
      <rect class="mini" x="404" width="154" height="76" rx="18"/>
      <text x="481" y="48" text-anchor="middle" class="small">Verify</text>
      <path class="line green" d="M154 38H202M356 38H404"/>
    </g>
    <path d="M80 278 C190 230 290 320 402 270 C494 230 552 256 610 210" stroke="#fbbf24" stroke-width="7" fill="none" stroke-linecap="round"/>
    <text x="83" y="340" class="small">人的判断把任务边界写成强结构，模型的生成沿着边界扩展。</text>
  </g>
  <text x="108" y="795" class="font small">系统性的问题要有系统性的解：很多函数组成的系统，需要很多句话及其结构关系来驱动。</text>
</svg>
