<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">子 Agent 的本质：上下文隔离与专门化</title>
  <desc id="desc">深色科技风架构图，展示主 Agent 将任务派发到多个独立上下文窗口，子 Agent 专门化执行后压缩摘要回传。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050b16"/>
      <stop offset="45%" stop-color="#08182a"/>
      <stop offset="100%" stop-color="#111326"/>
    </linearGradient>
    <radialGradient id="aura-cyan" cx="18%" cy="28%" r="52%">
      <stop offset="0%" stop-color="#3cecff" stop-opacity=".34"/>
      <stop offset="48%" stop-color="#3cecff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#3cecff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura-violet" cx="76%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#a982ff" stop-opacity=".32"/>
      <stop offset="55%" stop-color="#a982ff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#a982ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#61f3ff"/>
      <stop offset="100%" stop-color="#35f2b1"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0b2ff"/>
      <stop offset="100%" stop-color="#7b8cff"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe38e"/>
      <stop offset="100%" stop-color="#ff9a6b"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#7de9ff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000914" flood-opacity=".46"/>
    </filter>
    <style>
      .font { font-family: "Inter", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
      .title { font-size: 60px; font-weight: 800; fill: #f5fbff; }
      .subtitle { font-size: 25px; fill: #adc6d8; }
      .eyebrow { font-size: 21px; font-weight: 700; fill: #8ef2ff; }
      .label { font-size: 25px; font-weight: 760; fill: #edfaff; }
      .small { font-size: 19px; fill: #b9ccda; }
      .tiny { font-size: 15px; fill: #8fa6b8; }
      .chip { font-size: 17px; font-weight: 760; fill: #071321; }
      .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; font-size: 17px; fill: #dffbff; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#aura-cyan)"/>
  <rect width="1600" height="900" fill="url(#aura-violet)"/>

  <g opacity=".32">
    <path d="M70 720C270 610 370 690 560 588S830 320 1020 440 1260 570 1528 384" fill="none" stroke="#5ff0ff" stroke-width="2"/>
    <path d="M82 780C300 656 415 750 625 640S880 398 1070 505 1275 650 1518 486" fill="none" stroke="#aa8bff" stroke-width="2"/>
  </g>

  <g class="font" transform="translate(92 84)">
    <text x="0" y="0" class="eyebrow">SUB-AGENT ARCHITECTURE</text>
    <text x="0" y="78" class="title">上下文隔离与专门化</text>
    <text x="0" y="128" class="subtitle">完整 Agent 实例，不是弱化工具；主-子关系来自任务编排</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="92" y="252" width="372" height="418" rx="24" fill="#071827" fill-opacity=".88" stroke="#5ef0ff" stroke-opacity=".54"/>
    <rect x="566" y="235" width="444" height="452" rx="26" fill="#090f1d" fill-opacity=".90" stroke="#e9f8ff" stroke-opacity=".24"/>
    <rect x="1110" y="252" width="398" height="418" rx="24" fill="#121225" fill-opacity=".90" stroke="#b899ff" stroke-opacity=".56"/>
  </g>

  <g class="font" transform="translate(132 302)">
    <rect x="0" y="0" width="114" height="34" rx="17" fill="url(#cyan)"/>
    <text x="57" y="23" text-anchor="middle" class="chip">MAIN</text>
    <text x="0" y="82" class="label">主 Agent</text>
    <text x="0" y="119" class="small">保存全局任务图</text>
    <text x="0" y="151" class="small">拆分目标与约束</text>
    <text x="0" y="183" class="small">汇总证据与决策</text>

    <g transform="translate(0 240)">
      <rect width="292" height="54" rx="12" fill="#0c2436" stroke="#5ef0ff" stroke-opacity=".35"/>
      <text x="26" y="35" class="mono">route(task, constraints)</text>
    </g>
  </g>

  <g filter="url(#glow)">
    <path d="M472 430H548" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
    <path d="M530 410l24 22-24 22" fill="none" stroke="#dffbff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1018 430H1093" stroke="url(#violet)" stroke-width="5" stroke-linecap="round"/>
    <path d="M1075 410l24 22-24 22" fill="none" stroke="#f0e9ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="font" transform="translate(606 282)">
    <text x="182" y="0" text-anchor="middle" class="label">独立上下文窗口</text>
    <text x="182" y="36" text-anchor="middle" class="small">clean isolated execution</text>

    <g transform="translate(0 84)">
      <rect width="174" height="232" rx="20" fill="#0b2436" stroke="#5ef0ff" stroke-opacity=".56"/>
      <rect x="24" y="24" width="126" height="38" rx="10" fill="#13364a" stroke="#5ef0ff" stroke-opacity=".28"/>
      <text x="87" y="49" text-anchor="middle" class="small">Research</text>
      <circle cx="50" cy="98" r="8" fill="#35f2b1"/>
      <circle cx="88" cy="98" r="8" fill="#61f3ff"/>
      <circle cx="126" cy="98" r="8" fill="#b9f8ff"/>
      <path d="M44 146H130M44 176H112" stroke="#b9f8ff" stroke-opacity=".34" stroke-width="8" stroke-linecap="round"/>
      <text x="87" y="215" text-anchor="middle" class="tiny">own window</text>
    </g>

    <g transform="translate(226 84)">
      <rect width="174" height="232" rx="20" fill="#1a1730" stroke="#b899ff" stroke-opacity=".56"/>
      <rect x="24" y="24" width="126" height="38" rx="10" fill="#2a2446" stroke="#b899ff" stroke-opacity=".30"/>
      <text x="87" y="49" text-anchor="middle" class="small">Code</text>
      <path d="M52 104l-28 28 28 28M122 104l28 28-28 28" fill="none" stroke="#d0b2ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M104 92l-34 82" stroke="#7b8cff" stroke-width="7" stroke-linecap="round"/>
      <text x="87" y="215" text-anchor="middle" class="tiny">own window</text>
    </g>

    <g transform="translate(64 350)">
      <rect width="272" height="50" rx="14" fill="#161b2a" stroke="#ffe38e" stroke-opacity=".42"/>
      <text x="136" y="32" text-anchor="middle" class="small">执行期有状态，调用间无状态</text>
    </g>
  </g>

  <g class="font" transform="translate(1154 302)">
    <rect x="0" y="0" width="128" height="34" rx="17" fill="url(#violet)"/>
    <text x="64" y="23" text-anchor="middle" class="chip">RETURN</text>
    <text x="0" y="82" class="label">压缩摘要回传</text>
    <text x="0" y="119" class="small">只保留结论、证据、风险</text>
    <text x="0" y="151" class="small">丢弃执行噪音与中间过程</text>
    <text x="0" y="183" class="small">防止主上下文膨胀</text>

    <g transform="translate(0 238)">
      <rect width="310" height="58" rx="14" fill="#1d1a35" stroke="#b899ff" stroke-opacity=".42"/>
      <text x="28" y="37" class="mono">summary + evidence</text>
      <circle cx="270" cy="29" r="10" fill="#d0b2ff" filter="url(#glow)"/>
    </g>
  </g>

  <g class="font" transform="translate(180 746)">
    <rect width="1240" height="82" rx="22" fill="#07111e" fill-opacity=".78" stroke="#74edff" stroke-opacity=".25"/>
    <text x="620" y="34" text-anchor="middle" class="small">子 Agent 的价值不是“更小”，而是把复杂执行放进独立、干净、可丢弃的上下文</text>
    <text x="620" y="64" text-anchor="middle" class="tiny">orchestrator keeps the map · subagents work in isolation · summaries cross back</text>
  </g>
</svg>
