<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Harness Engineering 完整指南</title>
  <desc id="desc">Prompt、Context 与 Harness 三层工程化跃迁，把模型输出变成可验证系统。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".54" stop-color="#172033"/>
      <stop offset="1" stop-color="#2c2a18"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#fde68a" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity=".42"/>
    </filter>
    <style>
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:58px;font-weight:820;fill:#f8fafc}
      .sub{font-size:27px;font-weight:500;fill:#fde68a}
      .label{font-size:25px;font-weight:780;fill:#fffbeb}
      .small{font-size:20px;font-weight:520;fill:#d1d5db}
      .stage{fill:#111827;stroke:#fbbf24;stroke-width:3;filter:url(#shadow)}
      .rail{stroke:#93c5fd;stroke-width:7;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .loop{stroke:#34d399;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .chip{fill:#172554;stroke:#93c5fd;stroke-width:2.5}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g class="font">
    <text x="105" y="124" class="title">Harness Engineering 完整指南</text>
    <text x="108" y="181" class="sub">从 Prompt 到 Context，再到可验证的工程控制系统</text>
  </g>
  <g class="font" transform="translate(128 292)">
    <rect class="stage" width="360" height="260" rx="26"/>
    <text x="58" y="68" class="label">1. Prompt</text>
    <text x="58" y="126" class="small">单次指令</text>
    <text x="58" y="168" class="small">局部优化</text>
    <text x="58" y="210" class="small">高波动输出</text>
  </g>
  <g class="font" transform="translate(620 292)">
    <rect class="stage" width="360" height="260" rx="26"/>
    <text x="58" y="68" class="label">2. Context</text>
    <text x="58" y="126" class="small">任务工作集</text>
    <text x="58" y="168" class="small">工具结果</text>
    <text x="58" y="210" class="small">状态回灌</text>
  </g>
  <g class="font" transform="translate(1112 292)">
    <rect class="stage" width="360" height="260" rx="26"/>
    <text x="58" y="68" class="label">3. Harness</text>
    <text x="58" y="126" class="small">Spec 边界</text>
    <text x="58" y="168" class="small">Tests 验收</text>
    <text x="58" y="210" class="small">Loop 自动修正</text>
  </g>
  <path class="rail" d="M505 422H600M997 422H1092"/>
  <path class="loop" d="M1234 610C1128 690 874 706 710 622C640 586 625 532 660 488"/>
  <g class="font" transform="translate(552 676)">
    <rect class="chip" width="495" height="68" rx="20"/>
    <text x="248" y="43" text-anchor="middle" class="small">generate → validate → repair → continue</text>
  </g>
  <text x="108" y="795" class="font small">Harness 的价值，是把模型的概率输出接入可恢复、可验证、可持续推进的外部系统。</text>
</svg>
