<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">智能体记忆全景综述</title>
  <desc id="desc">外部记忆系统通过压缩、检索和换入换出，把有限上下文连接成长期工作边界。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2335"/>
      <stop offset=".52" stop-color="#16202f"/>
      <stop offset="1" stop-color="#1d342a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d1fae5" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <style>
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:58px;font-weight:820;fill:#f8fafc}
      .sub{font-size:27px;font-weight:500;fill:#bbf7d0}
      .label{font-size:24px;font-weight:760;fill:#ecfdf5}
      .small{font-size:20px;font-weight:520;fill:#cbd5e1}
      .panel{fill:#0f172a;stroke:#5eead4;stroke-width:3;filter:url(#shadow)}
      .slot{fill:#12312f;stroke:#86efac;stroke-width:2.5}
      .store{fill:#172554;stroke:#93c5fd;stroke-width:2.5}
      .line{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .green{stroke:#86efac}
      .amber{stroke:#fbbf24}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g class="font">
    <text x="105" y="124" class="title">智能体记忆全景综述</text>
    <text x="108" y="181" class="sub">压缩、检索、换入换出，把有限窗口接成长期工作边界</text>
  </g>
  <g class="font" transform="translate(150 276)">
    <rect class="panel" width="520" height="382" rx="30"/>
    <text x="62" y="74" class="label">Context Window</text>
    <rect class="slot" x="64" y="118" width="392" height="54" rx="16"/>
    <text x="86" y="153" class="small">当前目标 / active goal</text>
    <rect class="slot" x="64" y="194" width="392" height="54" rx="16"/>
    <text x="86" y="229" class="small">工作集 / working set</text>
    <rect class="slot" x="64" y="270" width="392" height="54" rx="16"/>
    <text x="86" y="305" class="small">下一步证据 / latest evidence</text>
  </g>
  <g class="font" transform="translate(930 245)">
    <rect class="panel" width="460" height="444" rx="30"/>
    <text x="62" y="74" class="label">External Memory</text>
    <rect class="store" x="64" y="122" width="332" height="56" rx="16"/>
    <text x="91" y="158" class="small">文件 / Notes</text>
    <rect class="store" x="64" y="204" width="332" height="56" rx="16"/>
    <text x="91" y="240" class="small">索引 / Search</text>
    <rect class="store" x="64" y="286" width="332" height="56" rx="16"/>
    <text x="91" y="322" class="small">摘要 / Compaction</text>
    <rect class="store" x="64" y="368" width="332" height="56" rx="16"/>
    <text x="91" y="404" class="small">长期档案 / Archive</text>
  </g>
  <path class="line green" d="M690 388C758 330 822 330 900 388"/>
  <path class="line amber" d="M900 546C822 608 756 608 690 546"/>
  <text x="735" y="364" class="font small">page in</text>
  <text x="735" y="612" class="font small">page out</text>
  <text x="108" y="795" class="font small">记忆系统的核心不是无限保存，而是知道什么该进窗口、什么该离开窗口。</text>
</svg>
