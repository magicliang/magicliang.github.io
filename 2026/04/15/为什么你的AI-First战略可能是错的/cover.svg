<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="50%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#12091f"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.05"/>
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="2">AI-FIRST STRATEGY RETHINK</text>
  <text x="600" y="85" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">CreaoAI 的全面重构实践</text>
  <!-- LEFT: Wrong approach (red, X) -->
  <rect x="80" y="130" width="480" height="340" rx="20" fill="rgba(9,24,39,0.75)" stroke="#ef4444" stroke-opacity="0.4" filter="url(#shadow)"/>
  <rect x="106" y="155" width="38" height="28" rx="14" fill="url(#red)"/>
  <text x="125" y="174" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="16" font-weight="800">✗</text>
  <text x="156" y="175" fill="#ef4444" font-family="system-ui,sans-serif" font-size="18" font-weight="700">传统方式：在流程上加 AI</text>
  <!-- Wrong approach layers -->
  <rect x="120" y="210" width="400" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="320" y="236" text-anchor="middle" fill="#cc8888" font-family="system-ui,sans-serif" font-size="15">Existing Workflow</text>
  <rect x="120" y="262" width="400" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="320" y="288" text-anchor="middle" fill="#cc8888" font-family="system-ui,sans-serif" font-size="15">Existing Process</text>
  <rect x="120" y="314" width="400" height="42" rx="8" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="320" y="340" text-anchor="middle" fill="#cc8888" font-family="system-ui,sans-serif" font-size="15">Existing Testing</text>
  <!-- AI bolt-on arrow -->
  <rect x="368" y="370" width="110" height="32" rx="8" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.35)" stroke-width="1"/>
  <text x="423" y="391" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="13" font-weight="600">+ AI Tool ↑</text>
  <text x="320" y="432" text-anchor="middle" fill="rgba(239,68,68,0.5)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">bolt-on · 收效甚微</text>
  <!-- RIGHT: Correct approach (green, ✓) -->
  <rect x="640" y="130" width="480" height="340" rx="20" fill="rgba(9,24,39,0.75)" stroke="#22c55e" stroke-opacity="0.4" filter="url(#shadow)"/>
  <rect x="666" y="155" width="38" height="28" rx="14" fill="url(#green)"/>
  <text x="685" y="174" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="16" font-weight="800">✓</text>
  <text x="716" y="175" fill="#22c55e" font-family="system-ui,sans-serif" font-size="18" font-weight="700">正确方式：围绕 Agent 重构</text>
  <!-- Correct approach: center Agent -->
  <rect x="780" y="230" width="200" height="60" rx="12" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5" filter="url(#glow)"/>
  <text x="880" y="265" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="18" font-weight="700">AI Agent</text>
  <!-- Surrounding elements -->
  <rect x="680" y="320" width="140" height="36" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="750" y="343" text-anchor="middle" fill="#88ccaa" font-family="system-ui,sans-serif" font-size="13">New Workflow</text>
  <rect x="940" y="320" width="140" height="36" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="1010" y="343" text-anchor="middle" fill="#88ccaa" font-family="system-ui,sans-serif" font-size="13">New Process</text>
  <rect x="810" y="380" width="140" height="36" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <text x="880" y="403" text-anchor="middle" fill="#88ccaa" font-family="system-ui,sans-serif" font-size="13">New Testing</text>
  <!-- Arrows from Agent to surrounding -->
  <line x1="830" y1="290" x2="760" y2="318" stroke="rgba(34,197,94,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="930" y1="290" x2="1000" y2="318" stroke="rgba(34,197,94,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="290" x2="880" y2="378" stroke="rgba(34,197,94,0.35)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="880" y="442" text-anchor="middle" fill="rgba(34,197,94,0.5)" font-family="system-ui,sans-serif" font-size="12" font-style="italic">ground-up · Harness Engineering</text>
  <!-- VS divider -->
  <text x="600" y="310" text-anchor="middle" fill="rgba(167,139,250,0.7)" font-family="system-ui,sans-serif" font-size="28" font-weight="800">VS</text>
  <!-- Bottom bar -->
  <rect x="200" y="510" width="800" height="70" rx="18" fill="rgba(9,24,39,0.7)" stroke="rgba(167,139,250,0.25)" stroke-width="1"/>
  <text x="600" y="545" text-anchor="middle" fill="#bdd0df" font-family="system-ui,sans-serif" font-size="16" font-weight="600">工程团队的首要工作不再是写代码</text>
  <text x="600" y="568" text-anchor="middle" fill="rgba(167,139,250,0.6)" font-family="system-ui,sans-serif" font-size="13">而是让 Agent 能够有效地完成工作</text>
  <!-- Footer pill -->
  <rect x="400" y="595" width="400" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="613" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="12">CreaoAI · Peter Pang · Harness Engineering</text>
</svg>
