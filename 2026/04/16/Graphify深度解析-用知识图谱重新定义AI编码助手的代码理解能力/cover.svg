<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060e1a"/>
      <stop offset="50%" stop-color="#0d1a2d"/>
      <stop offset="100%" stop-color="#0a1222"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="2">KNOWLEDGE GRAPH FOR AI CODING</text>
  <text x="600" y="82" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">从逐文件 Grep 到按图索骥</text>
  <!-- Knowledge Graph Visualization (center) -->
  <!-- Nodes -->
  <circle cx="600" cy="300" r="38" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="305" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Graph</text>
  <circle cx="420" cy="210" r="28" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="420" y="215" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Module</text>
  <circle cx="780" cy="210" r="28" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="780" y="215" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Class</text>
  <circle cx="350" cy="340" r="24" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="345" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Func</text>
  <circle cx="480" cy="420" r="24" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="425" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="11" font-weight="600">API</text>
  <circle cx="720" cy="420" r="24" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1.5"/>
  <text x="720" y="425" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Type</text>
  <circle cx="850" cy="340" r="24" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1.5"/>
  <text x="850" y="345" text-anchor="middle" fill="#34d399" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Doc</text>
  <circle cx="320" cy="220" r="18" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1"/>
  <text x="320" y="225" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="9" font-weight="600">dep</text>
  <circle cx="880" cy="220" r="18" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1"/>
  <text x="880" y="225" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="9" font-weight="600">ref</text>
  <!-- Edges -->
  <line x1="448" y1="220" x2="562" y2="288" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <line x1="752" y1="220" x2="638" y2="288" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <line x1="374" y1="340" x2="562" y2="305" stroke="rgba(16,185,129,0.3)" stroke-width="1.2"/>
  <line x1="504" y1="415" x2="570" y2="328" stroke="rgba(16,185,129,0.3)" stroke-width="1.2"/>
  <line x1="696" y1="415" x2="630" y2="328" stroke="rgba(16,185,129,0.3)" stroke-width="1.2"/>
  <line x1="826" y1="340" x2="638" y2="305" stroke="rgba(16,185,129,0.3)" stroke-width="1.2"/>
  <line x1="338" y1="220" x2="392" y2="215" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
  <line x1="862" y1="220" x2="808" y2="215" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
  <line x1="370" y1="326" x2="405" y2="238" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="830" y1="326" x2="795" y2="238" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="408" x2="700" y2="408" stroke="rgba(16,185,129,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Left panel: Pipeline -->
  <rect x="60" y="130" width="195" height="380" rx="14" fill="rgba(9,24,39,0.8)" stroke="rgba(6,182,212,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="158" y="162" text-anchor="middle" fill="#22d3ee" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Pipeline</text>
  <rect x="85" y="185" width="145" height="32" rx="6" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="158" y="206" text-anchor="middle" fill="#88ccdd" font-family="system-ui,sans-serif" font-size="12">① tree-sitter</text>
  <text x="158" y="240" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="system-ui,sans-serif" font-size="16">↓</text>
  <rect x="85" y="255" width="145" height="32" rx="6" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="158" y="276" text-anchor="middle" fill="#bba8ee" font-family="system-ui,sans-serif" font-size="12">② LLM Extract</text>
  <text x="158" y="310" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="system-ui,sans-serif" font-size="16">↓</text>
  <rect x="85" y="325" width="145" height="32" rx="6" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="158" y="346" text-anchor="middle" fill="#66ddaa" font-family="system-ui,sans-serif" font-size="12">③ Leiden Cluster</text>
  <text x="158" y="380" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="system-ui,sans-serif" font-size="16">↓</text>
  <rect x="85" y="395" width="145" height="32" rx="6" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="158" y="416" text-anchor="middle" fill="#ddcc66" font-family="system-ui,sans-serif" font-size="12">④ Query Graph</text>
  <text x="158" y="470" text-anchor="middle" fill="rgba(6,182,212,0.4)" font-family="system-ui,sans-serif" font-size="11" font-style="italic">AST → Semantics → Graph</text>
  <!-- Right panel: Before/After -->
  <rect x="945" y="130" width="195" height="380" rx="14" fill="rgba(9,24,39,0.8)" stroke="rgba(139,92,246,0.25)" stroke-width="1" filter="url(#shadow)"/>
  <text x="1042" y="162" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="14" font-weight="700">AI Coding</text>
  <text x="1042" y="200" text-anchor="middle" fill="#ef4444" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Before</text>
  <text x="1042" y="225" text-anchor="middle" fill="#886666" font-family="system-ui,sans-serif" font-size="11">Glob → Grep → Guess</text>
  <text x="1042" y="250" text-anchor="middle" fill="#886666" font-family="system-ui,sans-serif" font-size="11">80% token on search</text>
  <text x="1042" y="275" text-anchor="middle" fill="#886666" font-family="system-ui,sans-serif" font-size="11">no global context</text>
  <line x1="970" y1="300" x2="1114" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1042" y="330" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="12" font-weight="600">After</text>
  <text x="1042" y="355" text-anchor="middle" fill="#66aa88" font-family="system-ui,sans-serif" font-size="11">Query → Navigate</text>
  <text x="1042" y="380" text-anchor="middle" fill="#66aa88" font-family="system-ui,sans-serif" font-size="11">structural understanding</text>
  <text x="1042" y="405" text-anchor="middle" fill="#66aa88" font-family="system-ui,sans-serif" font-size="11">see the map first</text>
  <text x="1042" y="470" text-anchor="middle" fill="rgba(139,92,246,0.4)" font-family="system-ui,sans-serif" font-size="11" font-style="italic">先看地图再找路</text>
  <!-- Bottom tagline -->
  <rect x="350" y="545" width="500" height="56" rx="16" fill="rgba(9,24,39,0.7)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
  <text x="600" y="572" text-anchor="middle" fill="#bdd0df" font-family="system-ui,sans-serif" font-size="15" font-weight="600">Graphify: 面向 AI 编码助手的知识图谱</text>
  <text x="600" y="592" text-anchor="middle" fill="rgba(6,182,212,0.5)" font-family="system-ui,sans-serif" font-size="12">safishamsi/graphify · ⭐ 27.6K</text>
</svg>
