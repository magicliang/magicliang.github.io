<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Symphony 架构与数据流</title>
  <desc id="desc">Linear 工单经过 Symphony Orchestrator 调度，进入隔离 workspace 并启动 Codex app-server 子进程；WORKFLOW.md 提供仓库内策略，dashboard 观察运行状态。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07121f"/>
      <stop offset="55%" stop-color="#0b1b2f"/>
      <stop offset="100%" stop-color="#121827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14243a" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0f1d30" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#38d9ff"/>
      <stop offset="100%" stop-color="#8bffcf"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffcf5a"/>
      <stop offset="100%" stop-color="#ff7a90"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000814" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#38d9ff"/>
    </marker>
    <marker id="arrowWarm" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#ffcf5a"/>
    </marker>
    <style>
      text { font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .tiny { font-size: 22px; fill: #8aa4c2; }
      .label { font-size: 28px; fill: #dbeafe; font-weight: 700; }
      .title { font-size: 42px; fill: #f8fbff; font-weight: 800; }
      .subtitle { font-size: 24px; fill: #9fb6d5; }
      .chip { font-size: 20px; fill: #a7f3d0; font-weight: 700; letter-spacing: 0; }
      .body { font-size: 23px; fill: #c8d7ea; }
      .muted { font-size: 20px; fill: #8fa8c7; }
      .panel { fill: url(#panel); stroke: #284466; stroke-width: 2; filter: url(#softShadow); }
      .inner { fill: #0d1a2b; stroke: #315374; stroke-width: 1.5; }
      .cyan { stroke: #38d9ff; }
      .warm { stroke: #ffcf5a; }
      .flow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
      .grid { stroke: #1b3656; stroke-width: 1; opacity: 0.34; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.5">
    <path class="grid" d="M80 120H1520M80 240H1520M80 360H1520M80 480H1520M80 600H1520M80 720H1520M80 840H1520"/>
    <path class="grid" d="M160 80V840M320 80V840M480 80V840M640 80V840M800 80V840M960 80V840M1120 80V840M1280 80V840M1440 80V840"/>
  </g>

  <text x="80" y="78" class="title">Symphony：把工单变成隔离的 Codex implementation run</text>
  <text x="82" y="118" class="subtitle">核心不是“多开几个 agent”，而是让 tracker、workspace、workflow 和 app-server protocol 形成一条可审计的数据流。</text>

  <g transform="translate(80 180)">
    <rect class="panel" x="0" y="0" width="310" height="420" rx="24"/>
    <text class="label" x="34" y="54">Linear / Issue Tracker</text>
    <text class="tiny" x="34" y="88">control plane input</text>
    <rect class="inner" x="34" y="128" width="242" height="72" rx="16"/>
    <text class="body" x="58" y="173">候选工单</text>
    <rect class="inner" x="34" y="224" width="242" height="72" rx="16"/>
    <text class="body" x="58" y="269">状态机字段</text>
    <rect class="inner" x="34" y="320" width="242" height="72" rx="16"/>
    <text class="body" x="58" y="365">评论 / PR link / 关闭</text>
  </g>

  <g transform="translate(510 165)">
    <rect class="panel" x="0" y="0" width="430" height="450" rx="24"/>
    <text class="label" x="36" y="58">Symphony Orchestrator</text>
    <text class="tiny" x="36" y="92">single scheduler mutation point</text>
    <rect class="inner" x="36" y="126" width="358" height="52" rx="14"/>
    <text class="body" x="62" y="160">poll tick：reconcile → preflight</text>
    <rect class="inner" x="36" y="198" width="358" height="52" rx="14"/>
    <text class="body" x="62" y="232">stable sort：priority + time + id</text>
    <rect class="inner" x="36" y="270" width="358" height="52" rx="14"/>
    <text class="body" x="62" y="304">dispatch：按并发槽位派发</text>
    <rect class="inner" x="36" y="342" width="358" height="72" rx="14"/>
    <text class="body" x="62" y="374">stdio JSON line protocol</text>
    <text class="muted" x="62" y="402">启动并推进 Codex app-server turn</text>
  </g>

  <g transform="translate(1060 145)">
    <rect class="panel" x="0" y="0" width="460" height="510" rx="24"/>
    <text class="label" x="36" y="58">Per-Issue Workspaces</text>
    <text class="tiny" x="36" y="92">filesystem isolation + reusable state</text>
    <rect class="inner" x="36" y="128" width="388" height="132" rx="18"/>
    <text class="chip" x="62" y="164">LIN-123 workspace</text>
    <text class="body" x="62" y="205">repo checkout / hooks / tests</text>
    <text class="body" x="62" y="236">Codex app-server subprocess</text>
    <rect class="inner" x="36" y="292" width="388" height="132" rx="18"/>
    <text class="chip" x="62" y="328">LIN-124 workspace</text>
    <text class="body" x="62" y="369">独立 cwd / sandbox root</text>
    <text class="body" x="62" y="400">可跑在本地或 SSH worker</text>
  </g>

  <g transform="translate(210 690)">
    <rect class="panel" x="0" y="0" width="520" height="140" rx="22"/>
    <text class="label" x="34" y="52">WORKFLOW.md</text>
    <text class="body" x="34" y="90">仓库内策略：tracker、workspace、hooks</text>
    <text class="body" x="34" y="120">并发、sandbox、prompt template</text>
  </g>

  <g transform="translate(875 700)">
    <rect class="panel" x="0" y="0" width="470" height="120" rx="22"/>
    <text class="label" x="34" y="52">Observability Surface</text>
    <text class="body" x="34" y="90">LiveView dashboard / JSON API / state refresh</text>
  </g>

  <path class="flow cyan" d="M390 310 C445 305 455 305 510 305" marker-end="url(#arrowCyan)"/>
  <text class="muted" x="414" y="286">读候选 / 读状态</text>
  <path class="flow cyan" d="M940 355 C1000 355 1000 355 1060 355" marker-end="url(#arrowCyan)"/>
  <text class="muted" x="956" y="330">创建 workspace + 启动子进程</text>
  <path class="flow warm" d="M1185 655 C1165 685 1125 700 1070 708" marker-end="url(#arrowWarm)"/>
  <text class="muted" x="1112" y="690">运行态观测</text>
  <path class="flow warm" d="M470 690 C520 640 575 615 640 615" marker-end="url(#arrowWarm)"/>
  <text class="muted" x="500" y="650">动态 reload</text>
  <path class="flow warm" d="M1245 278 C1220 96 495 92 357 218" marker-end="url(#arrowWarm)"/>
  <text class="muted" x="700" y="154">agent 通过工具写回 ticket / comment / PR link</text>

  <g transform="translate(80 828)">
    <rect x="0" y="0" width="1440" height="2" fill="url(#accent)" opacity="0.7"/>
    <text class="tiny" x="0" y="34">边界读法：Symphony 读 tracker、调度 run、维护状态；Codex 在 workspace 内执行具体实现。</text>
    <text class="tiny" x="0" y="64">业务策略留在仓库，凭据和调度状态留在 orchestrator。</text>
  </g>
</svg>
