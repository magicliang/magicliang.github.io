<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="system-ui,-apple-system,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif">

  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5 Z" fill="#1a9850"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0.8" dy="0.8" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ====== TITLE ====== -->
  <text x="390" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">知识表示的架构翻转</text>

  <!-- ====== TOP SECTION: RAG ====== -->
  <rect x="6" y="40" width="768" height="148" rx="8" fill="#fffaf0" stroke="#f0dfc0" stroke-width="0.8"/>
  <text x="18" y="60" font-size="13" font-weight="600" fill="#d35400">传统 RAG</text>
  <text x="100" y="60" font-size="10" fill="#aaa">Set&lt;Fragment&gt; — 互不相识的碎片</text>

  <!-- 5 disconnected chunk boxes — staggered y to show "scattered" -->
  <rect x="22"  y="74"  width="138" height="42" rx="5" fill="#e67e22" opacity="0.88"/>
  <text x="91"  y="92"  text-anchor="middle" font-size="9.5" fill="#fff" font-weight="500">chunk 1 · 设计文档</text>
  <text x="91"  y="106" text-anchor="middle" font-size="7.8" fill="#fff" opacity="0.78">"JWT token 过期 30 分钟"</text>

  <rect x="172" y="80"  width="138" height="42" rx="5" fill="#f39c12" opacity="0.82"/>
  <text x="241" y="98"  text-anchor="middle" font-size="9.5" fill="#fff" font-weight="500">chunk 2 · API 文档</text>
  <text x="241" y="112" text-anchor="middle" font-size="7.8" fill="#fff" opacity="0.78">"POST /auth/login 接受…"</text>

  <rect x="322" y="72"  width="138" height="42" rx="5" fill="#e74c3c" opacity="0.72"/>
  <text x="391" y="90"  text-anchor="middle" font-size="9.5" fill="#fff" font-weight="500">chunk 3 · 会议纪要</text>
  <text x="391" y="104" text-anchor="middle" font-size="7.8" fill="#fff" opacity="0.78">"从 session 迁移到 JWT"</text>

  <rect x="472" y="82"  width="138" height="42" rx="5" fill="#c0392b" opacity="0.55"/>
  <text x="541" y="100" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="500">chunk 4 ⚠ 旧文档</text>
  <text x="541" y="114" text-anchor="middle" font-size="7.8" fill="#fff" opacity="0.78">"使用 session cookie"</text>

  <rect x="622" y="76"  width="138" height="42" rx="5" fill="#f39c12" opacity="0.68"/>
  <text x="691" y="94"  text-anchor="middle" font-size="9.5" fill="#fff" font-weight="500">chunk 5 · 部署文档</text>
  <text x="691" y="108" text-anchor="middle" font-size="7.8" fill="#fff" opacity="0.78">"auth-cluster 依赖 Redis"</text>

  <!-- Contradiction annotation -->
  <line x1="391" y1="114" x2="420" y2="133" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="541" y1="124" x2="512" y2="133" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="466" y="143" text-anchor="middle" font-size="8" fill="#c0392b">⚠ chunk 3 与 4 矛盾，查询时 LLM 临时裁定</text>

  <!-- No-connection annotation -->
  <text x="762" y="168" text-anchor="end" font-size="8" fill="#bbb">碎片之间无关系</text>
  <!-- Status -->
  <text x="18" y="178" font-size="9" fill="#d35400">原始文档 = 一等公民 ︱ 合成答案 = 临时产物，用完即弃</text>

  <!-- ====== DIVIDER ====== -->
  <rect x="280" y="195" width="220" height="22" rx="4" fill="#3498db" opacity="0.88"/>
  <text x="390" y="210" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">↓  架构翻转：合成知识升格为一等公民  ↓</text>

  <!-- ====== BOTTOM SECTION: LLM Wiki ====== -->
  <rect x="6" y="225" width="768" height="158" rx="8" fill="#f0faf0" stroke="#c0e8c0" stroke-width="0.8"/>
  <text x="18" y="246" font-size="13" font-weight="600" fill="#27ae60">LLM Wiki</text>
  <text x="110" y="246" font-size="10" fill="#aaa">Graph&lt;Page, Link&gt; — 交叉引用的知识图</text>

  <!-- Wiki page node: 认证流程 (top center) -->
  <rect x="290" y="258" width="140" height="50" rx="8" fill="#27ae60" filter="url(#shadow)"/>
  <text x="360" y="280" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="600">认证流程</text>
  <text x="360" y="297" text-anchor="middle" font-size="8" fill="#fff" opacity="0.82">JWT · 30min · 已知风险标注</text>

  <!-- Wiki page node: Redis 集群 (bottom left) -->
  <rect x="80" y="325" width="140" height="50" rx="8" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="150" y="347" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="600">Redis 集群</text>
  <text x="150" y="364" text-anchor="middle" font-size="8" fill="#fff" opacity="0.82">3 节点主从 · 被认证服务依赖</text>

  <!-- Wiki page node: 2024-03 认证故障 (bottom right) -->
  <rect x="500" y="325" width="165" height="50" rx="8" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="582" y="347" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="600">2024-03 认证故障</text>
  <text x="582" y="364" text-anchor="middle" font-size="8" fill="#fff" opacity="0.82">Redis 主节点宕机 · 认证全链路不可用</text>

  <!-- Cross-reference arrows -->
  <!-- 认证流程 → Redis 集群 -->
  <line x1="295" y1="300" x2="207" y2="325" stroke="#1a9850" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="235" y="308" font-size="8.5" fill="#1a9850" font-weight="500">[[依赖]]</text>

  <!-- 认证流程 → 认证故障 -->
  <line x1="425" y1="300" x2="515" y2="325" stroke="#1a9850" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="480" y="308" font-size="8.5" fill="#1a9850" font-weight="500">[[已知风险]]</text>

  <!-- Redis 集群 → 认证故障 -->
  <line x1="220" y1="350" x2="498" y2="350" stroke="#1a9850" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="360" y="344" text-anchor="middle" font-size="8.5" fill="#1a9850" font-weight="500">[[历史故障]]</text>

  <!-- Status -->
  <text x="18" y="394" font-size="9" fill="#27ae60">合成知识 = 一等公民 ︱ 原始文档 = 可归档的摄入素材</text>

  <!-- ====== BOTTOM ANALOGY BAR ====== -->
  <rect x="6" y="396" width="768" height="20" rx="4" fill="#f0f4f8"/>
  <text x="390" y="411" text-anchor="middle" font-size="9" fill="#666">类比：RAG ≈ 每次查询做实时 JOIN ︱ LLM Wiki ≈ 物化视图，读多写少时碾压实时 JOIN</text>

</svg>
