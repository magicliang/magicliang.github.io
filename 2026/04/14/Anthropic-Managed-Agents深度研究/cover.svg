<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="rose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#e879a8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000814" flood-opacity=".45"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.06"/>
  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#38bdf8" font-family="system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="2">MANAGED AGENTS ARCHITECTURE</text>
  <text x="600" y="90" text-anchor="middle" fill="#a0a0c0" font-family="system-ui,sans-serif" font-size="15">解耦大脑与双手的架构哲学</text>
  <!-- Brain box (left) -->
  <rect x="80" y="175" width="300" height="200" rx="18" fill="rgba(9,24,39,0.86)" stroke="#38bdf8" stroke-opacity="0.55" filter="url(#shadow)"/>
  <rect x="106" y="200" width="82" height="28" rx="14" fill="url(#teal)"/>
  <text x="147" y="219" text-anchor="middle" fill="#06111f" font-family="system-ui,sans-serif" font-size="14" font-weight="800">Brain</text>
  <text x="106" y="262" fill="#d7e6f0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Claude LLM</text>
  <text x="106" y="290" fill="#99aabb" font-family="system-ui,sans-serif" font-size="14">+ Harness Loop</text>
  <text x="106" y="316" fill="#99aabb" font-family="system-ui,sans-serif" font-size="14">+ Tool Router</text>
  <text x="106" y="348" fill="#667eea" font-family="system-ui,sans-serif" font-size="12" font-style="italic">think → decide → dispatch</text>
  <!-- Hands box (right) -->
  <rect x="820" y="175" width="300" height="200" rx="18" fill="rgba(9,24,39,0.86)" stroke="#f472b6" stroke-opacity="0.55" filter="url(#shadow)"/>
  <rect x="846" y="200" width="86" height="28" rx="14" fill="url(#rose)"/>
  <text x="889" y="219" text-anchor="middle" fill="#06111f" font-family="system-ui,sans-serif" font-size="14" font-weight="800">Hands</text>
  <text x="846" y="262" fill="#d7e6f0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Sandbox</text>
  <text x="846" y="290" fill="#99aabb" font-family="system-ui,sans-serif" font-size="14">+ Code Execution</text>
  <text x="846" y="316" fill="#99aabb" font-family="system-ui,sans-serif" font-size="14">+ File System</text>
  <text x="846" y="348" fill="#f472b6" font-family="system-ui,sans-serif" font-size="12" font-style="italic">execute(name, input) → string</text>
  <!-- Session box (center bottom) -->
  <rect x="400" y="440" width="400" height="110" rx="18" fill="rgba(9,24,39,0.86)" stroke="#fbbf24" stroke-opacity="0.55" filter="url(#shadow)"/>
  <rect x="426" y="462" width="100" height="28" rx="14" fill="url(#amber)"/>
  <text x="476" y="481" text-anchor="middle" fill="#06111f" font-family="system-ui,sans-serif" font-size="14" font-weight="800">Session</text>
  <text x="426" y="518" fill="#d7e6f0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Append-only Event Log</text>
  <text x="426" y="540" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="12" font-style="italic">memory · state · replay</text>
  <!-- Connection: Brain → Hands -->
  <line x1="384" y1="275" x2="816" y2="275" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrow)"/>
  <text x="600" y="262" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="12">decouple</text>
  <!-- Connection: Brain → Session -->
  <line x1="230" y1="379" x2="450" y2="438" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <!-- Connection: Hands → Session -->
  <line x1="970" y1="379" x2="750" y2="438" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <!-- Scaling labels -->
  <text x="230" y="150" text-anchor="middle" fill="rgba(56,189,248,0.45)" font-family="system-ui,sans-serif" font-size="13">↕ Many Brains</text>
  <text x="970" y="150" text-anchor="middle" fill="rgba(244,114,182,0.45)" font-family="system-ui,sans-serif" font-size="13">↕ Many Hands</text>
  <!-- Bottom tagline -->
  <rect x="340" y="580" width="520" height="30" rx="15" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="600" text-anchor="middle" fill="#808090" font-family="system-ui,sans-serif" font-size="13">Anthropic Managed Agents · Scaling Autonomous Coding</text>
</svg>
