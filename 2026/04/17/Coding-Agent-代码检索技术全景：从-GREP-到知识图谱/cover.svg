<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Coding Agent 代码检索技术全景</title>
  <desc id="desc">从 grep、AST、embedding 到知识图谱，检索能力决定 Agent 能否取到正确上下文。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".5" stop-color="#172033"/>
      <stop offset="1" stop-color="#2e2435"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#e9d5ff" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#020617" flood-opacity=".4"/>
    </filter>
    <style>
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:58px;font-weight:820;fill:#f8fafc}
      .sub{font-size:27px;font-weight:500;fill:#f0abfc}
      .label{font-size:24px;font-weight:780;fill:#fdf4ff}
      .small{font-size:20px;font-weight:520;fill:#d1d5db}
      .card{fill:#111827;stroke:#d946ef;stroke-width:3;filter:url(#shadow)}
      .node{fill:#172554;stroke:#93c5fd;stroke-width:2.5}
      .line{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .mag{stroke:#f0abfc}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g class="font">
    <text x="105" y="124" class="title">Coding Agent 代码检索技术全景</text>
    <text x="108" y="181" class="sub">从 GREP 到知识图谱：智能的一半是取到正确上下文</text>
  </g>
  <g class="font" transform="translate(120 298)">
    <rect class="card" width="1360" height="290" rx="30"/>
    <g transform="translate(72 78)">
      <rect class="node" width="190" height="98" rx="20"/>
      <text x="95" y="60" text-anchor="middle" class="label">GREP</text>
      <rect class="node" x="286" width="190" height="98" rx="20"/>
      <text x="381" y="60" text-anchor="middle" class="label">AST</text>
      <rect class="node" x="572" width="190" height="98" rx="20"/>
      <text x="667" y="60" text-anchor="middle" class="label">Embedding</text>
      <rect class="node" x="858" width="190" height="98" rx="20"/>
      <text x="953" y="60" text-anchor="middle" class="label">Graph</text>
      <rect class="node" x="1114" width="150" height="98" rx="20" fill="#052e2b" stroke="#86efac"/>
      <text x="1189" y="60" text-anchor="middle" class="label">Answer</text>
      <path class="line" d="M190 49H286M476 49H572M762 49H858M1048 49H1114"/>
    </g>
  </g>
  <g class="font" transform="translate(270 654)">
    <path class="line mag" d="M0 0C112 70 226 70 338 0C450 -70 566 -70 682 0C792 66 914 66 1032 0"/>
    <circle cx="0" cy="0" r="12" fill="#f0abfc"/>
    <circle cx="338" cy="0" r="12" fill="#93c5fd"/>
    <circle cx="682" cy="0" r="12" fill="#86efac"/>
    <circle cx="1032" cy="0" r="12" fill="#fbbf24"/>
    <text x="226" y="82" class="small">检索不是附属能力，而是 Agent 的环境感知系统。</text>
  </g>
  <text x="108" y="795" class="font small">模型越会主动取证，提示词工程的负担越低；环境准备越好，智能边界越宽。</text>
</svg>
