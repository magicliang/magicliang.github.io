<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <linearGradient id="cyanFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a3850"/>
      <stop offset="1" stop-color="#0e2133"/>
    </linearGradient>
    <linearGradient id="greenFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#173b30"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="orangeFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2c1c"/>
      <stop offset="1" stop-color="#241f19"/>
    </linearGradient>
    <linearGradient id="purpleFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c1f3a"/>
      <stop offset="1" stop-color="#1a1424"/>
    </linearGradient>
    <linearGradient id="redFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a1c2a"/>
      <stop offset="1" stop-color="#241419"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#67e7ff"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#9fb8c8"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <text x="80" y="78" fill="#f4fbff" font-size="42" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">Claude Code 五层架构：同一个引擎驱动所有前端</text>
  <text x="80" y="118" fill="#9fb8c8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">CLI 只是其中一种入口；Bridge 抽象让推理引擎不感知传输层。</text>

  <!-- Layer 1: Entrypoints -->
  <g transform="translate(80 165)">
    <rect width="1280" height="138" rx="20" fill="url(#cyanFade)" stroke="#58d7ff" stroke-opacity="0.45"/>
    <text x="36" y="46" fill="#7be6ff" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Layer 1 · Entrypoints</text>
    <text x="36" y="74" fill="#cfe4ef" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">多端入口：用户在哪里都能看到的"Claude Code"。</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#f7fbff">
      <rect x="36" y="92" width="160" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="56" y="115">Terminal CLI</text>
      <rect x="208" y="92" width="180" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="228" y="115">Desktop App</text>
      <rect x="400" y="92" width="200" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="420" y="115">Web (claude.ai/code)</text>
      <rect x="612" y="92" width="220" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="632" y="115">Agent SDK (Py / TS)</text>
      <rect x="844" y="92" width="220" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="864" y="115">VS Code / JetBrains</text>
      <rect x="1076" y="92" width="180" height="34" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.45"/><text x="1096" y="115">Headless / CI</text>
    </g>
  </g>

  <!-- Layer 2: Runtime -->
  <g transform="translate(80 320)">
    <rect width="1280" height="138" rx="20" fill="url(#greenFade)" stroke="#41efb7" stroke-opacity="0.4"/>
    <text x="36" y="46" fill="#72f0c3" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Layer 2 · Runtime</text>
    <text x="36" y="74" fill="#cfe4ef" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">运行时核心：管 REPL 循环、Hook 切面、permission、状态机。</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#f7fbff">
      <rect x="36" y="92" width="160" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="56" y="115">REPL Loop</text>
      <rect x="208" y="92" width="180" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="228" y="115">Hook System (9 类)</text>
      <rect x="400" y="92" width="180" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="420" y="115">Permission Engine</text>
      <rect x="592" y="92" width="180" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="612" y="115">State Manager</text>
      <rect x="784" y="92" width="180" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="804" y="115">Slash Commands</text>
      <rect x="976" y="92" width="280" height="34" rx="10" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.4"/><text x="996" y="115">AsyncLocalStorage Context</text>
    </g>
  </g>

  <!-- Layer 3: Engine -->
  <g transform="translate(80 475)">
    <rect width="1280" height="138" rx="20" fill="url(#orangeFade)" stroke="#ffbd7a" stroke-opacity="0.5"/>
    <text x="36" y="46" fill="#ffd596" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Layer 3 · Engine</text>
    <text x="36" y="74" fill="#cfe4ef" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">推理引擎：唯一与 Anthropic API 通信的层；AsyncGenerator 流式控制中枢。</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#f7fbff">
      <rect x="36" y="92" width="190" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="56" y="115">QueryEngine 单例</text>
      <rect x="238" y="92" width="200" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="258" y="115">Context Coordinator</text>
      <rect x="450" y="92" width="200" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="470" y="115">Compact Pipeline</text>
      <rect x="662" y="92" width="200" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="682" y="115">Streaming SSE Demux</text>
      <rect x="874" y="92" width="180" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="894" y="115">Cache Strategist</text>
      <rect x="1066" y="92" width="190" height="34" rx="10" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.4"/><text x="1086" y="115">Token Budget Guard</text>
    </g>
  </g>

  <!-- Layer 4: Tools & Capabilities -->
  <g transform="translate(80 630)">
    <rect width="1280" height="138" rx="20" fill="url(#purpleFade)" stroke="#c69dff" stroke-opacity="0.45"/>
    <text x="36" y="46" fill="#dabbff" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Layer 4 · Tools &amp; Capabilities</text>
    <text x="36" y="74" fill="#cfe4ef" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">能力层：模型能"做"什么完全由这层决定，没有任何后门绕过它。</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#f7fbff">
      <rect x="36" y="92" width="180" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="56" y="115">40+ Built-in Tools</text>
      <rect x="228" y="92" width="180" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="248" y="115">MCP Servers</text>
      <rect x="420" y="92" width="180" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="440" y="115">Skills (3-tier)</text>
      <rect x="612" y="92" width="180" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="632" y="115">Sub Agents</text>
      <rect x="804" y="92" width="180" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="824" y="115">Plugins / Marketplace</text>
      <rect x="996" y="92" width="260" height="34" rx="10" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.42"/><text x="1016" y="115">Hooks (harness 强制执行)</text>
    </g>
  </g>

  <!-- Layer 5: Infrastructure -->
  <g transform="translate(80 785)">
    <rect width="1280" height="138" rx="20" fill="url(#redFade)" stroke="#ff6b8a" stroke-opacity="0.45"/>
    <text x="36" y="46" fill="#ff9ab1" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">Layer 5 · Infrastructure</text>
    <text x="36" y="74" fill="#cfe4ef" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">基础设施：Bridge 抽象传输；引擎不知道数据走 stdin / WebSocket / IPC。</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="17" fill="#f7fbff">
      <rect x="36" y="92" width="160" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="56" y="115">Auth / OAuth</text>
      <rect x="208" y="92" width="180" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="228" y="115">Storage (~/.claude)</text>
      <rect x="400" y="92" width="200" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="420" y="115">Bridge Transport (stdin/WS/IPC)</text>
      <rect x="612" y="92" width="180" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="632" y="115">Telemetry / OTel</text>
      <rect x="804" y="92" width="180" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="824" y="115">apiPreconnect (TLS)</text>
      <rect x="996" y="92" width="260" height="34" rx="10" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.42"/><text x="1016" y="115">Sandbox (filesystem / network)</text>
    </g>
  </g>

  <!-- Right side annotations -->
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="1390" y="200" fill="#7be6ff" font-size="17" font-weight="700">用户可见前端</text>
    <text x="1390" y="225" fill="#9fb8c8" font-size="14">所有入口共享同一引擎</text>

    <text x="1390" y="355" fill="#72f0c3" font-size="17" font-weight="700">harness 控制权</text>
    <text x="1390" y="380" fill="#9fb8c8" font-size="14">Hook + permission</text>
    <text x="1390" y="400" fill="#9fb8c8" font-size="14">在这一层强制执行</text>

    <text x="1390" y="510" fill="#ffd596" font-size="17" font-weight="700">模型可见的边界</text>
    <text x="1390" y="535" fill="#9fb8c8" font-size="14">Layer 3 之上对模型透明</text>
    <text x="1390" y="555" fill="#9fb8c8" font-size="14">之下模型无法察觉</text>

    <text x="1390" y="665" fill="#dabbff" font-size="17" font-weight="700">能力即权力</text>
    <text x="1390" y="690" fill="#9fb8c8" font-size="14">没有这层的工具</text>
    <text x="1390" y="710" fill="#9fb8c8" font-size="14">模型就是一个聊天机</text>

    <text x="1390" y="820" fill="#ff9ab1" font-size="17" font-weight="700">Bridge 抽象</text>
    <text x="1390" y="845" fill="#9fb8c8" font-size="14">同一引擎驱动所有客户端</text>
    <text x="1390" y="865" fill="#9fb8c8" font-size="14">不感知传输协议</text>
  </g>

  <!-- vertical flow arrow on the left -->
  <path d="M55 200 L55 920" stroke="#67e7ff" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="6 6"/>
  <text x="22" y="565" fill="#67e7ff" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" transform="rotate(-90 22 565)">用户请求 → 引擎 → 工具 → 操作系统</text>

  <text x="80" y="970" fill="#9fb8c8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">据 redreamality / ThreeFish-AI / Pragmatic Engineer 等社区源码分析整理；具体名称为社区命名，与官方原始符号可能存在差异。</text>
</svg>
