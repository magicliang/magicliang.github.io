<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#67e7ff"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#ff6b8a"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#41efb7"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <text x="80" y="78" fill="#f4fbff" font-size="40" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">权限评估管线：deny &gt; ask &gt; allow，每段独立判规则</text>
  <text x="80" y="118" fill="#9fb8c8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">复合命令拆开评估、wrapper 自动剥离、Hook 是模型选择不到的硬切面。</text>

  <!-- Step 1: input -->
  <g transform="translate(80 180)">
    <rect width="320" height="100" rx="18" fill="#0e2133" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="28" y="36" fill="#7be6ff" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">① 模型决定调 Bash</text>
    <text x="28" y="64" fill="#cfe4ef" font-size="15" font-family="Arial">tool_use:</text>
    <text x="28" y="86" fill="#f7fbff" font-size="14" font-family="ui-monospace, monospace">timeout 30 npm test &amp;&amp; git push</text>
  </g>
  <path d="M404 230 L460 230" stroke="#67e7ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 2: wrapper strip -->
  <g transform="translate(460 180)">
    <rect width="320" height="100" rx="18" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.5"/>
    <text x="28" y="36" fill="#72f0c3" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">② 剥 process wrapper</text>
    <text x="28" y="64" fill="#cfe4ef" font-size="14" font-family="Arial">timeout / nice / nohup / stdbuf 等</text>
    <text x="28" y="86" fill="#cfe4ef" font-size="14" font-family="ui-monospace, monospace">→ npm test &amp;&amp; git push</text>
  </g>
  <path d="M784 230 L840 230" stroke="#67e7ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 3: split compound -->
  <g transform="translate(840 180)">
    <rect width="320" height="100" rx="18" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/>
    <text x="28" y="36" fill="#ffd596" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">③ 拆复合命令</text>
    <text x="28" y="64" fill="#cfe4ef" font-size="14" font-family="Arial">按 &amp;&amp; / || / ; / | / 换行 拆段</text>
    <text x="28" y="86" fill="#cfe4ef" font-size="14" font-family="ui-monospace, monospace">[npm test] · [git push]</text>
  </g>
  <path d="M1164 230 L1220 230" stroke="#67e7ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 4: per-segment match -->
  <g transform="translate(1220 180)">
    <rect width="300" height="100" rx="18" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.5"/>
    <text x="28" y="36" fill="#dabbff" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">④ 每段独立查规则</text>
    <text x="28" y="64" fill="#cfe4ef" font-size="14" font-family="Arial">针对每段单独跑 deny/ask/allow</text>
    <text x="28" y="86" fill="#ff9ab1" font-size="14" font-family="Arial">git push 命中 deny → 拒</text>
  </g>

  <!-- Three-tier rule precedence (vertical, left of center) -->
  <g transform="translate(80 360)">
    <text x="0" y="0" fill="#f4fbff" font-size="22" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">三层规则优先级（deny 永远胜出）</text>

    <g transform="translate(0 30)">
      <rect width="540" height="84" rx="14" fill="#3c1e22" stroke="#ff6b8a" stroke-opacity="0.6"/>
      <text x="24" y="36" fill="#ff9ab1" font-size="18" font-weight="700" font-family="Arial">deny</text>
      <text x="100" y="36" fill="#f7fbff" font-size="14" font-family="ui-monospace, monospace">"Bash(git push *)"  "Read(.env)"  "Read(//**/.env)"</text>
      <text x="24" y="68" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">先评估，命中即拒；bypassPermissions 也不能绕过 root/home rm。</text>
    </g>
    <g transform="translate(0 124)">
      <rect width="540" height="84" rx="14" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.6"/>
      <text x="24" y="36" fill="#ffd596" font-size="18" font-weight="700" font-family="Arial">ask</text>
      <text x="100" y="36" fill="#f7fbff" font-size="14" font-family="ui-monospace, monospace">"Edit(/src/**/*.ts)"</text>
      <text x="24" y="68" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">未被 deny 命中且 ask 命中 → 提示用户确认。</text>
    </g>
    <g transform="translate(0 218)">
      <rect width="540" height="84" rx="14" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.6"/>
      <text x="24" y="36" fill="#72f0c3" font-size="18" font-weight="700" font-family="Arial">allow</text>
      <text x="100" y="36" fill="#f7fbff" font-size="14" font-family="ui-monospace, monospace">"Bash(npm run *)"  "Read(src/**)"</text>
      <text x="24" y="68" fill="#cfe4ef" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">最后兜底；只读命令清单和 git 只读形式默认免提示。</text>
    </g>
  </g>

  <!-- Path anchoring (right of three-tier) -->
  <g transform="translate(680 360)">
    <text x="0" y="0" fill="#f4fbff" font-size="22" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">路径锚定（最常踩的坑）</text>
    <g font-family="ui-monospace, monospace">
      <g transform="translate(0 30)">
        <rect width="180" height="40" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/>
        <text x="14" y="26" fill="#7be6ff" font-size="15">//path</text>
      </g>
      <text x="200" y="55" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">文件系统绝对路径</text>

      <g transform="translate(0 80)">
        <rect width="180" height="40" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/>
        <text x="14" y="26" fill="#7be6ff" font-size="15">~/path</text>
      </g>
      <text x="200" y="105" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">用户 home 目录</text>

      <g transform="translate(0 130)">
        <rect width="180" height="40" rx="10" fill="#3c1e22" stroke="#ff6b8a" stroke-opacity="0.6"/>
        <text x="14" y="26" fill="#ff9ab1" font-size="15">/path</text>
      </g>
      <text x="200" y="155" fill="#ff9ab1" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">项目根（不是文件系统根）</text>

      <g transform="translate(0 180)">
        <rect width="180" height="40" rx="10" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/>
        <text x="14" y="26" fill="#7be6ff" font-size="15">path</text>
      </g>
      <text x="200" y="205" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">当前工作目录</text>

      <g transform="translate(0 230)">
        <rect width="540" height="60" rx="14" fill="#101a25" stroke="#9fb8c8" stroke-opacity="0.4"/>
        <text x="14" y="32" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">符号链接走双路径检查：allow 两端都过，deny 任一命中即拦。</text>
        <text x="14" y="50" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">这是项目内 symlink 仍能拦住 ~/.ssh/id_rsa 的机制。</text>
      </g>
    </g>
  </g>

  <!-- Below: Hook + Sandbox row -->
  <g transform="translate(80 720)">
    <rect width="1440" height="200" rx="22" fill="#101a25" stroke="#67e7ff" stroke-opacity="0.4"/>
    <text x="32" y="42" fill="#f4fbff" font-size="22" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">规则之外还有两道闸：PreToolUse Hook 与 OS Sandbox</text>

    <g transform="translate(32 70)">
      <rect width="660" height="110" rx="16" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.55"/>
      <text x="20" y="32" fill="#dabbff" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">⑤ PreToolUse Hook（harness 切面）</text>
      <text x="20" y="58" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">stdin 收 JSON（tool_name / tool_input / cwd / hook_event_name）</text>
      <text x="20" y="80" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">exit 2 → 忽略 stdout，stderr 回喂给 Claude（"非 1 是 2" 才阻塞）</text>
      <text x="20" y="100" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">JSON 输出与 exit code 互斥：permissionDecision: allow / deny / ask / defer</text>
    </g>

    <g transform="translate(720 70)">
      <rect width="688" height="110" rx="16" fill="#26161c" stroke="#ff6b8a" stroke-opacity="0.55"/>
      <text x="20" y="32" fill="#ff9ab1" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">⑥ Sandbox 边界（OS 层）</text>
      <text x="20" y="58" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">filesystem / network 隔离；sandbox 内 Bash 即便规则是 ask: Bash(*) 也直跑</text>
      <text x="20" y="80" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">autoAllowBashIfSandboxed: true（默认）— sandbox 边界替代 per-command prompt</text>
      <text x="20" y="100" fill="#cfe4ef" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">deny 规则在 sandbox 中仍生效；circuit breaker 始终保护 ~/ 与 / 的递归删除</text>
    </g>
  </g>

  <text x="80" y="965" fill="#9fb8c8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">官方文档：code.claude.com/docs/permissions / permission-modes / sandboxing；exit code 与 JSON 互斥的细节出自 hooks-guide。</text>
</svg>
