<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111d"/>
      <stop offset="1" stop-color="#111b16"/>
    </linearGradient>
    <linearGradient id="staticGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#143247"/>
      <stop offset="1" stop-color="#0e2133"/>
    </linearGradient>
    <linearGradient id="dynamicGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2c1c"/>
      <stop offset="1" stop-color="#2a1d12"/>
    </linearGradient>
    <linearGradient id="historyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#231b32"/>
      <stop offset="1" stop-color="#191124"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#89ddff" stroke-opacity="0.06"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#67e7ff"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#ffbd7a"/>
    </marker>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <text x="80" y="78" fill="#f4fbff" font-size="40" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">提示词缓存：四个 breakpoint 守住前缀，DYNAMIC_BOUNDARY 划界</text>
  <text x="80" y="118" fill="#9fb8c8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">cache_control 是前缀缓存的硬约束——任何上游变化都会击穿对应位置之后的所有缓存。</text>

  <!-- Prompt structure bar (top half, ~y=180~440) -->
  <g transform="translate(80 180)">
    <!-- Tools / System static (cacheable, blue) -->
    <rect x="0" y="0" width="780" height="180" rx="22" fill="url(#staticGrad)" stroke="#58d7ff" stroke-opacity="0.5"/>
    <text x="32" y="42" fill="#7be6ff" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">静态前缀（可缓存）</text>
    <text x="32" y="68" fill="#cfe4ef" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">tools → system static sections，跨用户共享</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#f7fbff">
      <rect x="32" y="86" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="50" y="108">Tool defs</text>
      <rect x="192" y="86" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="210" y="108">Identity / Tone</text>
      <rect x="352" y="86" width="172" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="370" y="108">Tools usage rules</text>
      <rect x="536" y="86" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="554" y="108">Output efficiency</text>

      <rect x="32" y="128" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="50" y="150">Action rules</text>
      <rect x="192" y="128" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="210" y="150">Safety guard</text>
      <rect x="352" y="128" width="172" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="370" y="150">Hooks doctrine</text>
      <rect x="536" y="128" width="148" height="32" rx="9" fill="#0a1d2c" stroke="#58d7ff" stroke-opacity="0.5"/><text x="554" y="150">Code conventions</text>
    </g>
    <!-- Breakpoint #1 marker (top edge of static) -->
    <g transform="translate(160 -30)">
      <circle r="14" fill="#58d7ff"/>
      <text fill="#06111d" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial">1</text>
      <text x="22" y="6" fill="#7be6ff" font-size="14" font-family="Arial">tools 末尾</text>
    </g>
    <g transform="translate(450 -30)">
      <circle r="14" fill="#58d7ff"/>
      <text fill="#06111d" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial">2</text>
      <text x="22" y="6" fill="#7be6ff" font-size="14" font-family="Arial">system static 末尾</text>
    </g>

    <!-- DYNAMIC_BOUNDARY -->
    <line x1="780" y1="-50" x2="780" y2="220" stroke="#ffbd7a" stroke-width="3" stroke-dasharray="8 6"/>
    <text x="788" y="-32" fill="#ffd596" font-size="15" font-weight="700" font-family="Arial">SYSTEM_PROMPT_DYNAMIC_BOUNDARY</text>
    <text x="788" y="-14" fill="#ffd596" font-size="13" font-family="Arial">边界以右逐用户/逐会话变化</text>

    <!-- Dynamic sections (orange) -->
    <rect x="800" y="0" width="500" height="180" rx="22" fill="url(#dynamicGrad)" stroke="#ffbd7a" stroke-opacity="0.55"/>
    <text x="832" y="42" fill="#ffd596" font-size="22" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">动态段（按需缓存）</text>
    <text x="832" y="68" fill="#cfe4ef" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">每会话不同：MCP / env / memory / 脚手板</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#f7fbff">
      <rect x="832" y="86" width="142" height="32" rx="9" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/><text x="850" y="108">env_info</text>
      <rect x="986" y="86" width="142" height="32" rx="9" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/><text x="1004" y="108">memory / @import</text>
      <rect x="1140" y="86" width="142" height="32" rx="9" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/><text x="1158" y="108">output_style</text>

      <rect x="832" y="128" width="142" height="32" rx="9" fill="#3c1e22" stroke="#ff6b8a" stroke-opacity="0.6"/><text x="850" y="150">mcp_instructions</text>
      <rect x="986" y="128" width="142" height="32" rx="9" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/><text x="1004" y="150">scratchpad</text>
      <rect x="1140" y="128" width="142" height="32" rx="9" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/><text x="1158" y="150">language</text>
    </g>
    <text x="832" y="178" fill="#ff9ab1" font-size="12" font-family="Arial">⚠ mcp_instructions 因每用户不同被显式标记为不可缓存</text>

    <!-- Messages history (purple, right) -->
    <rect x="1340" y="0" width="100" height="180" rx="20" fill="url(#historyGrad)" stroke="#c69dff" stroke-opacity="0.5"/>
    <text x="1356" y="40" fill="#dabbff" font-size="16" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">messages</text>
    <text x="1356" y="62" fill="#dabbff" font-size="13" font-family="Arial">历史</text>
    <g font-family="Arial, 'PingFang SC', sans-serif" font-size="13" fill="#f7fbff">
      <rect x="1356" y="78" width="68" height="22" rx="6" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.5"/><text x="1370" y="94">turn N-2</text>
      <rect x="1356" y="106" width="68" height="22" rx="6" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.5"/><text x="1370" y="122">turn N-1</text>
      <rect x="1356" y="134" width="68" height="22" rx="6" fill="#1f1730" stroke="#c69dff" stroke-opacity="0.5"/><text x="1370" y="150">turn N</text>
    </g>
    <!-- Breakpoint markers on dynamic and history -->
    <g transform="translate(1100 -30)">
      <circle r="14" fill="#ffbd7a"/>
      <text fill="#06111d" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial">3</text>
      <text x="-180" y="6" fill="#ffd596" font-size="14" font-family="Arial" text-anchor="start">动态尾（按需）</text>
    </g>
    <g transform="translate(1390 -30)">
      <circle r="14" fill="#c69dff"/>
      <text fill="#06111d" font-size="14" font-weight="700" text-anchor="middle" dominant-baseline="central" font-family="Arial">4</text>
      <text x="-90" y="6" fill="#dabbff" font-size="14" font-family="Arial" text-anchor="end">最后一轮历史</text>
    </g>
  </g>

  <!-- Prefix-matching invariant box -->
  <g transform="translate(80 460)">
    <rect width="1440" height="120" rx="20" fill="#0d2024" stroke="#58d7ff" stroke-opacity="0.4"/>
    <text x="32" y="42" fill="#7be6ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">前缀匹配硬约束 — 一字节都不能动</text>
    <text x="32" y="74" fill="#cfe4ef" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">tool 定义改了 → 整条失效；system 改了 → messages 部分失效；改 tool_choice 或加图 → system 之后失效。</text>
    <text x="32" y="100" fill="#cfe4ef" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">所以静态内容必须排在前面，子 Agent 用 model: 'inherit' 才能复用父对话缓存（byte-identical copies）。</text>
  </g>

  <!-- Pricing / usage section (bottom half) -->
  <g transform="translate(80 610)">
    <text x="0" y="0" fill="#f4fbff" font-size="24" font-weight="800" font-family="Arial, 'PingFang SC', sans-serif">价格与用量字段</text>

    <!-- Pricing cards -->
    <g transform="translate(0 30)">
      <rect width="340" height="180" rx="18" fill="#0d201a" stroke="#41efb7" stroke-opacity="0.5"/>
      <text x="28" y="40" fill="#72f0c3" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">cache_read</text>
      <text x="28" y="100" fill="#72f0c3" font-size="64" font-weight="900" font-family="Arial">0.1×</text>
      <text x="28" y="138" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">命中已缓存的输入</text>
      <text x="28" y="160" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">cache_read_input_tokens</text>
    </g>
    <g transform="translate(360 30)">
      <rect width="340" height="180" rx="18" fill="#26201a" stroke="#ffbd7a" stroke-opacity="0.5"/>
      <text x="28" y="40" fill="#ffd596" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">cache_write 5min</text>
      <text x="28" y="100" fill="#ffd596" font-size="64" font-weight="900" font-family="Arial">1.25×</text>
      <text x="28" y="138" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">默认 TTL，写入新缓存</text>
      <text x="28" y="160" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">ephemeral_5m_input_tokens</text>
    </g>
    <g transform="translate(720 30)">
      <rect width="340" height="180" rx="18" fill="#3c1e22" stroke="#ff6b8a" stroke-opacity="0.5"/>
      <text x="28" y="40" fill="#ff9ab1" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">cache_write 1h</text>
      <text x="28" y="100" fill="#ff9ab1" font-size="64" font-weight="900" font-family="Arial">2×</text>
      <text x="28" y="138" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">长 TTL（cache_control.ttl="1h"）</text>
      <text x="28" y="160" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">ephemeral_1h_input_tokens</text>
    </g>
    <g transform="translate(1080 30)">
      <rect width="360" height="180" rx="18" fill="#0e2133" stroke="#58d7ff" stroke-opacity="0.5"/>
      <text x="28" y="40" fill="#7be6ff" font-size="20" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">base input</text>
      <text x="28" y="100" fill="#7be6ff" font-size="64" font-weight="900" font-family="Arial">1×</text>
      <text x="28" y="138" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">最后一个 breakpoint 后的增量</text>
      <text x="28" y="160" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">input_tokens（≠ 总输入）</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(80 850)">
    <rect width="1440" height="100" rx="18" fill="#101a25" stroke="#9fb8c8" stroke-opacity="0.3"/>
    <text x="32" y="40" fill="#f4fbff" font-size="18" font-weight="700" font-family="Arial, 'PingFang SC', sans-serif">写一次省一万次 — 工程口诀</text>
    <text x="32" y="70" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">最多 4 个 breakpoint，每个回看 20 个 block；低于阈值（Sonnet 4.x 1024 tok / Opus 4.5+ &amp; Haiku 4.5 4096 tok）静默不缓存；</text>
    <text x="32" y="92" fill="#cfe4ef" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">据 Dev.to ishaaan 估算，Claude Code 的两层缓存策略（Global / Session）能让首轮之后的 token 成本下降约 50–70%。</text>
  </g>

  <text x="80" y="980" fill="#9fb8c8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">官方机制：platform.claude.com/docs/build-with-claude/prompt-caching；DYNAMIC_BOUNDARY 出处：CSDN 程序员鱼皮、Dev.to ishaaan 等社区源码分析。</text>
</svg>
