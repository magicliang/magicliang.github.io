<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">当智能体变成一份 Markdown 文档</title>
  <desc id="desc">Markdown 文档作为 Agent 的可读入口，连接规则、工具、记忆和执行环境。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset=".55" stop-color="#17263a"/>
      <stop offset="1" stop-color="#24351f"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#dbeafe" stroke-opacity=".06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <style>
      .font{font-family:system-ui,-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{font-size:56px;font-weight:800;fill:#f8fafc}
      .sub{font-size:27px;font-weight:500;fill:#c7d2fe}
      .label{font-size:25px;font-weight:760;fill:#eff6ff}
      .small{font-size:20px;font-weight:520;fill:#cbd5e1}
      .paper{fill:#f8fafc;stroke:#bfdbfe;stroke-width:3;filter:url(#shadow)}
      .panel{fill:#0f172a;stroke:#60a5fa;stroke-width:2.5;filter:url(#shadow)}
      .chip{fill:#1e293b;stroke:#7dd3fc;stroke-width:2}
      .line{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .green{stroke:#86efac}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <g class="font">
    <text x="105" y="124" class="title">当智能体变成一份 Markdown 文档</text>
    <text x="108" y="181" class="sub">规则、工具、记忆与入口，被压进一份可读文本</text>
  </g>
  <g transform="translate(188 262)">
    <rect class="paper" width="430" height="430" rx="24"/>
    <path d="M360 0v90h70" fill="#dbeafe"/>
    <text x="50" y="88" class="font" font-size="40" font-weight="840" fill="#0f172a">AGENT.md</text>
    <rect x="52" y="130" width="260" height="16" rx="8" fill="#2563eb" opacity=".76"/>
    <rect x="52" y="170" width="320" height="14" rx="7" fill="#94a3b8"/>
    <rect x="52" y="207" width="288" height="14" rx="7" fill="#94a3b8"/>
    <rect x="52" y="257" width="130" height="50" rx="14" fill="#dbeafe"/>
    <rect x="210" y="257" width="130" height="50" rx="14" fill="#dcfce7"/>
    <rect x="52" y="332" width="290" height="14" rx="7" fill="#94a3b8"/>
    <rect x="52" y="369" width="225" height="14" rx="7" fill="#94a3b8"/>
  </g>
  <g class="font" transform="translate(720 290)">
    <rect class="panel" width="690" height="356" rx="26"/>
    <g transform="translate(54 58)">
      <rect class="chip" width="160" height="74" rx="18"/>
      <text x="80" y="47" text-anchor="middle" class="label">Rules</text>
      <rect class="chip" x="240" width="160" height="74" rx="18"/>
      <text x="320" y="47" text-anchor="middle" class="label">Tools</text>
      <rect class="chip" x="480" width="160" height="74" rx="18"/>
      <text x="560" y="47" text-anchor="middle" class="label">Memory</text>
      <path class="line" d="M160 37H240M400 37H480"/>
    </g>
    <path class="line green" d="M344 148V228"/>
    <rect x="184" y="228" width="322" height="74" rx="20" fill="#052e2b" stroke="#86efac" stroke-width="3"/>
    <text x="345" y="276" text-anchor="middle" class="label">可观测的执行入口</text>
  </g>
  <text x="107" y="795" class="font small">文档不是说明书的尾巴，而是智能体进入软件世界的接口层。</text>
</svg>
