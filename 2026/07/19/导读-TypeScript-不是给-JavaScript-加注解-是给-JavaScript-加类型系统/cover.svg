<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3178c6"/>
      <stop offset="100%" style="stop-color:#235a9e"/>
    </linearGradient>
    <linearGradient id="jsYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7df1e"/>
      <stop offset="100%" style="stop-color:#e8c50a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- JS box (left) -->
  <rect x="100" y="200" width="280" height="230" rx="12" fill="none" stroke="#f7df1e" stroke-width="2" opacity="0.8"/>
  <rect x="100" y="200" width="280" height="44" rx="12" fill="url(#jsYellow)" opacity="0.15"/>
  <text x="240" y="228" font-family="'SF Mono','Fira Code',monospace" font-size="16" fill="#f7df1e" text-anchor="middle" font-weight="600">JavaScript Values</text>

  <!-- JS value examples -->
  <text x="130" y="275" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">"hello"  42  true</text>
  <text x="130" y="300" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">{ name, age }</text>
  <text x="130" y="325" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">[1, 2, 3]</text>
  <text x="130" y="350" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b949e">(x) => x + 1</text>
  <text x="130" y="390" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#484f58">runtime · dynamic · duck typing</text>

  <!-- Arrow JS → TS -->
  <line x1="395" y1="315" x2="470" y2="315" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <polygon points="470,310 480,315 470,320" fill="#58a6ff" opacity="0.6"/>

  <!-- TS type system box (center) -->
  <rect x="490" y="160" width="300" height="310" rx="12" fill="none" stroke="#3178c6" stroke-width="2.5"/>
  <rect x="490" y="160" width="300" height="44" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="640" y="188" font-family="'SF Mono','Fira Code',monospace" font-size="16" fill="#58a6ff" text-anchor="middle" font-weight="600">Type System</text>

  <!-- Type examples -->
  <text x="520" y="235" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">string  number  boolean</text>
  <text x="520" y="260" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">interface · type alias</text>
  <text x="520" y="285" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">union · intersection</text>
  <text x="520" y="310" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">generics · conditional</text>
  <text x="520" y="335" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">unknown · never</text>

  <!-- Structural typing label -->
  <rect x="515" y="365" width="250" height="32" rx="6" fill="#3178c6" opacity="0.15"/>
  <text x="640" y="386" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#58a6ff" text-anchor="middle">structural typing · sets</text>

  <!-- Check mark area -->
  <text x="520" y="440" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#484f58">compile-time only · zero runtime</text>

  <!-- Arrow TS → Output -->
  <line x1="805" y1="315" x2="880" y2="315" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <polygon points="880,310 890,315 880,320" fill="#58a6ff" opacity="0.6"/>

  <!-- Output box (right) -->
  <rect x="900" y="230" width="200" height="170" rx="12" fill="none" stroke="#238636" stroke-width="2" opacity="0.8"/>
  <rect x="900" y="230" width="200" height="44" rx="12" fill="#238636" opacity="0.1"/>
  <text x="1000" y="258" font-family="'SF Mono','Fira Code',monospace" font-size="16" fill="#3fb950" text-anchor="middle" font-weight="600">.js output</text>

  <text x="930" y="305" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">types erased</text>
  <text x="930" y="330" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">pure JavaScript</text>
  <text x="930" y="355" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">zero overhead</text>

  <!-- Title -->
  <text x="600" y="80" font-family="'Inter','Helvetica Neue',sans-serif" font-size="32" fill="#e6edf3" text-anchor="middle" font-weight="700" letter-spacing="-0.5">深入 TypeScript</text>
  <text x="600" y="118" font-family="'Inter','Helvetica Neue',sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Structural Type System · Type Erasure · Sets</text>

  <!-- Series badge -->
  <rect x="510" y="540" width="180" height="30" rx="15" fill="#3178c6" opacity="0.2"/>
  <text x="600" y="560" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#58a6ff" text-anchor="middle">00 · 导读</text>

  <!-- Decorative corner brackets -->
  <path d="M30,30 L30,60 M30,30 L60,30" stroke="#3178c6" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M1170,30 L1170,60 M1170,30 L1140,30" stroke="#3178c6" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M30,600 L30,570 M30,600 L60,600" stroke="#3178c6" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M1170,600 L1170,570 M1170,600 L1140,600" stroke="#3178c6" stroke-width="1.5" opacity="0.3" fill="none"/>
</svg>
