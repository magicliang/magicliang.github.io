<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="reactBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#61dafb"/>
      <stop offset="100%" style="stop-color:#4fa8c9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#61dafb" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="75" font-family="'Inter','Helvetica Neue',sans-serif" font-size="32" fill="#e6edf3" text-anchor="middle" font-weight="700" letter-spacing="-0.5">深入 React</text>
  <text x="600" y="113" font-family="'Inter','Helvetica Neue',sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">UI = f(state) · Virtual DOM · Fiber · Reconciliation</text>

  <!-- State box -->
  <rect x="80" y="220" width="200" height="180" rx="12" fill="none" stroke="#f0883e" stroke-width="2" opacity="0.8"/>
  <rect x="80" y="220" width="200" height="40" rx="12" fill="#f0883e" opacity="0.12"/>
  <text x="180" y="246" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#f0883e" text-anchor="middle" font-weight="600">State</text>
  <text x="110" y="290" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">{ count: 0 }</text>
  <text x="110" y="315" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">{ todos: [...] }</text>
  <text x="110" y="340" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e">{ filter: "all" }</text>
  <text x="110" y="375" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#484f58">source of truth</text>

  <!-- Arrow State → Component -->
  <line x1="295" y1="310" x2="370" y2="310" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <polygon points="370,305 382,310 370,315" fill="#58a6ff" opacity="0.6"/>

  <!-- Component function box -->
  <rect x="390" y="200" width="220" height="220" rx="12" fill="none" stroke="#61dafb" stroke-width="2.5"/>
  <rect x="390" y="200" width="220" height="40" rx="12" fill="#61dafb" opacity="0.12"/>
  <text x="500" y="226" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#61dafb" text-anchor="middle" font-weight="600">Component()</text>
  <text x="420" y="272" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#c9d1d9">f(state) → UI</text>
  <text x="420" y="300" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">pure function</text>
  <text x="420" y="325" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">declarative</text>
  <text x="420" y="350" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">composable</text>

  <!-- React atom icon (simplified) -->
  <circle cx="500" cy="390" r="4" fill="#61dafb"/>
  <ellipse cx="500" cy="390" rx="28" ry="10" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.4"/>
  <ellipse cx="500" cy="390" rx="28" ry="10" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.4" transform="rotate(60,500,390)"/>
  <ellipse cx="500" cy="390" rx="28" ry="10" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.4" transform="rotate(-60,500,390)"/>

  <!-- Arrow Component → Virtual DOM -->
  <line x1="625" y1="310" x2="700" y2="310" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <polygon points="700,305 712,310 700,315" fill="#58a6ff" opacity="0.6"/>

  <!-- Virtual DOM box -->
  <rect x="720" y="210" width="200" height="200" rx="12" fill="none" stroke="#a371f7" stroke-width="2" opacity="0.8"/>
  <rect x="720" y="210" width="200" height="40" rx="12" fill="#a371f7" opacity="0.1"/>
  <text x="820" y="236" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#a371f7" text-anchor="middle" font-weight="600">Virtual DOM</text>

  <!-- Mini tree inside -->
  <circle cx="820" cy="285" r="8" fill="none" stroke="#a371f7" stroke-width="1.5" opacity="0.6"/>
  <text x="820" y="289" font-family="'SF Mono','Fira Code',monospace" font-size="8" fill="#a371f7" text-anchor="middle">div</text>
  <line x1="814" y1="293" x2="790" y2="318" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <line x1="826" y1="293" x2="850" y2="318" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <circle cx="790" cy="325" r="7" fill="none" stroke="#a371f7" stroke-width="1.5" opacity="0.6"/>
  <text x="790" y="329" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="#a371f7" text-anchor="middle">h1</text>
  <circle cx="850" cy="325" r="7" fill="none" stroke="#a371f7" stroke-width="1.5" opacity="0.6"/>
  <text x="850" y="329" font-family="'SF Mono','Fira Code',monospace" font-size="7" fill="#a371f7" text-anchor="middle">ul</text>
  <line x1="845" y1="332" x2="832" y2="352" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <line x1="855" y1="332" x2="868" y2="352" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <circle cx="832" cy="358" r="5" fill="none" stroke="#a371f7" stroke-width="1" opacity="0.4"/>
  <circle cx="868" cy="358" r="5" fill="none" stroke="#a371f7" stroke-width="1" opacity="0.4"/>

  <text x="750" y="395" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#484f58">diff · reconcile</text>

  <!-- Arrow Virtual DOM → Real DOM -->
  <line x1="935" y1="310" x2="1000" y2="310" stroke="#58a6ff" stroke-width="2" opacity="0.6"/>
  <polygon points="1000,305 1012,310 1000,315" fill="#58a6ff" opacity="0.6"/>

  <!-- Real DOM box -->
  <rect x="1020" y="240" width="140" height="140" rx="12" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.8"/>
  <rect x="1020" y="240" width="140" height="40" rx="12" fill="#3fb950" opacity="0.1"/>
  <text x="1090" y="266" font-family="'SF Mono','Fira Code',monospace" font-size="15" fill="#3fb950" text-anchor="middle" font-weight="600">Real DOM</text>
  <text x="1050" y="310" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">minimal</text>
  <text x="1050" y="330" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">patches</text>
  <text x="1050" y="360" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#484f58">commit phase</text>

  <!-- Bottom: Fiber label -->
  <rect x="350" y="470" width="500" height="36" rx="18" fill="#61dafb" opacity="0.08"/>
  <text x="600" y="493" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#61dafb" text-anchor="middle" opacity="0.7">Fiber Architecture · Interruptible Rendering · Priority Lanes</text>

  <!-- Series badge -->
  <rect x="510" y="545" width="180" height="30" rx="15" fill="#61dafb" opacity="0.15"/>
  <text x="600" y="565" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#61dafb" text-anchor="middle">00 · 导读</text>

  <!-- Decorative corner brackets -->
  <path d="M30,30 L30,60 M30,30 L60,30" stroke="#61dafb" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M1170,30 L1170,60 M1170,30 L1140,30" stroke="#61dafb" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M30,600 L30,570 M30,600 L60,600" stroke="#61dafb" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M1170,600 L1170,570 M1170,600 L1140,600" stroke="#61dafb" stroke-width="1.5" opacity="0.3" fill="none"/>
</svg>
