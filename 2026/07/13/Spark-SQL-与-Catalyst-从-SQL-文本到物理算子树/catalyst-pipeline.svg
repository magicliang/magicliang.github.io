<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#fff"/>
  <text x="400" y="25" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="15" font-weight="bold">Catalyst 优化器：四阶段流水线</text>
  <!-- Phase 1: Parsing -->
  <rect x="20" y="60" width="160" height="70" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold">① Parsing</text>
  <text x="100" y="105" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">SQL 文本 → AST</text>
  <text x="100" y="120" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">Unresolved Plan</text>
  <!-- Arrow -->
  <line x1="180" y1="95" x2="210" y2="95" stroke="#666" stroke-width="1.5" marker-end="url(#ca)"/>
  <!-- Phase 2: Analysis -->
  <rect x="210" y="60" width="160" height="70" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="290" y="85" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold">② Analysis</text>
  <text x="290" y="105" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">查询 Catalog</text>
  <text x="290" y="120" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">绑定名称 + 类型</text>
  <line x1="370" y1="95" x2="400" y2="95" stroke="#666" stroke-width="1.5" marker-end="url(#ca)"/>
  <!-- Phase 3: Optimization -->
  <rect x="400" y="60" width="180" height="70" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="490" y="85" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="12" font-weight="bold">③ Optimization</text>
  <text x="490" y="105" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">规则重写 (RBO)</text>
  <text x="490" y="120" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">谓词下推 · 列裁剪 · 常量折叠</text>
  <line x1="580" y1="95" x2="610" y2="95" stroke="#666" stroke-width="1.5" marker-end="url(#ca)"/>
  <!-- Phase 4: Planning -->
  <rect x="610" y="60" width="170" height="70" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="695" y="85" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="12" font-weight="bold">④ Physical Plan</text>
  <text x="695" y="105" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">策略选择 + 代价模型</text>
  <text x="695" y="120" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">Join 算法 · Scan 方式</text>
  <!-- Example -->
  <text x="400" y="170" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="12">示例：SELECT name FROM users WHERE age > 18 AND 1 = 1</text>
  <rect x="40" y="185" width="160" height="55" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="120" y="200" text-anchor="middle" fill="#1976d2" font-family="monospace" font-size="9">Project ["name"]</text>
  <text x="120" y="215" text-anchor="middle" fill="#1976d2" font-family="monospace" font-size="9"> Filter (age>18 AND 1=1)</text>
  <text x="120" y="230" text-anchor="middle" fill="#1976d2" font-family="monospace" font-size="9">  UnresolvedRelation</text>
  <line x1="200" y1="212" x2="230" y2="212" stroke="#666" stroke-width="1" marker-end="url(#ca)"/>
  <rect x="230" y="185" width="160" height="55" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="310" y="200" text-anchor="middle" fill="#388e3c" font-family="monospace" font-size="9">Project [name#12]</text>
  <text x="310" y="215" text-anchor="middle" fill="#388e3c" font-family="monospace" font-size="9"> Filter (age#13>18 AND true)</text>
  <text x="310" y="230" text-anchor="middle" fill="#388e3c" font-family="monospace" font-size="9">  Relation [users]</text>
  <line x1="390" y1="212" x2="420" y2="212" stroke="#666" stroke-width="1" marker-end="url(#ca)"/>
  <rect x="420" y="185" width="160" height="55" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="500" y="200" text-anchor="middle" fill="#f57c00" font-family="monospace" font-size="9">Project [name#12]</text>
  <text x="500" y="215" text-anchor="middle" fill="#f57c00" font-family="monospace" font-size="9"> Filter (age#13 > 18)</text>
  <text x="500" y="230" text-anchor="middle" fill="#f57c00" font-family="monospace" font-size="9">  Relation [users]</text>
  <text x="500" y="248" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="8">↑ 1=1 被常量折叠消除</text>
  <line x1="580" y1="212" x2="610" y2="212" stroke="#666" stroke-width="1" marker-end="url(#ca)"/>
  <rect x="610" y="185" width="170" height="55" rx="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="695" y="200" text-anchor="middle" fill="#c62828" font-family="monospace" font-size="9">*Filter (age > 18)</text>
  <text x="695" y="215" text-anchor="middle" fill="#c62828" font-family="monospace" font-size="9"> *FileScan parquet</text>
  <text x="695" y="230" text-anchor="middle" fill="#c62828" font-family="monospace" font-size="9">  PushedFilter:[age>18]</text>
  <text x="695" y="248" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="8">↑ 谓词下推到 Scan + CodeGen(*)</text>
  <text x="400" y="300" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="11">Tree + Rule 架构：每个 Rule 做一种模式匹配和替换，反复应用直到不动点</text>
  <defs><marker id="ca" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#666"/></marker></defs>
</svg>
