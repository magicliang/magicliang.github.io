<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="24" font-weight="bold">Catalyst — 4-Phase Pipeline</text>
  <rect x="60" y="80" width="180" height="60" rx="8" fill="#16213e" stroke="#666" stroke-width="1.5"/>
  <text x="150" y="105" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">SQL / DataFrame</text>
  <text x="150" y="125" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">User Input</text>
  <line x1="240" y1="110" x2="290" y2="110" stroke="#4ecca3" stroke-width="2"/>
  <rect x="290" y="80" width="180" height="60" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="380" y="105" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">① Analysis</text>
  <text x="380" y="125" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Resolve names/types</text>
  <line x1="470" y1="110" x2="520" y2="110" stroke="#e94560" stroke-width="2"/>
  <rect x="520" y="80" width="180" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="610" y="105" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">② Optimization</text>
  <text x="610" y="125" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Rule-based rewrite</text>
  <line x1="700" y1="110" x2="750" y2="110" stroke="#533483" stroke-width="2"/>
  <rect x="750" y="80" width="160" height="60" rx="8" fill="#0f3460" stroke="#533483" stroke-width="2"/>
  <text x="830" y="105" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="12">③ Planning</text>
  <text x="830" y="125" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Strategy + Cost</text>
  <line x1="830" y1="140" x2="830" y2="180" stroke="#4ecca3" stroke-width="2"/>
  <rect x="680" y="180" width="260" height="60" rx="8" fill="#533483" stroke="#4ecca3" stroke-width="2"/>
  <text x="810" y="205" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">④ Physical Plan</text>
  <text x="810" y="225" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Executable operators</text>
  <text x="480" y="310" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">Tree + Rule Architecture</text>
  <rect x="100" y="340" width="350" height="150" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="275" y="365" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="13">TreeNode[T]</text>
  <text x="275" y="395" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">LogicalPlan extends TreeNode</text>
  <text x="275" y="420" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Expression extends TreeNode</text>
  <text x="275" y="445" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">transform(rule: PartialFunction)</text>
  <text x="275" y="475" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">recursive pattern match + rewrite</text>
  <rect x="510" y="340" width="380" height="150" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="700" y="365" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="13">Rule[T] / Strategy</text>
  <text x="700" y="395" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">ConstantFolding</text>
  <text x="700" y="420" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">PredicatePushdown</text>
  <text x="700" y="445" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">ColumnPruning</text>
  <text x="700" y="475" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">apply(plan) → transformed plan</text>
</svg>
