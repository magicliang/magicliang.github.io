  <text x="160" y="315" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Data Skew</text>
  <text x="160" y="340" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">Task Duration variance</text>
  <rect x="280" y="290" width="200" height="70" rx="6" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="380" y="315" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Shuffle Overhead</text>
  <text x="380" y="340" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">Shuffle Read/Write bytes</text>
  <rect x="500" y="290" width="200" height="70" rx="6" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
