  <text x="150" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Status</text>
  <rect x="270" y="80" width="180" height="120" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
