  <text x="570" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Task count</text>
  <rect x="690" y="80" width="210" height="120" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="795" y="105" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="13">SQL / Storage</text>
