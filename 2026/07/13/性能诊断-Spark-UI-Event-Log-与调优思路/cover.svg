<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Spark UI — Performance Diagnosis</text>
  <rect x="60" y="80" width="180" height="120" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
