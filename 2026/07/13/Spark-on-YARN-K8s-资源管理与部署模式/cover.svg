<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Spark on YARN / Kubernetes</text>
  <text x="260" y="85" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">YARN Mode</text>
  <rect x="80" y="100" width="360" height="380" rx="10" fill="#16213e" stroke="#4ecca3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="120" y="130" width="120" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="180" y="155" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">ResourceManager</text>
  <rect x="280" y="130" width="130" height="40" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="345" y="150" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">ApplicationMaster</text>
  <text x="345" y="165" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="8">(Driver in cluster mode)</text>
  <rect x="100" y="210" width="100" height="60" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="150" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">NodeManager</text>
  <text x="150" y="255" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="9">Executor 0</text>
  <rect x="220" y="210" width="100" height="60" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="270" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">NodeManager</text>
  <text x="270" y="255" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="9">Executor 1</text>
  <rect x="340" y="210" width="80" height="60" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="380" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">NM</text>
  <text x="380" y="255" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="9">Exec 2</text>
  <text x="700" y="85" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">K8s Mode</text>
  <rect x="520" y="100" width="380" height="380" rx="10" fill="#16213e" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="560" y="130" width="130" height="40" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="625" y="155" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">API Server</text>
  <rect x="720" y="130" width="140" height="40" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="790" y="150" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Driver Pod</text>
  <text x="790" y="165" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="8">(spark-submit → Pod)</text>
  <rect x="540" y="210" width="100" height="60" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="590" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Executor Pod</text>
  <text x="590" y="255" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">exec-0</text>
  <rect x="660" y="210" width="100" height="60" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="710" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Executor Pod</text>
  <text x="710" y="255" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">exec-1</text>
  <rect x="780" y="210" width="100" height="60" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="830" y="235" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Executor Pod</text>
  <text x="830" y="255" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">exec-2</text>
  <text x="260" y="370" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Client Mode: Driver outside</text>
  <text x="260" y="395" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Cluster Mode: Driver = AM</text>
  <text x="700" y="370" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Driver = Pod</text>
  <text x="700" y="395" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Dynamic Executor Pods</text>
  <text x="480" y="520" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Same Spark code — different cluster managers</text>
</svg>
