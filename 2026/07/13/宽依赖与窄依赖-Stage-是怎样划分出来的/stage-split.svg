<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <rect width="800" height="350" fill="#fff"/>
  <text x="400" y="25" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="15" font-weight="bold">Stage 划分：窄依赖 pipeline，宽依赖切 Stage</text>
  <!-- Stage 0 -->
  <rect x="30" y="50" width="350" height="200" rx="10" fill="#f1f8e9" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="205" y="75" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold">Stage 0 (ShuffleMapStage)</text>
  <rect x="60" y="100" width="90" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="105" y="122" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="11">textFile</text>
  <rect x="170" y="100" width="90" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="215" y="122" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">flatMap</text>
  <rect x="280" y="100" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="320" y="122" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">map</text>
  <line x1="150" y1="117" x2="170" y2="117" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="260" y1="117" x2="280" y2="117" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="205" y="160" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="10">窄依赖：一对一，可 pipeline</text>
  <!-- Partitions -->
  <rect x="60" y="175" width="40" height="25" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="80" y="192" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P0</text>
  <rect x="110" y="175" width="40" height="25" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="130" y="192" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P1</text>
  <rect x="160" y="175" width="40" height="25" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="180" y="192" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P2</text>
  <rect x="210" y="175" width="40" height="25" rx="3" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="230" y="192" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P3</text>
  <text x="205" y="230" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">每个 Task 处理一个分区，pipeline 整条链</text>
  <!-- Shuffle boundary -->
  <line x1="395" y1="50" x2="395" y2="250" stroke="#c62828" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="395" y="275" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="12" font-weight="bold">← Shuffle 边界 →</text>
  <text x="395" y="295" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="10">(ShuffleDependency)</text>
  <!-- Shuffle arrows -->
  <line x1="250" y1="187" x2="440" y2="120" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="187" x2="440" y2="160" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="200" x2="440" y2="120" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="200" x2="440" y2="160" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="200" x2="440" y2="120" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <line x1="130" y1="200" x2="440" y2="160" stroke="#c62828" stroke-width="1" opacity="0.4"/>
  <!-- Stage 1 -->
  <rect x="420" y="50" width="350" height="200" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="595" y="75" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="12" font-weight="bold">Stage 1 (ResultStage)</text>
  <rect x="440" y="100" width="120" height="35" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="500" y="122" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="11">reduceByKey</text>
  <rect x="580" y="100" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="620" y="122" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">filter</text>
  <rect x="680" y="100" width="80" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="720" y="122" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="11">collect</text>
  <line x1="560" y1="117" x2="580" y2="117" stroke="#388e3c" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="660" y1="117" x2="680" y2="117" stroke="#1976d2" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="440" y="155" width="55" height="25" rx="3" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="467" y="172" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P0</text>
  <rect x="505" y="155" width="55" height="25" rx="3" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="532" y="172" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="9">P1</text>
  <text x="595" y="215" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="10">宽依赖：多对多，必须等上游全完成</text>
  <text x="400" y="340" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="12">规则：遇到 ShuffleDependency 切一刀，窄依赖链合并到同一 Stage</text>
  <defs><marker id="a1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#666"/></marker></defs>
</svg>
