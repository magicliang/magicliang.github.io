  <rect x="260" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="295" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P2</text>
  <rect x="350" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="385" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P3</text>
  <rect x="80" y="200" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="115" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P0'</text>
  <rect x="170" y="200" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="205" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P1'</text>
  <rect x="260" y="200" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="295" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P2'</text>
  <rect x="350" y="200" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="385" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P3'</text>
  <line x1="115" y1="150" x2="115" y2="200" stroke="#4ecca3" stroke-width="2"/>
