  <text x="240" y="270" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">1:1 mapping — pipeline OK</text>
  <!-- Wide dependency side -->
  <text x="700" y="80" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">Wide (Shuffle) Dependency</text>
  <rect x="540" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="575" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P0</text>
  <rect x="630" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="665" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P1</text>
  <rect x="720" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="755" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P2</text>
  <rect x="810" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="845" y="135" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P3</text>
  <rect x="580" y="200" width="70" height="40" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="615" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P0'</text>
  <rect x="770" y="200" width="70" height="40" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="805" y="225" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">P1'</text>
  <line x1="575" y1="150" x2="615" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="575" y1="150" x2="805" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="665" y1="150" x2="615" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="665" y1="150" x2="805" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="755" y1="150" x2="615" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="755" y1="150" x2="805" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="845" y1="150" x2="615" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="845" y1="150" x2="805" y2="200" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <text x="700" y="270" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">N:M mapping — Stage boundary</text>
  <!-- Stage boundary illustration -->
  <line x1="40" y1="310" x2="920" y2="310" stroke="#e94560" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="480" y="340" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="14">── Stage Boundary ──</text>
  <!-- Bottom: pipeline diagram -->
  <rect x="60" y="370" width="380" height="60" rx="8" fill="none" stroke="#4ecca3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="250" y="365" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Stage 0</text>
  <rect x="80" y="385" width="80" height="30" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="120" y="405" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">textFile</text>
  <rect x="180" y="385" width="80" height="30" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="220" y="405" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">flatMap</text>
  <rect x="280" y="385" width="80" height="30" rx="4" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="320" y="405" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">map</text>
  <line x1="160" y1="400" x2="180" y2="400" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="260" y1="400" x2="280" y2="400" stroke="#4ecca3" stroke-width="1.5"/>
  <rect x="520" y="370" width="200" height="60" rx="8" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="365" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Stage 1</text>
  <rect x="540" y="385" width="100" height="30" rx="4" fill="#533483" stroke="#e94560" stroke-width="1"/>
  <text x="590" y="405" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">reduceByKey</text>
  <line x1="440" y1="400" x2="520" y2="400" stroke="#e94560" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="480" y="420" fill="#e94560" font-family="monospace" font-size="9">Shuffle</text>
  <text x="480" y="500" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">ShuffleDependency splits the DAG into Stages</text>
</svg>
