<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="24" font-weight="bold">Narrow vs Wide Dependencies</text>
  <!-- Narrow dependency side -->
  <text x="240" y="80" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">Narrow Dependency</text>
  <rect x="80" y="110" width="70" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
