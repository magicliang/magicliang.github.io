<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="24" font-weight="bold">Shuffle: Write → Network → Read</text>
  <text x="240" y="90" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">Map Side (Shuffle Write)</text>
  <text x="720" y="90" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">Reduce Side (Shuffle Read)</text>
  <rect x="80" y="120" width="100" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="130" y="142" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">Map Task 0</text>
  <rect x="80" y="180" width="100" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="130" y="202" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">Map Task 1</text>
  <rect x="80" y="240" width="100" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="130" y="262" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">Map Task 2</text>
  <rect x="240" y="120" width="120" height="160" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="150" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="10">Sort Buffer</text>
  <text x="300" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">partition + sort</text>
  <text x="300" y="200" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">spill to disk</text>
  <text x="300" y="230" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="10">Shuffle Files</text>
  <text x="300" y="250" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">.data + .index</text>
  <rect x="440" y="160" width="80" height="80" rx="20" fill="none" stroke="#e94560" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="480" y="195" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Network</text>
  <text x="480" y="215" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Transfer</text>
  <rect x="600" y="120" width="120" height="160" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="660" y="150" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">Fetch Buffer</text>
  <text x="660" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">pull from maps</text>
  <text x="660" y="200" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">merge sort</text>
  <text x="660" y="230" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">Aggregation</text>
  <rect x="780" y="120" width="110" height="35" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="835" y="142" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">Reduce T 0</text>
  <rect x="780" y="180" width="110" height="35" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="835" y="202" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">Reduce T 1</text>
  <line x1="180" y1="137" x2="240" y2="160" stroke="#4ecca3" stroke-width="1"/>
  <line x1="180" y1="197" x2="240" y2="200" stroke="#4ecca3" stroke-width="1"/>
  <line x1="180" y1="257" x2="240" y2="240" stroke="#4ecca3" stroke-width="1"/>
  <line x1="360" y1="200" x2="440" y2="200" stroke="#e94560" stroke-width="1.5"/>
  <line x1="520" y1="200" x2="600" y2="200" stroke="#e94560" stroke-width="1.5"/>
  <line x1="720" y1="160" x2="780" y2="137" stroke="#e94560" stroke-width="1"/>
  <line x1="720" y1="200" x2="780" y2="197" stroke="#e94560" stroke-width="1"/>
  <text x="480" y="370" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="14">SortShuffleManager Pipeline</text>
  <rect x="100" y="400" width="130" height="35" rx="5" fill="#0f3460" stroke="#666" stroke-width="1"/>
  <text x="165" y="422" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Hash Shuffle</text>
  <text x="165" y="455" text-anchor="middle" fill="#666" font-family="monospace" font-size="9">(deprecated)</text>
  <rect x="280" y="400" width="130" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="345" y="422" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Sort Shuffle</text>
  <text x="345" y="455" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="9">(default)</text>
  <rect x="460" y="400" width="160" height="35" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="540" y="422" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Tungsten Sort</text>
  <text x="540" y="455" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">(unsafe, off-heap)</text>
  <text x="480" y="520" text-anchor="middle" fill="#666" font-family="monospace" font-size="12">Shuffle evolution: Hash → Sort → Tungsten Sort</text>
</svg>
