<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <rect width="800" height="380" fill="#fff"/>
  <text x="400" y="25" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="15" font-weight="bold">Shuffle Write → Network → Shuffle Read</text>
  <!-- Map Side -->
  <rect x="30" y="50" width="250" height="280" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="155" y="75" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold">Map Side (Shuffle Write)</text>
  <rect x="50" y="95" width="90" height="30" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="95" y="115" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="10">Map Task 0</text>
  <rect x="50" y="135" width="90" height="30" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="95" y="155" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="10">Map Task 1</text>
  <rect x="50" y="175" width="90" height="30" rx="4" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="95" y="195" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="10">Map Task 2</text>
  <rect x="160" y="95" width="100" height="130" rx="5" fill="#f1f8e9" stroke="#388e3c" stroke-width="1"/>
  <text x="210" y="115" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">Sort Buffer</text>
  <text x="210" y="135" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">按 partitionId 排序</text>
  <text x="210" y="160" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">溢写到磁盘</text>
  <text x="210" y="185" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">归并输出:</text>
  <text x="210" y="205" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="8">.data + .index</text>
  <text x="155" y="260" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">每个 Map Task → 1 个 data 文件</text>
  <text x="155" y="280" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">（不是 R 个文件）</text>
  <!-- Network -->
  <rect x="310" y="120" width="180" height="80" rx="20" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="12">Network Transfer</text>
  <text x="400" y="175" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">M × R 次传输</text>
  <text x="400" y="195" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">(并行拉取, 默认 5 连接)</text>
  <!-- Reduce Side -->
  <rect x="520" y="50" width="250" height="280" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="645" y="75" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="12" font-weight="bold">Reduce Side (Shuffle Read)</text>
  <rect x="540" y="95" width="100" height="130" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="590" y="115" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="9">Fetch Buffer</text>
  <text x="590" y="135" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">从各 Map 拉取</text>
  <text x="590" y="160" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">归并排序</text>
  <text x="590" y="185" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">或哈希聚合</text>
  <text x="590" y="210" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="8">(ExternalAppendOnlyMap)</text>
  <rect x="660" y="95" width="95" height="30" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="707" y="115" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="10">Reduce T 0</text>
  <rect x="660" y="135" width="95" height="30" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
  <text x="707" y="155" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="10">Reduce T 1</text>
  <text x="645" y="260" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">查询 MapOutputTracker</text>
  <text x="645" y="280" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">按 index 文件定位偏移</text>
  <!-- Arrows -->
  <line x1="260" y1="155" x2="310" y2="155" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="490" y1="155" x2="540" y2="155" stroke="#f57c00" stroke-width="1.5" marker-end="url(#a2)"/>
  <!-- Bottom labels -->
  <text x="400" y="350" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="11">Shuffle 三重代价：磁盘 I/O + 网络传输 + 序列化开销</text>
  <text x="400" y="370" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">优化：Map 端预聚合 · Kryo 序列化 · 调整分区数 · External Shuffle Service</text>
  <defs><marker id="a2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#f57c00"/></marker></defs>
</svg>
