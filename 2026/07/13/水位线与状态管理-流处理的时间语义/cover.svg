<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Watermark &amp; State Management</text>
  <line x1="80" y1="200" x2="880" y2="200" stroke="#aaa" stroke-width="1.5"/>
  <text x="880" y="220" text-anchor="end" fill="#aaa" font-family="monospace" font-size="11">Event Time →</text>
  <rect x="150" y="120" width="150" height="60" rx="6" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="225" y="150" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Window [0, 10)</text>
  <text x="225" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">complete</text>
  <rect x="350" y="120" width="150" height="60" rx="6" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="425" y="150" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Window [10, 20)</text>
  <text x="425" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">active</text>
  <rect x="550" y="120" width="150" height="60" rx="6" fill="#16213e" stroke="#533483" stroke-width="1.5"/>
  <text x="625" y="150" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="11">Window [20, 30)</text>
  <text x="625" y="170" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">future</text>
  <line x1="430" y1="190" x2="430" y2="260" stroke="#e94560" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="280" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="13">Watermark = 12</text>
  <text x="430" y="300" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">(max event time - threshold)</text>
  <circle cx="200" cy="350" r="8" fill="#4ecca3"/>
  <text x="220" y="355" fill="#4ecca3" font-family="monospace" font-size="10">event t=5 (accepted, window closed)</text>
  <circle cx="400" cy="380" r="8" fill="#e94560"/>
  <text x="420" y="385" fill="#e94560" font-family="monospace" font-size="10">event t=8 (LATE → dropped by watermark)</text>
  <circle cx="500" cy="410" r="8" fill="#4ecca3"/>
  <text x="520" y="415" fill="#4ecca3" font-family="monospace" font-size="10">event t=15 (accepted, within active window)</text>
  <rect x="60" y="460" width="250" height="40" rx="5" fill="#16213e" stroke="#4ecca3" stroke-width="1"/>
  <text x="185" y="485" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">State Store (HDFS checkpoint)</text>
  <rect x="650" y="460" width="250" height="40" rx="5" fill="#16213e" stroke="#e94560" stroke-width="1"/>
  <text x="775" y="485" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Expired state auto-cleaned</text>
</svg>
