<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#fff"/>
  <text x="400" y="30" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="16" font-weight="bold">MapReduce 线性管道 vs Spark DAG 执行</text>
  <!-- MapReduce side -->
  <text x="200" y="60" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="13">MapReduce：固定三段管道</text>
  <rect x="40" y="80" width="100" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="90" y="105" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="12">HDFS Read</text>
  <rect x="160" y="80" width="80" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="200" y="105" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="12">Map</text>
  <rect x="260" y="80" width="80" height="40" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="300" y="105" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="12">Disk</text>
  <rect x="40" y="150" width="100" height="40" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="90" y="175" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="12">Shuffle</text>
  <rect x="160" y="150" width="80" height="40" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="200" y="175" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="12">Disk</text>
  <rect x="260" y="150" width="80" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="300" y="175" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="12">Reduce</text>
  <rect x="360" y="150" width="80" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="400" y="175" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="12">HDFS</text>
  <line x1="140" y1="100" x2="160" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="240" y1="100" x2="260" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="300" y1="120" x2="90" y2="150" stroke="#c62828" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="140" y1="170" x2="160" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="240" y1="170" x2="260" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="340" y1="170" x2="360" y2="170" stroke="#666" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <text x="220" y="215" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="11">每步强制落盘，多轮需串联多个 Job</text>
  <!-- Spark side -->
  <text x="400" y="250" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="13">Spark：任意 DAG + 内存 Pipeline</text>
  <rect x="40" y="270" width="80" height="35" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="80" y="292" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="11">textFile</text>
  <rect x="140" y="270" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="180" y="292" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">flatMap</text>
  <rect x="240" y="270" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="280" y="292" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">map</text>
  <rect x="340" y="270" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="380" y="292" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">filter</text>
  <rect x="500" y="270" width="110" height="35" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="555" y="292" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="11">reduceByKey</text>
  <rect x="640" y="270" width="80" height="35" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="680" y="292" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="11">map</text>
  <line x1="120" y1="287" x2="140" y2="287" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="220" y1="287" x2="240" y2="287" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="320" y1="287" x2="340" y2="287" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="420" y1="287" x2="500" y2="287" stroke="#c62828" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="610" y1="287" x2="640" y2="287" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <!-- Stage boxes -->
  <rect x="30" y="260" width="400" height="55" rx="8" fill="none" stroke="#388e3c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="230" y="330" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="10">Stage 0（内存 pipeline，不落盘）</text>
  <rect x="490" y="260" width="240" height="55" rx="8" fill="none" stroke="#c62828" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="610" y="330" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="10">Stage 1</text>
  <text x="455" y="295" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="10">Shuffle</text>
  <text x="400" y="370" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="12">Stage 内 pipeline 不落盘 · 只有 Shuffle 边界才写磁盘</text>
  <defs><marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#666"/></marker></defs>
</svg>
