<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="45" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="28" font-weight="bold">Apache Spark — DAG Execution</text>
  <!-- RDD nodes -->
  <rect x="80" y="100" width="120" height="50" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14">textFile</text>
  <rect x="80" y="200" width="120" height="50" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="140" y="230" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14">flatMap</text>
  <rect x="80" y="300" width="120" height="50" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="140" y="330" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14">map</text>
  <rect x="80" y="400" width="120" height="50" rx="8" fill="#533483" stroke="#e94560" stroke-width="2"/>
  <text x="140" y="430" text-anchor="middle" fill="#fff" font-family="monospace" font-size="14">reduceByKey</text>
  <!-- Arrows -->
  <line x1="140" y1="150" x2="140" y2="200" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="140" y1="250" x2="140" y2="300" stroke="#4ecca3" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="140" y1="350" x2="140" y2="400" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Stage boxes -->
  <rect x="50" y="80" width="180" height="290" rx="10" fill="none" stroke="#4ecca3" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="55" y="385" fill="#4ecca3" font-family="monospace" font-size="12">Stage 0 (ShuffleMap)</text>
  <rect x="50" y="390" width="180" height="80" rx="10" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="55" y="485" fill="#e94560" font-family="monospace" font-size="12">Stage 1 (Result)</text>
  <!-- DAG vs MapReduce comparison -->
  <text x="380" y="120" fill="#aaa" font-family="monospace" font-size="16">MapReduce: Linear Pipeline</text>
  <rect x="350" y="140" width="90" height="40" rx="5" fill="#16213e" stroke="#666" stroke-width="1.5"/>
  <text x="395" y="165" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">Map</text>
  <rect x="470" y="140" width="90" height="40" rx="5" fill="#16213e" stroke="#666" stroke-width="1.5"/>
  <text x="515" y="165" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">Shuffle</text>
  <rect x="590" y="140" width="90" height="40" rx="5" fill="#16213e" stroke="#666" stroke-width="1.5"/>
  <text x="635" y="165" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">Reduce</text>
  <line x1="440" y1="160" x2="470" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="560" y1="160" x2="590" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="380" y="230" fill="#4ecca3" font-family="monospace" font-size="16">Spark: DAG of Transformations</text>
  <!-- DAG graph -->
  <rect x="350" y="260" width="80" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="390" y="282" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">RDD-A</text>
  <rect x="500" y="260" width="80" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="540" y="282" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">RDD-B</text>
  <rect x="420" y="330" width="80" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="460" y="352" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">RDD-C</text>
  <rect x="350" y="400" width="80" height="35" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="390" y="422" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">RDD-D</text>
  <rect x="500" y="400" width="80" height="35" rx="5" fill="#533483" stroke="#e94560" stroke-width="1.5"/>
  <text x="540" y="422" text-anchor="middle" fill="#fff" font-family="monospace" font-size="11">RDD-E</text>
  <line x1="390" y1="295" x2="440" y2="330" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="540" y1="295" x2="480" y2="330" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="440" y1="365" x2="400" y2="400" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="480" y1="365" x2="530" y2="400" stroke="#e94560" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="700" y="290" fill="#4ecca3" font-family="monospace" font-size="13">Narrow Dep</text>
  <line x1="700" y1="300" x2="760" y2="300" stroke="#4ecca3" stroke-width="2"/>
  <text x="700" y="330" fill="#e94560" font-family="monospace" font-size="13">Wide Dep</text>
  <line x1="700" y1="340" x2="760" y2="340" stroke="#e94560" stroke-width="2"/>
  <text x="700" y="370" fill="#aaa" font-family="monospace" font-size="13">Lazy Eval</text>
  <text x="700" y="400" fill="#aaa" font-family="monospace" font-size="13">In-Memory</text>
  <text x="700" y="430" fill="#aaa" font-family="monospace" font-size="13">Stage Split</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4ecca3"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#666"/></marker>
  </defs>
</svg>
