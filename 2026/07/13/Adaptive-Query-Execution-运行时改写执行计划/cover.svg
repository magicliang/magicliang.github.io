  <text x="770" y="390" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="11">Optimize Skew Joins</text>
  <text x="480" y="490" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Spark 3.0+ — enabled by default</text>
