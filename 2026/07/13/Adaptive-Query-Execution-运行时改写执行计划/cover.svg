  <text x="480" y="75" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="14">Runtime re-optimization at shuffle boundaries</text>
  <rect x="100" y="110" width="200" height="50" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="200" y="140" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="13">Compile-time Plan</text>
  <line x1="300" y1="135" x2="360" y2="135" stroke="#4ecca3" stroke-width="1.5"/>
  <rect x="360" y="110" width="240" height="50" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="480" y="140" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="13">Execute Stage → Shuffle</text>
  <line x1="600" y1="135" x2="660" y2="135" stroke="#e94560" stroke-width="1.5"/>
  <rect x="660" y="110" width="200" height="50" rx="8" fill="#533483" stroke="#b794f6" stroke-width="2"/>
  <text x="760" y="140" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="13">Collect Statistics</text>
  <line x1="760" y1="160" x2="760" y2="200" stroke="#b794f6" stroke-width="2"/>
  <line x1="760" y1="200" x2="480" y2="200" stroke="#b794f6" stroke-width="1.5"/>
  <line x1="480" y1="200" x2="480" y2="230" stroke="#b794f6" stroke-width="1.5"/>
  <rect x="350" y="230" width="260" height="50" rx="8" fill="#533483" stroke="#b794f6" stroke-width="2"/>
  <text x="480" y="260" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13">Re-optimize Next Stage</text>
  <text x="200" y="340" fill="#4ecca3" font-family="monospace" font-size="14">Three Optimizations:</text>
  <rect x="60" y="360" width="260" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="190" y="390" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Coalesce Small Partitions</text>
  <rect x="350" y="360" width="260" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="480" y="390" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">SMJ → Broadcast Hash Join</text>
