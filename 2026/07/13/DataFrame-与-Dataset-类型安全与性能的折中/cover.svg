<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">RDD → DataFrame → Dataset</text>
  <text x="60" y="100" fill="#aaa" font-family="monospace" font-size="12">Type Safety ↑</text>
  <line x1="100" y1="110" x2="100" y2="460" stroke="#aaa" stroke-width="1.5"/>
  <line x1="100" y1="460" x2="860" y2="460" stroke="#aaa" stroke-width="1.5"/>
  <text x="860" y="490" text-anchor="end" fill="#aaa" font-family="monospace" font-size="12">Performance →</text>
  <rect x="140" y="140" width="200" height="120" rx="10" fill="#16213e" stroke="#4ecca3" stroke-width="2"/>
  <text x="240" y="175" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">RDD[T]</text>
  <text x="240" y="200" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Compile-time type check ✓</text>
  <text x="240" y="220" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Catalyst optimization ✗</text>
  <text x="240" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Java object overhead ✗</text>
  <rect x="380" y="280" width="200" height="120" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="480" y="315" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">DataFrame</text>
  <text x="480" y="340" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Compile-time type check ✗</text>
  <text x="480" y="360" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Catalyst optimization ✓</text>
  <text x="480" y="380" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">UnsafeRow (binary) ✓</text>
  <rect x="620" y="180" width="200" height="120" rx="10" fill="#16213e" stroke="#533483" stroke-width="2"/>
  <text x="720" y="215" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="16">Dataset[T]</text>
  <text x="720" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Compile-time type check ✓</text>
  <text x="720" y="260" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Catalyst optimization ✓</text>
  <text x="720" y="280" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Encoder ser/deser cost</text>
  <line x1="340" y1="200" x2="380" y2="320" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="580" y1="340" x2="620" y2="240" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="480" y="510" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">DataFrame = Dataset[Row] (untyped alias)</text>
</svg>
