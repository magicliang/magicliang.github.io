<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#fff"/>
  <text x="400" y="25" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="15" font-weight="bold">Lineage 容错：依赖链重算 vs Checkpoint 截断</text>
  <!-- Lineage chain -->
  <text x="100" y="55" fill="#388e3c" font-family="sans-serif" font-size="12" font-weight="bold">完整 Lineage（无 Checkpoint）</text>
  <rect x="30" y="70" width="70" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="65" y="90" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="9">HDFS</text>
  <rect x="115" y="70" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="145" y="90" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">map</text>
  <rect x="190" y="70" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="220" y="90" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">filter</text>
  <rect x="265" y="70" width="75" height="30" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="302" y="90" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="9">groupBy</text>
  <rect x="355" y="70" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="385" y="90" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">map</text>
  <rect x="430" y="70" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="460" y="90" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">filter</text>
  <rect x="505" y="70" width="75" height="30" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="542" y="90" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="9">reduceBy</text>
  <rect x="595" y="70" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="625" y="90" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">map</text>
  <rect x="670" y="65" width="70" height="40" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="705" y="82" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="9" font-weight="bold">LOST!</text>
  <text x="705" y="98" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="8">P2 丢失</text>
  <line x1="100" y1="85" x2="115" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="175" y1="85" x2="190" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="250" y1="85" x2="265" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="340" y1="85" x2="355" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="415" y1="85" x2="430" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="490" y1="85" x2="505" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="580" y1="85" x2="595" y2="85" stroke="#666" stroke-width="1"/>
  <line x1="655" y1="85" x2="670" y2="85" stroke="#666" stroke-width="1"/>
  <path d="M 705 105 C 705 130, 65 130, 65 105" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#la)"/>
  <text x="400" y="140" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="9">← 重算需要从 HDFS 源头开始，经过全部变换 →</text>
  <!-- Checkpoint version -->
  <text x="100" y="170" fill="#1976d2" font-family="sans-serif" font-size="12" font-weight="bold">有 Checkpoint（截断 Lineage）</text>
  <rect x="30" y="185" width="70" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="65" y="205" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="9">HDFS</text>
  <rect x="115" y="185" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="145" y="205" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">map</text>
  <rect x="190" y="185" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="220" y="205" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">filter</text>
  <rect x="275" y="180" width="90" height="40" rx="4" fill="#bbdefb" stroke="#1976d2" stroke-width="2"/>
  <text x="320" y="197" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="9" font-weight="bold">CHECKPOINT</text>
  <text x="320" y="212" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="8">(写入 HDFS)</text>
  <rect x="60" y="182" width="310" height="42" rx="6" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="60" y="240" fill="#999" font-family="sans-serif" font-size="8">← Lineage 被截断，这部分不再需要 →</text>
  <rect x="395" y="185" width="75" height="30" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="432" y="205" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="9">reduceBy</text>
  <rect x="485" y="185" width="60" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="515" y="205" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">map</text>
  <rect x="560" y="180" width="70" height="40" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="595" y="197" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="9" font-weight="bold">LOST!</text>
  <text x="595" y="212" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="8">P2 丢失</text>
  <line x1="365" y1="200" x2="395" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="470" y1="200" x2="485" y2="200" stroke="#666" stroke-width="1"/>
  <line x1="545" y1="200" x2="560" y2="200" stroke="#666" stroke-width="1"/>
  <path d="M 595 220 C 595 250, 320 250, 320 220" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#la)"/>
  <text x="460" y="260" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="9">← 只需从 Checkpoint 处重算，链条短得多 →</text>
  <text x="400" y="290" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="11">Checkpoint 截断 Lineage，把恢复起点从数据源提前到检查点</text>
  <defs><marker id="la" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#c62828"/></marker></defs>
</svg>
