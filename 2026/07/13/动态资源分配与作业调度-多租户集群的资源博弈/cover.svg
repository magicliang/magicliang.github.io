<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Dynamic Resource Allocation</text>
  <rect x="200" y="80" width="560" height="60" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="480" y="115" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="14">Cluster Resource Pool</text>
  <rect x="100" y="200" width="100" height="50" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="150" y="230" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Exec 0</text>
  <rect x="220" y="200" width="100" height="50" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="270" y="230" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Exec 1</text>
  <rect x="340" y="200" width="100" height="50" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="390" y="230" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Exec 2</text>
  <rect x="460" y="200" width="100" height="50" rx="5" fill="#533483" stroke="#e94560" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="510" y="225" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">+ Request</text>
  <rect x="580" y="200" width="100" height="50" rx="5" fill="#533483" stroke="#e94560" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="630" y="225" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">+ Request</text>
  <rect x="700" y="200" width="100" height="50" rx="5" fill="#16213e" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="750" y="225" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">- Release</text>
  <text x="510" y="290" fill="#e94560" font-family="monospace" font-size="12">↑ scale up (pending tasks)</text>
  <text x="700" y="290" fill="#666" font-family="monospace" font-size="12">↑ scale down (idle timeout)</text>
  <rect x="200" y="340" width="240" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="320" y="370" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">FAIR Scheduler</text>
  <rect x="520" y="340" width="240" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="640" y="370" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">FIFO Scheduler</text>
  <rect x="200" y="430" width="560" height="50" rx="6" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="480" y="460" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="12">External Shuffle Service (survives executor removal)</text>
  <text x="480" y="520" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Elastic executors — request on demand, release when idle</text>
</svg>
