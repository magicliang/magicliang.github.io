<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Spark vs Flink — Design Choices</text>
  <text x="260" y="85" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">Apache Spark</text>
  <text x="700" y="85" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">Apache Flink</text>
  <line x1="480" y1="70" x2="480" y2="500" stroke="#666" stroke-width="1" stroke-dasharray="6,3"/>
  <rect x="80" y="110" width="350" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="255" y="140" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Batch-first + Micro-batch Streaming</text>
  <rect x="530" y="110" width="350" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="705" y="140" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Stream-first + Batch as bounded stream</text>
  <rect x="80" y="190" width="350" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="255" y="220" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Stage-based DAG execution</text>
  <rect x="530" y="190" width="350" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="705" y="220" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Operator Chain + Network Buffer</text>
  <rect x="80" y="270" width="350" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="255" y="300" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Lineage recomputation (fault tolerance)</text>
  <rect x="530" y="270" width="350" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="705" y="300" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Chandy-Lamport distributed snapshots</text>
  <rect x="80" y="350" width="350" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="255" y="380" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">External State Store</text>
  <rect x="530" y="350" width="350" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="705" y="380" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Embedded RocksDB state backend</text>
  <rect x="80" y="430" width="350" height="50" rx="6" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="255" y="460" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">Catalyst + Tungsten CodeGen</text>
  <rect x="530" y="430" width="350" height="50" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="705" y="460" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Calcite + Vectorized execution</text>
  <text x="480" y="520" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Different design choices — not "better or worse"</text>
</svg>
