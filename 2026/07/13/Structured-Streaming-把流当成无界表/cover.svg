<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Structured Streaming — Unbounded Table</text>
  <text x="480" y="100" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="14">Input = Append-only Table</text>
  <rect x="150" y="120" width="660" height="100" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="150" y1="155" x2="810" y2="155" stroke="#0f3460" stroke-width="1"/>
  <line x1="150" y1="185" x2="700" y2="185" stroke="#0f3460" stroke-width="1"/>
  <text x="480" y="148" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">t=0  row row row row row row</text>
  <text x="440" y="178" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">t=1  row row row row row</text>
  <text x="380" y="208" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="10">t=2  row row row row  ← new data appended</text>
  <line x1="480" y1="230" x2="480" y2="270" stroke="#e94560" stroke-width="2"/>
  <rect x="300" y="270" width="360" height="60" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="480" y="300" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="14">Spark SQL Engine (Catalyst + Tungsten)</text>
  <text x="480" y="320" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">MicroBatch / Continuous Processing</text>
  <line x1="480" y1="330" x2="480" y2="370" stroke="#533483" stroke-width="2"/>
  <rect x="300" y="370" width="360" height="60" rx="8" fill="#16213e" stroke="#533483" stroke-width="2"/>
  <text x="480" y="400" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="14">Output Sink</text>
  <text x="480" y="420" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Append / Complete / Update mode</text>
  <rect x="60" y="280" width="180" height="40" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="150" y="305" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">Source: Kafka/File/Socket</text>
  <line x1="240" y1="300" x2="300" y2="300" stroke="#4ecca3" stroke-width="1.5"/>
  <rect x="720" y="380" width="180" height="40" rx="5" fill="#0f3460" stroke="#533483" stroke-width="1"/>
  <text x="810" y="405" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="11">Sink: Console/Kafka/DB</text>
  <line x1="660" y1="400" x2="720" y2="400" stroke="#533483" stroke-width="1.5"/>
  <text x="480" y="490" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Treat streams as tables — reuse batch engine</text>
</svg>
