<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="24" font-weight="bold">Project Tungsten — Three Pillars</text>
  <rect x="60" y="100" width="250" height="340" rx="10" fill="#16213e" stroke="#4ecca3" stroke-width="2"/>
  <text x="185" y="140" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">Off-Heap Memory</text>
  <text x="185" y="180" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">sun.misc.Unsafe</text>
  <text x="185" y="210" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">No GC overhead</text>
  <text x="185" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">Manual allocation</text>
  <rect x="100" y="270" width="170" height="50" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="185" y="290" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Execution Memory</text>
  <text x="185" y="310" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="10">↕ dynamic borrow</text>
  <rect x="100" y="330" width="170" height="50" rx="5" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="185" y="350" text-anchor="middle" fill="#fff" font-family="monospace" font-size="10">Storage Memory</text>
  <text x="185" y="370" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">(cache/broadcast)</text>
  <rect x="355" y="100" width="250" height="340" rx="10" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="480" y="140" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="16">Binary Format</text>
  <text x="480" y="180" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">UnsafeRow layout</text>
  <text x="480" y="210" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">No Java objects</text>
  <text x="480" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">Cache-friendly</text>
  <rect x="390" y="280" width="180" height="80" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="480" y="305" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">null bits | fixed | var</text>
  <text x="480" y="325" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">┌──┬──┬──┬──┬──────┐</text>
  <text x="480" y="345" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="9">│00│v1│v2│v3│ data │</text>
  <rect x="650" y="100" width="250" height="340" rx="10" fill="#16213e" stroke="#533483" stroke-width="2"/>
  <text x="775" y="140" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="16">Whole-Stage CodeGen</text>
  <text x="775" y="180" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">Fuse operators</text>
  <text x="775" y="210" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">No virtual calls</text>
  <text x="775" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="12">JIT-friendly</text>
  <rect x="690" y="280" width="170" height="80" rx="5" fill="#0f3460" stroke="#533483" stroke-width="1"/>
  <text x="775" y="300" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="10">Volcano Iterator</text>
  <text x="775" y="320" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">next() next() ...</text>
  <text x="775" y="340" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="10">→ Single Loop</text>
  <text x="480" y="490" text-anchor="middle" fill="#666" font-family="monospace" font-size="14">Bypass JVM object model for maximum throughput</text>
</svg>
