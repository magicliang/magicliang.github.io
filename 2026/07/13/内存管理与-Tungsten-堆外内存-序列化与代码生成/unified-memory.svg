<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <rect width="800" height="350" fill="#fff"/>
  <text x="400" y="25" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="15" font-weight="bold">Executor 统一内存管理（Spark 1.6+）</text>
  <!-- Total memory bar -->
  <rect x="50" y="50" width="700" height="220" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="400" y="72" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="11">Executor JVM Heap (spark.executor.memory)</text>
  <!-- Reserved -->
  <rect x="60" y="85" width="100" height="170" rx="5" fill="#e0e0e0" stroke="#999" stroke-width="1"/>
  <text x="110" y="170" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10" transform="rotate(-90,110,170)">Reserved (300MB)</text>
  <!-- User Memory -->
  <rect x="170" y="85" width="100" height="170" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
  <text x="220" y="160" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="10">User</text>
  <text x="220" y="178" text-anchor="middle" fill="#1976d2" font-family="sans-serif" font-size="10">Memory</text>
  <text x="220" y="195" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="8">用户代码对象</text>
  <!-- Execution Memory -->
  <rect x="280" y="85" width="230" height="170" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="395" y="115" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="13" font-weight="bold">Execution Memory</text>
  <text x="395" y="140" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">Shuffle · Join · Sort 缓冲区</text>
  <text x="395" y="160" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">聚合中间数据</text>
  <text x="395" y="185" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">可驱逐 Storage 数据回收空间 ✓</text>
  <text x="395" y="240" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="9">默认占比 50%</text>
  <!-- Dynamic boundary -->
  <line x1="510" y1="85" x2="510" y2="255" stroke="#c62828" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="510" y="280" text-anchor="middle" fill="#c62828" font-family="sans-serif" font-size="10" font-weight="bold">动态边界（可互相借用）</text>
  <!-- Storage Memory -->
  <rect x="520" y="85" width="220" height="170" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="630" y="115" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="13" font-weight="bold">Storage Memory</text>
  <text x="630" y="140" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">RDD 缓存 (cache/persist)</text>
  <text x="630" y="160" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">广播变量</text>
  <text x="630" y="185" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="9">不能驱逐 Execution 数据 ✗</text>
  <text x="630" y="240" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="9">默认占比 50%</text>
  <!-- Borrow arrows -->
  <line x1="450" y1="205" x2="530" y2="205" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ma)"/>
  <text x="490" y="200" text-anchor="middle" fill="#388e3c" font-family="sans-serif" font-size="8">借用→</text>
  <line x1="570" y1="220" x2="480" y2="220" stroke="#f57c00" stroke-width="1.5" marker-end="url(#ma)"/>
  <text x="525" y="215" text-anchor="middle" fill="#f57c00" font-family="sans-serif" font-size="8">←借用</text>
  <!-- Bottom note -->
  <text x="400" y="315" text-anchor="middle" fill="#333" font-family="sans-serif" font-size="11">不对称规则：Execution 可驱逐 Storage 缓存，Storage 不能驱逐 Execution 数据</text>
  <text x="400" y="335" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="10">（缓存数据可通过 Lineage 重算，执行中的 Shuffle 数据不可丢弃）</text>
  <defs><marker id="ma" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#666"/></marker></defs>
</svg>
