<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="22" font-weight="bold">Predicate Pushdown &amp; Column Pruning</text>
  <text x="160" y="90" fill="#4ecca3" font-family="monospace" font-size="14">Catalyst Layer</text>
  <rect x="60" y="110" width="300" height="160" rx="10" fill="#16213e" stroke="#4ecca3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="210" y="145" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">Logical Plan</text>
  <text x="210" y="175" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">PushDownPredicates rule</text>
  <text x="210" y="200" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">ColumnPruning rule</text>
  <text x="210" y="230" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Filter → pushed to Scan</text>
  <text x="210" y="255" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Select cols → pruned in Scan</text>
  <line x1="360" y1="190" x2="420" y2="190" stroke="#e94560" stroke-width="2"/>
  <text x="660" y="90" fill="#e94560" font-family="monospace" font-size="14">DataSource Layer</text>
  <rect x="420" y="110" width="480" height="160" rx="10" fill="#16213e" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="660" y="145" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">DataSource V2 API</text>
  <rect x="440" y="160" width="130" height="35" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="505" y="182" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">SupportsPushDown</text>
  <rect x="590" y="160" width="130" height="35" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="655" y="182" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">SupportsColumnPruning</text>
  <rect x="740" y="160" width="140" height="35" rx="5" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="810" y="182" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="10">SupportsBatchRead</text>
  <rect x="500" y="220" width="250" height="35" rx="5" fill="#533483" stroke="#b794f6" stroke-width="1.5"/>
  <text x="625" y="242" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="11">Parquet / ORC Row Group Filter</text>
  <line x1="480" y1="300" x2="480" y2="350" stroke="#e94560" stroke-width="2"/>
  <rect x="200" y="350" width="560" height="80" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="480" y="380" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="14">Storage: HDFS / S3 / Delta Lake</text>
  <text x="480" y="410" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Only read required columns + matching row groups</text>
  <text x="480" y="490" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">Push computation to storage = less I/O</text>
</svg>
