<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="24" font-weight="bold">BlockManager — Unified Storage</text>
  <rect x="330" y="70" width="300" height="50" rx="8" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="480" y="102" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="16">BlockManager</text>
  <line x1="380" y1="120" x2="200" y2="180" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="480" y2="180" stroke="#4ecca3" stroke-width="1.5"/>
  <line x1="580" y1="120" x2="760" y2="180" stroke="#4ecca3" stroke-width="1.5"/>
  <rect x="100" y="180" width="200" height="100" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="200" y="210" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="14">MemoryStore</text>
  <text x="200" y="235" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">On-Heap / Off-Heap</text>
  <text x="200" y="260" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">RDD cache + Broadcast</text>
  <rect x="380" y="180" width="200" height="100" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="480" y="210" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="14">DiskStore</text>
  <text x="480" y="235" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Shuffle files</text>
  <text x="480" y="260" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Spill overflow</text>
  <rect x="660" y="180" width="200" height="100" rx="8" fill="#16213e" stroke="#533483" stroke-width="1.5"/>
  <text x="760" y="210" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="14">BlockTransferService</text>
  <text x="760" y="235" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Netty RPC</text>
  <text x="760" y="260" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="11">Remote block fetch</text>
  <rect x="80" y="360" width="160" height="50" rx="6" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="160" y="390" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">Broadcast Var</text>
  <rect x="300" y="360" width="160" height="50" rx="6" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="380" y="390" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">RDD Partitions</text>
  <rect x="520" y="360" width="160" height="50" rx="6" fill="#0f3460" stroke="#533483" stroke-width="1"/>
  <text x="600" y="390" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">Shuffle Data</text>
  <rect x="740" y="360" width="160" height="50" rx="6" fill="#0f3460" stroke="#4ecca3" stroke-width="1"/>
  <text x="820" y="390" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">Accumulator</text>
  <text x="480" y="480" text-anchor="middle" fill="#666" font-family="monospace" font-size="13">All data goes through BlockManager</text>
