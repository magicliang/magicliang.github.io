<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1a1a2e"/>
  <text x="480" y="45" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="26" font-weight="bold">RDD — Five Core Properties</text>
  <!-- Central RDD box -->
  <rect x="350" y="80" width="260" height="60" rx="10" fill="#0f3460" stroke="#4ecca3" stroke-width="2"/>
  <text x="480" y="118" text-anchor="middle" fill="#fff" font-family="monospace" font-size="20">RDD[T]</text>
  <!-- Five properties as branches -->
  <!-- 1. Partitions -->
  <rect x="40" y="200" width="160" height="50" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="120" y="220" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">① partitions</text>
  <text x="120" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Array[Partition]</text>
  <line x1="350" y1="110" x2="200" y2="210" stroke="#4ecca3" stroke-width="1.5"/>
  <!-- 2. Dependencies -->
  <rect x="40" y="310" width="160" height="50" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="120" y="330" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">② dependencies</text>
  <text x="120" y="350" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Seq[Dependency]</text>
  <line x1="350" y1="130" x2="200" y2="320" stroke="#e94560" stroke-width="1.5"/>
  <!-- 3. Compute -->
  <rect x="400" y="200" width="160" height="50" rx="8" fill="#16213e" stroke="#533483" stroke-width="1.5"/>
  <text x="480" y="220" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="11">③ compute</text>
  <text x="480" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">(Partition) =&gt; Iterator</text>
  <line x1="480" y1="140" x2="480" y2="200" stroke="#533483" stroke-width="1.5"/>
  <!-- 4. Partitioner -->
  <rect x="760" y="200" width="160" height="50" rx="8" fill="#16213e" stroke="#4ecca3" stroke-width="1.5"/>
  <text x="840" y="220" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="11">④ partitioner</text>
  <text x="840" y="240" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Option[Partitioner]</text>
  <line x1="610" y1="110" x2="760" y2="210" stroke="#4ecca3" stroke-width="1.5"/>
  <!-- 5. Preferred Locations -->
  <rect x="760" y="310" width="160" height="50" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="840" y="330" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">⑤ preferredLocations</text>
  <text x="840" y="350" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="10">Seq[String]</text>
  <line x1="610" y1="130" x2="760" y2="320" stroke="#e94560" stroke-width="1.5"/>
  <!-- Bottom labels -->
  <text x="120" y="430" text-anchor="middle" fill="#4ecca3" font-family="monospace" font-size="12">What to compute</text>
  <text x="480" y="290" text-anchor="middle" fill="#b794f6" font-family="monospace" font-size="12">How to compute</text>
  <text x="840" y="430" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12">Where to compute</text>
  <!-- Subtitle -->
  <text x="480" y="510" text-anchor="middle" fill="#666" font-family="monospace" font-size="14">Not a data container — a computation recipe</text>
</svg>
