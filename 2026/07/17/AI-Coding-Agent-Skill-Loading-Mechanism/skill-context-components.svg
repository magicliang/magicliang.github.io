<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Skill 从文件来源进入模型上下文的组件结构</title>
  <desc id="desc">图中区分内容来源、宿主注册与路由、上下文装配、模型执行、缓存压缩和外部状态。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .label{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;fill:#0f172a}
      .small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;fill:#475569}
      .tiny{font:500 14px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;fill:#64748b}
      .lane{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;fill:#334155;letter-spacing:.08em}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
      .accentBox{fill:#eef2ff;stroke:#818cf8;stroke-width:2;rx:18}
      .runtimeBox{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:18}
      .stateBox{fill:#f0fdf4;stroke:#4ade80;stroke-width:2;rx:18}
      .arrow{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#94a3b8;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1440" height="820" fill="url(#bg)"/>
  <rect x="36" y="30" width="1368" height="760" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="2" filter="url(#shadow)"/>

  <rect x="36" y="30" width="1368" height="64" rx="28" fill="url(#accent)"/>
  <text x="70" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif" font-size="27" font-weight="700" fill="#fff">Skill 加载系统：文件已被宿主读取，不等于正文已经进入模型上下文</text>

  <text x="70" y="134" class="lane">内容来源</text>
  <text x="70" y="310" class="lane">宿主控制面</text>
  <text x="70" y="506" class="lane">模型执行面</text>
  <text x="70" y="690" class="lane">长会话状态</text>

  <rect x="210" y="112" width="220" height="108" class="box"/>
  <text x="320" y="151" text-anchor="middle" class="label">项目指令</text>
  <text x="320" y="180" text-anchor="middle" class="small">AGENTS / CLAUDE</text>
  <text x="320" y="204" text-anchor="middle" class="tiny">Rules / Instructions</text>

  <rect x="468" y="112" width="220" height="108" class="box"/>
  <text x="578" y="151" text-anchor="middle" class="label">Skill Bundle</text>
  <text x="578" y="180" text-anchor="middle" class="small">SKILL.md</text>
  <text x="578" y="204" text-anchor="middle" class="tiny">scripts / refs / assets</text>

  <rect x="726" y="112" width="220" height="108" class="box"/>
  <text x="836" y="151" text-anchor="middle" class="label">工具与 MCP</text>
  <text x="836" y="180" text-anchor="middle" class="small">Tool schemas</text>
  <text x="836" y="204" text-anchor="middle" class="tiny">local / remote capability</text>

  <rect x="984" y="112" width="220" height="108" class="box"/>
  <text x="1094" y="151" text-anchor="middle" class="label">外部状态</text>
  <text x="1094" y="180" text-anchor="middle" class="small">Memory / Files</text>
  <text x="1094" y="204" text-anchor="middle" class="tiny">spec / logs / history</text>

  <rect x="210" y="284" width="220" height="112" class="accentBox"/>
  <text x="320" y="326" text-anchor="middle" class="label">Registries</text>
  <text x="320" y="357" text-anchor="middle" class="small">metadata / parsed body</text>
  <text x="320" y="381" text-anchor="middle" class="tiny">面向宿主进程</text>

  <rect x="492" y="284" width="220" height="112" class="accentBox"/>
  <text x="602" y="326" text-anchor="middle" class="label">Router</text>
  <text x="602" y="357" text-anchor="middle" class="small">任务 / 权限 / 作用域</text>
  <text x="602" y="381" text-anchor="middle" class="tiny">显式或模型选择</text>

  <rect x="774" y="284" width="220" height="112" class="accentBox"/>
  <text x="884" y="326" text-anchor="middle" class="label">Loader</text>
  <text x="884" y="357" text-anchor="middle" class="small">body / ref / script</text>
  <text x="884" y="381" text-anchor="middle" class="tiny">从磁盘、缓存或插件取得</text>

  <rect x="1056" y="284" width="260" height="112" class="accentBox"/>
  <text x="1186" y="326" text-anchor="middle" class="label">Context Assembler</text>
  <text x="1186" y="357" text-anchor="middle" class="small">instructions / tools / messages</text>
  <text x="1186" y="381" text-anchor="middle" class="tiny">决定模型真正看见什么</text>

  <path d="M 320 220 L 320 276" class="arrow"/>
  <path d="M 578 220 C 578 248 430 250 374 282" class="arrow"/>
  <path d="M 836 220 C 836 248 930 252 930 282" class="arrow"/>
  <path d="M 1094 220 C 1094 248 1186 252 1186 282" class="arrow"/>
  <path d="M 430 340 L 484 340" class="arrow"/>
  <path d="M 712 340 L 766 340" class="arrow"/>
  <path d="M 994 340 L 1048 340" class="arrow"/>

  <rect x="268" y="478" width="260" height="118" class="runtimeBox"/>
  <text x="398" y="522" text-anchor="middle" class="label">Model Context</text>
  <text x="398" y="553" text-anchor="middle" class="small">catalog + selected body</text>
  <text x="398" y="579" text-anchor="middle" class="tiny">有限工作集</text>

  <rect x="590" y="478" width="238" height="118" class="runtimeBox"/>
  <text x="709" y="522" text-anchor="middle" class="label">Model</text>
  <text x="709" y="553" text-anchor="middle" class="small">route / reason / call</text>
  <text x="709" y="579" text-anchor="middle" class="tiny">当前决策器</text>

  <rect x="890" y="478" width="260" height="118" class="runtimeBox"/>
  <text x="1020" y="522" text-anchor="middle" class="label">Execution</text>
  <text x="1020" y="553" text-anchor="middle" class="small">tools / scripts / subagents</text>
  <text x="1020" y="579" text-anchor="middle" class="tiny">确定性动作与隔离上下文</text>

  <path d="M 1186 396 C 1186 440 510 438 430 476" class="arrow"/>
  <path d="M 528 537 L 582 537" class="arrow"/>
  <path d="M 828 537 L 882 537" class="arrow"/>
  <path d="M 890 570 C 816 626 526 626 468 596" class="dash"/>

  <rect x="268" y="664" width="260" height="96" class="stateBox"/>
  <text x="398" y="703" text-anchor="middle" class="label">Prompt Cache</text>
  <text x="398" y="733" text-anchor="middle" class="small">复用稳定前缀</text>

  <rect x="590" y="664" width="238" height="96" class="stateBox"/>
  <text x="709" y="703" text-anchor="middle" class="label">Compactor</text>
  <text x="709" y="733" text-anchor="middle" class="small">summary / retained tail</text>

  <rect x="890" y="664" width="260" height="96" class="stateBox"/>
  <text x="1020" y="703" text-anchor="middle" class="label">Rehydration</text>
  <text x="1020" y="733" text-anchor="middle" class="small">rules / skills / memory pointers</text>

  <path d="M 398 596 L 398 656" class="arrow"/>
  <path d="M 709 596 L 709 656" class="arrow"/>
  <path d="M 828 712 L 882 712" class="arrow"/>
  <path d="M 1020 664 C 1020 630 520 624 470 596" class="dash"/>

  <rect x="1220" y="478" width="96" height="282" rx="18" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1268" y="518" text-anchor="middle" class="label" transform="rotate(90 1268 518)">Hooks / Permissions / Trace</text>
</svg>
